<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Planning Cana">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest-responsable.json">
<link rel="apple-touch-icon" href="icon-responsable.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-responsable.png">
<link rel="icon" type="image/png" href="icon-responsable.png">
<meta name="theme-color" content="#be185d">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Planning Responsable — La Table de Cana</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<style>
:root{
  --bg:#0a1420; --card:#111f30; --card2:#16283c; --border:#1e3450;
  --muted:#7691ac; --txt:#e8eff7;
  --pink:#be185d; --pink2:#ec4899; --blue:#0ea5e9; --green:#22c55e;
  --orange:#f97316; --purple:#a855f7; --red:#ef4444; --amber:#f59e0b;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column;position:relative}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:12px}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px}
::-webkit-scrollbar{width:0}

/* ═══ LOGIN ═══ */
.login{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;background:radial-gradient(ellipse at top,#1a1228,#0a1420 60%);position:relative;overflow:hidden}
.halo{position:absolute;border-radius:50%;pointer-events:none;filter:blur(8px)}
.l-logo{width:104px;height:104px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 16px 44px rgba(190,24,93,.4);margin-bottom:18px;position:relative;z-index:2}
.l-welcome{font-size:13px;font-weight:700;color:var(--pink2);letter-spacing:3px;text-transform:uppercase;z-index:2}
.l-title{font-size:30px;font-weight:900;color:#fff;text-align:center;line-height:1.05;margin-top:4px;z-index:2}
.l-sub{font-size:13px;color:var(--muted);margin-top:10px;margin-bottom:30px;z-index:2}
.l-field{width:100%;max-width:320px;z-index:2}
.l-label{font-size:12px;font-weight:800;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.l-input{width:100%;background:rgba(255,255,255,.06);border:2px solid var(--border);border-radius:16px;color:#fff;padding:16px;font-size:20px;text-align:center;letter-spacing:6px;outline:none;transition:.2s}
.l-input:focus{border-color:var(--pink)}
.l-btn{width:100%;margin-top:16px;padding:17px;border-radius:16px;background:linear-gradient(135deg,var(--pink),#9d174d);color:#fff;font-size:16px;font-weight:900;box-shadow:0 10px 30px rgba(190,24,93,.4)}
.l-btn:active{transform:scale(.97)}
.l-err{color:var(--red);font-size:13px;font-weight:800;margin-top:14px;height:18px;text-align:center}

/* ═══ HEADER ═══ */
.hdr{background:linear-gradient(135deg,var(--pink),#9d174d);padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 20px rgba(190,24,93,.3);flex-shrink:0;position:relative;z-index:10}
.hdr-logo{width:38px;height:38px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-txt{flex:1;min-width:0}
.hdr-title{font-size:16px;font-weight:900;color:#fff;line-height:1.1}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.75);font-weight:600}
.hdr-sync{width:11px;height:11px;border-radius:50%;background:var(--green);box-shadow:0 0 8px currentColor;flex-shrink:0}
.hdr-back{background:rgba(255,255,255,.2);border-radius:11px;color:#fff;padding:9px 15px;font-size:15px;font-weight:800;display:flex;align-items:center;gap:5px;flex-shrink:0}

/* ═══ DATE BAR ═══ */
.datebar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.datebar-arrow{background:var(--card2);border:1px solid var(--border);border-radius:12px;color:#fff;width:44px;height:44px;font-size:22px;font-weight:800;display:flex;align-items:center;justify-content:center}
.datebar-arrow:active{background:var(--pink);border-color:var(--pink)}
.date-label{flex:1;text-align:center}
.date-day{font-size:16px;font-weight:900;color:#fff;text-transform:capitalize}
.date-today-badge{display:inline-block;font-size:9px;color:var(--pink2);font-weight:800;background:rgba(236,72,153,.15);padding:2px 8px;border-radius:6px;margin-top:2px}

/* ═══ STATS BAR ═══ */
.statsbar{display:flex;gap:8px;padding:12px;background:var(--bg)}
.stat{flex:1;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 8px;text-align:center}
.stat-num{font-size:22px;font-weight:900;line-height:1}
.stat-lbl{font-size:9px;color:var(--muted);font-weight:700;margin-top:3px;text-transform:uppercase;letter-spacing:.5px}

/* ═══ DRIVER CARD ═══ */
.dcard{background:var(--card);border:1px solid var(--border);border-radius:18px;margin:0 12px 12px;overflow:hidden}
.dcard-head{padding:13px 15px;display:flex;align-items:center;gap:11px;position:relative}
.dcard-avatar{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0}
.dcard-name{font-size:16px;font-weight:900;color:#fff}
.dcard-truck{font-size:11px;color:var(--amber);font-weight:700;display:flex;align-items:center;gap:4px;margin-top:1px}
.dcard-count{font-size:13px;font-weight:900;padding:6px 12px;border-radius:10px;flex-shrink:0}
.dcard-status{position:absolute;top:13px;right:15px;font-size:9px;font-weight:800;padding:3px 8px;border-radius:6px}

.mission{padding:11px 15px;border-top:1px solid var(--card2);display:flex;align-items:center;gap:12px}
.mission-time{font-size:19px;font-weight:900;min-width:54px;text-align:center;font-variant-numeric:tabular-nums}
.mission-bar{width:3px;align-self:stretch;border-radius:2px;min-height:34px}
.mission-info{flex:1;min-width:0}
.mission-client{font-size:14px;font-weight:800;color:#fff;line-height:1.2}
.mission-badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;display:inline-flex;align-items:center;gap:3px;margin-top:3px}
.mission-act{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}

.empty{text-align:center;padding:30px 20px;color:var(--muted);font-size:13px}
.empty-big{padding:60px 20px}
.empty-ico{font-size:44px;margin-bottom:14px}

/* ═══ FAB ═══ */
.fab{position:absolute;bottom:80px;right:16px;width:62px;height:62px;border-radius:20px;background:linear-gradient(135deg,var(--green),#16a34a);color:#fff;font-size:32px;box-shadow:0 10px 28px rgba(34,197,94,.5);z-index:50;display:flex;align-items:center;justify-content:center}
.fab:active{transform:scale(.92)}

/* ═══ BOTTOM NAV ═══ */
.botnav{background:var(--card);border-top:1px solid var(--border);display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.botnav button{flex:1;padding:9px 2px 11px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);position:relative}
.botnav button.active{color:var(--pink2)}
.botnav button.active::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:28px;height:3px;background:var(--pink2);border-radius:0 0 4px 4px}
.bn-ico{font-size:21px}
.bn-lbl{font-size:9px;font-weight:800}
.bn-badge{position:absolute;top:4px;right:calc(50% - 20px);background:var(--red);color:#fff;font-size:9px;font-weight:900;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px}

/* ═══ MENU GRID ═══ */
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px}
.menu-tile{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px 14px;display:flex;flex-direction:column;gap:10px}
.menu-tile:active{transform:scale(.97)}
.menu-tile-ico{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px}
.menu-tile-lbl{font-size:15px;font-weight:900;color:#fff}
.menu-tile-sub{font-size:11px;color:var(--muted)}

/* ═══ MODAL / SHEET ═══ */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.sheet{background:var(--card);border-radius:26px 26px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:8px 18px 30px;animation:up .3s cubic-bezier(.2,.8,.2,1)}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:40px;height:5px;background:var(--border);border-radius:3px;margin:8px auto 16px}
.sheet-title{font-size:19px;font-weight:900;color:#fff;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
.sheet-close{background:var(--card2);border-radius:11px;color:var(--muted);padding:9px 15px;font-size:13px;font-weight:800}
.field{margin-bottom:16px}
.field-lbl{display:block;font-size:12px;font-weight:800;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px}
.field-in{width:100%;background:var(--card2);border:2px solid var(--border);border-radius:14px;color:#fff;padding:14px 15px;outline:none;transition:.2s}
.field-in:focus{border-color:var(--pink)}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:11px 15px;border-radius:13px;border:2px solid var(--border);background:var(--card2);color:var(--muted);font-size:13px;font-weight:800}
.big-btn{width:100%;padding:16px;border-radius:15px;font-size:16px;font-weight:900;color:#fff;margin-top:6px}
.big-save{background:linear-gradient(135deg,var(--green),#16a34a)}
.big-danger{background:rgba(239,68,68,.14);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.big-blue{background:linear-gradient(135deg,var(--blue),#0369a1)}

/* ═══ TOAST ═══ */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#16a34a;color:#fff;padding:13px 22px;border-radius:14px;font-size:14px;font-weight:800;z-index:3000;box-shadow:0 10px 30px rgba(0,0,0,.4);max-width:90%;text-align:center}

/* ═══ MAP ═══ */
#map{width:100%;height:100%;border-radius:0}
.map-wrap{flex:1;position:relative}
.leaflet-container{background:#0a1420}

/* ═══ CARDS (livraisons, congés) ═══ */
.info-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 15px;margin:0 12px 10px;display:flex;align-items:center;gap:12px}
.info-card-photo{width:48px;height:48px;border-radius:11px;object-fit:cover;flex-shrink:0}

/* SEARCH */
.search-box{margin:12px;position:relative}
.search-in{width:100%;background:var(--card);border:2px solid var(--border);border-radius:16px;color:#fff;padding:15px 16px 15px 46px;font-size:15px;outline:none}
.search-in:focus{border-color:var(--pink)}
.search-ico{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:18px}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ═══════════════════════════════════════════════════════════
   PLANNING RESPONSABLE MOBILE PRO — La Table de Cana
   Fichier INDÉPENDANT. Même base Supabase que le planning bureau.
   Ne touche PAS à planning.html.
═══════════════════════════════════════════════════════════ */

var SUPA='https://lllzlidwtcjwsxbgkygn.supabase.co';
var KEY='sb_publishable_3weqcRqeCv9lwclSAPC2rA_48OAwGcV';
var H={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'};
var HM=Object.assign({'Prefer':'resolution=merge-duplicates,return=minimal'},H);

var DRIVERS=[
  {name:'OTMANE',truck:'VIVARO 1',color:'#3b82f6',start:'06:00',end:'14:00'},
  {name:'MOMO',truck:'JUMPY',color:'#22c55e',start:'06:00',end:'14:00'},
  {name:'MOHAMED',truck:'IVECO',color:'#a855f7',start:'06:00',end:'15:00'},
  {name:'ABDOU',truck:'VIVARO 2',color:'#f59e0b',start:'06:00',end:'14:00'},
  {name:'CHAUFFEUR 5',truck:'CAMION 5',color:'#ec4899',start:'06:00',end:'14:00'}
];

var CATS={
  traiteur:{lbl:'Traiteur',ico:'🎉',col:'#a855f7'},
  collectivite:{lbl:'Resto co',ico:'🏢',col:'#3b82f6'},
  centre:{lbl:'Centre',ico:'🌳',col:'#22c55e'},
  task:{lbl:'Tâche',ico:'📋',col:'#f59e0b'}
};

var CAMIONS=['JUMPY','VIVARO 1','VIVARO 2','IVECO','CAMION 5','VIVARO LOCATION','MASTER','TRAFIC'];
var RAYONS=['Frais','Sec','Surgelé','Boissons','Fruits & Légumes','Boucherie','Emballages','Matériel','Divers'];

var CODES={'1710':'Responsable','cana2026':'Direction','com2026':'Commercial','compta2026':'Compta','restoco2026':'Resto Co','rh2026':'RH','rse2026':'RSE'};

var LOGO_SVG='<svg width="66" height="66" viewBox="0 0 80 80"><circle cx="40" cy="40" r="16" fill="#be185d"/><circle cx="40" cy="12" r="6.5" fill="#be185d"/><circle cx="60" cy="20" r="6.5" fill="#be185d"/><circle cx="68" cy="40" r="6.5" fill="#be185d"/><circle cx="60" cy="60" r="6.5" fill="#be185d"/><circle cx="40" cy="68" r="6.5" fill="#be185d"/><circle cx="20" cy="60" r="6.5" fill="#be185d"/><circle cx="12" cy="40" r="6.5" fill="#be185d"/><circle cx="20" cy="20" r="6.5" fill="#ec4899"/></svg>';
var LOGO_MINI='<svg width="24" height="24" viewBox="0 0 80 80"><circle cx="40" cy="40" r="16" fill="#be185d"/><circle cx="40" cy="12" r="6.5" fill="#be185d"/><circle cx="60" cy="20" r="6.5" fill="#be185d"/><circle cx="68" cy="40" r="6.5" fill="#be185d"/><circle cx="60" cy="60" r="6.5" fill="#be185d"/><circle cx="40" cy="68" r="6.5" fill="#be185d"/><circle cx="20" cy="60" r="6.5" fill="#be185d"/><circle cx="12" cy="40" r="6.5" fill="#be185d"/><circle cx="20" cy="20" r="6.5" fill="#ec4899"/></svg>';

/* ═══ ÉTAT ═══ */
var ST={
  logged:false,
  service:'',
  cur:new Date().toISOString().slice(0,10),
  tasks:{},
  drivers:JSON.parse(JSON.stringify(DRIVERS)),
  page:'planning',
  sousPage:null,
  chargementFini:false,
  driversParDate:{},
  driversBase:JSON.parse(JSON.stringify(DRIVERS)),
  livraisons:[],
  statuts:{},
  positions:{},
  courses:[]
};

var SLOTS=['06:30'];
for(var _h=7;_h<=17;_h++){SLOTS.push(String(_h).padStart(2,'0')+':00');SLOTS.push(String(_h).padStart(2,'0')+':30');}

function gk(d,i,h){return d+'|'+i+'|'+h;}
/* Tâche (charger/décharger/commande) ou vraie livraison client ? */
function evEstTache(ev){
  if(ev && typeof ev.estTache==='boolean') return ev.estTache;
  return !!(ev && ev.category==='task');
}
function evLibelle(ev){ return (ev && ev.libelle) ? ev.libelle : (evEstTache(ev)?'Mission accomplie':'Livraison confirmée'); }
function evIcone(ev){ return evEstTache(ev) ? '📋' : '✅'; }
function todayStr(){return new Date().toISOString().slice(0,10);}
function $(id){return document.getElementById(id);}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

var JOURS=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
var MOIS=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
function fmtDate(s){var d=new Date(s+'T12:00:00');return JOURS[d.getDay()]+' '+d.getDate()+' '+MOIS[d.getMonth()];}
function fmtDateCourt(s){if(!s)return '';var d=new Date(s+'T12:00:00');return d.getDate()+'/'+String(d.getMonth()+1).padStart(2,'0');}

function toast(msg,col){
  var t=document.createElement('div');t.className='toast';if(col)t.style.background=col;
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(function(){t.style.transition='opacity .3s';t.style.opacity='0';setTimeout(function(){t.remove();},300);},2200);
}
function led(c){var l=$('sync-led');if(l)l.style.background=c;}

/* ═══ SUPABASE : PLANNING ═══ */
function chargerPlanning(cb){
  fetch(SUPA+'/rest/v1/planning?date=like.20*&order=date.desc&limit=400&select=date,donnees,updated_at',{headers:H,cache:'no-store'})
  .then(function(r){return r.ok?r.json():[];})
  .then(function(rows){
    if(!Array.isArray(rows)){if(cb)cb();return;}
    rows=rows.filter(function(r){
      if(!r.date)return false;
      var d=r.date;
      return !/^(EV_|INC_|STATUT_|POS_|BILAN_|HORS_|LISTE_|MESSAGES|CONGES_|REP_|AUDIT_|test)/.test(d);
    });
    var data=null,maxD=0,tasksAll={},dpd={};
    var estDate=function(x){return /^\d{4}-\d{2}-\d{2}$/.test(x);};
    rows.forEach(function(r){
      var d=r.donnees;
      if(typeof d==='string'){try{d=JSON.parse(d);}catch(e){d=null;}}
      r.donnees=d;
      if(!d)return;
      if(d.drivers&&d.drivers.length>=maxD){maxD=d.drivers.length;data=d;}
      if(d.drivers&&d.drivers.length&&estDate(r.date))dpd[r.date]=d.drivers;
    });
    /* RÈGLE : la ligne d'une date fait AUTORITÉ sur ses propres tâches.
       (avant : « le plus de tâches gagne » → les suppressions revenaient) */
    var datesAvecLigne={};
    rows.forEach(function(r){ if(estDate(r.date)) datesAvecLigne[r.date]=true; });
    var parRecence=rows.slice().sort(function(a,b){
      return String(b.updated_at||'').localeCompare(String(a.updated_at||''));
    });
    parRecence.forEach(function(r){
      if(!r.donnees||!r.donnees.tasks)return;
      Object.keys(r.donnees.tasks).forEach(function(k){
        var dk=k.split('|')[0];
        if(datesAvecLigne[dk])return;
        if(tasksAll[k])return;
        var arr=r.donnees.tasks[k];
        if(arr&&arr.length)tasksAll[k]=arr;
      });
    });
    rows.forEach(function(r){
      if(!estDate(r.date)||!r.donnees||!r.donnees.tasks)return;
      Object.keys(r.donnees.tasks).forEach(function(k){
        if(k.indexOf(r.date+'|')!==0)return;
        var arr=r.donnees.tasks[k];
        if(arr&&arr.length)tasksAll[k]=arr;
      });
    });
    ST.driversParDate=dpd;
    if(data&&data.drivers&&data.drivers.length)ST.driversBase=data.drivers.slice();
    ST.tasks=tasksAll;
    majDriversDuJour();
    ST.chargementFini=true;
    led('#22c55e');
    if(cb)cb();
  })
  .catch(function(){led('#ef4444');if(cb)cb();});
}

/* Recharge ST.drivers avec les horaires/camions de la date affichée (ST.cur) */
function majDriversDuJour(){
  var src = ST.driversParDate[ST.cur] || ST.driversBase || DRIVERS;
  var base = ST.driversBase || DRIVERS;
  /* On garde TOUJOURS tous les chauffeurs, même si une date en a moins
     d'enregistrés (sinon ils disparaîtraient du planning). */
  var n = Math.max(src.length, base.length, DRIVERS.length);
  var out = [];
  for(var i=0;i<n;i++){
    var d = src[i] || base[i] || DRIVERS[i] || {};
    var f = base[i] || DRIVERS[i] || {};
    out.push({
      name:  d.name  || f.name  || ('CHAUFFEUR '+(i+1)),
      truck: d.truck || f.truck || '',
      start: d.start || f.start || '06:00',
      end:   d.end   || f.end   || '14:00',
      color: (DRIVERS[i] ? DRIVERS[i].color : '#64748b'),
      _defini: !!(ST.driversParDate[ST.cur] && ST.driversParDate[ST.cur][i])
    });
  }
  ST.drivers = out;
}

function sauverPlanning(){
  if(!ST.chargementFini){toast('⏳ Chargement en cours, réessayez','#f59e0b');return;}
  led('#f59e0b');
  var dateSave=ST.cur;
  ST.driversParDate[dateSave]=ST.drivers.slice();
  var d={drivers:ST.drivers,tasks:ST.tasks,cur:ST.cur};
  fetch(SUPA+'/rest/v1/planning?date=eq.'+dateSave+'&select=date',{headers:H})
  .then(function(r){return r.ok?r.json():[];})
  .then(function(rows){
    var exists=rows&&rows.length>0;
    var url=exists?SUPA+'/rest/v1/planning?date=eq.'+dateSave:SUPA+'/rest/v1/planning';
    return fetch(url,{method:exists?'PATCH':'POST',headers:Object.assign({'Prefer':'return=minimal'},H),body:JSON.stringify({date:dateSave,donnees:d,updated_at:new Date().toISOString()})});
  })
  .then(function(r){led(r&&r.ok?'#22c55e':'#ef4444');})
  .catch(function(){led('#ef4444');});
}

/* ═══ MISSIONS DU JOUR ═══ */
function missionsDuJour(di,date){
  var res=[];
  SLOTS.forEach(function(slot){
    var k=gk(date,di,slot);
    (ST.tasks[k]||[]).forEach(function(t,i){
      if(!t||(!t.client&&!t.task))return;
      res.push({slot:slot,t:t,key:k,idx:i});
    });
  });
  return res;
}
function estLivre(t,client,di,date){
  if(t._livreParApp||t._statut==='done'||t.confirmed)return true;
  var nom=(client||'').toLowerCase();
  return ST.livraisons.some(function(l){
    return l.date===date && l.chauffeurId===di && (l.client||'').toLowerCase()===nom;
  });
}

function renderPlanning(){

  h+='<div class="scroll">';
  h+='<div class="statsbar">';
  h+='<div class="stat"><div class="stat-num" style="color:#fff">'+total+'</div><div class="stat-lbl">Missions</div></div>';
  h+='<div class="stat" style="border-color:rgba(34,197,94,.3)"><div class="stat-num" style="color:var(--green)">'+livrees+'</div><div class="stat-lbl">Livrées</div></div>';

  h+='<div class="stat" style="border-color:rgba(190,24,93,.3)"><div class="stat-num" style="color:var(--pink2)">'+ST.drivers.length+'</div><div class="stat-lbl">Chauffeurs</div></div>';
  h+='</div>';

  var stLbl={service:'EN SERVICE',enroute:'EN ROUTE',pause:'PAUSE',retour:'RETOUR',termine:'TERMINÉ',probleme:'PROBLÈME'};
  var stCol={service:'#22c55e',enroute:'#3b82f6',pause:'#f59e0b',retour:'#a855f7',termine:'#22c55e',probleme:'#ef4444'};

  ST.drivers.forEach(function(dr,di){
    var missions=missionsDuJour(di,ST.cur);
    var nbLiv=missions.filter(function(mi){return estLivre(mi.t,mi.t.client||mi.t.task,di,ST.cur);}).length;
    var s=ST.statuts[di];
    h+='<div class="dcard">';
    h+='<div class="dcard-head">';
    h+='<div class="dcard-avatar" style="background:'+dr.color+'">'+esc(dr.name[0])+'</div>';
    h+='<div style="flex:1;min-width:0" onclick="ouvrirChauffeur('+di+')">';
    h+='<div class="dcard-name">'+esc(dr.name)+'</div>';
    var _def=!!ST.driversParDate[ST.cur];
    h+='<div class="dcard-truck">🚛 '+esc(dr.truck)+' · <span style="color:'+(_def?'#fff':'var(--amber)')+'">🕐 '+esc(dr.start)+'-'+esc(dr.end)+(_def?'':' (à confirmer)')+'</span></div>';
    h+='</div>';
    var cCol=missions.length===0?'var(--muted)':(nbLiv===missions.length?'var(--green)':'var(--blue)');
    var cBg=missions.length===0?'rgba(118,145,172,.12)':(nbLiv===missions.length?'rgba(34,197,94,.15)':'rgba(14,165,233,.15)');
    h+='<div class="dcard-count" style="color:'+cCol+';background:'+cBg+'">'+nbLiv+'/'+missions.length+'</div>';
    h+='</div>';

    if(s&&ST.cur===today){
      var col=stCol[s.statut]||'#64748b';
      h+='<div style="padding:0 15px 9px"><span style="font-size:9px;font-weight:800;padding:3px 9px;border-radius:6px;background:'+col+'22;color:'+col+'">● '+(stLbl[s.statut]||'—')+(s.heure?' · '+esc(s.heure):'')+'</span></div>';
    }

    if(missions.length===0){
      h+='<div class="empty" style="padding:18px">Aucune mission — appuyez sur <b style="color:var(--green)">+</b> pour ajouter</div>';
    } else {
      missions.forEach(function(mi){
        var cat=CATS[mi.t.category]||{ico:'📦',col:'#64748b',lbl:''};
        var nom=mi.t.client||mi.t.task||'—';
        var liv=estLivre(mi.t,nom,di,ST.cur);
        h+='<div class="mission">';
        h+='<div class="mission-time" style="color:'+(liv?'var(--green)':cat.col)+'">'+mi.slot+'</div>';
        h+='<div class="mission-bar" style="background:'+(liv?'var(--green)':cat.col)+'"></div>';
        h+='<div class="mission-info" onclick="modifierMission(\''+mi.key+'\','+di+',\''+mi.slot+'\','+mi.idx+')">';
        h+='<div class="mission-client" style="'+(liv?'color:var(--muted);text-decoration:line-through':'')+'">'+esc(nom)+'</div>';
        h+='<span class="mission-badge" style="background:'+cat.col+'22;color:'+cat.col+'">'+cat.ico+' '+cat.lbl+'</span>';
        if(liv)h+='<span class="mission-badge" style="background:rgba(34,197,94,.15);color:var(--green);margin-left:5px">'+(mi.t.category==='task'?'📋 Fait':'✅ Livré')+'</span>';
        h+='</div>';
        h+='<button class="mission-act" style="background:rgba(190,24,93,.12);color:var(--pink2)" onclick="modifierMission(\''+mi.key+'\','+di+',\''+mi.slot+'\','+mi.idx+')">✏️</button>';
        h+='</div>';
      });
    }
    h+='</div>';
  });
  h+='<div style="height:80px"></div>';
  h+='</div>';
  return h;
}

function fermerModal(){var w=$('modal-wrap');if(w)w.remove();}

<script>
/* ═══════════════════ AJOUT MISSION ═══════════════════ */
window._editCat='traiteur';
function ouvrirAjout(diPre){
  window._editCat='traiteur';
  var h='<div class="modal" onclick="if(event.target===this)fermerModal()"><div class="sheet">';
  h+='<div class="sheet-handle"></div>';
  h+='<div class="sheet-title"><span>➕ Nouvelle mission</span><button class="sheet-close" onclick="fermerModal()">Fermer</button></div>';
  h+='<div class="field"><label class="field-lbl">Client / Tâche</label><input id="m-client" class="field-in" placeholder="Ex : Village Club Soleil" autocomplete="off"></div>';
  h+='<div class="field"><label class="field-lbl">Type</label><div class="chips" id="m-cats">';
  Object.keys(CATS).forEach(function(c){
    var cat=CATS[c];var on=(c==='traiteur');
    h+='<button class="chip'+(on?' on':'')+'" data-cat="'+c+'" onclick="choisirCat(\'m\',\''+c+'\')" style="'+(on?'border-color:'+cat.col+';background:'+cat.col+'22;color:'+cat.col:'')+'">'+cat.ico+' '+cat.lbl+'</button>';
  });
  h+='</div></div>';
  h+='<div class="field"><label class="field-lbl">Chauffeur</label><select id="m-driver" class="field-in">';
  ST.drivers.forEach(function(dr,i){h+='<option value="'+i+'"'+(diPre===i?' selected':'')+'>'+esc(dr.name)+' · '+esc(dr.truck)+'</option>';});
  h+='</select></div>';
  h+='<div class="field"><label class="field-lbl">Heure</label><select id="m-heure" class="field-in">';
  SLOTS.forEach(function(s){h+='<option value="'+s+'"'+(s==='08:00'?' selected':'')+'>'+s+'</option>';});
  h+='</select></div>';
  h+='<div class="field"><label class="field-lbl">Date</label><input id="m-date" class="field-in" type="date" value="'+ST.cur+'"></div>';
  h+='<button class="big-btn big-save" onclick="enregistrerMission()">✅ Ajouter la mission</button>';
  h+='</div></div>';
  var d=document.createElement('div');d.id='modal-wrap';d.innerHTML=h;document.body.appendChild(d);
  setTimeout(function(){var el=$('m-client');if(el)el.focus();},250);
}
function choisirCat(pfx,c){
  window._editCat=c;
  var nodes=document.querySelectorAll('#'+pfx+'-cats .chip');
  for(var i=0;i<nodes.length;i++){
    var ch=nodes[i];var key=ch.getAttribute('data-cat');var cat=CATS[key];
    if(key===c){ch.className='chip on';ch.style.cssText='border-color:'+cat.col+';background:'+cat.col+'22;color:'+cat.col;}
    else{ch.className='chip';ch.style.cssText='';}
  }
}
function enregistrerMission(){
  var el=$('m-client');
  var client=(el.value||'').trim();
  if(!client){el.style.borderColor='#ef4444';el.focus();return;}
  var di=parseInt($('m-driver').value);
  var heure=$('m-heure').value;
  var date=$('m-date').value||ST.cur;
  var cat=window._editCat;
  if(date!==ST.cur)ST.cur=date;
  var k=gk(date,di,heure);
  if(!ST.tasks[k])ST.tasks[k]=[];
  ST.tasks[k].push({
    task:cat==='task'?client:'',
    client:cat==='task'?'':client,
    category:cat,truck:ST.drivers[di].truck,end:'',bold:false,priority:false,
    ts:Date.now()
  });
  sauverPlanning();
  fermerModal();
  render();
  toast('✅ Mission ajoutée · '+esc(ST.drivers[di].name));
}

/* ═══════════════════ MODIFIER / SUPPRIMER ═══════════════════ */
function modifierMission(key,di,slot,idx){
  var arr=ST.tasks[key]||[];
  var t=arr[idx];if(!t)return;
  window._editCat=t.category||'traiteur';
  var nom=t.client||t.task||'';
  var h='<div class="modal" onclick="if(event.target===this)fermerModal()"><div class="sheet">';
  h+='<div class="sheet-handle"></div>';
  h+='<div class="sheet-title"><span>✏️ Modifier</span><button class="sheet-close" onclick="fermerModal()">Fermer</button></div>';
  h+='<div class="field"><label class="field-lbl">Client / Tâche</label><input id="e-client" class="field-in" value="'+esc(nom)+'"></div>';
  h+='<div class="field"><label class="field-lbl">Type</label><div class="chips" id="e-cats">';
  Object.keys(CATS).forEach(function(c){
    var cat=CATS[c];var on=(c===window._editCat);
    h+='<button class="chip'+(on?' on':'')+'" data-cat="'+c+'" onclick="choisirCat(\'e\',\''+c+'\')" style="'+(on?'border-color:'+cat.col+';background:'+cat.col+'22;color:'+cat.col:'')+'">'+cat.ico+' '+cat.lbl+'</button>';
  });
  h+='</div></div>';
  h+='<div class="field"><label class="field-lbl">Chauffeur / Tournée</label><select id="e-driver" class="field-in">';
  ST.drivers.forEach(function(dr,i){h+='<option value="'+i+'"'+(i===di?' selected':'')+'>'+esc(dr.name)+' · '+esc(dr.truck)+'</option>';});
  h+='</select></div>';
  h+='<div class="field"><label class="field-lbl">Heure</label><select id="e-heure" class="field-in">';
  SLOTS.forEach(function(s){h+='<option value="'+s+'"'+(s===slot?' selected':'')+'>'+s+'</option>';});
  h+='</select></div>';
  h+='<button class="big-btn big-save" onclick="sauverModif(\''+key+'\','+idx+')">✅ Enregistrer</button>';
  h+='<button class="big-btn big-danger" style="margin-top:10px" onclick="supprimerMission(\''+key+'\','+idx+')">🗑️ Supprimer la mission</button>';
  h+='</div></div>';
  var d=document.createElement('div');d.id='modal-wrap';d.innerHTML=h;document.body.appendChild(d);
}
function sauverModif(key,idx){
  var arr=ST.tasks[key]||[];var t=arr[idx];if(!t)return;
  var client=($('e-client').value||'').trim();
  if(!client){$('e-client').style.borderColor='#ef4444';return;}
  var newDi=parseInt($('e-driver').value);
  var newHeure=$('e-heure').value;
  var cat=window._editCat;
  arr.splice(idx,1);
  if(arr.length===0)delete ST.tasks[key];
  var nk=gk(ST.cur,newDi,newHeure);
  if(!ST.tasks[nk])ST.tasks[nk]=[];
  ST.tasks[nk].push({
    task:cat==='task'?client:'',client:cat==='task'?'':client,
    category:cat,truck:ST.drivers[newDi].truck,end:t.end||'',bold:t.bold||false,priority:t.priority||false,
    ts:t.ts||Date.now()
  });

    h+='<button class="chip'+(on?' on':'')+'" style="'+(on?'border-color:var(--purple);background:rgba(168,85,247,.2);color:#c084fc':'')+'" onclick="preremplirHoraires(\''+p[0]+'\',\''+p[1]+'\')">'+p[0]+' – '+p[1]+'</button>';
  });

function preremplirHoraires(s,e){
  var a=$('h-start'), b=$('h-end');
  if(a)a.value=s; if(b)b.value=e;
  document.querySelectorAll('.chips .chip').forEach(function(c){
    var on=c.textContent.trim()===s+' – '+e;
    c.className='chip'+(on?' on':'');
    c.style.cssText=on?'border-color:var(--purple);background:rgba(168,85,247,.2);color:#c084fc':'';
  });
}

function appliquerHoraires(di,semaine){
  var s=$('h-start').value, e=$('h-end').value;
  if(s>=e){toast('⚠️ La fin doit être après le début','#ef4444');return;}
  if(!semaine){
    ST.drivers[di].start=s; ST.drivers[di].end=e;
    sauverPlanning();
    fermerModal(); render();
    toast('🕐 '+esc(ST.drivers[di].name)+' : '+s+' – '+e);
    return;
  }
  /* Toute la semaine : lundi → samedi de la semaine affichée */
  var d=new Date(ST.cur+'T12:00:00');
  var jour=d.getDay(); if(jour===0)jour=7;
  var lundi=new Date(d); lundi.setDate(d.getDate()-(jour-1));
  var dates=[];
  for(var i=0;i<6;i++){var x=new Date(lundi);x.setDate(lundi.getDate()+i);dates.push(x.toISOString().slice(0,10));}

  if(!confirm('Appliquer '+s+' – '+e+' à '+ST.drivers[di].name+' du lundi au samedi ?\n\n('+dates[0]+' → '+dates[5]+')'))return;
  fermerModal();
  toast('⏳ Enregistrement de la semaine...','#f59e0b');
  ecrireHorairesSemaine(di,s,e,dates,0);
}

/* Écrit les horaires date par date (une par une, pour ne rien écraser) */
function ecrireHorairesSemaine(di,s,e,dates,i){
  if(i>=dates.length){
    chargerPlanning(function(){render();toast('✅ Semaine enregistrée : '+s+' – '+e);});
    return;
  }
  var date=dates[i];
  fetch(SUPA+'/rest/v1/planning?date=eq.'+date+'&select=date,donnees',{headers:H,cache:'no-store'})
  .then(function(r){return r.ok?r.json():[];})
  .then(function(rows){
    var existe=rows&&rows.length>0;
    var d=null;
    if(existe&&rows[0].donnees){
      d=rows[0].donnees;
      if(typeof d==='string'){try{d=JSON.parse(d);}catch(err){d=null;}}
    }
    if(!d)d={};
    /* On repart des horaires déjà en place pour ce jour : on ne touche QUE ce chauffeur */
    var drv = (d.drivers&&d.drivers.length) ? d.drivers.slice() : (ST.driversParDate[date]||ST.driversBase||DRIVERS).slice();
    drv = drv.map(function(x,k){
      return {name:x.name||DRIVERS[k].name, truck:x.truck||DRIVERS[k].truck,
              start:x.start||DRIVERS[k].start, end:x.end||DRIVERS[k].end};
    });
    if(!drv[di])drv[di]={name:DRIVERS[di].name,truck:DRIVERS[di].truck};
    drv[di].start=s; drv[di].end=e;
    d.drivers=drv;
    if(!d.tasks)d.tasks={};
    var url=existe?SUPA+'/rest/v1/planning?date=eq.'+date:SUPA+'/rest/v1/planning';
    return fetch(url,{method:existe?'PATCH':'POST',headers:Object.assign({'Prefer':'return=minimal'},H),
      body:JSON.stringify({date:date,donnees:d,updated_at:new Date().toISOString()})});
  })
  .then(function(){ecrireHorairesSemaine(di,s,e,dates,i+1);})
  .catch(function(){ecrireHorairesSemaine(di,s,e,dates,i+1);});
}


/* ═══════════════════ HORAIRES DU MOIS (partagés avec le planning) ═══════════════════ */
var HM={mois:'',data:{},drv:0,charge:false};
function hmCle(x){return 'HORAIRES_'+x;}
function hmDuree(s,e){
  if(!s||!e)return 0;
  var a=s.split(':'),b=e.split(':');
  var m1=parseInt(a[0],10)*60+parseInt(a[1],10), m2=parseInt(b[0],10)*60+parseInt(b[1],10);
  if(m2<=m1)m2+=1440;
  return (m2-m1)/60;
}
function hmFmt(h){if(!h)return '—';var t=Math.round(h*60),hh=Math.floor(t/60),mm=t%60;return hh+'h'+(mm?String(mm).padStart(2,'0'):'');}
function hmNomMois(x){var p=x.split('-');return MOIS[parseInt(p[1],10)-1]+' '+p[0];}
function hmJoursDuMois(x){
  var p=x.split('-'),an=parseInt(p[0],10),mo=parseInt(p[1],10);
  var n=new Date(an,mo,0).getDate(),out=[];
  var JC=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  for(var i=1;i<=n;i++){
    var ds=an+'-'+String(mo).padStart(2,'0')+'-'+String(i).padStart(2,'0');
    var d=new Date(ds+'T12:00:00');
    out.push({date:ds,num:i,jour:JC[d.getDay()],we:(d.getDay()===0||d.getDay()===6)});
  }
  return out;
}
function hmGet(di,date){var d=HM.data[String(di)];return (d&&d[date])?d[date]:null;}
function hmSet(di,date,s,e){
  var k=String(di);
  if(!HM.data[k])HM.data[k]={};
  if(!s&&!e){delete HM.data[k][date];return;}
  HM.data[k][date]={s:s||'',e:e||''};
}
function hmCharger(mois,cb){
  fetch(SUPA+'/rest/v1/planning?date=eq.'+hmCle(mois)+'&select=donnees&limit=1',{headers:H,cache:'no-store'})
  .then(function(r){return r.ok?r.json():[];})
  .then(function(rows){
    var d=null;
    if(rows&&rows.length&&rows[0].donnees){
      d=rows[0].donnees;
      if(typeof d==='string'){try{d=JSON.parse(d);}catch(e){d=null;}}
    }
    HM.mois=mois; HM.data=(d&&d.h)?d.h:{}; HM.charge=true;
    if(cb)cb();
  })
  .catch(function(){HM.mois=mois;HM.data={};HM.charge=true;if(cb)cb();});
}
function hmSauver(){
  if(!HM.charge)return;
  led('#f59e0b');
  fetch(SUPA+'/rest/v1/planning',{method:'POST',headers:HM_H(),
    body:JSON.stringify({date:hmCle(HM.mois),donnees:{type:'horaires_mois',mois:HM.mois,h:HM.data,ts:new Date().toISOString()},updated_at:new Date().toISOString()})})
  .then(function(r){led(r&&r.ok?'#22c55e':'#ef4444');})
  .catch(function(){led('#ef4444');});
}
function HM_H(){return Object.assign({'Prefer':'resolution=merge-duplicates,return=minimal'},H);}

function chargerHoraires(){
  var mois=(ST.cur||todayStr()).slice(0,7);
  var el=$('page-content');
  if(el)el.innerHTML='<div class="empty">⏳ Chargement des horaires...</div>';
  hmCharger(mois,function(){afficherHoraires();});
}
function hmChangerMois(delta){
  var p=HM.mois.split('-');
  var d=new Date(parseInt(p[0],10),parseInt(p[1],10)-1+delta,1);
  var mm=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  var el=$('page-content'); if(el)el.innerHTML='<div class="empty">⏳ Chargement...</div>';
  hmCharger(mm,function(){afficherHoraires();});
}
function hmChoisirDrv(i){HM.drv=i;afficherHoraires();}

function afficherHoraires(){
  var el=$('page-content'); if(!el)return;
  var di=HM.drv, dr=ST.drivers[di]||{name:'?',color:'#64748b'};
  var jours=hmJoursDuMois(HM.mois);
  var total=0,nb=0;
  var h='<div style="padding:12px">';

  /* Mois */
  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">';
  h+='<button class="datebar-arrow" onclick="hmChangerMois(-1)">‹</button>';
  h+='<div style="flex:1;text-align:center;font-size:16px;font-weight:900;color:#fff;text-transform:capitalize">'+hmNomMois(HM.mois)+'</div>';
  h+='<button class="datebar-arrow" onclick="hmChangerMois(1)">›</button>';
  h+='</div>';

  /* Chauffeurs */
  h+='<div style="display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding-bottom:4px">';
  ST.drivers.forEach(function(x,i){
    var on=(i===di);
    h+='<button onclick="hmChoisirDrv('+i+')" style="flex-shrink:0;padding:9px 14px;border-radius:11px;border:2px solid '+(on?x.color:'var(--border)')+';background:'+(on?x.color+'22':'transparent')+';color:'+(on?x.color:'var(--muted)')+';font-size:12px;font-weight:800">'+esc(x.name)+'</button>';
  });
  h+='</div>';

  /* Calcul */
  var lignes='';
  jours.forEach(function(j){
    var v=hmGet(di,j.date);
    var s=v?v.s:'', e=v?v.e:'';
    var dur=hmDuree(s,e);
    if(dur>0){total+=dur;nb++;}
    lignes+='<div style="display:flex;align-items:center;gap:9px;padding:9px 11px;margin-bottom:5px;border-radius:11px;background:'+(v?'var(--card)':'transparent')+';border:1px solid '+(v?'var(--border)':'rgba(255,255,255,.05)')+';'+((!v&&j.we)?'opacity:.45':'')+'">';
    lignes+='<div style="text-align:center;min-width:38px"><div style="font-size:9px;font-weight:800;color:var(--muted)">'+j.jour+'</div><div style="font-size:17px;font-weight:900;color:'+(v?'#fff':'var(--muted)')+';line-height:1">'+j.num+'</div></div>';
    lignes+='<input type="time" value="'+s+'" onchange="hmMaj('+di+',\''+j.date+'\',this.value,null)" style="background:var(--card2);border:1px solid '+(s?'var(--blue)':'var(--border)')+';border-radius:8px;color:#93c5fd;font-size:13px;font-weight:700;padding:6px;width:86px">';
    lignes+='<span style="color:var(--muted);font-size:12px">→</span>';
    lignes+='<input type="time" value="'+e+'" onchange="hmMaj('+di+',\''+j.date+'\',null,this.value)" style="background:var(--card2);border:1px solid '+(e?'var(--blue)':'var(--border)')+';border-radius:8px;color:#93c5fd;font-size:13px;font-weight:700;padding:6px;width:86px">';
    lignes+='<div style="flex:1;text-align:right;font-size:13px;font-weight:900;color:'+(dur?'var(--green)':'#334155')+'">'+hmFmt(dur)+'</div>';
    lignes+='</div>';
  });

  /* Total */
  h+='<div style="background:linear-gradient(135deg,var(--card),var(--bg));border:1px solid rgba(34,197,94,.35);border-radius:16px;padding:14px 16px;margin-bottom:12px">';
  h+='<div style="font-size:11px;color:var(--muted);font-weight:800;text-transform:uppercase">Total · '+esc(dr.name)+'</div>';
  h+='<div style="font-size:30px;font-weight:900;color:var(--green);line-height:1.1">'+hmFmt(total)+'</div>';
  h+='<div style="font-size:11px;color:var(--muted)">'+nb+' jour'+(nb>1?'s':'')+' · moyenne '+hmFmt(nb?total/nb:0)+'/jour</div>';
  h+='</div>';

  /* Remplissage rapide */
  h+='<div class="chips" style="margin-bottom:12px">';
  [['06:00','14:00'],['06:00','15:00'],['07:00','15:00'],['08:00','16:00']].forEach(function(p){
    h+='<button class="chip" onclick="hmRemplirMois(\''+p[0]+'\',\''+p[1]+'\')" style="font-size:11px;padding:9px 11px">'+p[0]+'–'+p[1]+'</button>';
  });
  h+='<button class="chip" onclick="hmViderMois()" style="font-size:11px;padding:9px 11px;border-color:rgba(239,68,68,.4);color:var(--red)">🗑️ Vider</button>';
  h+='</div>';

  h+=lignes;
  h+='<div style="height:20px"></div></div>';
  el.innerHTML=h;
}
function hmMaj(di,date,s,e){
  var v=hmGet(di,date)||{s:'',e:''};
  if(s!==null)v.s=s;
  if(e!==null)v.e=e;
  hmSet(di,date,v.s,v.e);
  hmSauver();
  afficherHoraires();
}
function hmRemplirMois(s,e){
  var di=HM.drv, dr=ST.drivers[di]||{name:'?'};
  if(!confirm('Remplir tout '+hmNomMois(HM.mois)+' pour '+dr.name+' ?\n\n'+s+' → '+e+', du lundi au vendredi.'))return;
  hmJoursDuMois(HM.mois).forEach(function(j){if(!j.we)hmSet(di,j.date,s,e);});
  hmSauver(); afficherHoraires();
  toast('✅ Mois rempli : '+s+' → '+e);
}
function hmViderMois(){
  var di=HM.drv, dr=ST.drivers[di]||{name:'?'};
  if(!confirm('Effacer tous les horaires de '+dr.name+' pour '+hmNomMois(HM.mois)+' ?'))return;
  delete HM.data[String(di)];
  hmSauver(); afficherHoraires();
  toast('🗑️ Effacé','#ef4444');
}

/* ═══════════════════ RECHERCHE CLIENT ═══════════════════ */
function renderRecherche(){
  var h='<div class="scroll">';
  h+='<div class="search-box"><span class="search-ico">🔍</span>';
  h+='<input id="rc-input" class="search-in" placeholder="Nom du client..." oninput="rechercheClient(this.value)" autocomplete="off"></div>';
  h+='<div id="rc-results"><div class="empty empty-big"><div class="empty-ico">🔍</div>Tapez au moins 2 lettres<br>pour chercher dans tout le planning</div></div>';
  h+='</div>';
  return h;
}
function rechercheClient(terme){
  var el=$('rc-results');if(!el)return;
  terme=(terme||'').trim().toLowerCase();
  if(terme.length<2){el.innerHTML='<div class="empty empty-big"><div class="empty-ico">🔍</div>Tapez au moins 2 lettres</div>';return;}
  var today=todayStr();var res=[];
  Object.keys(ST.tasks).forEach(function(k){
    var p=k.split('|');var date=p[0],di=parseInt(p[1]),heure=p[2];
    (ST.tasks[k]||[]).forEach(function(t){
      var nom=(t.client||t.task||'');
      if(nom.toLowerCase().indexOf(terme)>=0){
        res.push({client:nom,date:date,heure:heure,di:di,cat:t.category,livre:estLivre(t,nom,di,date)});
      }
    });
  });
  res.sort(function(a,b){
    var aT=(a.date===today)?0:(a.date>today?1:2);
    var bT=(b.date===today)?0:(b.date>today?1:2);
    if(aT!==bT)return aT-bT;
    return a.date.localeCompare(b.date);
  });
  if(!res.length){el.innerHTML='<div class="empty empty-big"><div class="empty-ico">🤷</div>Aucun client trouvé</div>';return;}
  var h='<div style="font-size:12px;color:var(--muted);font-weight:800;margin:0 12px 10px">'+res.length+' résultat'+(res.length>1?'s':'')+'</div>';
  res.slice(0,30).forEach(function(r){
    var cat=CATS[r.cat]||{ico:'📦',col:'#64748b',lbl:''};
    var dr=ST.drivers[r.di];
    var badge=r.livre
      ? '<span class="mission-badge" style="background:rgba(34,197,94,.15);color:var(--green)">✅ Livré</span>'
      : (r.date===today
        ? '<span class="mission-badge" style="background:rgba(249,115,22,.15);color:var(--orange)">⏳ À livrer</span>'
        : (r.date>today
          ? '<span class="mission-badge" style="background:rgba(59,130,246,.15);color:var(--blue)">📅 Prévu</span>'
          : '<span class="mission-badge" style="background:rgba(118,145,172,.12);color:var(--muted)">Passé</span>'));
    h+='<div class="info-card" style="border-left:3px solid '+cat.col+'" onclick="allerAuJour(\''+r.date+'\')">';
    h+='<div style="font-size:22px">'+cat.ico+'</div>';
    h+='<div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:800;color:#fff">'+esc(r.client)+'</div>';
    h+='<div style="font-size:11px;color:var(--muted);margin-top:2px">📅 '+fmtDate(r.date)+' · 🕐 '+r.heure+' · 🚛 '+esc(dr?dr.name:'?')+'</div>';
    h+='<div style="margin-top:3px">'+badge+'</div></div>';
    h+='<div style="font-size:18px;color:var(--border)">›</div>';
    h+='</div>';
  });
  el.innerHTML=h;
}

    {ico:'🏖️',lbl:'Congés',sub:'Demandes chauffeurs',col:'#a855f7',page:'conges'}
  ];
  var h='<div class="scroll">';
  h+='<div style="padding:16px 14px 4px;font-size:12px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:1px">Toutes les fonctions</div>';
  h+='<div class="menu-grid">';
  items.forEach(function(it){
    h+='<div class="menu-tile" onclick="allerPage(\''+it.page+'\')">';
    h+='<div class="menu-tile-ico" style="background:'+it.col+'20">'+it.ico+'</div>';
    h+='<div><div class="menu-tile-lbl">'+it.lbl+'</div><div class="menu-tile-sub">'+it.sub+'</div></div>';
    h+='</div>';
  });
  h+='</div>';
  h+='<div style="padding:6px 14px 14px">';
  h+='<div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;display:flex;align-items:center;gap:12px">';
  h+='<div class="hdr-logo" style="width:42px;height:42px">'+LOGO_MINI+'</div>';
  h+='<div style="flex:1"><div style="font-size:14px;font-weight:900;color:#fff">Connecté : '+esc(ST.service)+'</div>';
  h+='<div style="font-size:11px;color:var(--muted)">La Table de Cana · Marseille</div></div>';
  h+='</div>';
  h+='<button class="big-btn" style="background:var(--card2)" onclick="forcerSync()">🔄 Actualiser les données</button>';
  h+='<button class="big-btn big-danger" style="margin-top:10px" onclick="deconnexion()">🚪 Se déconnecter</button>';
  h+='</div>';
  h+='<div style="height:20px"></div>';
  h+='</div>';
  return h;
}
function forcerSync(){
  led('#f59e0b');
  chargerPlanning(function(){
    chargerLivraisons(false);
    chargerStatuts(false);
    toast('🔄 Données actualisées');
  });
}
</script>
<script>
/* ═══════════════════ LIVRAISONS ═══════════════════ */
function chargerLivraisons(afficher){
  fetch(SUPA+'/rest/v1/planning?date=like.EV_LIV_*&select=donnees,updated_at&order=updated_at.desc&limit=80',{headers:H,cache:'no-store'})
  .then(function(r){return r.ok?r.json():[];})
  .then(function(rows){
    var livs=[];
    (rows||[]).forEach(function(row){
      var ev=row.donnees;
      if(typeof ev==='string'){try{ev=JSON.parse(ev);}catch(e){return;}}
      if(ev&&ev.type==='livraison_confirmee')livs.push(ev);
    });
    ST.livraisons=livs;
    if(afficher&&ST.page==='livraisons')afficherLivraisons();
  })
  .catch(function(){if(afficher)afficherLivraisons();});
}
function afficherLivraisons(){
  var el=$('page-content');if(!el)return;
  var today=todayStr();
  var livs=ST.livraisons.filter(function(l){return l.date===today;});
  if(!livs.length){el.innerHTML='<div class="empty empty-big"><div class="empty-ico">📦</div>Aucune livraison confirmée<br>aujourd\'hui</div>';return;}
  /* Grouper par chauffeur */
  var parCh={};
  livs.forEach(function(l){
    var k=l.chauffeurId!==undefined?l.chauffeurId:'?';
    if(!parCh[k])parCh[k]={nom:l.chauffeur||'?',vehicule:l.vehicule||'',items:[]};
    parCh[k].items.push(l);
  });
  var nbT=livs.filter(evEstTache).length, nbL=livs.length-nbT;
  var parts=[];
  if(nbL)parts.push('✅ '+nbL+' livraison'+(nbL>1?'s':''));
  if(nbT)parts.push('📋 '+nbT+' tâche'+(nbT>1?'s':'')+' accomplie'+(nbT>1?'s':''));
  var h='<div style="padding:12px 12px 4px"><div style="font-size:13px;color:var(--muted);font-weight:800">'+parts.join('  ·  ')+'  ·  '+fmtDate(today)+'</div></div>';
  Object.keys(parCh).forEach(function(k){
    var g=parCh[k];
    var dr=ST.drivers[k];
    var col=dr?dr.color:'#64748b';
    h+='<div class="dcard">';
    h+='<div class="dcard-head">';
    h+='<div class="dcard-avatar" style="background:'+col+'">'+esc(g.nom[0]||'?')+'</div>';
    h+='<div style="flex:1"><div class="dcard-name">'+esc(g.nom)+'</div><div class="dcard-truck">🚛 '+esc(g.vehicule)+'</div></div>';
    h+='<div class="dcard-count" style="color:var(--green);background:rgba(34,197,94,.15)">'+g.items.length+'</div>';
    h+='</div>';
    g.items.forEach(function(l){
      var tache=evEstTache(l);
      var col=tache?'var(--amber)':'var(--green)';
      h+='<div class="mission">';
      h+='<div style="font-size:22px">'+evIcone(l)+'</div>';
      h+='<div class="mission-info"><div class="mission-client">'+esc(l.client||'—')+'</div>';
      h+='<span class="mission-badge" style="background:'+col+'22;color:'+col+'">'+evLibelle(l)+'</span>';
      h+='<div style="font-size:11px;color:var(--muted);margin-top:2px">🕐 '+esc(l.heure||'')+'</div></div>';
      if(l.photo)h+='<img class="info-card-photo" src="'+l.photo+'" onclick="zoomPhoto(this.src)">';
      h+='</div>';
    });
    h+='</div>';
  });
  h+='<div style="height:20px"></div>';
  el.innerHTML=h;
}
function zoomPhoto(src){
  var z=document.createElement('div');
  z.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:5000;display:flex;align-items:center;justify-content:center;padding:16px';
  z.onclick=function(){z.remove();};
  z.innerHTML='<img src="'+src+'" style="max-width:100%;max-height:100%;border-radius:14px">';
  document.body.appendChild(z);
}

/* ═══════════════════ STATUTS ═══════════════════ */
function chargerStatuts(afficher){
  fetch(SUPA+'/rest/v1/planning?date=like.STATUT_*&select=donnees,updated_at&order=updated_at.desc&limit=60',{headers:H,cache:'no-store'})
  .then(function(r){return r.ok?r.json():[];})
  .then(function(rows){
    var st={};
    (rows||[]).forEach(function(row){
      var ev=row.donnees;
      if(typeof ev==='string'){try{ev=JSON.parse(ev);}catch(e){return;}}
      if(ev&&ev.type==='statut_chauffeur'){
        var di=ev.chauffeurId;
        if(st[di]===undefined||new Date(ev.ts)>new Date(st[di].ts))st[di]=ev;
      }
    });
    ST.statuts=st;
    if(afficher&&ST.page==='statuts')afficherStatuts();
  })
  .catch(function(){if(afficher)afficherStatuts();});
}
function afficherStatuts(){
  var el=$('page-content');if(!el)return;
  var stLbl={service:'✅ En service',enroute:'🚐 En route',pause:'☕ En pause',retour:'🔄 Retour',termine:'🏁 Terminé',probleme:'🆘 Problème'};
  var stCol={service:'#22c55e',enroute:'#3b82f6',pause:'#f59e0b',retour:'#a855f7',termine:'#22c55e',probleme:'#ef4444'};
  var h='<div style="height:12px"></div>';
  ST.drivers.forEach(function(dr,di){
    var s=ST.statuts[di];
    var lbl=s&&stLbl[s.statut]?stLbl[s.statut]:'⚪ Pas de statut';
    var col=s&&stCol[s.statut]?stCol[s.statut]:'#64748b';
    var pos=ST.positions[di];
    h+='<div class="info-card" style="border-left:4px solid '+col+'">';
    h+='<div class="dcard-avatar" style="background:'+dr.color+'">'+esc(dr.name[0])+'</div>';
    h+='<div style="flex:1;min-width:0"><div style="font-size:15px;font-weight:900;color:#fff">'+esc(dr.name)+'</div>';
    h+='<div style="font-size:11px;color:var(--muted)">🚛 '+esc(dr.truck)+'</div>';
    if(pos)h+='<div style="font-size:10px;color:var(--blue);margin-top:2px">📍 Position à '+esc(pos.heure||'')+'</div>';
    h+='</div>';
    h+='<div style="text-align:right"><div style="font-size:13px;font-weight:800;color:'+col+'">'+lbl+'</div>';
    if(s&&s.heure)h+='<div style="font-size:10px;color:var(--muted)">'+esc(s.heure)+'</div>';
    h+='</div></div>';
  });
  h+='<div style="padding:14px"><button class="big-btn big-blue" onclick="allerPage(\'carte\')">📍 Voir sur la carte</button></div>';
  el.innerHTML=h;
}

/* ═══════════════════ CARTE GÉOLOCALISATION ═══════════════════ */
var _map=null,_markers=[];
function chargerPositions(cb){
  fetch(SUPA+'/rest/v1/planning?date=like.POS_*&select=date,donnees,updated_at&limit=20',{headers:H,cache:'no-store'})
  .then(function(r){return r.ok?r.json():[];})
  .then(function(rows){
    var pos={};
    (rows||[]).forEach(function(row){
      var ev=row.donnees;
      if(typeof ev==='string'){try{ev=JSON.parse(ev);}catch(e){return;}}
      if(ev&&ev.type==='position_chauffeur'&&ev.lat&&ev.lng)pos[ev.chauffeurId]=ev;
    });
    ST.positions=pos;
    if(cb)cb();
  })
  .catch(function(){if(cb)cb();});
}
function initCarte(){
  if(typeof L==='undefined'){
    var cl=$('carte-liste');
    if(cl)cl.innerHTML='<div class="empty">Carte indisponible (pas de connexion)</div>';
    return;
  }
  var el=$('map');if(!el)return;
  if(_map){try{_map.remove();}catch(e){}_map=null;}
  _map=L.map('map',{zoomControl:true,attributionControl:false}).setView([43.2965,5.3698],11);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(_map);
  chargerPositions(function(){majMarqueurs();});
}
function majMarqueurs(){
  if(!_map)return;
  _markers.forEach(function(m){try{_map.removeLayer(m);}catch(e){}});
  _markers=[];
  var pts=[];
  ST.drivers.forEach(function(dr,di){
    var p=ST.positions[di];
    if(!p)return;
    var ico=L.divIcon({
      className:'',
      html:'<div style="width:38px;height:38px;border-radius:50%;background:'+dr.color+';border:3px solid #fff;box-shadow:0 3px 12px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#fff;font-family:Arial">'+esc(dr.name[0])+'</div>',
      iconSize:[38,38],iconAnchor:[19,19]
    });
    var mk=L.marker([p.lat,p.lng],{icon:ico}).addTo(_map);
    mk.bindPopup('<b>'+esc(dr.name)+'</b><br>🚛 '+esc(dr.truck)+'<br>🕐 '+esc(p.heure||'')+'<br>📍 ±'+(p.precision||'?')+' m');
    _markers.push(mk);
    pts.push([p.lat,p.lng]);
  });
  if(pts.length){try{_map.fitBounds(pts,{padding:[50,50],maxZoom:14});}catch(e){}}
  /* Liste sous la carte */
  var cl=$('carte-liste');if(!cl)return;
  var n=pts.length;
  var h='<div style="background:var(--card);border-top:1px solid var(--border);padding:12px;max-height:170px;overflow-y:auto">';
  if(!n){
    h+='<div style="text-align:center;color:var(--muted);font-size:12px;padding:8px">Aucune position reçue.<br>Les chauffeurs envoient leur position à chaque livraison et changement de statut.</div>';
  } else {
    h+='<div style="font-size:11px;color:var(--muted);font-weight:800;margin-bottom:8px;text-transform:uppercase">'+n+' position'+(n>1?'s':'')+' reçue'+(n>1?'s':'')+'</div>';
    ST.drivers.forEach(function(dr,di){
      var p=ST.positions[di];if(!p)return;
      h+='<div onclick="centrerSur('+di+')" style="display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;background:var(--card2);margin-bottom:6px">';
      h+='<div style="width:28px;height:28px;border-radius:50%;background:'+dr.color+';display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff">'+esc(dr.name[0])+'</div>';
      h+='<div style="flex:1"><div style="font-size:13px;font-weight:800;color:#fff">'+esc(dr.name)+'</div>';
      h+='<div style="font-size:10px;color:var(--muted)">🕐 '+esc(p.heure||'')+' · '+esc(p.contexte||'')+'</div></div>';
      h+='<div style="font-size:14px;color:var(--muted)">›</div>';
      h+='</div>';
    });
  }
  h+='<button class="big-btn" style="background:var(--card2);margin-top:4px;padding:11px;font-size:13px" onclick="rafraichirCarte()">🔄 Actualiser les positions</button>';
  h+='</div>';
  cl.innerHTML=h;
}
function centrerSur(di){
  var p=ST.positions[di];if(!p||!_map)return;
  _map.setView([p.lat,p.lng],16);
  _markers.forEach(function(m){
    var ll=m.getLatLng();
    if(Math.abs(ll.lat-p.lat)<0.00001&&Math.abs(ll.lng-p.lng)<0.00001)m.openPopup();
  });
}
function rafraichirCarte(){
  chargerPositions(function(){majMarqueurs();toast('📍 Positions actualisées');});
}

/* ═══════════════════ TABLEAU DE BORD ═══════════════════ */
function renderDashboard(){
  var el=$('page-content');if(!el)return;
  var date=ST.cur;
  var total=0,livrees=0;
  var parCat={traiteur:0,collectivite:0,centre:0,task:0};
  var parCh=[];
  ST.drivers.forEach(function(dr,di){
    var ms=missionsDuJour(di,date);
    var l=0;
    ms.forEach(function(mi){
      total++;
      if(parCat[mi.t.category]!==undefined)parCat[mi.t.category]++;
      if(estLivre(mi.t,mi.t.client||mi.t.task,di,date)){livrees++;l++;}
    });
    parCh.push({nom:dr.name,col:dr.color,total:ms.length,livrees:l});
  });
  var restantes=total-livrees;
  var pct=total>0?Math.round(livrees/total*100):0;

  var h='<div style="padding:14px">';
  h+='<div style="font-size:16px;font-weight:900;color:#fff;margin-bottom:12px;text-transform:capitalize">📊 '+fmtDate(date)+'</div>';

  h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:14px">';
  h+='<div class="stat"><div class="stat-num" style="color:#fff">'+total+'</div><div class="stat-lbl">Missions</div></div>';
  h+='<div class="stat" style="border-color:rgba(34,197,94,.3)"><div class="stat-num" style="color:var(--green)">'+livrees+'</div><div class="stat-lbl">Livrées</div></div>';
  h+='<div class="stat" style="border-color:rgba(249,115,22,.3)"><div class="stat-num" style="color:var(--orange)">'+restantes+'</div><div class="stat-lbl">Restantes</div></div>';
  h+='</div>';

  h+='<div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px">';
  h+='<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px">';
  h+='<span style="font-size:13px;font-weight:800;color:#fff">Progression du jour</span>';
  h+='<span style="font-size:24px;font-weight:900;color:'+(pct>=100?'var(--green)':pct>=50?'var(--blue)':'var(--orange)')+'">'+pct+'%</span>';
  h+='</div>';
  h+='<div style="background:var(--card2);border-radius:8px;height:12px;overflow:hidden"><div style="width:'+pct+'%;height:12px;background:linear-gradient(90deg,var(--green),#16a34a);transition:.5s"></div></div>';
  h+='</div>';

  /* Répartition par type */
  var typesPresents=Object.keys(parCat).filter(function(c){return parCat[c]>0;});
  if(typesPresents.length){
    h+='<div style="font-size:12px;font-weight:800;color:var(--muted);margin-bottom:9px;text-transform:uppercase">Répartition par type</div>';
    h+='<div style="display:flex;gap:8px;margin-bottom:16px">';
    typesPresents.forEach(function(c){
      var cat=CATS[c];
      h+='<div style="flex:1;background:'+cat.col+'12;border:1px solid '+cat.col+'30;border-radius:12px;padding:11px 6px;text-align:center">';
      h+='<div style="font-size:18px">'+cat.ico+'</div>';
      h+='<div style="font-size:19px;font-weight:900;color:'+cat.col+';line-height:1">'+parCat[c]+'</div>';
      h+='<div style="font-size:9px;color:'+cat.col+';font-weight:700;opacity:.85;margin-top:2px">'+cat.lbl+'</div>';
      h+='</div>';
    });
    h+='</div>';
  }

  h+='<div style="font-size:12px;font-weight:800;color:var(--muted);margin-bottom:9px;text-transform:uppercase">Par chauffeur</div>';
  parCh.forEach(function(c){
    if(c.total===0)return;
    var cp=Math.round(c.livrees/c.total*100);
    h+='<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:8px">';
    h+='<div style="display:flex;justify-content:space-between;margin-bottom:7px">';
    h+='<span style="font-size:14px;font-weight:900;color:#fff">'+esc(c.nom)+'</span>';
    h+='<span style="font-size:13px;font-weight:900;color:'+(cp>=100?'var(--green)':'var(--orange)')+'">'+c.livrees+'/'+c.total+'</span>';
    h+='</div>';
    h+='<div style="background:var(--card2);border-radius:5px;height:7px;overflow:hidden"><div style="width:'+cp+'%;height:7px;background:'+c.col+'"></div></div>';
    h+='</div>';
  });
  if(total===0)h+='<div class="empty">Aucune mission ce jour</div>';
  h+='<div style="height:20px"></div></div>';
  el.innerHTML=h;
}
</script>
<script>
/* ═══════════════════ LISTE DE COURSES (structure identique au planning bureau) ═══════════════════ */
var LC_RAYONS=['🥬 Légumes','🥩 Viande','🐟 Poisson','🧀 Crémerie','🍞 Boulangerie','🥫 Épicerie','🧊 Surgelé','🍷 Boissons alcool','🥤 Boissons soft','🧴 Hygiène','📦 Autre'];
var _lcLoaded=false;

function chargerCourses(){
  /* localStorage = source de vérité immédiate (comme le planning bureau) */
  try{
    var loc=localStorage.getItem('cana_liste_courses');
    if(loc){var p=JSON.parse(loc);if(p.items&&Array.isArray(p.items))ST.courses=p.items;}
  }catch(e){}
  afficherCourses();
  if(!_lcLoaded){
    fetch(SUPA+'/rest/v1/planning?date=eq.LISTE_COURSES&select=donnees&limit=1',{headers:H,cache:'no-store'})
    .then(function(r){return r.ok?r.json():[];})
    .then(function(rows){
      if(rows&&rows.length&&rows[0].donnees){
        var remote=[];
        try{remote=typeof rows[0].donnees==='string'?JSON.parse(rows[0].donnees):(rows[0].donnees.items||rows[0].donnees||[]);}catch(e){remote=[];}
        if(!Array.isArray(remote))remote=remote.items||[];
        if(remote.length>ST.courses.length){
          ST.courses=remote;
          try{localStorage.setItem('cana_liste_courses',JSON.stringify({items:ST.courses,ts:Date.now()}));}catch(e){}
        }
      }
      _lcLoaded=true;
      if(ST.page==='courses')afficherCourses();
    })
    .catch(function(){_lcLoaded=true;});
  }
}
function sauverCourses(){
  try{localStorage.setItem('cana_liste_courses',JSON.stringify({items:ST.courses,ts:Date.now()}));}catch(e){}
  fetch(SUPA+'/rest/v1/planning',{method:'POST',headers:HM,body:JSON.stringify({date:'LISTE_COURSES',donnees:JSON.stringify(ST.courses),updated_at:new Date().toISOString()})}).catch(function(){});
}
function afficherCourses(){
  var el=$('page-content');if(!el)return;
  var items=ST.courses||[];
  var restants=items.filter(function(i){return !i.fait;}).length;
  var h='<div style="padding:12px">';

  /* Bouton ajouter */
  h+='<button class="big-btn big-save" style="margin:0 0 14px" onclick="ouvrirAjoutCourse()">➕ Ajouter un article</button>';

  /* Stats */
  h+='<div style="display:flex;gap:8px;margin-bottom:14px">';
  h+='<div class="stat"><div class="stat-num" style="color:#fff">'+items.length+'</div><div class="stat-lbl">Articles</div></div>';
  h+='<div class="stat" style="border-color:rgba(249,115,22,.3)"><div class="stat-num" style="color:var(--orange)">'+restants+'</div><div class="stat-lbl">À acheter</div></div>';
  h+='<div class="stat" style="border-color:rgba(34,197,94,.3)"><div class="stat-num" style="color:var(--green)">'+(items.length-restants)+'</div><div class="stat-lbl">Achetés</div></div>';
  h+='</div>';

  if(!items.length){
    h+='<div class="empty empty-big"><div class="empty-ico">🛍️</div>Liste vide<br>Appuyez sur « Ajouter un article »</div>';
    h+='</div>';el.innerHTML=h;return;
  }

  /* Grouper par rayon */
  var parRayon={};
  items.forEach(function(it,idx){
    var r=it.rayon||'📦 Autre';
    if(!parRayon[r])parRayon[r]=[];
    parRayon[r].push({it:it,idx:idx});
  });
  Object.keys(parRayon).forEach(function(rayon){
    var grp=parRayon[rayon];
    h+='<div style="font-size:12px;font-weight:800;color:var(--muted);margin:14px 0 8px;text-transform:uppercase;letter-spacing:.5px">'+esc(rayon)+' · '+grp.length+'</div>';
    grp.forEach(function(g){
      var it=g.it;var fait=it.fait;
      h+='<div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px'+(fait?';opacity:.5':'')+'">';
      h+='<button onclick="toggleCourse('+it.id+')" style="width:30px;height:30px;border-radius:50%;border:2px solid '+(fait?'var(--green)':'var(--border)')+';background:'+(fait?'var(--green)':'transparent')+';color:#fff;font-size:15px;flex-shrink:0;display:flex;align-items:center;justify-content:center">'+(fait?'✓':'')+'</button>';
      h+='<div style="flex:1;min-width:0" onclick="modifierCourse('+it.id+')">';
      h+='<div style="font-size:15px;font-weight:800;color:#fff;'+(fait?'text-decoration:line-through':'')+'">'+esc(it.article||'')+'</div>';
      var meta=[];
      if(it.qty&&it.qty!=='—')meta.push('<span style="color:var(--amber);font-weight:800">'+esc(it.qty)+'</span>');
      if(it.client)meta.push('👤 '+esc(it.client));
      if(it.dateEvent)meta.push('📅 '+fmtDateCourt(it.dateEvent));
      if(meta.length)h+='<div style="font-size:11px;color:var(--muted);margin-top:3px">'+meta.join(' · ')+'</div>';
      if(it.par)h+='<div style="font-size:9px;color:var(--border);margin-top:2px">Ajouté par '+esc(it.par)+'</div>';
      h+='</div>';
      h+='<button class="mission-act" style="background:rgba(239,68,68,.12);color:var(--red)" onclick="suppCourse('+it.id+')">🗑️</button>';
      h+='</div>';
    });
  });
  h+='<div style="height:20px"></div></div>';
  el.innerHTML=h;
}
function ouvrirAjoutCourse(){
  var h='<div class="modal" onclick="if(event.target===this)fermerModal()"><div class="sheet">';
  h+='<div class="sheet-handle"></div>';
  h+='<div class="sheet-title"><span>🛍️ Nouvel article</span><button class="sheet-close" onclick="fermerModal()">Fermer</button></div>';
  h+='<div class="field"><label class="field-lbl">Article *</label><input id="c-article" class="field-in" placeholder="Ex : Tomates cerises" autocomplete="off"></div>';
  h+='<div class="field"><label class="field-lbl">Quantité</label><input id="c-qty" class="field-in" placeholder="Ex : 5 kg / 3 caisses" autocomplete="off"></div>';
  h+='<div class="field"><label class="field-lbl">Rayon</label><select id="c-rayon" class="field-in">';
  LC_RAYONS.forEach(function(r){h+='<option value="'+esc(r)+'">'+esc(r)+'</option>';});
  h+='</select></div>';
  h+='<div class="field"><label class="field-lbl">Client (optionnel)</label><input id="c-client" class="field-in" placeholder="Ex : Village Club Soleil" autocomplete="off"></div>';
  h+='<div class="field"><label class="field-lbl">Date de l\'événement (optionnel)</label><input id="c-date" class="field-in" type="date"></div>';
  h+='<button class="big-btn big-save" onclick="ajouterCourse()">✅ Ajouter à la liste</button>';
  h+='</div></div>';
  var d=document.createElement('div');d.id='modal-wrap';d.innerHTML=h;document.body.appendChild(d);
  setTimeout(function(){var el=$('c-article');if(el)el.focus();},250);
}
function ajouterCourse(){
  var el=$('c-article');
  var art=(el.value||'').trim();
  if(!art){el.style.borderColor='#ef4444';el.focus();return;}
  ST.courses.push({
    id:Date.now(),
    article:art,
    qty:($('c-qty').value||'').trim()||'—',
    rayon:$('c-rayon').value,
    client:($('c-client').value||'').trim()||'',
    dateEvent:$('c-date').value||'',
    fait:false,
    par:ST.service||'Responsable',
    ts:new Date().toISOString()
  });
  sauverCourses();fermerModal();afficherCourses();toast('✅ '+esc(art)+' ajouté');
}
function modifierCourse(id){
  var it=ST.courses.filter(function(x){return x.id===id;})[0];
  if(!it)return;
  var h='<div class="modal" onclick="if(event.target===this)fermerModal()"><div class="sheet">';
  h+='<div class="sheet-handle"></div>';
  h+='<div class="sheet-title"><span>✏️ Modifier l\'article</span><button class="sheet-close" onclick="fermerModal()">Fermer</button></div>';
  h+='<div class="field"><label class="field-lbl">Article</label><input id="cm-article" class="field-in" value="'+esc(it.article||'')+'"></div>';
  h+='<div class="field"><label class="field-lbl">Quantité</label><input id="cm-qty" class="field-in" value="'+esc(it.qty==='—'?'':it.qty||'')+'" placeholder="Ex : 5 kg"></div>';
  h+='<div class="field"><label class="field-lbl">Rayon</label><select id="cm-rayon" class="field-in">';
  LC_RAYONS.forEach(function(r){h+='<option value="'+esc(r)+'"'+(r===it.rayon?' selected':'')+'>'+esc(r)+'</option>';});
  h+='</select></div>';
  h+='<div class="field"><label class="field-lbl">Client</label><input id="cm-client" class="field-in" value="'+esc(it.client||'')+'"></div>';
  h+='<div class="field"><label class="field-lbl">Date de l\'événement</label><input id="cm-date" class="field-in" type="date" value="'+esc(it.dateEvent||'')+'"></div>';
  h+='<button class="big-btn big-save" onclick="sauverModifCourse('+id+')">✅ Enregistrer</button>';
  h+='<button class="big-btn big-danger" style="margin-top:10px" onclick="suppCourse('+id+');fermerModal()">🗑️ Supprimer</button>';
  h+='</div></div>';
  var d=document.createElement('div');d.id='modal-wrap';d.innerHTML=h;document.body.appendChild(d);
}
function sauverModifCourse(id){
  var it=ST.courses.filter(function(x){return x.id===id;})[0];
  if(!it)return;
  var art=($('cm-article').value||'').trim();
  if(!art){$('cm-article').style.borderColor='#ef4444';return;}
  it.article=art;
  it.qty=($('cm-qty').value||'').trim()||'—';
  it.rayon=$('cm-rayon').value;
  it.client=($('cm-client').value||'').trim()||'';
  it.dateEvent=$('cm-date').value||'';
  sauverCourses();fermerModal();afficherCourses();toast('✅ Article modifié');
}
function toggleCourse(id){
  var it=ST.courses.filter(function(x){return x.id===id;})[0];
  if(it){it.fait=!it.fait;sauverCourses();afficherCourses();}
}
function suppCourse(id){
  ST.courses=ST.courses.filter(function(x){return x.id!==id;});
  sauverCourses();afficherCourses();toast('🗑️ Article retiré','#ef4444');
}

/* ═══════════════════ CONGÉS ═══════════════════ */
function chargerConges(){
  var el=$('page-content');if(!el)return;
  var annee=new Date().getFullYear();
  fetch(SUPA+'/rest/v1/planning?date=like.CONGES_*&select=date,donnees&limit=60',{headers:H,cache:'no-store'})
  .then(function(r){return r.ok?r.json():[];})
  .then(function(rows){
    var demandes=[];
    (rows||[]).forEach(function(row){
      var d=row.donnees;
      if(typeof d==='string'){try{d=JSON.parse(d);}catch(e){return;}}
      if(!d)return;
      if(Array.isArray(d))d.forEach(function(c){demandes.push(c);});
      else if(d.demandes&&Array.isArray(d.demandes))d.demandes.forEach(function(c){demandes.push(c);});
      else if(d.chauffeur||d.nom)demandes.push(d);
    });
    if(!demandes.length){el.innerHTML='<div class="empty empty-big"><div class="empty-ico">🏖️</div>Aucune demande de congé</div>';return;}
    var h='<div style="padding:12px 12px 4px"><div style="font-size:13px;color:var(--muted);font-weight:800">'+demandes.length+' demande'+(demandes.length>1?'s':'')+'</div></div>';
    demandes.forEach(function(c){
      var statut=c.statut||c.etat||'en_attente';
      var col=statut==='valide'||statut==='accepte'?'#22c55e':statut==='refuse'?'#ef4444':'#f59e0b';
      var lbl=statut==='valide'||statut==='accepte'?'✅ Validé':statut==='refuse'?'❌ Refusé':'⏳ En attente';
      h+='<div class="info-card" style="border-left:4px solid '+col+';align-items:flex-start">';
      h+='<div style="font-size:22px">🏖️</div>';
      h+='<div style="flex:1;min-width:0">';
      h+='<div style="font-size:14px;font-weight:900;color:#fff">'+esc(c.chauffeur||c.nom||'Chauffeur')+'</div>';
      var d1=c.debut||c.dateDebut||'';var d2=c.fin||c.dateFin||'';
      if(d1)h+='<div style="font-size:12px;color:var(--muted);margin-top:3px">📅 '+esc(d1)+(d2?' → '+esc(d2):'')+'</div>';
      if(c.motif||c.type)h+='<div style="font-size:11px;color:var(--muted);margin-top:2px">'+esc(c.motif||c.type)+'</div>';
      h+='<div style="margin-top:5px"><span class="mission-badge" style="background:'+col+'22;color:'+col+'">'+lbl+'</span></div>';
      h+='</div></div>';
    });
    h+='<div style="height:20px"></div>';
    el.innerHTML=h;
  })
  .catch(function(){el.innerHTML='<div class="empty empty-big"><div class="empty-ico">⚠️</div>Erreur de chargement</div>';});
}

/* ═══════════════════ ALERTE LIVRAISON EN DIRECT ═══════════════════ */
var _audioCtx=null;
function debloquerAudio(){
  try{
    var AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;
    if(!_audioCtx)_audioCtx=new AC();
    if(_audioCtx.state==='suspended')_audioCtx.resume();
    var o=_audioCtx.createOscillator();var g=_audioCtx.createGain();
    o.connect(g);g.connect(_audioCtx.destination);g.gain.value=0.0001;
    o.start();o.stop(_audioCtx.currentTime+0.01);
  }catch(e){}
}
function bipLivraison(){
  try{
    var AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;
    var ctx=_audioCtx||(_audioCtx=new AC());
    if(ctx.state==='suspended')ctx.resume();
    [0,0.22].forEach(function(dl){
      var o=ctx.createOscillator();var g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=880;o.type='sine';
      g.gain.setValueAtTime(0.001,ctx.currentTime+dl);
      g.gain.exponentialRampToValueAtTime(0.35,ctx.currentTime+dl+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dl+0.18);
      o.start(ctx.currentTime+dl);o.stop(ctx.currentTime+dl+0.2);
    });
  }catch(e){}
}
var _nbLivVues=null;
function surveillerLivraisons(){
  if(!ST.logged)return;
  fetch(SUPA+'/rest/v1/planning?date=like.EV_LIV_*&select=donnees,updated_at&order=updated_at.desc&limit=60',{headers:H,cache:'no-store'})
  .then(function(r){return r.ok?r.json():[];})
  .then(function(rows){
    var today=todayStr();var livs=[];var derniere=null;
    (rows||[]).forEach(function(row){
      var ev=row.donnees;
      if(typeof ev==='string'){try{ev=JSON.parse(ev);}catch(e){return;}}
      if(ev&&ev.type==='livraison_confirmee'){
        livs.push(ev);
        if(ev.date===today&&!derniere)derniere=ev;
      }
    });
    ST.livraisons=livs;
    var nb=livs.filter(function(l){return l.date===today;}).length;
    if(_nbLivVues!==null && nb>_nbLivVues && derniere){
      bipLivraison();
      if(navigator.vibrate)navigator.vibrate([250,80,250]);
      try{
        if('Notification' in window && Notification.permission==='granted'){
          new Notification(evIcone(derniere)+' '+evLibelle(derniere)+' !',{body:(derniere.chauffeur||'')+' → '+(derniere.client||''),tag:'liv-'+Date.now()});
        }
      }catch(e){}
      toast(evIcone(derniere)+' '+(derniere.chauffeur||'')+(evEstTache(derniere)?' a fini : ':' a livré ')+(derniere.client||''),'#16a34a');
      if(ST.page==='planning')render();
      else if(ST.page==='livraisons')afficherLivraisons();
    }
    _nbLivVues=nb;
  }).catch(function(){});
}

/* ═══════════════════ PWA ═══════════════════ */
/* Le manifest est un VRAI fichier (manifest-responsable.json) déclaré
   dans le <head> : Chrome exige un vrai fichier pour proposer
   « Installer l'application ». */

/* Service worker — obligatoire pour l'installation */
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}

function estInstallee(){
  try{
    return (window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches)
        || (window.matchMedia&&window.matchMedia('(display-mode: fullscreen)').matches)
        || navigator.standalone===true;
  }catch(e){return false;}
}
var deferredPrompt=null;
function afficherBoutonInstall(){
  /* Le bouton s'affiche TOUJOURS quand l'installation est possible,
     y compris sur l'écran de connexion. */
  if($('btn-install')||estInstallee())return;
  var b=document.createElement('button');b.id='btn-install';
  b.innerHTML='⬇️ Installer l\'application';
  b.style.cssText='position:fixed;bottom:88px;right:14px;z-index:900;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;border:none;border-radius:14px;padding:14px 18px;font-size:14px;font-weight:900;box-shadow:0 10px 28px rgba(34,197,94,.55);font-family:inherit;animation:pulseInstall 2s ease-in-out infinite';
  b.onclick=function(){
    if(!deferredPrompt)return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(c){
      deferredPrompt=null;b.remove();
      if(c.outcome==='accepted')toast('🎉 Application installée !');
    });
  };
  document.body.appendChild(b);
  if(!$('anim-install')){
    var s=document.createElement('style');s.id='anim-install';
    s.textContent='@keyframes pulseInstall{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}';
    document.head.appendChild(s);
  }
}
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();deferredPrompt=e;
  afficherBoutonInstall();
});
window.addEventListener('appinstalled',function(){
  var b=$('btn-install');if(b)b.remove();
  deferredPrompt=null;
});

/* ═══════════════════ POLLING ═══════════════════ */
setInterval(function(){
  if(!ST.logged||$('modal-wrap'))return;
  if(ST.page==='planning'){
    chargerPlanning(function(){if(ST.page==='planning'&&!$('modal-wrap'))render();});
    chargerStatuts(false);
  }
  else if(ST.page==='livraisons')chargerLivraisons(true);
  else if(ST.page==='statuts')chargerStatuts(true);
  else if(ST.page==='carte')chargerPositions(function(){majMarqueurs();});
},15000);

setInterval(surveillerLivraisons,8000);

/* ═══════════════════ DÉMARRAGE ═══════════════════ */
(function(){
  var saved='';try{saved=localStorage.getItem('cana_mob_service')||'';}catch(e){}
  if(saved){
    ST.logged=true;ST.service=saved;
    render();
    chargerPlanning(function(){if(ST.page==='planning')render();});
    chargerLivraisons(false);
    chargerStatuts(false);
    chargerPositions(function(){});
  } else {
    renderLogin();
  }
  setTimeout(function(){
    try{if('Notification' in window && Notification.permission==='default'&&ST.logged)Notification.requestPermission();}catch(e){}
    surveillerLivraisons();
  },3000);
})();
