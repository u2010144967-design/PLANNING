<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cana">
<meta name="theme-color" content="#0B1220">
<title>Cana Chauffeur</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0B1220;--card:#111827;--raised:#1A2332;
  --orange:#f97316;--terracotta:#C2540A;--blue:#3b82f6;--green:#22c55e;
  --amber:#f59e0b;--red:#ef4444;--purple:#a855f7;--teal:#14b8a6;
  --text:#F8FAFC;--muted:#8B96A8;--dim:#475569;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.13);
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
html,body,#root{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}
.screen{height:100%;display:flex;flex-direction:column}
button{cursor:pointer;font-family:inherit;border:none;outline:none;-webkit-user-select:none;user-select:none}
input,textarea{font-family:inherit;outline:none;-webkit-appearance:none}
::-webkit-scrollbar{display:none}
.mono{font-family:'SF Mono','Consolas',monospace}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px}

/* LOGIN */
.login{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;background:radial-gradient(ellipse 140% 60% at 50% 0%,#1A2332,var(--bg) 65%);overflow-y:auto}
.logo{width:72px;height:72px;background:linear-gradient(135deg,#f97316,#C2540A);border-radius:20px;display:flex;align-items:center;justify-content:center;margin-bottom:18px;box-shadow:0 16px 40px rgba(249,115,22,.35)}
.ch-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:310px;margin-bottom:22px}
.ch-btn{background:var(--card);border:2px solid var(--border);border-radius:16px;padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:7px;transition:border-color .2s,background .2s}
.ch-btn:active{transform:scale(.96)}
.ch-btn.sel{border-color:var(--orange);background:rgba(249,115,22,.08)}
.av{border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;width:44px;height:44px;font-size:17px}
.dots{display:flex;gap:12px;margin:14px 0}
.dot-c{width:13px;height:13px;border-radius:50%;border:2px solid var(--dim);transition:all .2s}
.dot-c.on{background:var(--orange);border-color:var(--orange);transform:scale(1.1)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;width:100%;max-width:280px}
.nk{background:var(--card);border:1px solid var(--border2);border-radius:14px;padding:16px;font-size:21px;font-weight:600;color:var(--text);transition:all .12s;display:flex;align-items:center;justify-content:center;aspect-ratio:1}
.nk:active{background:var(--raised);transform:scale(.91)}

/* HEADER avec retour */
.hdr{padding:calc(var(--sat) + 16px) 16px 12px;flex-shrink:0;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.back-btn{width:40px;height:40px;border-radius:12px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text);flex-shrink:0}
.back-btn:active{background:var(--raised);transform:scale(.93)}
.hdr-title{font-size:17px;font-weight:800;flex:1}

/* ACCUEIL GRILLE */
.home-top{padding:calc(var(--sat) + 24px) 18px 16px;flex-shrink:0}
.home-greet{font-size:13px;color:var(--muted)}
.home-name{font-size:24px;font-weight:900;margin-top:2px}
.home-meta{font-size:12px;color:var(--muted);margin-top:6px;display:flex;align-items:center;gap:8px}
.icon-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px}
.icon-tile{aspect-ratio:1.15;border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;position:relative;border:1px solid var(--border2);transition:transform .15s}
.icon-tile:active{transform:scale(.95)}
.icon-tile-emoji{font-size:34px}
.icon-tile-label{font-size:13px;font-weight:800;text-align:center}
.icon-tile-sub{font-size:10px;opacity:.8;font-weight:600}
.tile-badge{position:absolute;top:10px;right:10px;background:var(--red);color:#fff;font-size:10px;font-weight:800;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 5px}

/* STATUT TILE special */
.status-tile{grid-column:span 2;border-radius:22px;padding:18px;display:flex;align-items:center;gap:16px;border:1px solid var(--border2)}

/* SOS */
.sos-fab{position:fixed;bottom:24px;right:16px;width:54px;height:54px;border-radius:50%;background:rgba(239,68,68,.95);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(239,68,68,.45);z-index:60}
.sos-fab:active{transform:scale(.92)}

/* SCROLL LIST */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px calc(24px + var(--sab))}

/* NEXT BANNER */
.next-banner{margin:0 16px 14px;background:linear-gradient(135deg,var(--raised),var(--card));border:1px solid var(--border2);border-radius:18px;padding:14px 16px;position:relative;overflow:hidden}
.next-banner::before{content:'';position:absolute;top:-20px;right:-20px;width:90px;height:90px;background:radial-gradient(circle,rgba(249,115,22,.15),transparent 70%)}

/* MISSION CARD */
.mc{border-radius:20px;margin-bottom:14px;background:var(--card);border:1px solid var(--border);overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.18)}
.mc-hd{padding:13px 15px 9px;display:flex;align-items:flex-start;justify-content:space-between}
.mc-time{font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1}
.mc-sub{font-size:10px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:4px}
.mc-truck{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
.mc-client{padding:0 15px 9px;cursor:pointer}
.mc-name{font-size:17px;font-weight:800;line-height:1.2;margin-bottom:4px}
.mc-addr{font-size:12px;color:var(--muted);display:flex;gap:5px;align-items:flex-start;line-height:1.5}
.allerg{margin:0 15px 9px;padding:7px 11px;border-radius:9px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:6px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:var(--red)}
.div{height:1px;background:var(--border);margin:0 15px}
.meta{padding:9px 15px;display:flex;flex-wrap:wrap;gap:7px}
.mt{background:var(--raised);border-radius:8px;padding:5px 9px;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px}
.mt b{color:var(--text)}
.mt.fw{width:100%}
.btns{padding:11px 15px;display:grid;gap:7px}
.ab{border-radius:14px;padding:14px 8px;font-size:11px;font-weight:800;display:flex;flex-direction:column;align-items:center;gap:6px;border:1.5px solid transparent;transition:all .15s}
.ab:active{transform:scale(.92)}
.ab svg{width:21px;height:21px}
.ab-maps{background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.28);color:var(--blue)}
.ab-call{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.28);color:var(--green)}
.ab-go{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.28);color:var(--amber)}
.ab-arrived{background:rgba(168,85,247,.1);border-color:rgba(168,85,247,.28);color:var(--purple)}
.ab-done{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.28);color:var(--green)}
.ab-photo{background:rgba(168,85,247,.1);border-color:rgba(168,85,247,.28);color:var(--purple)}
.ab-sign{background:rgba(20,184,166,.1);border-color:rgba(20,184,166,.28);color:var(--teal)}
.ab-voice{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.28);color:var(--red)}

/* OVERLAYS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;flex-direction:column;justify-content:flex-end}
.obox{background:var(--card);border-radius:22px 22px 0 0;padding:18px;max-height:88vh;overflow-y:auto}
.obox h3{font-size:15px;font-weight:800;margin-bottom:3px}
.obox .sub{font-size:12px;color:var(--muted);margin-bottom:14px}
.oc{display:flex;gap:9px;margin-top:12px}
.obtn{flex:1;border-radius:13px;padding:14px;font-size:13px;font-weight:700;border:1px solid var(--border)}
.obtn.cancel{background:var(--raised);color:var(--muted)}
.obtn.confirm{background:var(--green);color:#fff;border-color:var(--green)}

/* SIGNATURE — zone isolée pour éviter conflits tactiles */
.sig-wrap{position:relative;width:100%;height:180px;border-radius:12px;overflow:hidden;border:2px solid var(--border2);touch-action:none}
.sig-cv{display:block;width:100%;height:100%;background:#fff;touch-action:none}
.sig-actions{display:flex;gap:10px;margin-top:14px;position:relative;z-index:5}
.sig-btn{flex:1;border-radius:13px;padding:15px;font-size:14px;font-weight:800;border:none;-webkit-user-select:none;user-select:none}
.sig-btn:active{transform:scale(.96)}

/* MATERIEL */
.mat-list{display:flex;flex-direction:column;gap:7px;margin:12px 0}
.mat-row{background:var(--raised);border:2px solid var(--border);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:10px;transition:border-color .2s}
.mat-row.on{border-color:var(--orange)}
.mat-icon{font-size:20px;flex-shrink:0;width:26px;text-align:center}
.mat-label{flex:1;font-size:12px;font-weight:600;color:var(--muted)}
.mat-row.on .mat-label{color:var(--text)}
.ctr{display:flex;align-items:center;gap:8px}
.ctr-btn{background:var(--card);border:1px solid var(--border2);border-radius:50%;width:29px;height:29px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--text)}
.ctr-btn:active{background:var(--orange);color:#fff}
.ctr-n{font-size:17px;font-weight:800;color:var(--orange);min-width:22px;text-align:center}

/* MODE CONDUITE */
.drive{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.drive-time{font-size:58px;font-weight:900;letter-spacing:-3px;line-height:1}
.drive-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:300px;margin-top:24px}
.drive-btn{border-radius:14px;padding:18px 10px;font-size:13px;font-weight:800;display:flex;flex-direction:column;align-items:center;gap:7px;border:none}
.drive-btn:active{transform:scale(.95)}
.drive-btn svg{width:26px;height:26px}

/* VOCAL */
.voice{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;backdrop-filter:blur(12px)}
.vring{width:120px;height:120px;border-radius:50%;border:3px solid var(--red);display:flex;align-items:center;justify-content:center;animation:vr 1.2s ease-in-out infinite;margin-bottom:22px}
@keyframes vr{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.1);opacity:1}}

/* TOAST */
.toast{position:fixed;top:calc(var(--sat) + 14px);left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:28px;font-size:13px;font-weight:600;z-index:999;white-space:nowrap;box-shadow:0 6px 20px rgba(0,0,0,.4);animation:tIn .22s ease;max-width:88vw;text-align:center;background:#1e293b}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* LOADER */
.spin{border:3px solid var(--border2);border-top-color:var(--orange);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.loader{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;color:var(--muted);font-size:13px}

/* GEO */
.geo{width:6px;height:6px;border-radius:50%;background:var(--green);animation:gp 2s infinite}
@keyframes gp{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}70%{box-shadow:0 0 0 5px rgba(34,197,94,0)}}

/* FICHE CLIENT rows */
.crow{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.crow-ico{font-size:18px;flex-shrink:0;width:26px;text-align:center}
.crow-lbl{font-size:10px;color:var(--muted);margin-bottom:2px}
.crow-val{font-size:14px;font-weight:500}

/* CALENDRIER */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px}
.cal-hd{text-align:center;font-size:10px;color:var(--muted);font-weight:700;padding:3px 0}
.cal-d{aspect-ratio:1;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;position:relative;border:1.5px solid transparent;transition:all .13s;font-weight:500}
.cal-d.today{border-color:var(--orange);color:var(--orange);font-weight:800}
.cal-d.hasm::after{content:'';position:absolute;bottom:4px;width:4px;height:4px;border-radius:50%;background:var(--orange)}
.cal-d.sel{background:var(--orange);color:#fff;font-weight:800}
.cal-d.sel::after{background:#fff}
.cal-d.off{background:rgba(239,68,68,.07);color:var(--dim)}
.cal-d.rest{background:rgba(100,116,139,.07);color:var(--muted)}
.hgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:14px}
.hg{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:11px;text-align:center}
.hg-v{font-size:22px;font-weight:800;line-height:1}
.hg-l{font-size:10px;color:var(--muted);margin-top:2px}

/* MESSAGES */
.msgw{flex:1;display:flex;flex-direction:column;overflow:hidden}
.msg-list{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:9px}
.mb{max-width:87%}
.mb.me{align-self:flex-end}
.mb.them{align-self:flex-start}
.mb-in{padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5}
.mb.them .mb-in{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px}
.mb.me .mb-in{background:var(--orange);color:#fff;border-bottom-right-radius:4px}
.mb-meta{font-size:10px;color:var(--muted);margin-top:3px;padding:0 4px}
.mb.me .mb-meta{text-align:right}
.msg-bar{padding:9px 14px;background:var(--bg);border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;padding-bottom:calc(9px + var(--sab))}
.msg-in{flex:1;background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:10px 15px;font-size:14px;color:var(--text);resize:none;max-height:90px}
.msg-send{background:var(--orange);border-radius:50%;width:42px;height:42px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.msg-send:active{transform:scale(.93)}

/* VEHICULE */
.veh-issue-btn{background:var(--raised);border:1.5px solid var(--border2);border-radius:14px;padding:14px;display:flex;align-items:center;gap:10px;width:100%;margin-bottom:8px}
.veh-issue-btn:active{background:var(--card);transform:scale(.98)}
</style>
</head>
<body>
<div id="root"></div>
<input type="file" id="photo-cap" accept="image/*" capture="environment" style="position:fixed;width:0;height:0;opacity:0;pointer-events:none"/>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

/* ══ CONFIG ══ */
const SUPA='https://lllzlidwtcjwsxbgkygn.supabase.co';
const KEY='sb_publishable_3weqcRqeCv9lwclSAPC2rA_48OAwGcV';

const DRIVERS=[
  {id:0,name:'OTMANE',display:'Otmane',ini:'O',color:'#3b82f6',code:'1111',truck:'VIVARO 1',start:'06:00',end:'14:00'},
  {id:1,name:'MOMO',display:'Momo',ini:'M',color:'#22c55e',code:'2222',truck:'JUMPY',start:'06:00',end:'14:00'},
  {id:2,name:'MOHAMED',display:'Mohamed',ini:'H',color:'#f97316',code:'3333',truck:'IVECO',start:'06:00',end:'15:00'},
  {id:3,name:'ABDOU',display:'Abdou',ini:'A',color:'#a855f7',code:'4444',truck:'VIVARO 2',start:'06:00',end:'14:00'},
  {id:4,name:'CHAUFFEUR 5',display:"Maître d'H.",ini:'5',color:'#f59e0b',code:'5555',truck:'CAMION 5',start:'08:00',end:'22:00'},
];

const SL=[];
for(let h=6;h<18;h++){
  const hh=String(h).padStart(2,'0');
  if(h===6)SL.push('06:30');
  else{SL.push(hh+':00');if(h<17)SL.push(hh+':30');}
}
SL.push('17:30');

const MOIS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const JOURS=['Di','Lu','Ma','Me','Je','Ve','Sa'];
const MAT=[
  {id:'gastro',label:'Bacs gastro',icon:'🥘'},
  {id:'chariot',label:'Chariots',icon:'🛒'},
  {id:'echelle',label:'Échelles pâtiss.',icon:'🏗️'},
  {id:'container',label:'Containers',icon:'📦'},
  {id:'caisse',label:'Caisses traiteur',icon:'🗃️'},
  {id:'etuve',label:'Étuves',icon:'🔥'},
  {id:'plateau',label:'Plateaux inox',icon:'🍽️'},
  {id:'nappe',label:'Nappes',icon:'🪡'},
];

/* ══ SUPABASE ══ */
async function db(path,opts={}){
  try{
    const r=await fetch(SUPA+'/rest/v1/'+path,{
      headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'},
      ...opts
    });
    if(!r.ok)return null;
    return r.json();
  }catch(e){return null;}
}

async function loadPlanning(){
  const today=new Date().toISOString().slice(0,10);
  let rows=await db('planning?date=eq.'+today+'&select=donnees,date&limit=1');
  if(rows&&rows.length&&rows[0].donnees&&rows[0].donnees.tasks)return rows[0].donnees;
  rows=await db('planning?select=donnees,date&order=date.desc&limit=20');
  if(rows){
    for(const r of rows){
      if(r.date&&r.date.match(/^\d{4}-\d{2}-\d{2}$/)&&r.donnees&&r.donnees.tasks){
        if(Object.keys(r.donnees.tasks).length>0)return r.donnees;
      }
    }
  }
  return null;
}

async function saveEvent(ev){
  try{
    const rows=await db('planning?date=eq.EVENTS&select=donnees&limit=1');
    let list=[];
    if(rows&&rows.length&&rows[0].donnees){
      try{const d=rows[0].donnees;list=JSON.parse(typeof d==='string'?d:JSON.stringify(d));if(!Array.isArray(list))list=[];}catch(e){list=[];}
    }
    list.unshift({...ev,ts:new Date().toISOString()});
    list=list.slice(0,300);
    const s=JSON.stringify(list);
    if(rows&&rows.length)await db('planning?date=eq.EVENTS',{method:'PATCH',body:JSON.stringify({donnees:s})});
    else await db('planning',{method:'POST',body:JSON.stringify({date:'EVENTS',donnees:s})});
  }catch(e){}
}

async function saveMsg(msg){
  try{
    const rows=await db('planning?date=eq.MESSAGES&select=donnees&limit=1');
    let list=[];
    if(rows&&rows.length&&rows[0].donnees){
      try{const d=rows[0].donnees;list=JSON.parse(typeof d==='string'?d:JSON.stringify(d));if(!Array.isArray(list))list=[];}catch(e){list=[];}
    }
    list.push(msg);list=list.slice(-500);
    const s=JSON.stringify(list);
    if(rows&&rows.length)await db('planning?date=eq.MESSAGES',{method:'PATCH',body:JSON.stringify({donnees:s})});
    else await db('planning',{method:'POST',body:JSON.stringify({date:'MESSAGES',donnees:s})});
  }catch(e){}
}

async function loadMsgs(){
  const rows=await db('planning?date=eq.MESSAGES&select=donnees&limit=1');
  if(rows&&rows.length&&rows[0].donnees){
    try{const d=rows[0].donnees;const r=JSON.parse(typeof d==='string'?d:JSON.stringify(d));return Array.isArray(r)?r:[];}catch(e){}
  }
  return[];
}

/* ══ HELPERS ══ */
function getMissions(planning,di,date){
  if(!planning||!planning.tasks)return[];
  const ms=[];
  SL.forEach(h=>{
    const k=date+'|'+di+'|'+h;
    const tasks=planning.tasks[k];
    if(tasks&&tasks.length)tasks.forEach((t,ti)=>ms.push({...t,heure:h,_key:k,_ti:ti,_statut:t._statut||'pending'}));
  });
  return ms;
}
function getStatut(planning,di,date){
  if(!planning||!planning.statuts)return null;
  return Object.values(planning.statuts).find(s=>s&&s.di===di&&s.date===date)||null;
}
function calcH(planning,di,mo,yr){
  let j=0,ab=0,min=0;
  const days=new Date(yr,mo+1,0).getDate();
  for(let d=1;d<=days;d++){
    if(new Date(yr,mo,d)>new Date())break;
    const ds=yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const st=getStatut(planning,di,ds);
    if(st&&['absent','maladie','conge','repos'].includes(st.type)){ab++;continue;}
    if(getMissions(planning,di,ds).length>0){j++;min+=7*60-45;}
  }
  return{j,ab,h:Math.floor(min/60),m:min%60,hb:j*7};
}
function speak(t){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);u.lang='fr-FR';u.rate=.95;
  window.speechSynthesis.speak(u);
}

/* ══ SIGNATURE — corrigée, zone tactile isolée ══ */
function SigModal({m,ch,onClose,onDone}){
  const ref=useRef();const ctx=useRef(null);const drawing=useRef(false);const last=useRef({x:0,y:0});
  const [hasDrawn,setHasDrawn]=useState(false);

  useEffect(()=>{
    const c=ref.current;if(!c)return;
    const rect=c.getBoundingClientRect();
    const dpr=window.devicePixelRatio||1;
    c.width=rect.width*dpr;c.height=rect.height*dpr;
    const x=c.getContext('2d');ctx.current=x;
    x.scale(dpr,dpr);
    x.fillStyle='#fff';x.fillRect(0,0,rect.width,rect.height);
    x.strokeStyle='#111';x.lineWidth=2.6;x.lineCap='round';x.lineJoin='round';
  },[]);

  const getPos=(clientX,clientY)=>{
    const c=ref.current;const r=c.getBoundingClientRect();
    return{x:clientX-r.left,y:clientY-r.top};
  };

  const handleStart=(clientX,clientY)=>{
    drawing.current=true;
    last.current=getPos(clientX,clientY);
    setHasDrawn(true);
  };
  const handleMove=(clientX,clientY)=>{
    if(!drawing.current||!ctx.current)return;
    const p=getPos(clientX,clientY);
    ctx.current.beginPath();
    ctx.current.moveTo(last.current.x,last.current.y);
    ctx.current.lineTo(p.x,p.y);
    ctx.current.stroke();
    last.current=p;
  };
  const handleEnd=()=>{drawing.current=false;};

  const onMouseDown=e=>{e.preventDefault();handleStart(e.clientX,e.clientY);};
  const onMouseMove=e=>{e.preventDefault();handleMove(e.clientX,e.clientY);};
  const onTouchStart=e=>{e.preventDefault();const t=e.touches[0];handleStart(t.clientX,t.clientY);};
  const onTouchMove=e=>{e.preventDefault();const t=e.touches[0];handleMove(t.clientX,t.clientY);};

  const clear=()=>{
    if(!ctx.current||!ref.current)return;
    const rect=ref.current.getBoundingClientRect();
    ctx.current.fillStyle='#fff';
    ctx.current.fillRect(0,0,rect.width,rect.height);
    setHasDrawn(false);
  };

  const handleValidate=async()=>{
    if(!ref.current)return;
    const dataUrl=ref.current.toDataURL('image/png');
    await saveEvent({type:'signature',chauffeurId:ch.id,chauffeur:ch.display,client:m.client||m.task||'',heure:m.heure,date:new Date().toISOString().slice(0,10),dataUrl});
    onDone();
  };

  return(
    <div className="overlay" onClick={onClose}>
      <div className="obox" onClick={e=>e.stopPropagation()}>
        <h3>✍️ Signature client</h3>
        <div className="sub">{m.client||m.task} — {m.heure}</div>

        <div className="sig-wrap">
          <canvas ref={ref} className="sig-cv"
            onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={handleEnd} onMouseLeave={handleEnd}
            onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={handleEnd}/>
        </div>
        <p style={{fontSize:11,color:'var(--muted)',textAlign:'center',margin:'8px 0 0'}}>Signez dans le cadre blanc</p>

        <div className="sig-actions">
          <button type="button" className="sig-btn" style={{background:'var(--raised)',color:'var(--muted)',border:'1px solid var(--border2)'}}
            onPointerUp={clear}>
            🗑️ Effacer
          </button>
          <button type="button" className="sig-btn" style={{background:hasDrawn?'var(--green)':'var(--dim)',color:'#fff'}}
            disabled={!hasDrawn}
            onPointerUp={handleValidate}>
            ✅ Valider
          </button>
        </div>
        <button onClick={onClose} style={{width:'100%',marginTop:10,padding:10,background:'transparent',color:'var(--muted)',fontSize:12,border:'none'}}>Annuler</button>
      </div>
    </div>
  );
}

/* ══ VOCAL ══ */
function VoiceModal({m,ch,onClose,onCmd}){
  const [listening,setL]=useState(false);
  const [transcript,setT]=useState('');
  const [action,setA]=useState('');
  const rec=useRef(null);
  const parse=t=>{
    const tl=t.toLowerCase();
    if(tl.includes('terminé')||tl.includes('livré')){speak('Mission terminée.');onCmd('done');return'✅ Mission terminée';}
    if(tl.includes('en route')||tl.includes('je pars')){speak('Bon trajet !');onCmd('enroute');return'🚗 En route';}
    if(tl.includes('absent')||tl.includes('personne')){speak('Client absent.');onCmd('absent');return'⚠️ Client absent';}
    if(tl.includes('arrivé')||tl.includes('j arrive')){speak('Arrivée notée.');onCmd('arrived');return'📍 Arrivée notée';}
    const bacs=tl.match(/(\d+)\s*(bac|caisse|chariot|plateau|container|nappe)/);
    if(bacs){speak(`${bacs[1]} ${bacs[2]} notés.`);onCmd('materiel',bacs[1]+' '+bacs[2]);return`📦 ${bacs[1]} ${bacs[2]}`;}
    if(tl.includes('photo')){speak('Photo.');onCmd('photo');return'📷 Photo';}
    if(tl.includes('appel')){speak('Appel.');onCmd('call');return'📞 Appel';}
    if(tl.includes('maps')||tl.includes('navigation')){speak('Navigation.');onCmd('maps');return'📍 Maps';}
    speak('Non compris. Réessayez.');return'❓ Non reconnu';
  };
  const start=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setA('Non disponible sur ce navigateur');return;}
    const r=new SR();rec.current=r;r.lang='fr-FR';r.continuous=false;r.interimResults=true;
    r.onstart=()=>{setL(true);setT('');setA('');};
    r.onresult=e=>{
      const t=Array.from(e.results).map(r=>r[0].transcript).join('');setT(t);
      if(e.results[e.results.length-1].isFinal){setA(parse(t));setL(false);}
    };
    r.onerror=()=>setL(false);r.onend=()=>setL(false);r.start();
  };
  useEffect(()=>{speak(`Que faire pour ${m?m.client:''} ?`);setTimeout(start,1400);},[]);
  return(
    <div className="voice" onClick={!listening?onClose:undefined}>
      <div className="vring" style={{background:listening?'rgba(239,68,68,.08)':'rgba(34,197,94,.08)',borderColor:listening?'var(--red)':'var(--green)'}}>
        <svg width="54" height="54" viewBox="0 0 24 24" fill="none" stroke={listening?'var(--red)':'var(--green)'} strokeWidth="2">
          <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </div>
      <div style={{fontSize:17,fontWeight:700,marginBottom:7}}>{listening?'Je vous écoute...':'Parlez'}</div>
      <div style={{fontSize:14,color:transcript?'var(--text)':'var(--muted)',textAlign:'center',minHeight:20,marginBottom:7}}>{transcript||'...'}</div>
      <div style={{fontSize:15,fontWeight:700,color:'var(--green)',minHeight:22,marginBottom:22}}>{action}</div>
      <div style={{display:'flex',gap:10}}>
        {listening
          ?<button onClick={()=>rec.current?.stop()} style={{background:'var(--red)',color:'#fff',borderRadius:50,padding:'11px 26px',fontSize:14,fontWeight:700}}>Stop</button>
          :<button onClick={start} style={{background:'var(--green)',color:'#fff',borderRadius:50,padding:'11px 26px',fontSize:14,fontWeight:700}}>🎤 Reparler</button>
        }
        <button onClick={onClose} style={{background:'var(--raised)',color:'var(--muted)',border:'1px solid var(--border2)',borderRadius:50,padding:'11px 26px',fontSize:14,fontWeight:700}}>Fermer</button>
      </div>
      <p style={{fontSize:11,color:'var(--dim)',marginTop:14,textAlign:'center',lineHeight:1.7,maxWidth:260}}>
        "Mission terminée" · "En route" · "J'arrive" · "Client absent"<br/>"5 bacs" · "Photo" · "Appeler"
      </p>
    </div>
  );
}

/* ══ CALENDRIER ══ */
function CalendarScreen({ch,planning,onBack}){
  const today=new Date();
  const [mo,setMo]=useState(today.getMonth());
  const [yr,setYr]=useState(today.getFullYear());
  const [sel,setSel]=useState(today.getDate());
  const dim=new Date(yr,mo+1,0).getDate();
  const fd=new Date(yr,mo,1).getDay();
  const off=fd===0?6:fd-1;
  const ds=d=>`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const gMs=d=>planning?getMissions(planning,ch.id,ds(d)):[];
  const gSt=d=>planning?getStatut(planning,ch.id,ds(d)):null;
  const h=planning?calcH(planning,ch.id,mo,yr):{j:0,ab:0,h:0,m:0,hb:0};
  const selMs=gMs(sel);const selSt=gSt(sel);
  const days=[];for(let i=0;i<off;i++)days.push(null);for(let d=1;d<=dim;d++)days.push(d);
  return(
    <>
      <Header title="Mon planning du mois" onBack={onBack}/>
      <div className="scroll">
        <div className="hgrid">
          {[{v:h.j,l:'Jours travaillés',c:ch.color},{v:`${h.h}h${h.m?h.m+'m':''}`,l:'Heures nettes',c:'var(--green)'},{v:h.ab,l:'Absences',c:'var(--amber)'},{v:`${h.hb}h`,l:'Heures brutes',c:'var(--blue)'}].map((x,i)=>(
            <div key={i} className="hg"><div className="hg-v" style={{color:x.c}}>{x.v}</div><div className="hg-l">{x.l}</div></div>
          ))}
        </div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <button onClick={()=>mo===0?(setMo(11),setYr(y=>y-1)):setMo(m=>m-1)} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:9,width:34,height:34,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--muted)'}}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <div style={{textAlign:'center'}}><div style={{fontSize:15,fontWeight:700}}>{MOIS[mo]} {yr}</div></div>
          <button onClick={()=>mo===11?(setMo(0),setYr(y=>y+1)):setMo(m=>m+1)} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:9,width:34,height:34,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--muted)'}}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
        <div className="cal-grid">
          {JOURS.map(j=><div key={j} className="cal-hd">{j}</div>)}
          {days.map((d,i)=>{
            if(!d)return<div key={`e${i}`}/>;
            const isT=d===today.getDate()&&mo===today.getMonth()&&yr===today.getFullYear();
            const hM=gMs(d).length>0;const st=gSt(d);const isSel=d===sel;
            const isOff=st&&['absent','maladie','conge'].includes(st.type);
            const isRest=st&&st.type==='repos';
            return<div key={d} className={`cal-d ${isT?'today':''} ${hM?'hasm':''} ${isSel&&!isT?'sel':''} ${isOff?'off':''} ${isRest?'rest':''}`} onClick={()=>setSel(d)}>{d}</div>;
          })}
        </div>
        <div style={{marginTop:4}}>
          <div style={{fontSize:11,color:'var(--muted)',fontWeight:600,marginBottom:9,textTransform:'uppercase'}}>
            {JOURS[new Date(yr,mo,sel).getDay()]} {sel} {MOIS[mo]}
            {selSt&&<span style={{marginLeft:7,background:'var(--raised)',borderRadius:20,padding:'2px 7px',fontSize:10}}>{selSt.type}</span>}
          </div>
          {selMs.length===0?(
            <div style={{textAlign:'center',padding:'18px 0',color:'var(--muted)',fontSize:13}}>{selSt?'Statut : '+selSt.type:'Aucune mission'}</div>
          ):selMs.map((m,i)=>(
            <div key={i} style={{background:'var(--card)',border:'1px solid var(--border)',borderLeft:`3px solid ${ch.color}`,borderRadius:11,padding:'10px 12px',marginBottom:7,display:'flex',alignItems:'center',gap:9}}>
              <div className="mono" style={{fontSize:14,fontWeight:800,color:ch.color,flexShrink:0,width:44}}>{m.heure}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600}}>{m.client||m.task}</div>
                <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>{(m.adresse||'').split(',')[0]}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </>
  );
}

/* ══ MESSAGES ══ */
function MessagesScreen({ch,onBack}){
  const [msgs,setMsgs]=useState([{id:1,from:'resp',text:'Bonjour à tous ! Bonne journée 💪',time:'07:00'}]);
  const [text,setText]=useState('');
  const ref=useRef();
  useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight;},[msgs]);
  useEffect(()=>{
    const load=async()=>{
      const ms=await loadMsgs();
      if(ms.length)setMsgs(prev=>{
        const ids=new Set(prev.map(x=>x.id));
        const news=ms.filter(x=>!ids.has(x.id)).map(x=>({...x,from:x.chauffeurId===ch.id?'me':'them'}));
        return news.length?[...prev,...news]:prev;
      });
    };
    load();const iv=setInterval(load,15000);return()=>clearInterval(iv);
  },[]);
  const send=async()=>{
    if(!text.trim())return;
    const t=text.trim();setText('');
    const time=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    const msg={id:Date.now(),from:'me',fromName:ch.display,chauffeurId:ch.id,text:t,time};
    setMsgs(m=>[...m,msg]);
    await saveMsg({...msg,from:'chauffeur'});
  };
  return(
    <>
      <Header title="Messages" onBack={onBack}/>
      <div className="msgw">
        <div ref={ref} className="msg-list">
          {msgs.map(m=>(
            <div key={m.id} className={`mb ${m.from==='me'?'me':'them'}`}>
              <div className="mb-in">{m.text}</div>
              <div className="mb-meta">{m.from==='me'?'Moi':m.fromName||'Responsable'} · {m.time}</div>
            </div>
          ))}
        </div>
        <div className="msg-bar">
          <textarea className="msg-in" placeholder="Votre message..." rows={1} value={text}
            onChange={e=>setText(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}/>
          <button className="msg-send" onClick={send}>
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </>
  );
}

        </button>
        <button className="drive-btn" style={{background:'var(--raised)',color:'var(--muted)',border:'1px solid var(--border)'}} onClick={onClose}>
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>Quitter
        </button>
      </div>
    </div>
  );
}

/* ══ APP PRINCIPALE ══ */
function ChaufApp({ch,onLogout}){
  const [screen,setScreen]=useState('home');
  const [planning,setPlanning]=useState(null);
  const [toast,setToast]=useState(null);
  const [selectedMission,setSelectedMission]=useState(null);
  const [sigM,setSigM]=useState(null);
  const [matM,setMatM]=useState(null);
  const [matIA,setMatIA]=useState(null);
  const [driveM,setDriveM]=useState(null);
  const [voiceM,setVoiceM]=useState(null);
  const photoRef=useRef(null);

  const t3=(msg,color='var(--green)')=>{setToast({msg,color});setTimeout(()=>setToast(null),3500);};
  const vib=p=>{try{if(navigator.vibrate)navigator.vibrate(p);}catch(e){}};

  useEffect(()=>{
    const load=async()=>{const p=await loadPlanning();if(p)setPlanning(p);};
    load();const iv=setInterval(load,30000);return()=>clearInterval(iv);
  },[]);

  useEffect(()=>{
    if(!navigator.geolocation)return;
    const iv=setInterval(()=>{
      navigator.geolocation.getCurrentPosition(p=>{
        saveEvent({type:'geo',chauffeurId:ch.id,lat:p.coords.latitude,lng:p.coords.longitude});
      },()=>{},{enableHighAccuracy:true,timeout:8000});
    },30000);
    return()=>clearInterval(iv);
  },[ch.id]);

  /* PHOTO + IA — corrigé avec gestion d'erreur complète */
  useEffect(()=>{
    const inp=document.getElementById('photo-cap');if(!inp)return;
    const handler=async e=>{
      const file=e.target.files[0];if(!file)return;
      const m=photoRef.current;
      t3("📷 Photo en cours d'analyse...",'var(--purple)');
      const reader=new FileReader();
      reader.onload=async ev=>{
        const dataUrl=ev.target.result;
        const base64=dataUrl.split(',')[1];
        await saveEvent({type:'photo',chauffeurId:ch.id,chauffeur:ch.display,client:m?m.client||m.task:'',heure:m?m.heure:'',dataUrl,date:new Date().toISOString().slice(0,10)});

        try{
          const resp=await fetch('https://api.anthropic.com/v1/messages',{
            method:'POST',
            headers:{
              'Content-Type':'application/json',
              'anthropic-dangerous-direct-browser-access':'true',
              'anthropic-version':'2023-06-01'
            },
            body:JSON.stringify({
              model:'claude-sonnet-4-6',
              max_tokens:400,
              messages:[{role:'user',content:[
                {type:'image',source:{type:'base64',media_type:file.type||'image/jpeg',data:base64}},
                {type:'text',text:'Tu es un expert logistique traiteur. Analyse cette photo et compte précisément le matériel visible (bacs gastro inox rectangulaires, chariots, échelles pâtissières, containers, caisses, étuves, plateaux, nappes). Réponds UNIQUEMENT avec un objet JSON valide, sans texte avant ni après, sans markdown, format exact: {"gastro":0,"chariot":0,"echelle":0,"container":0,"caisse":0,"etuve":0,"plateau":0,"nappe":0,"description":"description courte en français","confiance":"haute"}'}
              ]}]
            })
          });

          if(!resp.ok){
            const errText=await resp.text();
            console.log('Erreur API:',resp.status,errText);
            t3('🤖 IA indisponible — saisie manuelle','var(--amber)');
            if(m)setMatM(m);
            return;
          }

          const data=await resp.json();
          const txt=data.content?.[0]?.text||'{}';
          let res={};
          try{
            const cleaned=txt.replace(/```json|```/g,'').trim();
            res=JSON.parse(cleaned);
          }catch(parseErr){
            console.log('Erreur parsing JSON IA:',parseErr,txt);
            res={};
          }

          const matKeys=['gastro','chariot','echelle','container','caisse','etuve','plateau','nappe'];
          const tot=matKeys.reduce((a,k)=>a+(parseInt(res[k])||0),0);

          if(tot>0){
            t3(`🤖 IA : ${tot} item(s) détecté(s) !`,'var(--green)');
            vib([100,50,200]);
            if(m)setMatIA({mission:m,aiData:res,aiDesc:res.description});
          }else{
            t3(`🤖 ${res.description||'Aucun matériel détecté'} — saisissez manuellement`,'var(--amber)');
            if(m)setMatM(m);
          }
        }catch(err){
          console.log('Erreur réseau IA:',err);
          t3('📷 Photo sauvegardée — IA indisponible','var(--purple)');
          if(m)setMatM(m);
        }
      };
      reader.readAsDataURL(file);
      inp.value='';
    };
    inp.addEventListener('change',handler);
    return()=>inp.removeEventListener('change',handler);
  },[ch]);

  const action=async(m,act)=>{
    if(act==='voice'){setVoiceM(m);return;}
    if(act==='sign'){setSigM(m);return;}
    if(act==='photo'){photoRef.current=m;document.getElementById('photo-cap').click();return;}
    if(act==='done'){setMatM(m);return;}
    if(act==='done_confirmed'){
      vib([100,50,200]);t3('✅ Livraison confirmée !','var(--green)');speak('Livraison confirmée. Excellent travail !');
      await saveEvent({type:'done',chauffeurId:ch.id,chauffeur:ch.display,client:m.client||m.task||'',heure:m.heure,date:new Date().toISOString().slice(0,10),materiel:m._mat||{}});
      setDriveM(null);
      setSelectedMission(prev=>prev?{...prev,_statut:'done'}:null);
    }
    if(act==='enroute'){
      vib([50,30,50]);t3('🚗 En route !','var(--amber)');
      await saveEvent({type:'enroute',chauffeurId:ch.id,chauffeur:ch.display,client:m.client||m.task||'',heure:m.heure});
      setSelectedMission(prev=>prev?{...prev,_statut:'enroute'}:null);
      setDriveM(m);
    }
    if(act==='arrived'){
      vib([80]);t3('📍 Arrivée notée !','var(--purple)');
      await saveEvent({type:'arrived',chauffeurId:ch.id,chauffeur:ch.display,client:m.client||m.task||'',heure:m.heure});
    }
  };

  const voiceCmd=async(cmd,data)=>{
    const m=voiceM;
    if(cmd==='done')action(m,'done');
    if(cmd==='enroute')action(m,'enroute');
    if(cmd==='arrived')action(m,'arrived');
    if(cmd==='photo')action(m,'photo');
    if(cmd==='call'&&m?.contact)window.open('tel:'+m.contact);
    if(cmd==='maps'&&m)window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(m.adresse||m.client||'')}`, '_blank');
    setVoiceM(null);
  };

  const today=new Date().toISOString().slice(0,10);
  const myMs=planning?getMissions(planning,ch.id,today):[];

  const handleSelectMission=(m)=>{setSelectedMission(m);};

  return(
    <div className="screen">
      {screen==='home'&&!selectedMission&&<HomeScreen ch={ch} planning={planning} onNavigate={setScreen} unreadMsg={1}/>}
      {screen==='today'&&!selectedMission&&<TodayList ch={ch} planning={planning} onSelectMission={handleSelectMission} onBack={()=>setScreen('home')}/>}
      {screen==='clients'&&!selectedMission&&<ClientsList ch={ch} planning={planning} onSelectMission={handleSelectMission} onBack={()=>setScreen('home')}/>}
      {screen==='calendar'&&<CalendarScreen ch={ch} planning={planning} onBack={()=>setScreen('home')}/>}
      {screen==='messages'&&<MessagesScreen ch={ch} onBack={()=>setScreen('home')}/>}
      {screen==='vehicle'&&<VehicleScreen ch={ch} onBack={()=>setScreen('home')} onToast={t3}/>}
      {screen==='help'&&<HelpScreen ch={ch} onBack={()=>setScreen('home')} onToast={t3}/>}

      {selectedMission&&(
        <MissionDetail m={selectedMission} ch={ch}
          onBack={()=>setSelectedMission(null)}
          onAction={action}/>
      )}

      {screen==='home'&&!selectedMission&&(
        <button onClick={onLogout} style={{position:'fixed',top:'calc(var(--sat) + 16px)',right:16,width:36,height:36,borderRadius:11,background:'var(--card)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--muted)',zIndex:10}}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      )}

      {sigM&&<SigModal m={sigM} ch={ch} onClose={()=>setSigM(null)} onDone={()=>{setSigM(null);t3('✍️ Signature enregistrée !','var(--teal)');}}/>}
      {matM&&<MatModal m={matM} ch={ch} onClose={()=>setMatM(null)} onConfirm={async mat=>{setMatM(null);await action({...matM,_mat:mat},'done_confirmed');}}/>}
      {matIA&&<MatModal m={matIA.mission} ch={ch} aiPre={matIA.aiData} aiDesc={matIA.aiDesc} onClose={()=>setMatIA(null)} onConfirm={async mat=>{setMatIA(null);await action({...matIA.mission,_mat:mat},'done_confirmed');}}/>}
      {driveM&&<DriveMode m={driveM} ch={ch} onClose={()=>setDriveM(null)} onDone={()=>action(driveM,'done')}/>}
      {voiceM&&<VoiceModal m={voiceM} ch={ch} onClose={()=>setVoiceM(null)} onCmd={voiceCmd}/>}

      {!selectedMission&&screen==='home'&&(
        <button className="sos-fab" onClick={()=>setScreen('help')}>
          <i className="fa-solid fa-bell" style={{color:'#fff',fontSize:20}}/>
        </button>
      )}

      {toast&&<Toast msg={toast.msg} color={toast.color}/>}
    </div>
  );
}

function App(){
  const [ch,setCh]=useState(null);
  return ch?<ChaufApp ch={ch} onLogout={()=>setCh(null)}/>:<Login onLogin={setCh}/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
