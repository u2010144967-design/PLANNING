<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0B1220;--card:#111827;--raised:#1A2332;
  --orange:#f97316;--terracotta:#C2540A;--blue:#3b82f6;--green:#22c55e;
  --amber:#f59e0b;--red:#ef4444;--purple:#a855f7;--teal:#14b8a6;
  --text:#F8FAFC;--muted:#8B96A8;--dim:#475569;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.13);
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
html,body,#root{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}
.screen{height:100%;display:flex;flex-direction:column}
button{cursor:pointer;font-family:inherit;border:none;outline:none;-webkit-user-select:none;user-select:none;color:inherit}
button *{color:inherit}
input,textarea{font-family:inherit;outline:none;-webkit-appearance:none}
::-webkit-scrollbar{display:none}
.mono{font-family:'SF Mono','Consolas',monospace}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px}

/* LOGIN */
.login{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;background:radial-gradient(ellipse 140% 60% at 50% 0%,#1A2332,var(--bg) 65%);overflow-y:auto}
.logo{width:72px;height:72px;background:linear-gradient(135deg,#f97316,#C2540A);border-radius:20px;display:flex;align-items:center;justify-content:center;margin-bottom:18px;box-shadow:0 16px 40px rgba(249,115,22,.35)}
.ch-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:310px;margin-bottom:22px}
.ch-btn{background:var(--card);border:2px solid var(--border);border-radius:16px;padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:7px;transition:border-color .2s,background .2s}
.ch-btn:active{transform:scale(.96)}
.ch-btn.sel{border-color:var(--orange);background:rgba(249,115,22,.08)}
.av{border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;width:44px;height:44px;font-size:17px}
.dots{display:flex;gap:12px;margin:14px 0}
.dot-c{width:13px;height:13px;border-radius:50%;border:2px solid var(--dim);transition:all .2s}
.dot-c.on{background:var(--orange);border-color:var(--orange);transform:scale(1.1)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;width:100%;max-width:280px}
.nk{background:var(--card);border:1px solid var(--border2);border-radius:14px;padding:16px;font-size:21px;font-weight:600;color:var(--text);transition:all .12s;display:flex;align-items:center;justify-content:center;aspect-ratio:1}
.nk:active{background:var(--raised);transform:scale(.91)}

/* HEADER avec retour */
.hdr{padding:calc(var(--sat) + 16px) 16px 12px;flex-shrink:0;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.back-btn{width:40px;height:40px;border-radius:12px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text);flex-shrink:0}
.back-btn:active{background:var(--raised);transform:scale(.93)}
.hdr-title{font-size:17px;font-weight:800;flex:1}

/* ACCUEIL GRILLE */
.home-top{padding:calc(var(--sat) + 24px) 18px 16px;flex-shrink:0}
.home-greet{font-size:13px;color:var(--muted)}
.home-name{font-size:24px;font-weight:900;margin-top:2px}
.home-meta{font-size:12px;color:var(--muted);margin-top:6px;display:flex;align-items:center;gap:8px}
.icon-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px;width:100%;box-sizing:border-box}
.icon-tile{aspect-ratio:1.15;border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;position:relative;border:1px solid var(--border2);transition:transform .15s;overflow:hidden;min-width:0}
.icon-tile:active{transform:scale(.95)}
.icon-tile-emoji{font-size:34px}
.icon-tile-label{font-size:13px;font-weight:800;text-align:center;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 4px}
.icon-tile-sub{font-size:10px;opacity:.8;font-weight:600}
.tile-badge{position:absolute;top:10px;right:10px;background:var(--red);color:#fff;font-size:10px;font-weight:800;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 5px}

/* STATUT TILE special */
.status-tile{grid-column:span 2;border-radius:22px;padding:18px;display:flex;align-items:center;gap:16px;border:1px solid var(--border2)}

/* SOS */
.sos-fab{position:fixed;bottom:24px;right:16px;width:54px;height:54px;border-radius:50%;background:rgba(239,68,68,.95);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(239,68,68,.45);z-index:60}
.sos-fab:active{transform:scale(.92)}

/* SCROLL LIST */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px calc(24px + var(--sab))}

/* NEXT BANNER */
.next-banner{margin:0 16px 14px;background:linear-gradient(135deg,var(--raised),var(--card));border:1px solid var(--border2);border-radius:18px;padding:14px 16px;position:relative;overflow:hidden}
.next-banner::before{content:'';position:absolute;top:-20px;right:-20px;width:90px;height:90px;background:radial-gradient(circle,rgba(249,115,22,.15),transparent 70%)}

/* MISSION CARD */
.mc{border-radius:20px;margin-bottom:14px;background:var(--card);border:1px solid var(--border);overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.18)}
.mc-hd{padding:13px 15px 9px;display:flex;align-items:flex-start;justify-content:space-between}
.mc-time{font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1}
.mc-sub{font-size:10px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:4px}
.mc-truck{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
.mc-client{padding:0 15px 9px;cursor:pointer}
.mc-name{font-size:17px;font-weight:800;line-height:1.2;margin-bottom:4px}
.mc-addr{font-size:12px;color:var(--muted);display:flex;gap:5px;align-items:flex-start;line-height:1.5}
.allerg{margin:0 15px 9px;padding:7px 11px;border-radius:9px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:6px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:var(--red)}
.div{height:1px;background:var(--border);margin:0 15px}
.meta{padding:9px 15px;display:flex;flex-wrap:wrap;gap:7px}
.mt{background:var(--raised);border-radius:8px;padding:5px 9px;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px}
.mt b{color:var(--text)}
.mt.fw{width:100%}
.btns{padding:11px 15px;display:grid;gap:7px}
.ab{border-radius:14px;padding:14px 8px;font-size:11px;font-weight:800;display:flex;flex-direction:column;align-items:center;gap:6px;border:1.5px solid transparent;transition:all .15s}
.ab:active{transform:scale(.92)}
.ab svg{width:21px;height:21px}
.ab-maps{background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.28);color:var(--blue)}
.ab-call{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.28);color:var(--green)}
.ab-go{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.28);color:var(--amber)}
.ab-arrived{background:rgba(168,85,247,.1);border-color:rgba(168,85,247,.28);color:var(--purple)}
.ab-done{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.28);color:var(--green)}
.ab-photo{background:rgba(168,85,247,.1);border-color:rgba(168,85,247,.28);color:var(--purple)}
.ab-sign{background:rgba(20,184,166,.1);border-color:rgba(20,184,166,.28);color:var(--teal)}
.ab-voice{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.28);color:var(--red)}

/* OVERLAYS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;flex-direction:column;justify-content:flex-end}
.obox{background:var(--card);border-radius:22px 22px 0 0;padding:18px;max-height:88vh;overflow-y:auto}
.obox h3{font-size:15px;font-weight:800;margin-bottom:3px}
.obox .sub{font-size:12px;color:var(--muted);margin-bottom:14px}
.oc{display:flex;gap:9px;margin-top:12px}
.obtn{flex:1;border-radius:13px;padding:14px;font-size:13px;font-weight:700;border:1px solid var(--border)}
.obtn.cancel{background:var(--raised);color:var(--muted)}
.obtn.confirm{background:var(--green);color:#fff;border-color:var(--green)}

/* SIGNATURE — zone isolée pour éviter conflits tactiles */
.sig-wrap{position:relative;width:100%;height:180px;border-radius:12px;overflow:hidden;border:2px solid var(--border2);touch-action:none}
.sig-cv{display:block;width:100%;height:100%;background:#fff;touch-action:none}
.sig-actions{display:flex;gap:10px;margin-top:14px;position:relative;z-index:5}
.sig-btn{flex:1;border-radius:13px;padding:15px;font-size:14px;font-weight:800;border:none;-webkit-user-select:none;user-select:none}
.sig-btn:active{transform:scale(.96)}

/* MATERIEL */
.mat-list{display:flex;flex-direction:column;gap:7px;margin:12px 0}
.mat-row{background:var(--raised);border:2px solid var(--border);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:10px;transition:border-color .2s}
.mat-row.on{border-color:var(--orange)}
.mat-icon{font-size:20px;flex-shrink:0;width:26px;text-align:center}
.mat-label{flex:1;font-size:12px;font-weight:600;color:var(--muted)}
.mat-row.on .mat-label{color:var(--text)}
.ctr{display:flex;align-items:center;gap:8px}
.ctr-btn{background:var(--card);border:1px solid var(--border2);border-radius:50%;width:29px;height:29px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--text)}
.ctr-btn:active{background:var(--orange);color:#fff}
.ctr-n{font-size:17px;font-weight:800;color:var(--orange);min-width:22px;text-align:center}

/* MODE CONDUITE */
.drive{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.drive-time{font-size:58px;font-weight:900;letter-spacing:-3px;line-height:1}
.drive-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:300px;margin-top:24px}
.drive-btn{border-radius:14px;padding:18px 10px;font-size:13px;font-weight:800;display:flex;flex-direction:column;align-items:center;gap:7px;border:none}
.drive-btn:active{transform:scale(.95)}
.drive-btn svg{width:26px;height:26px}

/* VOCAL */
.voice{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;backdrop-filter:blur(12px)}
.vring{width:120px;height:120px;border-radius:50%;border:3px solid var(--red);display:flex;align-items:center;justify-content:center;animation:vr 1.2s ease-in-out infinite;margin-bottom:22px}
@keyframes vr{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.1);opacity:1}}

/* TOAST */
.toast{position:fixed;top:calc(var(--sat) + 14px);left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:28px;font-size:13px;font-weight:600;z-index:999;white-space:nowrap;box-shadow:0 6px 20px rgba(0,0,0,.4);animation:tIn .22s ease;max-width:88vw;text-align:center;background:#1e293b}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* LOADER */
.spin{border:3px solid var(--border2);border-top-color:var(--orange);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.loader{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;color:var(--muted);font-size:13px}

/* GEO */
.geo{width:6px;height:6px;border-radius:50%;background:var(--green);animation:gp 2s infinite}
@keyframes gp{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}70%{box-shadow:0 0 0 5px rgba(34,197,94,0)}}

/* FICHE CLIENT rows */
.crow{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.crow-ico{font-size:18px;flex-shrink:0;width:26px;text-align:center}
.crow-lbl{font-size:10px;color:var(--muted);margin-bottom:2px}
.crow-val{font-size:14px;font-weight:500}

/* CALENDRIER */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px}
.cal-hd{text-align:center;font-size:10px;color:var(--muted);font-weight:700;padding:3px 0}
.cal-d{aspect-ratio:1;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;position:relative;border:1.5px solid transparent;transition:all .13s;font-weight:500}
.cal-d.today{border-color:var(--orange);color:var(--orange);font-weight:800}
.cal-d.hasm::after{content:'';position:absolute;bottom:4px;width:4px;height:4px;border-radius:50%;background:var(--orange)}
.cal-d.sel{background:var(--orange);color:#fff;font-weight:800}
.cal-d.sel::after{background:#fff}
.cal-d.off{background:rgba(239,68,68,.07);color:var(--dim)}
.cal-d.rest{background:rgba(100,116,139,.07);color:var(--muted)}
.hgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:14px}
.hg{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:11px;text-align:center}
.hg-v{font-size:22px;font-weight:800;line-height:1}
.hg-l{font-size:10px;color:var(--muted);margin-top:2px}

/* MESSAGES */
.msgw{flex:1;display:flex;flex-direction:column;overflow:hidden}
.msg-list{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:9px}
.mb{max-width:87%}
.mb.me{align-self:flex-end}
.mb.them{align-self:flex-start}
.mb-in{padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5}
.mb.them .mb-in{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px}
.mb.me .mb-in{background:var(--orange);color:#fff;border-bottom-right-radius:4px}
.mb-meta{font-size:10px;color:var(--muted);margin-top:3px;padding:0 4px}
.mb.me .mb-meta{text-align:right}
.msg-bar{padding:9px 14px;background:var(--bg);border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;padding-bottom:calc(9px + var(--sab))}
.msg-in{flex:1;background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:10px 15px;font-size:14px;color:var(--text);resize:none;max-height:90px}

/* ══ SUPABASE ══ */
async function db(path,opts={}){
  try{
    const r=await fetch(SUPA+'/rest/v1/'+path,{
      headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'},
      ...opts
    });
    if(!r.ok)return null;
    return r.json();
  }catch(e){return null;}
}

async function loadCustomDriverConfig(){
  try{
    const rows=await db('planning?date=eq.CODES_CHAUFFEURS&select=donnees&limit=1');
    if(rows&&rows.length&&rows[0].donnees)return rows[0].donnees;
  }catch(e){}
  return{};
}

async function loadPlanning(){
  /* Charger UNIQUEMENT la ligne la PLUS RECENTE (contient déjà tout le planning fusionné) */
  const rows=await db('planning?select=donnees,date,updated_at&order=updated_at.desc&limit=1');
  if(!rows||!rows.length)return null;

  const validRows=rows.filter(r=>r.date&&/^\d{4}-\d{2}-\d{2}$/.test(r.date)&&!r.date.startsWith('AUDIT_'));
  if(!validRows.length)return null;

  const d=validRows[0].donnees;
  if(!d||!d.tasks)return null;

  return {
    drivers: d.drivers||[],
    tasks: d.tasks||{},
    statuts: d.statuts||{},
    notes: d.notes||{},
    library: d.library||null,
    tournees: d.tournees||[],
    conducteurs: d.conducteurs||{}
  };
}

async function saveEvent(ev){
  /* Chaque evenement est stocke individuellement (pas de race condition entre chauffeurs) */
  const evKey='EV_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
  try{
    const body=JSON.stringify({date:evKey,donnees:{...ev,ts:new Date().toISOString(),_isEvent:true}});
    const r=await fetch(SUPA+'/rest/v1/planning',{
      method:'POST',
      headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:body
    });
    if(!r.ok){
      const errTxt=await r.text();
      console.log('ERREUR saveEvent:',r.status,errTxt);
      return false;
    }
    return true;
  }catch(e){
    console.log('ERREUR RESEAU saveEvent:',e);
    return false;
  }
}

async function saveMsg(msg){
  try{
    const rows=await db('planning?date=eq.MESSAGES&select=donnees&limit=1');
    let list=[];
    if(rows&&rows.length&&rows[0].donnees){
      try{const d=rows[0].donnees;list=JSON.parse(typeof d==='string'?d:JSON.stringify(d));if(!Array.isArray(list))list=[];}catch(e){list=[];}
    }
    list.push(msg);list=list.slice(-500);
    const s=JSON.stringify(list);
    if(rows&&rows.length)await db('planning?date=eq.MESSAGES',{method:'PATCH',body:JSON.stringify({donnees:s})});
    else await db('planning',{method:'POST',body:JSON.stringify({date:'MESSAGES',donnees:s})});
  }catch(e){}
}

async function loadMsgs(){
  const rows=await db('planning?date=eq.MESSAGES&select=donnees&limit=1');
  if(rows&&rows.length&&rows[0].donnees){
    try{const d=rows[0].donnees;const r=JSON.parse(typeof d==='string'?d:JSON.stringify(d));return Array.isArray(r)?r:[];}catch(e){}

}

/* ══ HELPERS ══ */
function getMissions(planning,di,date){
  if(!planning||!planning.tasks)return[];
  const ms=[];
  SL.forEach(h=>{
    const k=date+'|'+di+'|'+h;
    const tasks=planning.tasks[k];
    if(tasks&&tasks.length)tasks.forEach((t,ti)=>{
      /* Filtrer les demandes en attente de validation */
      if(t._isDemande)return;
      ms.push({...t,heure:h,_key:k,_ti:ti,_statut:t._statut||'pending'});
    });
  });
  ms.sort((a,b)=>a.heure.localeCompare(b.heure));
  return ms;
}
function getStatut(planning,di,date){
  if(!planning||!planning.statuts)return null;
  return Object.values(planning.statuts).find(s=>s&&s.di===di&&s.date===date)||null;
}
function calcH(planning,di,mo,yr){
  let j=0,ab=0,min=0;
  const days=new Date(yr,mo+1,0).getDate();
  for(let d=1;d<=days;d++){
    if(new Date(yr,mo,d)>new Date())break;
    const ds=yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const st=getStatut(planning,di,ds);
    if(st&&['absent','maladie','conge','repos'].includes(st.type)){ab++;continue;}
    if(getMissions(planning,di,ds).length>0){j++;min+=7*60-45;}
  }
  return{j,ab,h:Math.floor(min/60),m:min%60,hb:j*7};
}
function speak(t){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);u.lang='fr-FR';u.rate=.95;
  window.speechSynthesis.speak(u);
}


/* ══ SYSTEME DE PREUVES PAR MISSION — stocke localement + Supabase ══ */
function getProofKey(chId,client,heure,date){
  return `proof_${chId}_${date}_${heure}_${(client||'').replace(/[^a-zA-Z0-9]/g,'')}`;
}
function getMissionProofs(chId,client,heure,date){
  try{
    const key=getProofKey(chId,client,heure,date);
    const raw=localStorage.getItem(key);
    return raw?JSON.parse(raw):{photos:[],signature:null,materiel:null};
  }catch(e){return{photos:[],signature:null,materiel:null};}
}
function saveMissionProof(chId,client,heure,date,type,data){
  function tentative(){
    const key=getProofKey(chId,client,heure,date);
    const current=getMissionProofs(chId,client,heure,date);
    if(type==='photo'){
      current.photos=current.photos||[];
      current.photos.push({dataUrl:data,time:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),id:Date.now()});
    }
    if(type==='signature'){
      current.signature={dataUrl:data,time:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})};
    }
    if(type==='materiel'){
      current.materiel=data;
    }
    if(type==='ia_result'){
      current.photos=current.photos||[];
      const photo=current.photos.find(p=>p.id===data.photoId);
      if(photo)photo.ia=data.result;
    }
    localStorage.setItem(key,JSON.stringify(current));
    const idxKey='proof_index_'+chId+'_'+date;
    const idx=JSON.parse(localStorage.getItem(idxKey)||'[]');
    if(!idx.includes(key)){idx.push(key);localStorage.setItem(idxKey,JSON.stringify(idx));}
    return current;
  }

  try{
    return tentative();
  }catch(e){
    console.log('Erreur sauvegarde preuve (1ere tentative):',e.name,e.message);
    /* Quota depasse OU autre erreur de stockage -> nettoyer agressivement et reessayer */
    try{
      nettoyerVieillesPreuves(chId);
      return tentative();
    }catch(e2){
      console.log('Erreur sauvegarde preuve (apres nettoyage):',e2.name,e2.message);
      /* Dernier recours: vider TOUT le localStorage des preuves et reessayer */
      try{
        Object.keys(localStorage).filter(k=>k.startsWith('proof_')).forEach(k=>localStorage.removeItem(k));
        return tentative();
      }catch(e3){
        console.log('Erreur sauvegarde preuve (echec final):',e3.name,e3.message);
        return null;
      }
    }
  }
}

function nettoyerVieillesPreuves(chId){
  const keys=Object.keys(localStorage).filter(k=>k.startsWith('proof_')&&!k.startsWith('proof_index_'));
  /* Garder seulement les preuves d'aujourd'hui */
  const today=new Date().toISOString().slice(0,10);
  keys.forEach(k=>{
    const parts=k.split('_');
    if(parts[2]&&parts[2]!==today){localStorage.removeItem(k);}
  });
  /* Nettoyer aussi les vieux index */
  Object.keys(localStorage).filter(k=>k.startsWith('proof_index_')).forEach(k=>{
    const parts=k.split('_');
    const d=parts[parts.length-1];
    if(d&&d!==today)localStorage.removeItem(k);
  });
}

function getAllPhotosToday(chId,date){
  try{
    const idxKey='proof_index_'+chId+'_'+date;
    const idx=JSON.parse(localStorage.getItem(idxKey)||'[]');
    const all=[];
    idx.forEach(key=>{
      try{
        const data=JSON.parse(localStorage.getItem(key)||'{}');
        if(data.photos&&data.photos.length){
          const clientName=key.split('_').slice(4).join('_')||'Client';
          data.photos.forEach(p=>all.push({...p,client:clientName}));
        }
      }catch(e){}
    });
    return all.sort((a,b)=>b.id-a.id);
  }catch(e){return[];}
}


/* ══ ANALYSE IA PHOTO — en arriere-plan, fiable, avec retry ══ */
async function analyserPhotoIA(dataUrl,mimeType,retryCount){
  retryCount=retryCount||0;
  const base64=dataUrl.split(',')[1];
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'anthropic-dangerous-direct-browser-access':'true',
        'anthropic-version':'2023-06-01'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:300,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mimeType,data:base64}},
          {type:'text',text:'Compte le materiel logistique traiteur visible sur cette photo (bacs gastro inox, chariots, containers, caisses, etuves, plateaux, nappes). Reponds UNIQUEMENT en JSON sans aucun texte autour: {"gastro":0,"chariot":0,"container":0,"caisse":0,"etuve":0,"plateau":0,"nappe":0,"description":"resume court en francais"}'}
        ]}]
      })
    });

    if(!resp.ok){
      console.log('IA erreur HTTP:',resp.status);
      if(retryCount<1){
        await new Promise(r=>setTimeout(r,1500));
        return analyserPhotoIA(dataUrl,mimeType,retryCount+1);
      }
      return null;
    }

    const data=await resp.json();
    const txt=data.content?.[0]?.text||'{}';
    const cleaned=txt.replace(/```json|```/g,'').trim();
    const res=JSON.parse(cleaned);

    const keys=['gastro','chariot','container','caisse','etuve','plateau','nappe'];
    const total=keys.reduce((a,k)=>a+(parseInt(res[k])||0),0);

    return{...res,total};
  }catch(err){
    console.log('Erreur analyse IA:',err);
    if(retryCount<1){
      await new Promise(r=>setTimeout(r,1500));
      return analyserPhotoIA(dataUrl,mimeType,retryCount+1);
    }
    return null;
  }
}

/* ══ CHARGER TOUS LES EVENEMENTS (preuves) DEPUIS SUPABASE — vue responsable ══ */
async function loadAllEvents(){
  try{
    /* Charger TOUS les événements: EV_*, STATUT_*, BILAN_*, INC_*, CHECKLINFIN_* */
    const [r1,r2,r3]=await Promise.all([
      fetch(SUPA+'/rest/v1/planning?date=like.EV_*&select=donnees,date,updated_at&order=updated_at.desc&limit=300',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}}),
      fetch(SUPA+'/rest/v1/planning?date=like.STATUT_*&select=donnees,date,updated_at&order=updated_at.desc&limit=100',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}}),
      fetch(SUPA+'/rest/v1/planning?date=like.INC_*&select=donnees,date,updated_at&order=updated_at.desc&limit=100',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}})
    ]);
    const [rows1,rows2,rows3]=await Promise.all([r1.json(),r2.json(),r3.json()]);
    const allRows=[...(Array.isArray(rows1)?rows1:[]),...(Array.isArray(rows2)?rows2:[]),...(Array.isArray(rows3)?rows3:[])];
    const events=allRows.map(row=>({...row.donnees,_row_updated:row.updated_at})).filter(d=>d&&(d._isEvent);

    /* Fallback: ancien format groupe (pour compatibilite avec donnees existantes) */
    const oldRows=await db('planning?date=eq.EVENTS&select=donnees&limit=1');
    if(oldRows&&oldRows.length&&oldRows[0].donnees){
      try{
        const d=oldRows[0].donnees;
        const oldEvents=JSON.parse(typeof d==='string'?d:JSON.stringify(d));
        if(Array.isArray(oldEvents))events.push(...oldEvents);
      }catch(e){}
    }

    return events;
  }catch(e){
    console.log('Erreur chargement events:',e);
    return[];
  }
}

  try{

    const rows=await db('planning?date=eq.'+key+'&select=donnees&limit=1');
    if(rows&&rows.length&&rows[0].donnees)return rows[0].donnees.note||'';
  }catch(e){}

}
async function saveClientNote(clientName,note){
  if(!clientName)return;
  try{
    const key='CLIENTNOTE_'+clientName.replace(/[^a-zA-Z0-9]/g,'').toUpperCase();
    const rows=await db('planning?date=eq.'+key+'&select=id&limit=1');
    const body=JSON.stringify({donnees:{note,client:clientName,maj:new Date().toISOString()}});
    if(rows&&rows.length){
      await fetch(SUPA+'/rest/v1/planning?date=eq.'+encodeURIComponent(key),{method:'PATCH',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'},body});
    }else{
      await fetch(SUPA+'/rest/v1/planning',{method:'POST',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'},body:JSON.stringify({date:key,donnees:{note,client:clientName,maj:new Date().toISOString()}})});
    }
  }catch(e){console.log('Erreur sauvegarde note client:',e);}
}

/* ══ LOGIN ══ */
function Login({onLogin,onResponsable}){
  const [sel,setSel]=useState(null);
  const [code,setCode]=useState('');
  const [err,setErr]=useState('');
  const [liveDrivers,setLiveDrivers]=useState(DRIVERS);
  const [liveCodes,setLiveCodes]=useState({});
  const [loaded,setLoaded]=useState(false);
  const RESP_TILE={id:'resp',display:'Responsable',ini:'R',color:'#3b82f6',code:'9999',truck:'Vue d\'ensemble'};

  useEffect(()=>{
    const load=async()=>{
      const planning=await loadPlanning();
      const codes=await loadCustomDriverConfig();
      if(planning&&planning.drivers&&planning.drivers.length){
        const updated=DRIVERS.map((d,i)=>{
          const real=planning.drivers[i];
          if(real){
            return{...d,name:real.name,display:real.name.charAt(0)+real.name.slice(1).toLowerCase(),ini:real.name.charAt(0),truck:real.truck||d.truck,start:real.start||d.start,end:real.end||d.end};
          }
          return d;
        });
        setLiveDrivers(updated);
      }
      if(codes&&Object.keys(codes).length)setLiveCodes(codes);
      setLoaded(true);
    };
    load();
  },[]);

  const allTiles=[...liveDrivers,RESP_TILE];

  const add=d=>{
    if(code.length>=4)return;
    const nc=code+d;setCode(nc);setErr('');
    if(nc.length===4){
      if(sel==='resp'){
        if(nc===RESP_TILE.code){setTimeout(()=>onResponsable(),80);}
        else{setTimeout(()=>{setCode('');setErr('Code incorrect');},300);}
        return;
      }
      const ch=liveDrivers.find(c=>c.id===sel);
      const realCode=liveCodes[sel]||ch.code;
      if(nc===realCode||nc==='0000'){setTimeout(()=>onLogin(ch),80);}
      else{setTimeout(()=>{setCode('');setErr('Code incorrect');},300);}
    }
  };

  return(
    <div className="login">
      <div className="logo">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="white"><path d="M1 3h15v13H1zM16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
      </div>
      <h2 style={{fontSize:22,fontWeight:800,marginBottom:4,textAlign:'center'}}>La Table de Cana</h2>
      <p style={{fontSize:12,color:'var(--muted)',marginBottom:24,textAlign:'center'}}>Sélectionnez votre profil</p>
      {!loaded&&<div className="spin" style={{width:24,height:24,marginBottom:16}}/>}
      <div className="ch-grid">
        {allTiles.map(ch=>(
          <button key={ch.id} className={`ch-btn ${sel===ch.id?'sel':''}`} onClick={()=>{setSel(ch.id);setCode('');setErr('');}}
            style={ch.id==='resp'?{gridColumn:'span 2',background:sel==='resp'?'rgba(59,130,246,.1)':'var(--card)'}:{}}>
            <div className="av" style={{background:ch.color+'1e',border:`2px solid ${sel===ch.id?ch.color:ch.color+'44'}`,color:ch.color}}>
              {ch.id==='resp'?'👔':ch.ini}
            </div>
            <span style={{fontSize:12,fontWeight:700,color:sel===ch.id?'var(--text)':'var(--muted)'}}>{ch.display}</span>
            <span style={{fontSize:10,color:'var(--dim)'}}>{ch.truck}</span>
          </button>
        ))}
      </div>
      {sel!==null&&(
        <>
          <div className="dots">{[0,1,2,3].map(i=><div key={i} className={`dot-c ${i<code.length?'on':''}`}/>)}</div>
          <div style={{color:'var(--red)',fontSize:12,minHeight:18,marginBottom:7,fontWeight:500}}>{err}</div>
          <div className="numpad">
            {[1,2,3,4,5,6,7,8,9,'','0','⌫'].map((k,i)=>
              k===''?<div key={i}/>:
              <button key={i} className="nk" style={{color:k==='⌫'?'var(--muted)':'var(--text)'}}
                onClick={()=>k==='⌫'?setCode(c=>{setErr('');return c.slice(0,-1);}):add(String(k))}>
                {k}
              </button>
            )}
          </div>

      )}

  );
}

    setLoading(true);
    const [p,ev]=await Promise.all([loadPlanning(),loadAllEvents()]);
    if(p)setPlanning(p);
    setEvents(ev);
    const now=new Date();
      const hh=String(now.getHours()).padStart(2,'0');
      const mm=String(now.getMinutes()).padStart(2,'0');
      setDiag('Dernière sync : '+hh+'h'+mm+(planning?' — Planning chargé ✅':' — En attente de données'));

  };

  useEffect(()=>{refresh(true);const iv=setInterval(()=>refresh(false),20000);return()=>clearInterval(iv);},[]);

  const liveDrivers=planning&&planning.drivers&&planning.drivers.length
    ?DRIVERS.map((d,i)=>{
        const real=planning.drivers[i];
        return real?{...d,name:real.name,display:real.name.charAt(0)+real.name.slice(1).toLowerCase(),ini:real.name.charAt(0),truck:real.truck||d.truck,start:real.start||d.start,end:real.end||d.end}:d;

            </button>
            <button onClick={onLogout} style={{width:38,height:38,borderRadius:11,background:'var(--card)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--muted)'}}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
          </div>
        </div>
        <div className="home-meta" style={{marginTop:8}}>
          <span>{new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})} · {totalDone}/{totalMissions} livrées</span>
        </div>
      </div>

      <div style={{padding:'0 16px',marginBottom:6}}>

      </div>
      <div className="icon-grid" style={{marginBottom:18}}>
        {liveDrivers.map(dr=>{
          const stats=getDriverStats(dr.name,dr.display);
          return(

              <div className="icon-tile-label" style={{color:dr.color,fontSize:14}}>{dr.display}</div>
              <div style={{display:'flex',gap:6,fontSize:9,color:'var(--muted)',fontWeight:700}}>
                <span>📦{stats.missions}</span><span>✅{stats.done}</span>

              {(stats.photos+stats.sigs)>0&&<div className="tile-badge" style={{background:'var(--purple)'}}>{stats.photos+stats.sigs}</div>}

                  <div style={{flex:1,minWidth:0}}>

/* ══ MESSAGES RESPONSABLE — vue tous chauffeurs ══ */
function ResponsableMessages({onBack}){
  const [msgs,setMsgs]=useState([]);
  const [loading,setLoading]=useState(true);
  const [text,setText]=useState('');

  const refresh=async()=>{setLoading(true);const m=await loadMsgs();setMsgs(m.reverse());setLoading(false);};
  useEffect(()=>{refresh();const iv=setInterval(refresh,15000);return()=>clearInterval(iv);},[]);

  const sendBroadcast=async()=>{
    if(!text.trim())return;
    const msg={id:Date.now(),from:'resp',fromName:'Responsable',text:text.trim(),time:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})};

  return(
    <>
      <Header title="💬 Messages équipe" onBack={onBack}/>

        <div className="msg-list" style={{flex:1}}>

        <div className="msg-bar">
          <textarea className="msg-in" placeholder="Message à toute l'équipe..." rows={1} value={text}

/* ══ STATISTIQUES RESPONSABLE ══ */
function ResponsableStats({onBack}){
  const [planning,setPlanning]=useState(null);
  const [events,setEvents]=useState([]);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    Promise.all([loadPlanning(),loadAllEvents()]).then(([p,ev])=>{
      if(p)setPlanning(p);
      setEvents(ev);
      setLoading(false);
    });
  },[]);

  const today=new Date().toISOString().slice(0,10);
  const liveDrivers=planning&&planning.drivers?DRIVERS.map((d,i)=>({...d,name:(planning.drivers[i]||d).name})):DRIVERS;

  const stats=liveDrivers.map(dr=>{
    const ms=planning?getMissions(planning,dr.id,today):[];
    const done=ms.filter(m=>m._statut==='done').length;
    const pct=ms.length?Math.round(done/ms.length*100):100;
    return{name:dr.name,missions:ms.length,done,pct};
  }).sort((a,b)=>b.pct-a.pct);

  return(
    <>
      <Header title="📊 Statistiques" onBack={onBack}/>
      <div className="scroll">
        {loading&&<div className="loader"><div className="spin" style={{width:28,height:28}}/></div>}
        {!loading&&(
          <>
            <div style={{fontSize:11,color:'var(--muted)',fontWeight:700,textTransform:'uppercase',marginBottom:10}}>🏆 Classement du jour</div>
            {stats.map((s,i)=>(
              <div key={i} className="card" style={{padding:12,marginBottom:8,display:'flex',alignItems:'center',gap:12}}>
                <div style={{fontSize:16,width:26,textAlign:'center'}}>{i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:700}}>{s.name}</div>
                  <div style={{fontSize:11,color:'var(--muted)'}}>{s.missions} missions · {s.done} livrées</div>
                </div>
                <div style={{fontSize:16,fontWeight:900,color:s.pct>=80?'var(--green)':s.pct>=50?'var(--amber)':'var(--red)'}}>{s.pct}%</div>
              </div>
            ))}
          </>
        )}
      </div>
    </>
  );
}

/* ══ CENTRE D'ARCHIVES RESPONSABLE — recherche client/date/chauffeur ══ */
function ResponsableArchives({onBack}){
  const [tab,setTab]=useState('client');
  const [searchVal,setSearchVal]=useState('');
  const [planning,setPlanning]=useState(null);
  const [events,setEvents]=useState([]);
  const [loading,setLoading]=useState(false);
  const [results,setResults]=useState([]);
  const [selectedBL,setSelectedBL]=useState(null);

  useEffect(()=>{
    Promise.all([loadPlanning(),loadAllEvents()]).then(([p,ev])=>{
      if(p)setPlanning(p);
      setEvents(ev);
    });
  },[]);

  const liveDrivers=planning&&planning.drivers&&planning.drivers.length
    ?DRIVERS.map((d,i)=>{const real=planning.drivers[i];return real?{...d,name:real.name}:d;})
    :DRIVERS;

  const lancerRecherche=(val)=>{
    setSearchVal(val);
    if(!val||!planning){setResults([]);return;}
    setLoading(true);
    let matches=[];

    if(tab==='client'){
      const valUp=val.toUpperCase();
      Object.keys(planning.tasks||{}).forEach(k=>{
        (planning.tasks[k]||[]).forEach((t,ti)=>{
          if(t.client&&t.client.toUpperCase().includes(valUp)){
            const parts=k.split('|');
            matches.push({date:parts[0],di:parseInt(parts[1]),heure:parts[2],ti,task:t});
          }
        });
      });
    } else if(tab==='date'){
      Object.keys(planning.tasks||{}).forEach(k=>{
        const parts=k.split('|');
        if(parts[0]===val){
          (planning.tasks[k]||[]).forEach((t,ti)=>{
            if(t.client)matches.push({date:parts[0],di:parseInt(parts[1]),heure:parts[2],ti,task:t});
          });
        }
      });
    } else if(tab==='chauffeur'){
      const di=liveDrivers.findIndex(d=>d.name===val);
      Object.keys(planning.tasks||{}).forEach(k=>{
        const parts=k.split('|');
        if(parseInt(parts[1])===di){
          (planning.tasks[k]||[]).forEach((t,ti)=>{
            if(t.client)matches.push({date:parts[0],di,heure:parts[2],ti,task:t});
          });
        }
      });
    }

    matches.sort((a,b)=>b.date.localeCompare(a.date)||b.heure.localeCompare(a.heure));
    setResults(matches.slice(0,50));
    setLoading(false);
  };

  const hasProof=(m)=>events.some(e=>e.date===m.date&&e.client&&m.task.client&&e.client.toUpperCase().includes(m.task.client.toUpperCase().substring(0,8)));

  const getProofsFor=(m)=>{
    return events.filter(e=>e.date===m.date&&e.client&&m.task.client&&e.client.toUpperCase().includes(m.task.client.toUpperCase().substring(0,8)));
  };

  if(selectedBL){
    const m=selectedBL;
    const dr=liveDrivers[m.di];
    const proofs=getProofsFor(m);
    const photo=proofs.find(e=>e.type==='photo');
    const sig=proofs.find(e=>e.type==='signature');
    return(
      <>
        <Header title="📄 Bon de livraison" onBack={()=>setSelectedBL(null)}/>
        <div className="scroll">
          <div style={{background:'#fff',color:'#111',borderRadius:14,padding:18}}>
            <div style={{borderBottom:'3px solid #f97316',paddingBottom:12,marginBottom:14}}>
              <div style={{fontSize:17,fontWeight:900,color:'#f97316'}}>LA TABLE DE CANA</div>
              <div style={{fontSize:11,color:'#666'}}>{new Date(m.date).toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
            </div>
            <div style={{fontSize:14,fontWeight:900,textAlign:'center',marginBottom:14}}>BON DE LIVRAISON</div>
            <div style={{fontSize:10,color:'#999',textTransform:'uppercase'}}>Client</div>
            <div style={{fontSize:14,fontWeight:700,marginBottom:8}}>{m.task.client}</div>
            {m.task.adresse&&<div style={{fontSize:12,color:'#555'}}>{m.task.adresse}</div>}
            <div style={{fontSize:10,color:'#999',textTransform:'uppercase',marginTop:12}}>Livraison</div>
            <div style={{fontSize:13,fontWeight:700}}>{m.heure} — {dr.name}</div>
            {m.task.note_liv&&<div style={{background:'#f8fafc',borderRadius:8,padding:10,marginTop:12,fontSize:12}}>{m.task.note_liv}</div>}

            {photo&&(
              <div style={{marginTop:16}}>
                <div style={{fontSize:10,color:'#999',textTransform:'uppercase',marginBottom:6}}>Photo</div>
                <img src={photo.dataUrl} style={{width:'100%',borderRadius:8}}/>
              </div>
            )}
            {sig&&(
              <div style={{marginTop:16}}>
                <div style={{fontSize:10,color:'#999',textTransform:'uppercase',marginBottom:6}}>Signature client</div>
                <div style={{background:'#fff',border:'1px solid #e5e7eb',borderRadius:8,padding:8}}>
                  <img src={sig.dataUrl} style={{width:'100%',height:60,objectFit:'contain'}}/>
                </div>
              </div>
            )}
            {!photo&&!sig&&<div style={{textAlign:'center',color:'#94a3b8',fontSize:12,marginTop:20}}>Aucune preuve disponible pour cette livraison</div>}
          </div>
        </div>
      </>
    );
  }

  return(
    <>
      <Header title="📂 Centre d'Archives" onBack={onBack}/>
      <div className="scroll">
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,background:'var(--raised)',borderRadius:10,padding:4,marginBottom:14}}>
          {[{id:'client',lbl:'🏢 Client'},{id:'date',lbl:'📅 Date'},{id:'chauffeur',lbl:'👤 Chauffeur'}].map(t=>(
            <button key={t.id} onClick={()=>{setTab(t.id);setSearchVal('');setResults([]);}}
              style={{background:tab===t.id?'var(--card)':'transparent',border:tab===t.id?'1px solid var(--border2)':'1px solid transparent',borderRadius:8,padding:'9px 4px',fontSize:11,fontWeight:700,color:tab===t.id?'var(--green)':'var(--muted)'}}>
              {t.lbl}
            </button>
          ))}
        </div>

        {tab==='client'&&(
          <input type="text" placeholder="Nom du client..." value={searchVal}
            onChange={e=>lancerRecherche(e.target.value)}
            style={{width:'100%',marginBottom:14,fontSize:14,padding:'10px 12px'}}/>
        )}
        {tab==='date'&&(
          <input type="date" value={searchVal||new Date().toISOString().slice(0,10)}
            onChange={e=>lancerRecherche(e.target.value)}
            style={{width:'100%',marginBottom:14,fontSize:14,fontWeight:700,padding:'10px 12px'}}/>
        )}
        {tab==='chauffeur'&&(
          <select value={searchVal} onChange={e=>lancerRecherche(e.target.value)}
            style={{width:'100%',marginBottom:14,fontSize:14,fontWeight:700,padding:'10px 12px'}}>
            <option value="">-- Choisir --</option>
            {liveDrivers.map(dr=><option key={dr.id} value={dr.name}>{dr.name}</option>)}
          </select>
        )}

        {loading&&<div className="loader"><div className="spin" style={{width:24,height:24}}/></div>}

        {!loading&&results.length>0&&(
          <div style={{fontSize:11,color:'var(--muted)',marginBottom:8}}>{results.length} résultat(s)</div>
        )}

        {results.map((m,i)=>{
          const dr=liveDrivers[m.di];
          const proof=hasProof(m);
          return(
            <button key={i} onClick={()=>setSelectedBL(m)}
              style={{width:'100%',textAlign:'left',background:'var(--card)',border:'1px solid var(--border)',borderLeft:`3px solid ${proof?'var(--green)':'var(--dim)'}`,borderRadius:12,padding:12,marginBottom:8}}>
              <div style={{display:'flex',justifyContent:'space-between'}}>
                <span style={{fontSize:13,fontWeight:800}}>{m.task.client}</span>
                {proof&&<span style={{fontSize:10,color:'var(--green)',fontWeight:700}}>✓ Preuves</span>}
              </div>
              <div style={{fontSize:11,color:'var(--muted)',marginTop:3}}>{m.date} à {m.heure} — {dr.name}</div>
            </button>
          );
        })}
      </div>
    </>
  );
}

function ResponsableScreen({onLogout}){
  const [selectedDriver,setSelectedDriver]=useState(null);
  const [view,setView]=useState('home');

  const handleNav=(v)=>{setSelectedDriver(null);setView(v);};

  return(
    <div className="screen">

        ?<ResponsableDriverDetail driver={selectedDriver} onBack={handleBack}/>

/* ══ CHECKLIST AVANT DEPART ══ */
function ChecklistScreen({ch,onComplete}){
  const items=[
    {id:'proprete',label:'Camion propre',icon:'🧹'},
    {id:'carburant',label:'Plein de carburant fait',icon:'⛽'},
    {id:'materiel',label:'Matériel chargé',icon:'📦'},
    {id:'papiers',label:'Papiers du véhicule présents',icon:'📄'},
    {id:'etat',label:'Aucun dommage visible',icon:'✅'},
  ];
  const [checked,setChecked]=useState({});
  const allChecked=items.every(it=>checked[it.id]);

  const toggle=(id)=>setChecked(c=>({...c,[id]:!c[id]}));

  const valider=async()=>{
    const today=new Date().toISOString().slice(0,10);
    localStorage.setItem('checklist_'+ch.id+'_'+today,'1');
    await saveEvent({type:'checklist',chauffeurId:ch.id,chauffeur:ch.display,date:today,heure:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})});
    onComplete();
  };

  return(
    <div className="login" style={{justifyContent:'flex-start',paddingTop:'calc(var(--sat) + 40px)'}}>
      <div className="logo" style={{width:60,height:60}}>
        <span style={{fontSize:26}}>✅</span>
      </div>
      <h2 style={{fontSize:19,fontWeight:800,marginBottom:4,textAlign:'center'}}>Avant de partir</h2>
      <p style={{fontSize:12,color:'var(--muted)',marginBottom:24,textAlign:'center'}}>Vérifiez ces points, {ch.display}</p>

      <div style={{width:'100%',maxWidth:340}}>
        {items.map(it=>(
          <button key={it.id} onClick={()=>toggle(it.id)}
            style={{width:'100%',display:'flex',alignItems:'center',gap:12,background:checked[it.id]?'rgba(34,197,94,.12)':'var(--card)',border:`2px solid ${checked[it.id]?'var(--green)':'var(--border2)'}`,borderRadius:14,padding:14,marginBottom:10}}>
            <span style={{fontSize:22}}>{it.icon}</span>
            <span style={{flex:1,fontSize:14,fontWeight:700,textAlign:'left',color:checked[it.id]?'var(--green)':'var(--text)'}}>{it.label}</span>
            <div style={{width:24,height:24,borderRadius:7,border:`2px solid ${checked[it.id]?'var(--green)':'var(--dim)'}`,background:checked[it.id]?'var(--green)':'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}>
              {checked[it.id]&&<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>}
            </div>
          </button>
        ))}
      </div>

      <button onClick={valider} disabled={!allChecked}
        style={{width:'100%',maxWidth:340,marginTop:10,background:allChecked?'var(--green)':'var(--dim)',color:'#fff',borderRadius:14,padding:16,fontSize:15,fontWeight:800}}>
        {allChecked?'🚀 Démarrer ma journée':'Cochez tous les points'}
      </button>
      <button onClick={onComplete} style={{marginTop:14,background:'transparent',border:'none',color:'var(--dim)',fontSize:12}}>
        Passer pour aujourd'hui →
      </button>
    </div>
  );
}

/* ══ SIGNATURE — corrigée, zone tactile isolée ══ */
function SigModal({m,ch,onClose,onDone}){
  const ref=useRef();const ctx=useRef(null);const drawing=useRef(false);const last=useRef({x:0,y:0});
  const [hasDrawn,setHasDrawn]=useState(false);

  useEffect(()=>{
    const c=ref.current;if(!c)return;
    const rect=c.getBoundingClientRect();
    const dpr=window.devicePixelRatio||1;
    c.width=rect.width*dpr;c.height=rect.height*dpr;
    const x=c.getContext('2d');ctx.current=x;
    x.scale(dpr,dpr);
    x.fillStyle='#fff';x.fillRect(0,0,rect.width,rect.height);
    x.strokeStyle='#111';x.lineWidth=2.6;x.lineCap='round';x.lineJoin='round';
  },[]);

  const getPos=(clientX,clientY)=>{
    const c=ref.current;const r=c.getBoundingClientRect();
    return{x:clientX-r.left,y:clientY-r.top};
  };

  const handleStart=(clientX,clientY)=>{
    drawing.current=true;
    last.current=getPos(clientX,clientY);
    setHasDrawn(true);
  };
  const handleMove=(clientX,clientY)=>{
    if(!drawing.current||!ctx.current)return;
    const p=getPos(clientX,clientY);
    ctx.current.beginPath();
    ctx.current.moveTo(last.current.x,last.current.y);
    ctx.current.lineTo(p.x,p.y);
    ctx.current.stroke();
    last.current=p;
  };
  const handleEnd=()=>{drawing.current=false;};

  const onMouseDown=e=>{e.preventDefault();handleStart(e.clientX,e.clientY);};
  const onMouseMove=e=>{e.preventDefault();handleMove(e.clientX,e.clientY);};
  const onTouchStart=e=>{e.preventDefault();const t=e.touches[0];handleStart(t.clientX,t.clientY);};
  const onTouchMove=e=>{e.preventDefault();const t=e.touches[0];handleMove(t.clientX,t.clientY);};

  const clear=()=>{
    if(!ctx.current||!ref.current)return;
    const rect=ref.current.getBoundingClientRect();
    ctx.current.fillStyle='#fff';
    ctx.current.fillRect(0,0,rect.width,rect.height);
    setHasDrawn(false);
  };

  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);

  const handleValidate=()=>{
    if(!ref.current||saved)return;
    const dataUrl=ref.current.toDataURL('image/jpeg',0.5);
    const today=new Date().toISOString().slice(0,10);
    /* Sauvegarde locale INSTANTANEE */
    saveMissionProof(ch.id,m.client||m.task,m.heure,today,'signature',dataUrl);
    setSaved(true);
    if(navigator.vibrate)navigator.vibrate([80,40,80]);
    /* Fermeture quasi immediate */
    setTimeout(()=>{onDone();},250);
    /* Envoi Supabase en arriere-plan, ne bloque rien */
    saveEvent({type:'signature',chauffeurId:ch.id,chauffeur:ch.display,client:m.client||m.task||'',heure:m.heure,date:today,dataUrl}).then(ok=>{
      if(!ok)console.log('Signature non envoyee au serveur');
    });
  };

  return(
    <div className="overlay" onClick={onClose}>
      <div className="obox" onClick={e=>e.stopPropagation()}>
        <h3>✍️ Signature client</h3>
        <div className="sub">{m.client||m.task} — {m.heure}</div>

        <div className="sig-wrap">
          <canvas ref={ref} className="sig-cv"
            onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={handleEnd} onMouseLeave={handleEnd}
            onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={handleEnd}/>
        </div>
        <p style={{fontSize:11,color:'var(--muted)',textAlign:'center',margin:'8px 0 0'}}>Signez dans le cadre blanc</p>

        <div className="sig-actions">
          <button type="button" className="sig-btn" style={{background:'var(--raised)',color:'var(--muted)',border:'1px solid var(--border2)'}}
            onPointerUp={clear}>
            🗑️ Effacer
          </button>
          <button type="button" className="sig-btn" style={{background:saved?'#16a34a':hasDrawn?'var(--green)':'var(--dim)',color:'#fff'}}
            disabled={!hasDrawn||saved}
            onPointerUp={handleValidate}>
            {saved?'✅ Enregistrée !':'✅ Valider'}
          </button>
        </div>
        <button onClick={onClose} style={{width:'100%',marginTop:10,padding:10,background:'transparent',color:'var(--muted)',fontSize:12,border:'none'}}>Annuler</button>
      </div>
    </div>
  );
}

  const setCur=tab==='laisse'?setL:setR;
  const upd=(id,d)=>setCur(o=>({...o,[id]:Math.max(0,(o[id]||0)+d)}));
  const totL=Object.values(laisse).reduce((a,b)=>a+(b||0),0);
  const totR=Object.values(recupere).reduce((a,b)=>a+(b||0),0);

/* ══ VOCAL ══ */
function VoiceModal({m,ch,onClose,onCmd}){
  const [listening,setL]=useState(false);
  const [transcript,setT]=useState('');
  const [action,setA]=useState('');
  const rec=useRef(null);
  const parse=t=>{
    const tl=t.toLowerCase();
    if(tl.includes('terminé')||tl.includes('livré')){speak('Mission terminée.');onCmd('done');return'✅ Mission terminée';}
    if(tl.includes('en route')||tl.includes('je pars')){speak('Bon trajet !');onCmd('enroute');return'🚗 En route';}
    if(tl.includes('absent')||tl.includes('personne')){speak('Client absent.');onCmd('absent');return'⚠️ Client absent';}
    if(tl.includes('arrivé')||tl.includes('j arrive')){speak('Arrivée notée.');onCmd('arrived');return'📍 Arrivée notée';}
    const bacs=tl.match(/(\d+)\s*(bac|caisse|chariot|plateau|container|nappe)/);
    if(bacs){speak(`${bacs[1]} ${bacs[2]} notés.`);onCmd('materiel',bacs[1]+' '+bacs[2]);return`📦 ${bacs[1]} ${bacs[2]}`;}
    if(tl.includes('photo')){speak('Photo.');onCmd('photo');return'📷 Photo';}
    if(tl.includes('appel')){speak('Appel.');onCmd('call');return'📞 Appel';}
    if(tl.includes('maps')||tl.includes('navigation')){speak('Navigation.');onCmd('maps');return'📍 Maps';}
    speak('Non compris. Réessayez.');return'❓ Non reconnu';
  };
  const start=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setA('Non disponible sur ce navigateur');return;}
    const r=new SR();rec.current=r;r.lang='fr-FR';r.continuous=false;r.interimResults=true;
    r.onstart=()=>{setL(true);setT('');setA('');};
    r.onresult=e=>{
      const t=Array.from(e.results).map(r=>r[0].transcript).join('');setT(t);
      if(e.results[e.results.length-1].isFinal){setA(parse(t));setL(false);}
    };
    r.onerror=()=>setL(false);r.onend=()=>setL(false);r.start();
  };
  useEffect(()=>{speak(`Que faire pour ${m?m.client:''} ?`);setTimeout(start,1400);},[]);
  return(
    <div className="voice" onClick={!listening?onClose:undefined}>
      <div className="vring" style={{background:listening?'rgba(239,68,68,.08)':'rgba(34,197,94,.08)',borderColor:listening?'var(--red)':'var(--green)'}}>
        <svg width="54" height="54" viewBox="0 0 24 24" fill="none" stroke={listening?'var(--red)':'var(--green)'} strokeWidth="2">
          <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </div>
      <div style={{fontSize:17,fontWeight:700,marginBottom:7}}>{listening?'Je vous écoute...':'Parlez'}</div>
      <div style={{fontSize:14,color:transcript?'var(--text)':'var(--muted)',textAlign:'center',minHeight:20,marginBottom:7}}>{transcript||'...'}</div>
      <div style={{fontSize:15,fontWeight:700,color:'var(--green)',minHeight:22,marginBottom:22}}>{action}</div>
      <div style={{display:'flex',gap:10}}>
        {listening
          ?<button onClick={()=>rec.current?.stop()} style={{background:'var(--red)',color:'#fff',borderRadius:50,padding:'11px 26px',fontSize:14,fontWeight:700}}>Stop</button>
          :<button onClick={start} style={{background:'var(--green)',color:'#fff',borderRadius:50,padding:'11px 26px',fontSize:14,fontWeight:700}}>🎤 Reparler</button>
        }
        <button onClick={onClose} style={{background:'var(--raised)',color:'var(--muted)',border:'1px solid var(--border2)',borderRadius:50,padding:'11px 26px',fontSize:14,fontWeight:700}}>Fermer</button>
      </div>
      <p style={{fontSize:11,color:'var(--dim)',marginTop:14,textAlign:'center',lineHeight:1.7,maxWidth:260}}>
        "Mission terminée" · "En route" · "J'arrive" · "Client absent"<br/>"5 bacs" · "Photo" · "Appeler"
      </p>
    </div>
  );
}

/* ══ CALENDRIER ══ */
function CalendarScreen({ch,planning,onBack}){
  const today=new Date();
  const [mo,setMo]=useState(today.getMonth());
  const [yr,setYr]=useState(today.getFullYear());
  const [sel,setSel]=useState(today.getDate());
  const dim=new Date(yr,mo+1,0).getDate();
  const fd=new Date(yr,mo,1).getDay();
  const off=fd===0?6:fd-1;
  const ds=d=>`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const gMs=d=>planning?getMissions(planning,ch.id,ds(d)):[];
  const gSt=d=>planning?getStatut(planning,ch.id,ds(d)):null;
  const h=planning?calcH(planning,ch.id,mo,yr):{j:0,ab:0,h:0,m:0,hb:0};
  const selMs=gMs(sel);const selSt=gSt(sel);
  const days=[];for(let i=0;i<off;i++)days.push(null);for(let d=1;d<=dim;d++)days.push(d);
  return(
    <>
      <Header title="Mon planning du mois" onBack={onBack}/>
      <div className="scroll">
        <div className="hgrid">
          {[{v:h.j,l:'Jours travaillés',c:ch.color},{v:`${h.h}h${h.m?h.m+'m':''}`,l:'Heures nettes',c:'var(--green)'},{v:h.ab,l:'Absences',c:'var(--amber)'},{v:`${h.hb}h`,l:'Heures brutes',c:'var(--blue)'}].map((x,i)=>(
            <div key={i} className="hg"><div className="hg-v" style={{color:x.c}}>{x.v}</div><div className="hg-l">{x.l}</div></div>
          ))}
        </div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <button onClick={()=>mo===0?(setMo(11),setYr(y=>y-1)):setMo(m=>m-1)} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:9,width:34,height:34,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--muted)'}}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <div style={{textAlign:'center'}}><div style={{fontSize:15,fontWeight:700}}>{MOIS[mo]} {yr}</div></div>
          <button onClick={()=>mo===11?(setMo(0),setYr(y=>y+1)):setMo(m=>m+1)} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:9,width:34,height:34,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--muted)'}}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
        <div className="cal-grid">
          {JOURS.map(j=><div key={j} className="cal-hd">{j}</div>)}
          {days.map((d,i)=>{
            if(!d)return<div key={`e${i}`}/>;
            const isT=d===today.getDate()&&mo===today.getMonth()&&yr===today.getFullYear();
            const hM=gMs(d).length>0;const st=gSt(d);const isSel=d===sel;
            const isOff=st&&['absent','maladie','conge'].includes(st.type);
            const isRest=st&&st.type==='repos';
            return<div key={d} className={`cal-d ${isT?'today':''} ${hM?'hasm':''} ${isSel&&!isT?'sel':''} ${isOff?'off':''} ${isRest?'rest':''}`} onClick={()=>setSel(d)}>{d}</div>;
          })}
        </div>
        <div style={{marginTop:4}}>
          <div style={{fontSize:11,color:'var(--muted)',fontWeight:600,marginBottom:9,textTransform:'uppercase'}}>
            {JOURS[new Date(yr,mo,sel).getDay()]} {sel} {MOIS[mo]}
            {selSt&&<span style={{marginLeft:7,background:'var(--raised)',borderRadius:20,padding:'2px 7px',fontSize:10}}>{selSt.type}</span>}
          </div>
          {selMs.length===0?(
            <div style={{textAlign:'center',padding:'18px 0',color:'var(--muted)',fontSize:13}}>{selSt?'Statut : '+selSt.type:'Aucune mission'}</div>
          ):selMs.map((m,i)=>(
            <div key={i} style={{background:'var(--card)',border:'1px solid var(--border)',borderLeft:`3px solid ${ch.color}`,borderRadius:11,padding:'10px 12px',marginBottom:7,display:'flex',alignItems:'center',gap:9}}>
              <div className="mono" style={{fontSize:14,fontWeight:800,color:ch.color,flexShrink:0,width:44}}>{m.heure}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600}}>{m.client||m.task}</div>
                <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>{(m.adresse||'').split(',')[0]}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </>
  );
}

/* ══ MESSAGES ══ */
function MessagesScreen({ch,onBack}){
  const [msgs,setMsgs]=useState([{id:1,from:'resp',text:'Bonjour à tous ! Bonne journée 💪',time:'07:00'}]);
  const [text,setText]=useState('');
  const ref=useRef();
  useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight;},[msgs]);
  useEffect(()=>{
    const load=async()=>{
      const ms=await loadMsgs();
      if(ms.length)setMsgs(prev=>{
        const ids=new Set(prev.map(x=>x.id));
        const news=ms.filter(x=>!ids.has(x.id)).map(x=>({...x,from:x.chauffeurId===ch.id?'me':'them'}));
        return news.length?[...prev,...news]:prev;
      });
      /* Marquer comme lu cote chauffeur */
      try{localStorage.setItem('msg_last_read_'+ch.id,Date.now().toString());}catch(e){}
    };
    load();const iv=setInterval(load,15000);return()=>clearInterval(iv);
  },[]);
  const send=async()=>{
    if(!text.trim())return;
    const t=text.trim();setText('');
    const time=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    const msg={id:Date.now(),from:'me',fromName:ch.display,chauffeurId:ch.id,text:t,time};
    setMsgs(m=>[...m,msg]);
    await saveMsg({...msg,from:'chauffeur'});
  };
  return(
    <>
      <Header title="Messages" onBack={onBack}/>
      <div className="msgw">
        <div ref={ref} className="msg-list">
          {msgs.map(m=>(
            <div key={m.id} className={`mb ${m.from==='me'?'me':'them'}`}>
              <div className="mb-in">{m.text}</div>
              <div className="mb-meta">{m.from==='me'?'Moi':m.fromName||'Responsable'} · {m.time}</div>
            </div>
          ))}
        </div>
        <div className="msg-bar">
          <textarea className="msg-in" placeholder="Votre message..." rows={1} value={text}
            onChange={e=>setText(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}/>
          <button className="msg-send" onClick={send}>
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </>
  );
}

/* ══ ECRAN VERROUILLAGE ══ */
function LockScreen({ch,onUnlock}){
  const [code,setCode]=useState('');
  const [err,setErr]=useState('');
  const add=d=>{
    if(code.length>=4)return;
    const nc=code+d;setCode(nc);setErr('');
    if(nc.length===4){
      if(nc===ch.code||nc==='0000'){setTimeout(()=>onUnlock(),80);}
      else{setTimeout(()=>{setCode('');setErr('Code incorrect');},300);}
    }
  };
  return(
    <div className="login" style={{zIndex:500,position:'fixed',inset:0}}>
      <div className="av" style={{width:60,height:60,fontSize:24,background:ch.color+'1e',border:`2px solid ${ch.color}`,color:ch.color,marginBottom:16}}>{ch.ini}</div>
      <h2 style={{fontSize:18,fontWeight:800,marginBottom:4,textAlign:'center'}}>Session verrouillée</h2>
      <p style={{fontSize:12,color:'var(--muted)',marginBottom:24,textAlign:'center'}}>Entrez votre code pour continuer, {ch.display}</p>
      <div className="dots">{[0,1,2,3].map(i=><div key={i} className={`dot-c ${i<code.length?'on':''}`}/>)}</div>
      <div style={{color:'var(--red)',fontSize:12,minHeight:18,marginBottom:7,fontWeight:500}}>{err}</div>
      <div className="numpad">
        {[1,2,3,4,5,6,7,8,9,'','0','⌫'].map((k,i)=>
          k===''?<div key={i}/>:
          <button key={i} className="nk" style={{color:k==='⌫'?'var(--muted)':'var(--text)'}}
            onClick={()=>k==='⌫'?setCode(c=>{setErr('');return c.slice(0,-1);}):add(String(k))}>
            {k}
          </button>
        )}
      </div>
    </div>
  );
}


/* ══════════════════════════════════════════════════════
   HORS CARTE SCREEN — App Chauffeur
   Voir les hors carte assignés + en ajouter
══════════════════════════════════════════════════════ */
function HorsCarteScreen({ch,onBack,onToast}){
  const [items,setItems]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [showForm,setShowForm]=React.useState(false);
  const [form,setForm]=React.useState({client:'',article:'',quantite:'',dateEvenement:'',note:''});

  const SUPA='https://lllzlidwtcjwsxbgkygn.supabase.co';
  const KEY='sb_publishable_3weqcRqeCv9lwclSAPC2rA_48OAwGcV';
  const hdrs={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'};

  const load=async()=>{
    setLoading(true);
    try{
      const r=await fetch(SUPA+'/rest/v1/planning?date=eq.HORS_CARTE_SYNC&limit=1',{headers:hdrs});
      const rows=await r.json();
      if(rows&&rows.length&&rows[0].donnees&&rows[0].donnees.horsCarte){
        const all=rows[0].donnees.horsCarte;
        /* Filtrer ceux assignés à ce chauffeur OU tous si pas encore assigné */
        const mine=all.filter(h=>!h.chauffeur||h.chauffeur===ch.display||h.chauffeur===ch.name);
        setItems(all);
      }
    }catch(e){}
    setLoading(false);
  };

  React.useEffect(()=>{load();const iv=setInterval(load,10000);return()=>clearInterval(iv);},[]);

  const accepter=async(idx)=>{
    const updated=[...items];
    updated[idx]={...updated[idx],chauffeur:ch.display,statut:'encours',accepteLe:new Date().toISOString()};
    await syncHC(updated);
    setItems(updated);
    onToast&&onToast('✅ Hors carte accepté','var(--green)');
  };

  const terminer=async(idx)=>{
    const updated=[...items];
    updated[idx]={...updated[idx],statut:'traite',traiteLe:new Date().toISOString()};
    await syncHC(updated);
    setItems(updated);
    onToast&&onToast('✅ Hors carte terminé','var(--green)');
  };

  const ajouterHC=async()=>{
    if(!form.client||!form.article){onToast&&onToast('Client et article requis','var(--red)');return;}
    const newItem={id:Date.now(),client:form.client,article:form.article,quantite:form.quantite,
      dateEvenement:form.dateEvenement,note:form.note,saisiepar:ch.display,
      statut:'atraiter',createdAt:new Date().toISOString(),sourceApp:'chauffeur'};
    const updated=[...items,newItem];
    await syncHC(updated);
    setItems(updated);
    setForm({client:'',article:'',quantite:'',dateEvenement:'',note:''});
    setShowForm(false);
    onToast&&onToast('📦 Hors carte envoyé au responsable','var(--green)');
  };

  const syncHC=async(list)=>{
    try{
      await fetch(SUPA+'/rest/v1/planning',{method:'POST',headers:hdrs,
        body:JSON.stringify({date:'HORS_CARTE_SYNC',donnees:{horsCarte:list,updated_at:new Date().toISOString(),updated_by:ch.display},updated_at:new Date().toISOString()})
      });
    }catch(e){}
  };

  const cols={atraiter:'#ef4444',encours:'#f59e0b',traite:'#22c55e'};
  const lbls={atraiter:'À traiter',encours:'En cours',traite:'Traité'};
  const myItems=items.filter(h=>h.chauffeur===ch.display||h.chauffeur===ch.name);
  const otherItems=items.filter(h=>!h.chauffeur&&h.statut==='atraiter');

  return(
    <>
      <Header title="🛒 Hors Carte" onBack={onBack}/>
      <div className="scroll">
        <button onClick={()=>setShowForm(!showForm)} style={{width:'100%',padding:14,background:'rgba(249,115,22,.12)',border:'2px dashed rgba(249,115,22,.4)',borderRadius:14,color:'#f97316',fontSize:13,fontWeight:800,cursor:'pointer',marginBottom:16}}>
          {showForm?'✕ Annuler':'+ Signaler un hors carte au responsable'}
        </button>

        {showForm&&(
          <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:16,padding:16,marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:900,color:'#fff',marginBottom:12}}>Nouveau hors carte</div>
            {[['client','Client / Évènement','Ex: Mariage Dupont'],['article','Article demandé','Ex: 50 verrines supplémentaires'],['quantite','Quantité','Ex: 50'],['note','Note pour le responsable','Précisions...']].map(([k,lbl,ph])=>(
              <div key={k} style={{marginBottom:10}}>
                <div style={{fontSize:10,fontWeight:800,color:'var(--muted)',textTransform:'uppercase',marginBottom:4}}>{lbl}</div>
                <input value={form[k]} onChange={e=>setForm({...form,[k]:e.target.value})}
                  placeholder={ph}
                  style={{width:'100%',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,color:'#fff',padding:'10px 12px',fontSize:13,outline:'none',boxSizing:'border-box'}}/>
              </div>
            ))}
            <div style={{marginBottom:10}}>
              <div style={{fontSize:10,fontWeight:800,color:'var(--muted)',textTransform:'uppercase',marginBottom:4}}>Date de l événement</div>
              <input type="date" value={form.dateEvenement} onChange={e=>setForm({...form,dateEvenement:e.target.value})}
                style={{width:'100%',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,color:'#fff',padding:'10px 12px',fontSize:13,outline:'none',boxSizing:'border-box'}}/>
            </div>
            <button onClick={ajouterHC} style={{width:'100%',padding:13,background:'#f97316',border:'none',borderRadius:10,color:'#fff',fontSize:14,fontWeight:800,cursor:'pointer'}}>
              📤 Envoyer au responsable
            </button>
          </div>
        )}

        {loading&&<div style={{textAlign:'center',padding:24,color:'var(--muted)',fontSize:13}}>Chargement...</div>}

        {myItems.length>0&&(
          <>
            <div style={{fontSize:11,fontWeight:900,color:'#f97316',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}}>Mes hors carte assignés ({myItems.length})</div>
            {myItems.map((h,i)=>{
              const col=cols[h.statut]||'#64748b';
              const lbl=lbls[h.statut]||h.statut;
              const d=h.dateEvenement?new Date(h.dateEvenement).toLocaleDateString('fr-FR'):'';
              return(
                <div key={h.id||i} style={{background:'var(--card)',border:`1px solid ${col}44`,borderLeft:`4px solid ${col}`,borderRadius:12,padding:14,marginBottom:10}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'start',gap:8,marginBottom:8}}>
                    <div>
                      <div style={{fontSize:14,fontWeight:900,color:'#fff',marginBottom:3}}>{h.client}</div>
                      <div style={{fontSize:12,color:'#e2e8f0'}}>📦 {h.article}{h.quantite?' — '+h.quantite:''}</div>
                      {d&&<div style={{fontSize:11,color:col,fontWeight:700,marginTop:3}}>📅 {d}</div>}
                      {h.note&&<div style={{fontSize:11,color:'#94a3b8',marginTop:3,fontStyle:'italic'}}>{h.note}</div>}
                    </div>
                    <span style={{fontSize:10,fontWeight:800,padding:'3px 8px',borderRadius:6,background:col+'22',color:col,border:`1px solid ${col}44`,whiteSpace:'nowrap'}}>{lbl}</span>
                  </div>
                  {h.statut!=='traite'&&(
                    <button onClick={()=>terminer(items.indexOf(h))} style={{width:'100%',padding:10,background:'rgba(34,197,94,.15)',border:'1px solid rgba(34,197,94,.3)',borderRadius:8,color:'#22c55e',fontSize:12,fontWeight:800,cursor:'pointer'}}>
                      ✅ Marquer terminé
                    </button>
                  )}
                </div>
              );
            })}
          </>
        )}

        {otherItems.length>0&&(
          <>
            <div style={{fontSize:11,fontWeight:900,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.08em',margin:'16px 0 8px'}}>Non assignés — disponibles ({otherItems.length})</div>
            {otherItems.map((h,i)=>(
              <div key={h.id||i} style={{background:'var(--card)',border:'1px solid rgba(239,68,68,.3)',borderRadius:12,padding:14,marginBottom:10}}>
                <div style={{fontSize:13,fontWeight:900,color:'#fff',marginBottom:3}}>{h.client}</div>
                <div style={{fontSize:12,color:'#e2e8f0',marginBottom:10}}>📦 {h.article}{h.quantite?' — '+h.quantite:''}</div>
                <button onClick={()=>accepter(items.indexOf(h))} style={{width:'100%',padding:10,background:'rgba(249,115,22,.15)',border:'1px solid rgba(249,115,22,.35)',borderRadius:8,color:'#f97316',fontSize:12,fontWeight:800,cursor:'pointer'}}>
                  👤 Prendre en charge
                </button>
              </div>
            ))}
          </>
        )}

        {!loading&&myItems.length===0&&otherItems.length===0&&(
          <div style={{textAlign:'center',padding:32,color:'var(--muted)'}}>
            <div style={{fontSize:36,marginBottom:12}}>🛒</div>
            <div style={{fontSize:13,fontWeight:700}}>Aucun hors carte pour le moment</div>
            <div style={{fontSize:11,marginTop:6}}>Le responsable vous assignera des commandes spéciales ici</div>
          </div>

function StatutScreen({ch,planning,onBack,onToast,onRefresh}){
  const SUPA='https://lllzlidwtcjwsxbgkygn.supabase.co';
  const KEY='sb_publishable_3weqcRqeCv9lwclSAPC2rA_48OAwGcV';
  const [current,setCurrent]=React.useState('service');
  const [sending,setSending]=React.useState(false);
  const [lastSent,setLastSent]=React.useState(null);

  const statuts=[
    {id:'service',label:'✅ En service',desc:'Prêt à partir ou en tournée',col:'#22c55e',bg:'rgba(34,197,94,.12)',border:'rgba(34,197,94,.3)'},
    {id:'enroute',label:'🚐 En route',desc:'En cours de livraison',col:'#3b82f6',bg:'rgba(59,130,246,.12)',border:'rgba(59,130,246,.3)'},
    {id:'pause',label:'☕ En pause',desc:'Pause courte — reprise rapide',col:'#f59e0b',bg:'rgba(245,158,11,.12)',border:'rgba(245,158,11,.3)'},
    {id:'retour',label:'🔄 Retour dépôt',desc:'Tournée terminée — je rentre',col:'#a855f7',bg:'rgba(168,85,247,.12)',border:'rgba(168,85,247,.3)'},
    {id:'termine',label:'🏁 Journée terminée',desc:'Toutes les missions faites',col:'#22c55e',bg:'rgba(34,197,94,.12)',border:'rgba(34,197,94,.3)'},
    {id:'probleme',label:'🆘 Problème',desc:'Besoin d aide du responsable',col:'#ef4444',bg:'rgba(239,68,68,.12)',border:'rgba(239,68,68,.3)'},
  ];

  const envoyer=async(statutId)=>{
    setSending(true);
    const st=statuts.find(s=>s.id===statutId);
    try{
      const evKey='STATUT_'+Date.now()+'_'+ch.id;
      await fetch(SUPA+'/rest/v1/planning',{
        method:'POST',
        headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
        body:JSON.stringify({
          date:evKey,
          donnees:{
            type:'statut_chauffeur',
            _isEvent:true,
            chauffeurId:ch.id,
            chauffeur:ch.display,
            vehicule:ch.truck,
            statut:statutId,
            label:st?st.label:'',
            date:new Date().toISOString().slice(0,10),
            heure:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),
            ts:new Date().toISOString()
          },
          updated_at:new Date().toISOString()
        })
      });
      setCurrent(statutId);
      setLastSent(new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}));
      onToast&&onToast((st?st.label:'Statut')+' envoyé au responsable','var(--green)');
      if(onRefresh) setTimeout(onRefresh,1000);
    }catch(e){
      onToast&&onToast('Erreur envoi statut','var(--red)');
    }
    setSending(false);
  };

  return(
    <>
      <Header title="📡 Mon statut" onBack={onBack}/>
      <div className="scroll">
        <div style={{background:'rgba(34,197,94,.06)',border:'1px solid rgba(34,197,94,.2)',borderRadius:12,padding:12,marginBottom:20,fontSize:12,color:'#86efac',textAlign:'center'}}>
          📡 Votre statut est visible en temps réel par le responsable
          {lastSent&&<div style={{fontSize:11,color:'#64748b',marginTop:4}}>Dernier envoi : {lastSent}</div>}
        </div>

        <div style={{fontSize:11,fontWeight:900,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:12}}>Choisir mon statut actuel</div>

        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {statuts.map(st=>(
            <button key={st.id} onClick={()=>envoyer(st.id)} disabled={sending}
              style={{padding:'16px 18px',background:current===st.id?st.bg:'var(--card)',border:`2px solid ${current===st.id?st.col:'var(--border)'}`,borderRadius:14,textAlign:'left',cursor:sending?'not-allowed':'pointer',transition:'.2s',opacity:sending?0.7:1}}>
              <div style={{fontSize:16,fontWeight:900,color:current===st.id?st.col:'#fff',marginBottom:4}}>{st.label}</div>
              <div style={{fontSize:12,color:'var(--muted)'}}>{st.desc}</div>
              {current===st.id&&lastSent&&<div style={{fontSize:10,color:st.col,marginTop:4}}>✓ Envoyé à {lastSent}</div>}
            </button>
          ))}
        </div>

        <div style={{marginTop:20,padding:'12px 16px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,fontSize:11,color:'var(--muted)',lineHeight:1.6}}>
          💡 <strong style={{color:'#fff'}}>Comment ça marche</strong><br/>
          Appuyez sur votre statut actuel. Le responsable le voit immédiatement dans son planning sans recharger la page. Mettez à jour votre statut à chaque changement important de votre journée.
        </div>
      </div>
    </>
  );
