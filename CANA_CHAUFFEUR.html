/* ══ SYNC INDICATOR — Barre de statut en direct ══ */
function SyncIndicator({ch}){
  const [lastSync,setLastSync]=React.useState(null);
  React.useEffect(()=>{
    const iv=setInterval(()=>setLastSync(new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})),30000);
    setLastSync(new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}));
    return()=>clearInterval(iv);
  },[]);
  if(!lastSync) return null;
  return(
    <span style={{fontSize:10,color:'#22c55e',fontWeight:700}}>
      📡 Sync {lastSync}
    </span>
  );
}


/* ══════════════════════════════════════════════════════
   SCORE SCREEN — Performance du chauffeur
══════════════════════════════════════════════════════ */
function ScoreScreen({ch,planning,onBack}){
  const today=new Date().toISOString().slice(0,10);
  const ms=planning?getMissions(planning,ch.id,today):[];
  const done=ms.filter(m=>m._statut==='done').length;
  const total=ms.length;
  const tauxCompletion=total>0?Math.round(done/total*100):100;

  /* Calculer score */
  const score=Math.min(100,Math.max(0,
    tauxCompletion*0.4 +           /* 40pts — missions complétées */
    60                              /* 60pts — base */
  ));

  const scoreCol=score>=80?'#22c55e':score>=60?'#f59e0b':'#ef4444';
  const scoreLbl=score>=90?'Excellent 🏆':score>=80?'Très bien ⭐':score>=70?'Bien 👍':score>=60?'Correct 👌':'À améliorer 💪';

  const criteres=[
    {label:'Missions complétées',val:done+'/'+total,pts:Math.round(tauxCompletion*0.4),max:40,col:'#22c55e'},
    {label:'Ponctualité',val:'En cours...',pts:15,max:20,col:'#3b82f6'},
    {label:'Signalement incidents',val:'Actif',pts:10,max:10,col:'#a855f7'},
    {label:'Bilan journée envoyé',val:'En attente',pts:0,max:10,col:'#f97316'},
    {label:'Zéro problème signalé',val:'✅',pts:20,max:20,col:'#22c55e'},
  ];

  return(
    <>
      <Header title="⭐ Mon score" onBack={onBack}/>
      <div className="scroll">
        {/* Score principal */}
        <div style={{textAlign:'center',background:'var(--card)',border:'1px solid var(--border)',borderRadius:20,padding:'28px 20px',marginBottom:20}}>
          <div style={{fontSize:11,fontWeight:800,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:12}}>Score de performance</div>
          <div style={{position:'relative',width:120,height:120,margin:'0 auto 16px'}}>
            <svg width="120" height="120" viewBox="0 0 120 120">
              <circle cx="60" cy="60" r="50" fill="none" stroke="#1a3550" strokeWidth="10"/>
              <circle cx="60" cy="60" r="50" fill="none" stroke={scoreCol} strokeWidth="10"
                strokeDasharray={`${score*3.14} 314`}
                strokeLinecap="round"
                transform="rotate(-90 60 60)"
                style={{transition:'stroke-dasharray .8s ease'}}/>
            </svg>
            <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
              <div style={{fontSize:28,fontWeight:900,color:scoreCol}}>{score}</div>
              <div style={{fontSize:10,color:'var(--muted)'}}>/ 100</div>
            </div>
          </div>
          <div style={{fontSize:16,fontWeight:800,color:scoreCol}}>{scoreLbl}</div>
          <div style={{fontSize:12,color:'var(--muted)',marginTop:6}}>{ch.display} — {new Date().toLocaleDateString('fr-FR')}</div>
        </div>

        {/* Détail par critère */}
        <div style={{fontSize:11,fontWeight:900,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:12}}>Détail des points</div>
        {criteres.map((cr,i)=>(
          <div key={i} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,padding:'12px 14px',marginBottom:8}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
              <div style={{fontSize:13,fontWeight:700,color:'#fff'}}>{cr.label}</div>
              <div style={{fontSize:12,fontWeight:900,color:cr.col}}>{cr.pts}/{cr.max} pts</div>
            </div>
            <div style={{background:'var(--bg)',borderRadius:4,height:6,marginBottom:6}}>
              <div style={{width:(cr.pts/cr.max*100)+'%',height:6,borderRadius:4,background:cr.col,transition:'.6s ease'}}/>
            </div>
            <div style={{fontSize:11,color:'var(--muted)'}}>{cr.val}</div>
          </div>
        ))}

        <div style={{background:'rgba(249,115,22,.06)',border:'1px solid rgba(249,115,22,.2)',borderRadius:12,padding:'14px 16px',marginTop:8,fontSize:12,color:'#fed7aa',lineHeight:1.6}}>
          💡 Le score se met à jour en temps réel. Envoyez votre bilan de journée pour gagner 10 points supplémentaires.
        </div>
      </div>
    </>
  );
}

    {id:'tenue_rangee',label:'Tenue rangée',icon:'👔',critical:false},
  ];

  const [checked,setChecked]=React.useState({});
  const [sent,setSent]=React.useState(false);
  const [sending,setSending]=React.useState(false);
  const criticals=items.filter(i=>i.critical);
  const allCriticalsDone=criticals.every(i=>checked[i.id]);
  const allDone=items.every(i=>checked[i.id]);
  const countDone=Object.values(checked).filter(Boolean).length;

  const toggle=(id)=>setChecked(c=>({...c,[id]:!c[id]}));

  const valider=async()=>{
    if(!allCriticalsDone){
      onToast&&onToast('Complétez d'abord les points obligatoires (🔴)','var(--red)');
      return;
    }
    setSending(true);
    try{
      const today=new Date().toISOString().slice(0,10);
      await fetch(SUPA+'/rest/v1/planning',{
        method:'POST',
        headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
        body:JSON.stringify({
          date:'CHECKLINFIN_'+today+'_'+ch.id,
          donnees:{
            type:'checklist_fin',_isEvent:true,
            chauffeurId:ch.id,chauffeur:ch.display,
            date:today,
            heure:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),
            checked:checked,score:countDone+'/'+items.length,
            ts:new Date().toISOString()
          },
          updated_at:new Date().toISOString()
        })
      });
      setSent(true);
      onToast&&onToast('✅ Journée clôturée — à demain !','var(--green)');
    }catch(e){
      onToast&&onToast('Erreur — réessayer','var(--red)');
    }
    setSending(false);
  };

  if(sent){
    return(
      <>
        <Header title="✅ Journée clôturée" onBack={onBack}/>
        <div className="scroll" style={{textAlign:'center',paddingTop:50}}>
          <div style={{fontSize:72,marginBottom:20}}>🏁</div>
          <div style={{fontSize:22,fontWeight:900,color:'#fff',marginBottom:8}}>Bonne fin de journée !</div>
          <div style={{fontSize:14,color:'var(--muted)',marginBottom:8}}>{ch.display}</div>
          <div style={{fontSize:13,color:'#22c55e',marginBottom:24}}>{countDone}/{items.length} points validés</div>
          <button onClick={onBack} style={{padding:'13px 28px',background:'rgba(34,197,94,.15)',border:'1px solid rgba(34,197,94,.3)',borderRadius:12,color:'#22c55e',fontSize:14,fontWeight:800,cursor:'pointer'}}>
            Retour à l'accueil
          </button>
        </div>
      </>
    );
  }

  return(
    <>
      <Header title="✅ Fin de journée" onBack={onBack}/>
      <div className="scroll">
        {/* Progress */}
        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,padding:'14px 16px',marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <div style={{fontSize:13,fontWeight:800,color:'#fff'}}>Progression</div>
            <div style={{fontSize:14,fontWeight:900,color:allDone?'#22c55e':'#f97316'}}>{countDone}/{items.length}</div>
          </div>
          <div style={{background:'var(--bg)',borderRadius:4,height:8}}>
            <div style={{width:(countDone/items.length*100)+'%',height:8,borderRadius:4,background:allDone?'#22c55e':'#f97316',transition:'.3s'}}/>
          </div>
        </div>

        <div style={{fontSize:11,fontWeight:900,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:12}}>
          Points obligatoires <span style={{color:'#ef4444'}}>●</span>
        </div>

        {items.map(item=>(
          <button key={item.id} onClick={()=>toggle(item.id)}
            style={{width:'100%',display:'flex',alignItems:'center',gap:12,background:checked[item.id]?'rgba(34,197,94,.1)':'var(--card)',border:`2px solid ${checked[item.id]?'rgba(34,197,94,.4)':'var(--border)'}`,borderRadius:14,padding:'13px 14px',marginBottom:8,cursor:'pointer',textAlign:'left',transition:'.2s'}}>
            <span style={{fontSize:22,flexShrink:0}}>{item.icon}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:700,color:checked[item.id]?'#22c55e':'#fff'}}>{item.label}</div>
              {item.critical&&!checked[item.id]&&<div style={{fontSize:10,color:'#ef4444',fontWeight:700,marginTop:2}}>● Obligatoire</div>}
            </div>
            <div style={{width:26,height:26,borderRadius:8,border:`2px solid ${checked[item.id]?'#22c55e':'var(--border)'}`,background:checked[item.id]?'#22c55e':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              {checked[item.id]&&<span style={{fontSize:14,color:'#fff'}}>✓</span>}
            </div>
          </button>
        ))}

        {!allCriticalsDone&&(
          <div style={{background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.2)',borderRadius:10,padding:'10px 14px',marginTop:4,marginBottom:16,fontSize:12,color:'#fca5a5'}}>
            ⚠️ Complétez les points obligatoires avant de clôturer
          </div>
        )}

        <button onClick={valider} disabled={sending||!allCriticalsDone}
          style={{width:'100%',padding:16,marginTop:8,background:allCriticalsDone?'#22c55e':'rgba(34,197,94,.2)',border:'none',borderRadius:14,color:'#fff',fontSize:15,fontWeight:900,cursor:allCriticalsDone&&!sending?'pointer':'not-allowed',transition:'.2s'}}>
          {sending?'Envoi...':'🏁 Clôturer la journée'}
        </button>
      </div>
    </>
  );
}

function MeteoWidget(){
  const [meteo,setMeteo]=React.useState(null);
  React.useEffect(()=>{
    /* API Open-Meteo gratuite — Marseille */
    fetch('https://api.open-meteo.com/v1/forecast?latitude=43.2965&longitude=5.3698&current=temperature_2m,weathercode,windspeed_10m&timezone=Europe/Paris')
      .then(r=>r.json())
      .then(d=>{
        if(d&&d.current){
          const code=d.current.weathercode;
          const ico=code===0?'☀️':code<=3?'⛅':code<=67?'🌧️':code<=77?'🌨️':code<=82?'🌦️':'⛈️';
          const desc=code===0?'Ensoleillé':code<=3?'Nuageux':code<=67?'Pluie':code<=77?'Neige':code<=82?'Averses':'Orage';
          setMeteo({
            temp:Math.round(d.current.temperature_2m),
            wind:Math.round(d.current.windspeed_10m),
            ico,desc
          });
        }
      }).catch(()=>{});
  },[]);

  if(!meteo) return null;

  const alertVent=meteo.wind>60;
  return(
    <div style={{margin:'8px 16px 0',background:alertVent?'rgba(239,68,68,.08)':'rgba(255,255,255,.04)',border:`1px solid ${alertVent?'rgba(239,68,68,.25)':'rgba(255,255,255,.08)'}`,borderRadius:12,padding:'8px 14px',display:'flex',alignItems:'center',gap:12}}>

        <div style={{fontSize:13,fontWeight:800,color:'#fff'}}>{meteo.desc} · {meteo.temp}°C</div>
        <div style={{fontSize:11,color:alertVent?'#ef4444':'var(--muted)',fontWeight:alertVent?800:400}}>
          {alertVent?'⚠️ Mistral fort — ':''}{meteo.wind} km/h · Marseille

      {alertVent&&<div style={{fontSize:10,fontWeight:900,color:'#ef4444',background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.3)',borderRadius:6,padding:'3px 8px'}}>PRUDENCE</div>}

  );

function HistoriqueScreen({ch,onBack}){
  const SUPA='https://lllzlidwtcjwsxbgkygn.supabase.co';

  const [data,setData]=React.useState([]);

  const [weekOffset,setWeekOffset]=React.useState(0);

  const getWeekDays=(offset)=>{
    const now=new Date();
    const day=now.getDay();
    const monday=new Date(now);
    monday.setDate(now.getDate()-(day===0?6:day-1)+offset*7);
    monday.setHours(0,0,0,0);
    return Array.from({length:7},(_,i)=>{
      const d=new Date(monday);d.setDate(monday.getDate()+i);
      return d.toISOString().slice(0,10);
    });
  };

  const days=getWeekDays(weekOffset);
  const weekLabel=`${new Date(days[0]).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})} → ${new Date(days[6]).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'})}`;

        ...(Array.isArray(d3)?d3:[]).map(r=>r.donnees).filter(d=>d&&d._isEvent&&String(d.chauffeurId)===String(ch.id)),

function ChaufApp({ch,onLogout}){
  const [screen,setScreen]=useState('home');
  const [locked,setLocked]=useState(false);
  const lastActivity=useRef(Date.now());

  /* Verrouillage auto apres 10 min d'inactivite */
  useEffect(()=>{
    const resetActivity=()=>{lastActivity.current=Date.now();};
    ['touchstart','mousedown','keydown'].forEach(evt=>document.addEventListener(evt,resetActivity));
    const iv=setInterval(()=>{
      if(Date.now()-lastActivity.current>600000)setLocked(true);
    },30000);
    return()=>{
      ['touchstart','mousedown','keydown'].forEach(evt=>document.removeEventListener(evt,resetActivity));
      clearInterval(iv);
    };
  },[]);
  const [planning,setPlanning]=useState(null);
  const [toast,setToast]=useState(null);
  const [selectedMission,setSelectedMission]=useState(null);
  const [sigM,setSigM]=useState(null);
  const [matM,setMatM]=useState(null);
  const [matIA,setMatIA]=useState(null);
  const [driveM,setDriveM]=useState(null);
  const [voiceM,setVoiceM]=useState(null);
  const [refreshKey,setRefreshKey]=useState(0);
  const photoRef=useRef(null);

  const t3=(msg,color='var(--green)')=>{setToast({msg,color});setTimeout(()=>setToast(null),3500);};
  const vib=p=>{try{if(navigator.vibrate)navigator.vibrate(p);}catch(e){}};

  useEffect(()=>{
    const load=async()=>{const p=await loadPlanning();if(p)setPlanning(p);};
    load();const iv=setInterval(load,30000);return()=>clearInterval(iv);
  },[]);

  useEffect(()=>{
    if(!navigator.geolocation)return;
    const iv=setInterval(()=>{
      navigator.geolocation.getCurrentPosition(p=>{
        saveEvent({type:'geo',chauffeurId:ch.id,lat:p.coords.latitude,lng:p.coords.longitude});
      },()=>{},{enableHighAccuracy:true,timeout:8000});
    },30000);
    return()=>clearInterval(iv);
  },[ch.id]);
  /* Verification retard auto - notifie le responsable apres 15 min sans action */
  useEffect(()=>{
    const checkRetard=async()=>{
      if(!planning)return;
      const todayD=new Date().toISOString().slice(0,10);
      const ms=getMissions(planning,ch.id,todayD);
      const now=new Date();
      ms.forEach(async m=>{
        if(m._statut==='pending'){
          const [hh,mm]=m.heure.split(':').map(Number);
          const missionTime=new Date();missionTime.setHours(hh,mm,0,0);
          const diffMin=(now-missionTime)/60000;
          if(diffMin>15&&diffMin<17){
            const key='retard_notif_'+m._key;
            if(!sessionStorage.getItem(key)){
              sessionStorage.setItem(key,'1');
              await saveEvent({type:'retard_auto',chauffeurId:ch.id,chauffeur:ch.display,client:m.client||m.task||'',heure:m.heure,date:todayD,retardMin:Math.round(diffMin)});
            }
          }
        }
      });
    };
    const iv=setInterval(checkRetard,60000);
    return()=>clearInterval(iv);
  },[planning,ch.id]);


  /* PHOTO — blindee contre tout crash, jamais de deconnexion */
  useEffect(()=>{
    const inp=document.getElementById('photo-cap');if(!inp)return;
    const handler=e=>{
      try{
        const file=e.target.files[0];if(!file){inp.value='';return;}
        const m=photoRef.current;
        const reader=new FileReader();

        reader.onerror=()=>{
          t3('❌ Erreur lecture photo','var(--red)');
          inp.value='';
        };

        reader.onload=ev=>{
          try{
            const rawDataUrl=ev.target.result;
            const todayD=new Date().toISOString().slice(0,10);
            const clientKey=m?(m.client||m.task||''):'';
            const heureKey=m?m.heure:'';

            const finishSave=(finalDataUrl)=>{
              try{
                const updatedProof=saveMissionProof(ch.id,clientKey,heureKey,todayD,'photo',finalDataUrl);
                const savedPhotoId=updatedProof&&updatedProof.photos&&updatedProof.photos.length
                  ?updatedProof.photos[updatedProof.photos.length-1].id:null;
                vib([60]);
                t3('📷 Photo enregistrée — analyse en cours...','var(--green)');
                setRefreshKey(k=>k+1);

                /* Analyser AVANT d'envoyer a Supabase, pour inclure le comptage dans le meme evenement */
                analyserPhotoIA(finalDataUrl,file.type||'image/jpeg').then(res=>{
                  var materielDetecte=null;
                  if(res&&res.total>0){
                    materielDetecte={gastro:res.gastro||0,chariot:res.chariot||0,container:res.container||0,caisse:res.caisse||0,etuve:res.etuve||0,plateau:res.plateau||0,nappe:res.nappe||0};
                    t3(`🤖 IA : ${res.total} item(s) détecté(s)`,'var(--purple)');
                    if(navigator.vibrate)navigator.vibrate([80,40,80]);
                    if(savedPhotoId)saveMissionProof(ch.id,clientKey,heureKey,todayD,'ia_result',{photoId:savedPhotoId,result:res});
                    setRefreshKey(k=>k+1);
                  }
                  saveEvent({type:'photo',chauffeurId:ch.id,chauffeur:ch.display,client:clientKey,heure:heureKey,dataUrl:finalDataUrl,date:todayD,materielDetecte:materielDetecte}).then(ok=>{
                    if(!ok)t3('⚠️ Photo non envoyée au serveur (stockage plein ?)','var(--red)');
                  }).catch(()=>{t3('⚠️ Erreur réseau envoi photo','var(--red)');});
                }).catch(err=>{
                  console.log('IA non disponible:',err);
                  /* Envoyer quand meme la photo sans le comptage IA */
                  saveEvent({type:'photo',chauffeurId:ch.id,chauffeur:ch.display,client:clientKey,heure:heureKey,dataUrl:finalDataUrl,date:todayD}).then(ok=>{
                    if(!ok)t3('⚠️ Photo non envoyée au serveur (stockage plein ?)','var(--red)');
                  }).catch(()=>{t3('⚠️ Erreur réseau envoi photo','var(--red)');});
                });
              }catch(saveErr){
                console.log('Erreur sauvegarde:',saveErr);
                t3('⚠️ Photo prise mais non sauvegardée','var(--amber)');
              }
            };

            /* Tenter la compression, avec fallback sur l'image brute si ca echoue */
            try{
              const img=new Image();
              img.onload=()=>{
                try{
                  const canvas=document.createElement('canvas');
                  const maxW=500;
                  const scale=Math.min(1,maxW/(img.width||500));
                  canvas.width=Math.max(1,Math.round((img.width||500)*scale));
                  canvas.height=Math.max(1,Math.round((img.height||500)*scale));
                  const cx=canvas.getContext('2d');
                  cx.drawImage(img,0,0,canvas.width,canvas.height);
                  const compressed=canvas.toDataURL('image/jpeg',0.45);
                  finishSave(compressed);
                }catch(compressErr){
                  console.log('Compression echouee, utilisation image brute:',compressErr);
                  finishSave(rawDataUrl);
                }
              };
              img.onerror=()=>{
                console.log('Chargement image echoue, utilisation brute');
                finishSave(rawDataUrl);
              };
              img.src=rawDataUrl;
            }catch(imgErr){
              console.log('Erreur creation image, utilisation brute:',imgErr);
              finishSave(rawDataUrl);
            }
          }catch(loadErr){
            console.log('Erreur traitement photo:',loadErr);
            t3('❌ Erreur traitement photo','var(--red)');
          }
        };
        reader.readAsDataURL(file);
      }catch(globalErr){
        console.log('Erreur globale photo:',globalErr);
        t3('❌ Erreur photo','var(--red)');
      }finally{
        inp.value='';
      }
    };
    inp.addEventListener('change',handler);
    return()=>inp.removeEventListener('change',handler);
  },[ch]);

  const action=async(m,act)=>{
    if(act==='voice'){setVoiceM(m);return;}
    if(act==='sign'){setSigM(m);return;}
    if(act==='photo'){photoRef.current=m;document.getElementById('photo-cap').click();return;}
    if(act==='done'){setMatM(m);return;}
    if(act==='done_confirmed'){
      vib([100,50,200]);t3('✅ Livraison confirmée !','var(--green)');speak('Livraison confirmée. Excellent travail !');
      await saveEvent({type:'done',chauffeurId:ch.id,chauffeur:ch.display,client:m.client||m.task||'',heure:m.heure,date:new Date().toISOString().slice(0,10),materiel:m._mat||{}});
      setDriveM(null);
      setSelectedMission(prev=>prev?{...prev,_statut:'done'}:null);
    }
    if(act==='enroute'){
      vib([50,30,50]);t3('🚗 En route !','var(--amber)');
      await saveEvent({type:'enroute',chauffeurId:ch.id,chauffeur:ch.display,client:m.client||m.task||'',heure:m.heure});
      setSelectedMission(prev=>prev?{...prev,_statut:'enroute'}:null);
      setDriveM(m);
    }
    if(act==='arrived'){
      vib([80]);t3('📍 Arrivée notée !','var(--purple)');
      await saveEvent({type:'arrived',chauffeurId:ch.id,chauffeur:ch.display,client:m.client||m.task||'',heure:m.heure});
    }
  };

  const voiceCmd=async(cmd,data)=>{
    const m=voiceM;
    if(cmd==='done')action(m,'done');
    if(cmd==='enroute')action(m,'enroute');
    if(cmd==='arrived')action(m,'arrived');
    if(cmd==='photo')action(m,'photo');
    if(cmd==='call'&&m?.contact)window.open('tel:'+m.contact);
    if(cmd==='maps'&&m)window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(m.adresse||m.client||'')}`, '_blank');
    setVoiceM(null);
  };

  const today=new Date().toISOString().slice(0,10);
  const myMs=planning?getMissions(planning,ch.id,today):[];

  const handleSelectMission=(m)=>{setSelectedMission(m);};

  if(locked){
    return<LockScreen ch={ch} onUnlock={()=>{setLocked(false);lastActivity.current=Date.now();}}/>;
  }

  return(
    <div className="screen">
      {screen==='home'&&!selectedMission&&<HomeScreen ch={ch} planning={planning} onNavigate={setScreen} unreadMsg={1}/>}
      {screen==='horscarte'&&<HorsCarteScreen ch={ch} onBack={()=>setScreen('home')} onToast={t3}/>}
      {screen==='incident'&&<IncidentScreen ch={ch} onBack={()=>setScreen('home')} onToast={t3}/>}
      {screen==='bilan'&&<BilanJourneeScreen ch={ch} planning={planning} onBack={()=>setScreen('home')} onToast={t3}/>}
      {screen==='statut'&&<StatutScreen ch={ch} planning={planning} onBack={()=>setScreen('home')} onToast={t3} onRefresh={()=>{loadPlanning().then(p=>{if(p)setPlanning(p);});}}/>}
      {screen==='score'&&<ScoreScreen ch={ch} planning={planning} onBack={()=>setScreen('home')}/>}
      {screen==='checklist_fin'&&<ChecklistFinScreen ch={ch} onBack={()=>setScreen('home')} onToast={t3}/>}
      {screen==='historique'&&<HistoriqueScreen ch={ch} onBack={()=>setScreen('home')}/>}
      {screen==='today'&&!selectedMission&&<TodayList ch={ch} planning={planning} onSelectMission={handleSelectMission} onBack={()=>setScreen('home')}/>}
      {screen==='clients'&&!selectedMission&&<ClientsList ch={ch} planning={planning} onSelectMission={handleSelectMission} onBack={()=>setScreen('home')}/>}
      {screen==='calendar'&&<CalendarScreen ch={ch} planning={planning} onBack={()=>setScreen('home')}/>}
      {screen==='messages'&&<MessagesScreen ch={ch} onBack={()=>setScreen('home')}/>}
      {screen==='vehicle'&&<VehicleScreen ch={ch} onBack={()=>setScreen('home')} onToast={t3}/>}
      {screen==='reprises'&&<ReprisesScreen ch={ch} onBack={()=>setScreen('home')} onToast={t3}/>}
      {screen==='photos'&&<AllPhotosScreen ch={ch} onBack={()=>setScreen('home')}/>}
      {screen==='help'&&<HelpScreen ch={ch} onBack={()=>setScreen('home')} onToast={t3}/>}

      {selectedMission&&(
        <MissionDetail m={selectedMission} ch={ch}
          onBack={()=>setSelectedMission(null)}
          onAction={action}
          refreshKey={refreshKey}/>
      )}

      {screen==='home'&&!selectedMission&&(
        <button onClick={onLogout} style={{position:'fixed',top:'calc(var(--sat) + 16px)',right:16,width:36,height:36,borderRadius:11,background:'var(--card)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--muted)',zIndex:10}}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      )}

      {sigM&&<SigModal m={sigM} ch={ch} onClose={()=>setSigM(null)} onDone={()=>{setSigM(null);setRefreshKey(k=>k+1);t3('✍️ Signature enregistrée !','var(--teal)');}}/>}
      {matM&&<MatModal m={matM} ch={ch} onClose={()=>setMatM(null)} onConfirm={async mat=>{setMatM(null);setRefreshKey(k=>k+1);await action({...matM,_mat:mat},'done_confirmed');}}/>}
      {matIA&&<MatModal m={matIA.mission} ch={ch} aiPre={matIA.aiData} aiDesc={matIA.aiDesc} onClose={()=>setMatIA(null)} onConfirm={async mat=>{setMatIA(null);setRefreshKey(k=>k+1);await action({...matIA.mission,_mat:mat},'done_confirmed');}}/>}
      {driveM&&<DriveMode m={driveM} ch={ch} onClose={()=>setDriveM(null)} onDone={()=>action(driveM,'done')}/>}
      {voiceM&&<VoiceModal m={voiceM} ch={ch} onClose={()=>setVoiceM(null)} onCmd={voiceCmd}/>}

      {!selectedMission&&screen==='home'&&(
        <button className="sos-fab" onClick={()=>setScreen('help')}>
          <i className="fa-solid fa-bell" style={{color:'#fff',fontSize:20}}/>
        </button>
      )}

      {toast&&<Toast msg={toast.msg} color={toast.color}/>}
    </div>
  );
}

/* ══ ERROR BOUNDARY — empeche les crashs de deconnecter le chauffeur ══ */
class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false,errorMsg:''};}
  static getDerivedStateFromError(error){return{hasError:true,errorMsg:error.message||'Erreur inconnue'};}
  componentDidCatch(error,info){console.log('Erreur capturee:',error,info);}
  render(){
    if(this.state.hasError){
      return(
        <div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:30,background:'var(--bg)',color:'var(--text)',textAlign:'center'}}>
          <div style={{fontSize:50,marginBottom:16}}>⚠️</div>
          <div style={{fontSize:16,fontWeight:800,marginBottom:8}}>Une erreur est survenue</div>
          <div style={{fontSize:12,color:'var(--muted)',marginBottom:24}}>{this.state.errorMsg}</div>
          <button onClick={()=>this.setState({hasError:false,errorMsg:''})}
            style={{background:'var(--orange)',color:'#fff',borderRadius:14,padding:'14px 28px',fontSize:14,fontWeight:700}}>
            🔄 Continuer
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

function App(){
  const [ch,setCh]=useState(null);
  const [respMode,setRespMode]=useState(false);
  const [checklistDone,setChecklistDone]=useState(false);
  useEffect(()=>{
    const checkNight=()=>{
      const h=new Date().getHours();
      if(h>=20||h<6)document.body.classList.add('night-mode');
      else document.body.classList.remove('night-mode');
    };
    checkNight();
    const iv=setInterval(checkNight,300000);
    return()=>clearInterval(iv);
  },[]);
  if(respMode)return<ResponsableScreen onLogout={()=>setRespMode(false)}/>;
  if(ch&&!checklistDone){
    const today=new Date().toISOString().slice(0,10);
    const already=localStorage.getItem('checklist_'+ch.id+'_'+today);
    if(already)return<ChaufApp ch={ch} onLogout={()=>setCh(null)}/>;
    return<ChecklistScreen ch={ch} onComplete={()=>setChecklistDone(true)}/>;
  }
  return ch?<ChaufApp ch={ch} onLogout={()=>{setCh(null);setChecklistDone(false);}}/>:<Login onLogin={setCh} onResponsable={()=>setRespMode(true)}/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
