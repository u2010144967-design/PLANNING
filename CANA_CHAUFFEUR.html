<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>La Table de Cana</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
:root{
  --bg:#0a0f1e;--card:#111827;--raised:#1a2234;--hover:#1e2d45;
  --orange:#f97316;--blue:#3b82f6;--green:#22c55e;
  --amber:#f59e0b;--red:#ef4444;--purple:#a855f7;--teal:#14b8a6;
  --text:#f1f5f9;--muted:#64748b;--dim:#374151;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body,#root{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;font-size:14px}
.screen{height:100%;display:flex;flex-direction:column;position:relative}
button{cursor:pointer;font-family:inherit;border:none;outline:none;-webkit-user-select:none;user-select:none}
input,textarea,select{font-family:inherit;outline:none;-webkit-appearance:none}
::-webkit-scrollbar{display:none}
.scroll{overflow-y:auto;-webkit-overflow-scrolling:touch}
.mono{font-family:'SF Mono','Consolas',monospace}

/* ══ UTILITAIRES ══ */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.pill-green{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25);color:var(--green)}
.pill-orange{background:rgba(249,115,22,.12);border:1px solid rgba(249,115,22,.25);color:var(--orange)}
.pill-amber{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.25);color:var(--amber)}
.pill-red{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:var(--red)}
.pill-blue{background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);color:var(--blue)}
.pill-muted{background:rgba(100,116,139,.12);border:1px solid rgba(100,116,139,.25);color:var(--muted)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-green{background:var(--green);box-shadow:0 0 8px rgba(34,197,94,.5)}
.dot-amber{background:var(--amber);box-shadow:0 0 8px rgba(245,158,11,.5)}
.dot-red{background:var(--red);box-shadow:0 0 8px rgba(239,68,68,.5)}
.dot-gray{background:var(--dim)}

/* ══ LOGIN ══ */
.login-screen{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse 120% 60% at 50% 0%,#1a2234,var(--bg) 70%);overflow-y:auto}
.login-logo{width:76px;height:76px;background:linear-gradient(135deg,#f97316,#ef4444);border-radius:22px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 20px 40px rgba(249,115,22,.35)}
.ch-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:320px;margin-bottom:24px}
.ch-btn{background:var(--card);border:2px solid var(--border);border-radius:16px;padding:16px 10px;display:flex;flex-direction:column;align-items:center;gap:8px;transition:all .2s}
.ch-btn:active{transform:scale(.95)}
.ch-btn.sel{border-color:var(--orange);background:rgba(249,115,22,.08)}
.av{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0}
.code-dots{display:flex;gap:14px;margin:16px 0}
.code-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--dim);transition:all .25s}
.code-dot.filled{background:var(--orange);border-color:var(--orange);transform:scale(1.1)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:290px}
.num-key{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:17px;font-size:22px;font-weight:600;color:var(--text);transition:all .12s;display:flex;align-items:center;justify-content:center;aspect-ratio:1}
.num-key:active{background:var(--raised);transform:scale(.92)}
.num-key.del-key{font-size:18px;color:var(--muted)}
.err-msg{color:var(--red);font-size:12px;min-height:18px;margin-bottom:6px;font-weight:500}

/* ══ APP HEADER ══ */
.app-top{padding:calc(var(--safe-top) + 48px) 16px 12px;flex-shrink:0}
.driver-row{display:flex;align-items:center;justify-content:space-between}
.driver-info .greeting{font-size:12px;color:var(--muted)}
.driver-info .dname{font-size:22px;font-weight:800;line-height:1.1}
.driver-info .dtruck{font-size:11px;color:var(--muted);margin-top:2px}
.header-actions{display:flex;gap:8px;align-items:center}
.icon-btn{background:var(--card);border:1px solid var(--border);border-radius:12px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.icon-btn:active{background:var(--raised)}

/* ══ STATUT JOURNÉE ══ */
.day-status-bar{margin:10px 16px 0;border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px;border:1px solid var(--border2)}
.dsb-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dsb-info{flex:1}
.dsb-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.dsb-val{font-size:13px;font-weight:600;margin-top:1px}
.dsb-hours{font-size:11px;color:var(--muted);margin-top:1px}

/* ══ PROGRESS BAR ══ */
.progress-card{margin:12px 16px 0;padding:12px 14px;display:flex;align-items:center;gap:12px}
.prog-bar-wrap{flex:1}
.prog-label{font-size:10px;color:var(--muted);margin-bottom:5px}
.prog-bar{height:6px;background:var(--raised);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.prog-count{text-align:right;flex-shrink:0}
.prog-num{font-size:20px;font-weight:800;line-height:1}
.prog-sub{font-size:10px;color:var(--muted)}

/* ══ BOTTOM NAV ══ */
.bnav{position:absolute;bottom:0;left:0;right:0;background:rgba(10,15,30,.97);border-top:1px solid var(--border);display:flex;padding:8px 0 calc(var(--safe-bottom) + 8px);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;background:transparent;border:none;color:var(--muted);font-size:10px;font-weight:500;position:relative;transition:color .2s}
.nav-btn.active{color:var(--orange)}
.nav-btn svg{width:24px;height:24px;stroke-width:1.8;transition:transform .2s}
.nav-btn.active svg{transform:scale(1.1)}
.nav-badge{position:absolute;top:2px;right:calc(50% - 18px);background:var(--red);border-radius:20px;min-width:17px;height:17px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;padding:0 4px;border:2px solid var(--bg)}

/* ══ MAIN CONTENT ══ */
.main-content{flex:1;overflow:hidden;display:flex;flex-direction:column;padding-bottom:calc(60px + var(--safe-bottom))}

/* ══ MISSIONS ══ */
.missions-list{flex:1;overflow-y:auto;padding:12px 16px 0}
.mc{border-radius:20px;margin-bottom:14px;overflow:hidden;transition:transform .15s}
.mc:active{transform:scale(.99)}
.mc-top{padding:14px 16px 10px;display:flex;align-items:flex-start;justify-content:space-between}
.mc-time-block .mc-time{font-size:26px;font-weight:800;letter-spacing:-1.5px;line-height:1}
.mc-time-block .mc-type{font-size:10px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:5px}
.mc-client{padding:0 16px 10px}
.mc-cname{font-size:18px;font-weight:700;line-height:1.2;margin-bottom:5px}
.mc-addr{font-size:12px;color:var(--muted);display:flex;gap:6px;align-items:flex-start;line-height:1.5}
.allerg{margin:0 16px 10px;padding:8px 12px;border-radius:10px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:7px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:var(--red)}
.mc-divider{height:1px;background:var(--border);margin:0 16px}
.mc-meta{padding:10px 16px;display:flex;flex-wrap:wrap;gap:8px}
.mt{background:var(--raised);border-radius:9px;padding:5px 10px;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px}
.mt b{color:var(--text)}
.mt.full{width:100%}
.mc-btns{padding:12px 16px;display:grid;gap:8px}
.ab{border-radius:13px;padding:13px 8px;font-size:12px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:5px;border:1.5px solid transparent;transition:all .15s}
.ab:active{transform:scale(.94)}
.ab svg{width:22px;height:22px}
.ab-maps{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.3);color:var(--blue)}
.ab-call{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.3);color:var(--green)}
.ab-go{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.3);color:var(--amber)}
.ab-done{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.3);color:var(--green)}
.ab-photo{background:rgba(168,85,247,.12);border-color:rgba(168,85,247,.3);color:var(--purple)}
.ab-sign{background:rgba(20,184,166,.12);border-color:rgba(20,184,166,.3);color:var(--teal)}
.ab-msg{background:rgba(99,102,241,.12);border-color:rgba(99,102,241,.3);color:#818cf8}

/* ══ EMPTY / LOADER ══ */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;color:var(--muted)}
.empty-state svg{width:64px;height:64px;margin-bottom:16px;opacity:.25;stroke-width:1.2}
.empty-state p{font-size:14px;line-height:1.7}
.loader-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--muted);font-size:13px}
.spin{width:34px;height:34px;border:3px solid var(--border2);border-top-color:var(--orange);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══ CALENDRIER ══ */
.cal-wrap{flex:1;overflow-y:auto;padding:12px 16px 0}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-nav-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.cal-nav-btn:active{background:var(--raised)}
.cal-month-title{font-size:16px;font-weight:700;text-align:center}
.cal-month-sub{font-size:11px;color:var(--muted);text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
.cal-hd{text-align:center;font-size:10px;color:var(--muted);font-weight:700;padding:4px 0}
.cal-d{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;cursor:pointer;position:relative;border:1.5px solid transparent;transition:all .15s;font-weight:500}
.cal-d:active{transform:scale(.9)}
.cal-d.today{border-color:var(--orange);color:var(--orange);font-weight:800}
.cal-d.has-m::after{content:'';position:absolute;bottom:5px;width:4px;height:4px;border-radius:50%;background:var(--orange)}
.cal-d.sel{background:var(--orange);color:#fff;font-weight:800}
.cal-d.sel::after{background:#fff}
.cal-d.off{color:var(--dim);background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.15)}
.cal-d.rest{color:var(--muted);background:rgba(100,116,139,.06)}
.day-list .di{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--orange);border-radius:12px;padding:11px 13px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.di .dt{font-family:monospace;font-size:14px;font-weight:800;color:var(--orange);flex-shrink:0;width:46px}
.di .dc{flex:1}
.di .dn{font-size:13px;font-weight:600}
.di .ds{font-size:11px;color:var(--muted);margin-top:1px}
.status-chip{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}

/* ══ HEURES DU MOIS ══ */
.hours-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
.hours-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.hg-item{background:var(--raised);border-radius:12px;padding:12px;text-align:center}
.hg-val{font-size:24px;font-weight:800;line-height:1}
.hg-lbl{font-size:10px;color:var(--muted);margin-top:3px}

/* ══ MESSAGES ══ */
.msg-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.msg-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.msg-list{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.mb{max-width:88%}
.mb.me{align-self:flex-end}
.mb.them{align-self:flex-start}
.mb-inner{padding:11px 15px;border-radius:20px;font-size:14px;line-height:1.5}
.mb.them .mb-inner{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--text)}
.mb.me .mb-inner{background:var(--orange);color:#fff;border-bottom-right-radius:4px}
.mb-meta{font-size:10px;color:var(--muted);margin-top:4px;padding:0 4px}
.mb.me .mb-meta{text-align:right}
.msg-bar{padding:10px 16px;background:var(--bg);border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;padding-bottom:calc(10px + var(--safe-bottom))}
.msg-input{flex:1;background:var(--card);border:1px solid var(--border2);border-radius:22px;padding:11px 16px;font-size:14px;color:var(--text);resize:none;max-height:100px;line-height:1.4}
.msg-input:focus{border-color:var(--orange)}
.send-btn{background:var(--orange);border-radius:50%;width:44px;height:44px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;transition:transform .15s}
.send-btn:active{transform:scale(.9)}

/* ══ SIGNATURE ══ */
.sig-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.sig-box{background:var(--card);border-radius:20px;padding:20px;width:100%;max-width:400px}
.sig-canvas{background:#fff;border-radius:12px;width:100%;touch-action:none;cursor:crosshair;display:block}
.sig-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.sig-btn{border-radius:12px;padding:12px;font-size:13px;font-weight:700;transition:transform .15s}
.sig-btn:active{transform:scale(.96)}

/* ══ TOAST ══ */
.toast{position:fixed;top:calc(var(--safe-top) + 16px);left:50%;transform:translateX(-50%);padding:11px 22px;border-radius:30px;font-size:13px;font-weight:600;z-index:999;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:tIn .25s ease;max-width:90vw;text-align:center}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ══ PHOTO INPUT ══ */
.photo-input{position:absolute;width:0;height:0;opacity:0}
</style>
</head>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

/* ══ CONFIG ══ */
const SUPA_URL='https://lllzlidwtcjwsxbgkygn.supabase.co';
const SUPA_KEY='sb_publishable_3weqcRqeCv9lwclSAPC2rA_48OAwGcV';
const TG_TOKEN='8477045091:AAFiQhOh8MPvbi8auzW8y_s2doKrRnyF2ys';
const RESP_ID='7551397917';
const TG_API=`https://api.telegram.org/bot${TG_TOKEN}`;

const CHAUFFEURS=[
  {id:0,name:'Otmane',initial:'O',color:'#3b82f6',code:'1111',truck:'JUMPY',start:'06:00',end:'14:00'},
  {id:1,name:'Nicolas',initial:'N',color:'#22c55e',code:'2222',truck:'VIVARO 1',start:'06:00',end:'14:00'},
  {id:2,name:'Mickaël',initial:'M',color:'#f97316',code:'3333',truck:'VIVARO 2',start:'06:00',end:'15:00'},
  {id:3,name:'Karim',initial:'K',color:'#a855f7',code:'4444',truck:'IVECO',start:'06:00',end:'14:00'},
  {id:4,name:"Maître d'H.",initial:'H',color:'#f59e0b',code:'5555',truck:'VIVARO LOC.',start:'08:00',end:'22:00'},
];

const SL=['06:00','06:30','07:00','07:30','08:00','08:30','09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00'];
const MOIS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const JOURS=['Di','Lu','Ma','Me','Je','Ve','Sa'];

/* ══ API ══ */
async function supaFetch(path,opts={}){
  const r=await fetch(SUPA_URL+'/rest/v1/'+path,{
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
    ...opts
  });
  return r.json();
}

async function chargerPlanning(date){
  const d=date||new Date().toISOString().slice(0,10);
  try{
    const rows=await supaFetch('planning?date=eq.'+d+'&select=donnees&order=updated_at.desc&limit=1');
    if(rows&&rows.length) return rows[0].donnees;
  }catch(e){}
  return null;
}

async function tg(method,body){
  try{
    await fetch(`${TG_API}/${method}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  }catch(e){}
}

function getMissions(planning,di,date){
  if(!planning||!planning.tasks) return [];
  const ms=[];
  SL.forEach(h=>{
    const k=date+'|'+di+'|'+h;
    (planning.tasks[k]||[]).forEach((t,ti)=>{
      ms.push({...t,heure:h,_key:k,_ti:ti,_statut:t._statut||'pending'});
    });
  });
  return ms;
}

function getStatut(planning,di,date){
  if(!planning||!planning.statuts) return null;
  return Object.values(planning.statuts).find(s=>s.di===di&&s.date===date)||null;
}

function calcHeuresMois(planning,di,mois,annee){
  let jours=0,absences=0,totalMin=0;
  const daysInMonth=new Date(annee,mois+1,0).getDate();
  for(let day=1;day<=daysInMonth;day++){
    const d=new Date(annee,mois,day);
    if(d>new Date()) break;
    const ds=`${annee}-${String(mois+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const st=getStatut(planning,di,ds);
    if(st&&(st.type==='absent'||st.type==='maladie'||st.type==='conge'||st.type==='repos')){
      absences++;continue;
    }
    const ms=getMissions(planning,di,ds);
    if(ms.length>0){jours++;totalMin+=7*60-45;}
  }
  return {jours,absences,heures:Math.floor(totalMin/60),minutes:totalMin%60};
}

/* ══ TOAST ══ */
function Toast({msg,color,bg}){
  if(!msg)return null;
  return<div className="toast" style={{background:bg||'#1e293b',border:`1px solid ${color}44`,color}}>{msg}</div>;
}

/* ══ LOGIN ══ */
function Login({onLogin}){
  const [sel,setSel]=useState(null);
  const [code,setCode]=useState('');
  const [err,setErr]=useState('');

  const addDigit=d=>{
    if(code.length>=4)return;
    const nc=code+d;
    setCode(nc);setErr('');
    if(nc.length===4){
      const ch=CHAUFFEURS.find(c=>c.id===sel);
      if(nc===ch.code||nc==='0000'){setTimeout(()=>onLogin(ch),100);}
      else{setTimeout(()=>{setCode('');setErr('Code incorrect, réessayez');},300);}
    }
  };

  return(
    <div className="login-screen">
      <div className="login-logo">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="white">

/* ══ STATUT BARRE ══ */
function DayStatusBar({statut,chauffeur}){
  const today=new Date();
  const startH=parseInt(chauffeur.start.split(':')[0]);
  const endH=parseInt(chauffeur.end.split(':')[0]);
  const nowH=today.getHours()+(today.getMinutes()/60);
  const pct=Math.max(0,Math.min(100,((nowH-startH)/(endH-startH))*100));

  let bg='var(--raised)',iconBg='rgba(34,197,94,.15)',iconColor='var(--green)',label='En service',sublabel=chauffeur.start+' → '+chauffeur.end;
  if(statut){
    const t=statut.type;
    if(t==='absent'||t==='maladie'){bg='rgba(239,68,68,.08)';iconBg='rgba(239,68,68,.15)';iconColor='var(--red)';label=t==='maladie'?'Arrêt maladie':'Absent';}
    else if(t==='conge'){bg='rgba(59,130,246,.08)';iconBg='rgba(59,130,246,.15)';iconColor='var(--blue)';label='En congé';}
    else if(t==='repos'){bg='rgba(100,116,139,.08)';iconBg='rgba(100,116,139,.15)';iconColor='var(--muted)';label='Jour de repos';}
  }

  return(
    <div className="day-status-bar" style={{background:bg}}>
      <div className="dsb-icon" style={{background:iconBg}}>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={iconColor} strokeWidth="2">
          {label==='En service'?<><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></>:
          <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>}
        </svg>
      </div>
      <div className="dsb-info">
        <div className="dsb-label">Statut du jour</div>
        <div className="dsb-val" style={{color:iconColor}}>{label}</div>
        <div className="dsb-hours">{sublabel}</div>
      </div>
      {label==='En service'&&(
        <div style={{width:40,height:40,position:'relative',flex:'none'}}>
          <svg viewBox="0 0 36 36" style={{width:'100%',height:'100%',transform:'rotate(-90deg)'}}>
            <circle cx="18" cy="18" r="15" fill="none" stroke="var(--raised)" strokeWidth="3"/>
            <circle cx="18" cy="18" r="15" fill="none" stroke={chauffeur.color} strokeWidth="3"
              strokeDasharray={`${pct*0.942} 100`} strokeLinecap="round"/>
          </svg>
          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,color:chauffeur.color}}>{Math.round(pct)}%</div>
        </div>
      )}
    </div>
  );
}

/* ══ SIGNATURE ══ */
function SignatureModal({mission,chauffeur,onClose,onDone}){
  const canvasRef=useRef();
  const drawing=useRef(false);
  const lastPos=useRef({x:0,y:0});

  useEffect(()=>{
    const canvas=canvasRef.current;
    const ctx=canvas.getContext('2d');
    canvas.width=canvas.offsetWidth*window.devicePixelRatio;
    canvas.height=canvas.offsetHeight*window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio,window.devicePixelRatio);
    ctx.strokeStyle='#1e293b';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';
  },[]);

  const getPos=(e,canvas)=>{
    const r=canvas.getBoundingClientRect();
    const src=e.touches?e.touches[0]:e;
    return{x:src.clientX-r.left,y:src.clientY-r.top};
  };

  const start=e=>{drawing.current=true;lastPos.current=getPos(e,canvasRef.current);e.preventDefault();};
  const move=e=>{
    if(!drawing.current)return;e.preventDefault();
    const canvas=canvasRef.current;const ctx=canvas.getContext('2d');
    const pos=getPos(e,canvas);
    ctx.beginPath();ctx.moveTo(lastPos.current.x,lastPos.current.y);
    ctx.lineTo(pos.x,pos.y);ctx.stroke();lastPos.current=pos;
  };
  const end=()=>drawing.current=false;

  const clear=()=>{
    const canvas=canvasRef.current;const ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,canvas.offsetWidth,canvas.offsetHeight);
  };

  const save=async()=>{
    const canvas=canvasRef.current;
    const dataUrl=canvas.toDataURL('image/png');
    await tg('sendPhoto',{chat_id:RESP_ID,photo:dataUrl,caption:`✍️ *Signature client*\n${chauffeur.name} — ${mission.client} (${mission.heure})`});
    onDone();
  };

  return(
    <div className="sig-modal" onClick={onClose}>
      <div className="sig-box" onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>Signature client</div>
        <div style={{fontSize:12,color:'var(--muted)',marginBottom:12}}>{mission.client} — {mission.heure}</div>
        <canvas ref={canvasRef} className="sig-canvas" style={{height:180}}
          onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
          onTouchStart={start} onTouchMove={move} onTouchEnd={end}/>
        <div className="sig-actions">
          <button className="sig-btn" style={{background:'var(--raised)',color:'var(--muted)'}} onClick={clear}>Effacer</button>
          <button className="sig-btn" style={{background:'var(--green)',color:'#fff'}} onClick={save}>Valider ✓</button>
        </div>
        <button onClick={onClose} style={{width:'100%',marginTop:8,padding:10,background:'transparent',color:'var(--muted)',fontSize:12}}>Annuler</button>
      </div>
    </div>
  );
}

/* ══ VUE CALENDRIER + HEURES ══ */
function CalendarView({chauffeur,planning}){
  const today=new Date();
  const [month,setMonth]=useState(today.getMonth());
  const [year,setYear]=useState(today.getFullYear());
  const [selDay,setSelDay]=useState(today.getDate());

  const daysInMonth=new Date(year,month+1,0).getDate();
  const firstDay=new Date(year,month,1).getDay();
  const offset=firstDay===0?6:firstDay-1;

  const getMs=d=>{
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    return planning?getMissions(planning,chauffeur.id,ds):[];
  };

  const getSt=d=>{
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    return planning?getStatut(planning,chauffeur.id,ds):null;
  };

  const heures=planning?calcHeuresMois(planning,chauffeur.id,month,year):{jours:0,absences:0,heures:0,minutes:0};
  const selMs=getMs(selDay);
  const selSt=getSt(selDay);

  const days=[];
  for(let i=0;i<offset;i++)days.push(null);
  for(let d=1;d<=daysInMonth;d++)days.push(d);

  return(
    <div className="cal-wrap">
      {/* Bilan mensuel */}
      <div className="hours-card">
        <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.05}}>Bilan {MOIS[month]}</div>
        <div className="hours-grid">
          <div className="hg-item">
            <div className="hg-val" style={{color:chauffeur.color}}>{heures.jours}</div>
            <div className="hg-lbl">Jours travaillés</div>
          </div>
          <div className="hg-item">
            <div className="hg-val" style={{color:'var(--green)'}}>{heures.heures}h{heures.minutes>0?heures.minutes+'m':''}</div>
            <div className="hg-lbl">Heures nettes (-45min/j)</div>
          </div>
          <div className="hg-item">
            <div className="hg-val" style={{color:'var(--amber)'}}>{heures.absences}</div>
            <div className="hg-lbl">Absences / Repos</div>
          </div>
          <div className="hg-item">
            <div className="hg-val" style={{color:'var(--blue)'}}>{heures.jours*7}h</div>
            <div className="hg-lbl">Heures brutes</div>
          </div>
        </div>
      </div>

      {/* Navigation */}
      <div className="cal-nav">
        <button className="cal-nav-btn" onClick={()=>month===0?(setMonth(11),setYear(y=>y-1)):setMonth(m=>m-1)}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div>
          <div className="cal-month-title">{MOIS[month]} {year}</div>
          <div className="cal-month-sub">{chauffeur.name}</div>
        </div>
        <button className="cal-nav-btn" onClick={()=>month===11?(setMonth(0),setYear(y=>y+1)):setMonth(m=>m+1)}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>

      {/* Grille */}
      <div className="cal-grid">
        {JOURS.map(j=><div key={j} className="cal-hd">{j}</div>)}
        {days.map((d,i)=>{
          if(!d)return<div key={`e${i}`}/>;
          const isToday=d===today.getDate()&&month===today.getMonth()&&year===today.getFullYear();
          const hasMiss=getMs(d).length>0;
          const st=getSt(d);
          const isSel=d===selDay;
          const isOff=st&&(st.type==='absent'||st.type==='maladie'||st.type==='conge');
          const isRest=st&&st.type==='repos';
          return(
            <div key={d} className={`cal-d ${isToday?'today':''} ${hasMiss?'has-m':''} ${isSel&&!isToday?'sel':''} ${isOff?'off':''} ${isRest?'rest':''}`}
              onClick={()=>setSelDay(d)}>{d}</div>
          );
        })}
      </div>

      {/* Missions du jour sélectionné */}
      <div className="day-list">
        <div style={{fontSize:11,color:'var(--muted)',fontWeight:600,marginBottom:10,textTransform:'uppercase'}}>
          {JOURS[new Date(year,month,selDay).getDay()]} {selDay} {MOIS[month]}
          {selSt&&<span className="status-chip" style={{marginLeft:8,background:selSt.type==='repos'?'var(--raised)':'rgba(239,68,68,.1)',color:selSt.type==='repos'?'var(--muted)':'var(--red)'}}>{selSt.type}</span>}
        </div>
        {selMs.length===0?(
          <div style={{textAlign:'center',padding:'20px 0',color:'var(--muted)',fontSize:13}}>
            {selSt?'Statut : '+selSt.type:'Aucune mission'}
          </div>
        ):(
          selMs.map((m,i)=>(
            <div key={i} className="di">
              <div className="dt">{m.heure}</div>
              <div className="dc">
                <div className="dn">{m.client||m.task}</div>
                <div className="ds">{m.convives?m.convives+' conv. · ':''}{(m.adresse||'').split(',')[0]}</div>
              </div>
              <div className={`dot ${m._statut==='done'?'dot-green':m._statut==='enroute'?'dot-amber':'dot-gray'}`}/>
            </div>
          ))
        )}
      </div>
    </div>
  );
}

    <div className="msg-wrap">
      <div className="msg-header">
        <div style={{width:38,height:38,borderRadius:11,background:'rgba(249,115,22,.15)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--orange)" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        </div>
        <div>
          <div style={{fontSize:14,fontWeight:700}}>Responsable</div>
          <div style={{fontSize:11,color:'var(--green)',display:'flex',alignItems:'center',gap:5}}>
            <div className="dot dot-green"/>En ligne
          </div>
        </div>
      </div>
      <div ref={listRef} className="msg-list">
        {msgs.map(m=>(
          <div key={m.id} className={`mb ${m.from==='me'?'me':'them'}`}>
            <div className="mb-inner">{m.text}</div>
            <div className="mb-meta">{m.from==='me'?'Moi':m.from==='resp'?'Responsable':m.from} · {m.time}</div>
          </div>
        ))}
      </div>
      <div className="msg-bar">
        <textarea className="msg-input" placeholder="Votre message..." rows={1} value={text}
          onChange={e=>setText(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}/>
        <button className="send-btn" onClick={send}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  );
}

/* ══ APP PRINCIPALE ══ */
function ChaufApp({chauffeur,onLogout}){
  const [tab,setTab]=useState('today');
  const [planning,setPlanning]=useState(null);
  const [loading,setLoading]=useState(true);
  const [toast,setToast]=useState(null);
  const [sigMission,setSigMission]=useState(null);
  const photoInputRef=useRef();
  const pendingPhotoMission=useRef(null);

  const showToast=(msg,color='var(--green)',bg)=>{
    setToast({msg,color,bg});
    setTimeout(()=>setToast(null),3000);
  };

  /* Chargement planning + rafraîchissement 30s */
  useEffect(()=>{
    const load=()=>chargerPlanning().then(p=>{if(p)setPlanning(p);setLoading(false);}).catch(()=>setLoading(false));
    load();
    const iv=setInterval(load,30000);
    return()=>clearInterval(iv);
  },[]);

  /* Photo */
  useEffect(()=>{
    const input=document.getElementById('photo-input');
    if(!input)return;
    const handler=async e=>{
      const file=e.target.files[0];
      if(!file)return;
      const m=pendingPhotoMission.current;
      const caption=`📷 *PHOTO DE LIVRAISON*\n--------------------\n👤 *${chauffeur.name.toUpperCase()}*\n🏢 ${m?m.client:''} (${m?m.heure:''})\n--------------------\n_La Table de Cana_`;
      const formData=new FormData();
      formData.append('chat_id',RESP_ID);
      formData.append('photo',file);
      formData.append('caption',caption);
      formData.append('parse_mode','Markdown');
      try{
        await fetch(`${TG_API}/sendPhoto`,{method:'POST',body:formData});
        showToast('📷 Photo envoyée au responsable !','var(--purple)');
      }catch(e){showToast('Erreur envoi photo','var(--red)');}
      input.value='';
    };
    input.addEventListener('change',handler);
    return()=>input.removeEventListener('change',handler);
  },[chauffeur]);

  const handleAction=async(mission,action)=>{
    if(action==='photo'){
      pendingPhotoMission.current=mission;
      document.getElementById('photo-input').click();
      return;
    }
    if(action==='sign'){setSigMission(mission);return;}
    if(action==='enroute'){
      showToast('🚗 En route !','var(--amber)');
      await tg('sendMessage',{chat_id:RESP_ID,text:`🚗 *${chauffeur.name.toUpperCase()}* est en route\n📅 *${mission.heure}* — ${mission.client}`,parse_mode:'Markdown'});
    }
    if(action==='done'){
      showToast('✅ Livraison confirmée !','var(--green)');
      await tg('sendMessage',{chat_id:RESP_ID,text:`✅ *${chauffeur.name.toUpperCase()}* a terminé\n📅 *${mission.heure}* — *${mission.client}*`,parse_mode:'Markdown'});
    }
  };

  const today=new Date().toISOString().slice(0,10);
  const myMissions=planning?getMissions(planning,chauffeur.id,today):[];
  const pending=myMissions.filter(m=>m._statut!=='done').length;

  return(
    <div className="screen">
      <div className="app-top">
        <div className="driver-row">
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div className="av" style={{width:46,height:46,background:chauffeur.color+'20',border:`2px solid ${chauffeur.color}60`,color:chauffeur.color}}>
              {chauffeur.initial}
            </div>
            <div className="driver-info">
              <div className="greeting">Bonjour 👋</div>
              <div className="dname" style={{color:chauffeur.color}}>{chauffeur.name}</div>
              <div className="dtruck">{chauffeur.truck} · {chauffeur.start}–{chauffeur.end}</div>
            </div>
          </div>
          <div className="header-actions">
            {loading&&<div className="spin" style={{width:20,height:20,borderWidth:2}}/>}
            <button className="icon-btn" onClick={onLogout}>
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div className="main-content">
        {tab==='today'&&<TodayView chauffeur={chauffeur} planning={planning} onAction={handleAction}/>}
        {tab==='calendar'&&<CalendarView chauffeur={chauffeur} planning={planning}/>}
        {tab==='messages'&&<MessagesView chauffeur={chauffeur}/>}
      </div>

      <nav className="bnav">
        {[
          {id:'today',lbl:"Aujourd'hui",badge:pending,svg:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>},
          {id:'calendar',lbl:'Planning',badge:0,svg:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>},
          {id:'messages',lbl:'Messages',badge:0,svg:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>},
        ].map(n=>(
          <button key={n.id} className={`nav-btn ${tab===n.id?'active':''}`} onClick={()=>setTab(n.id)}>
            {n.svg}
            <span>{n.lbl}</span>
            {n.badge>0&&<div className="nav-badge" style={{background:tab===n.id?chauffeur.color:'var(--red)'}}>{n.badge}</div>}
          </button>
        ))}
      </nav>

      {sigMission&&(
        <SignatureModal mission={sigMission} chauffeur={chauffeur}
          onClose={()=>setSigMission(null)}
          onDone={()=>{setSigMission(null);showToast('✍️ Signature envoyée !','var(--teal)');}}/>
      )}

      {toast&&<Toast msg={toast.msg} color={toast.color} bg={toast.bg}/>}
    </div>
  );
}

function App(){
  const [ch,setCh]=useState(null);
  return ch?<ChaufApp chauffeur={ch} onLogout={()=>setCh(null)}/>:<Login onLogin={setCh}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
