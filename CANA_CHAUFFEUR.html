<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>La Table de Cana — App Chauffeur</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07101e;--card:#0d1b2e;--border:#1a3550;--text:#e2e8f0;--muted:#607d9a;
  --orange:#f97316;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#a855f7;
  --sab:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden}
#root{height:100%;display:flex;flex-direction:column}
.screen{height:100%;display:flex;flex-direction:column;overflow:hidden}
.scroll{flex:1;overflow-y:auto;padding-bottom:calc(20px + var(--sab))}
.scroll::-webkit-scrollbar{display:none}

/* ── LOGIN ── */
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:24px;background:linear-gradient(160deg,#071526,#0a1f38)}
.login-logo{font-size:56px;margin-bottom:12px}
.login-title{font-size:26px;font-weight:900;color:#fff;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:32px;text-align:center}
.login-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:320px;margin-bottom:20px}
.driver-btn{padding:16px 8px;border-radius:14px;border:2px solid;background:transparent;font-size:13px;font-weight:800;cursor:pointer;text-align:center;transition:.15s}
.driver-btn:active{transform:scale(.96)}
.pin-section{width:100%;max-width:320px}
.pin-input{width:100%;background:var(--card);border:2px solid var(--border);border-radius:12px;color:#fff;padding:14px;font-size:18px;text-align:center;outline:none;letter-spacing:6px;margin-bottom:10px}
.pin-input:focus{border-color:var(--orange)}
.pin-go{width:100%;padding:14px;background:var(--orange);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:900;cursor:pointer}
.pin-err{color:var(--red);font-size:12px;text-align:center;margin-top:6px;min-height:16px}

/* ── HEADER ── */
.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.hdr-back{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:8px}
.hdr-title{font-size:16px;font-weight:800;color:#fff;flex:1}
.hdr-right{font-size:12px;color:var(--muted)}

/* ── ICON GRID ── */
.icon-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px}
.icon-tile{aspect-ratio:1;border-radius:18px;border:1.5px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;cursor:pointer;background:none;font-family:inherit;position:relative;transition:.15s}
.icon-tile:active{transform:scale(.94)}
.icon-tile-emoji{font-size:26px}
.icon-tile-label{font-size:12px;font-weight:800;text-align:center;padding:0 4px;line-height:1.3}
.icon-tile-sub{font-size:10px;text-align:center;padding:0 4px;line-height:1.2}
.tile-badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:10px;font-weight:800;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--bg)}

/* ── HOME TOP ── */
.home-top{padding:20px 16px 12px;background:linear-gradient(160deg,#0f1928,#071526);border-bottom:1px solid var(--border)}
.home-greet{font-size:13px;color:var(--muted);margin-bottom:2px}
.home-name{font-size:24px;font-weight:900;color:#fff;margin-bottom:8px}
.home-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);flex-wrap:wrap}
.meteo-bar{margin:8px 16px 0;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:10px;font-size:12px}

/* ── CARD ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin:0 16px 12px}
.card-title{font-size:14px;font-weight:800;color:#fff;margin-bottom:12px}

/* ── FORM ── */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field label{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.field input,.field select,.field textarea{background:var(--bg);border:1px solid var(--border);border-radius:8px;color:#fff;padding:10px 12px;font-size:13px;outline:none;font-family:inherit;box-sizing:border-box;width:100%}
.field input:focus,.field select:focus{border-color:var(--orange)}
.btn-primary{width:100%;padding:14px;background:var(--orange);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:900;cursor:pointer}
.btn-secondary{width:100%;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-weight:700;cursor:pointer}

/* ── TOAST ── */
#toast{position:fixed;bottom:calc(20px + var(--sab));left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 20px;font-size:13px;font-weight:700;color:#fff;z-index:9999;pointer-events:none;opacity:0;transition:.3s;white-space:nowrap;max-width:90vw}
#toast.show{opacity:1}

/* ── INCIDENT TYPES ── */
.inc-type{width:100%;padding:12px 14px;background:var(--card);border:2px solid var(--border);border-radius:12px;text-align:left;cursor:pointer;margin-bottom:8px;transition:.15s;font-family:inherit}
.inc-type.on{border-color:var(--red);background:rgba(239,68,68,.1)}
.inc-type-title{font-size:13px;font-weight:800;color:#fff}
.inc-type-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* ── HC ITEM ── */
.hc-card{background:var(--card);border-radius:12px;padding:14px;margin:0 16px 10px;border-left:4px solid var(--orange)}
.hc-card.done{border-left-color:var(--green);opacity:.7}
.hc-card.encours{border-left-color:#f59e0b}

/* ── SCORE ── */
.score-circle{position:relative;width:120px;height:120px;margin:0 auto 16px}

/* ── CHECKLIST ── */
.check-item{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--card);border:2px solid var(--border);border-radius:14px;margin-bottom:8px;cursor:pointer;transition:.2s}
.check-item.checked{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.3)}
.check-box{width:26px;height:26px;border-radius:8px;border:2px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s}
.check-item.checked .check-box{background:var(--green);border-color:var(--green)}

/* ── STATUT ── */
.statut-btn{width:100%;padding:16px 18px;background:var(--card);border:2px solid var(--border);border-radius:14px;text-align:left;cursor:pointer;margin-bottom:10px;transition:.2s;font-family:inherit}
.statut-btn.active{border-color:var(--orange);background:rgba(249,115,22,.08)}
.statut-label{font-size:15px;font-weight:900;color:#fff}
.statut-desc{font-size:12px;color:var(--muted);margin-top:3px}

/* ── HISTORIQUE ── */
.hist-day{background:var(--card);border:1px solid var(--border);border-radius:14px;margin:0 16px 10px;overflow:hidden}
.hist-day-head{padding:10px 14px;display:flex;align-items:center;gap:10px}
.hist-day-head.today{background:rgba(249,115,22,.06);border-bottom:1px solid rgba(249,115,22,.2)}
</style>
</head>
<body>
<div id="root"></div>
<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="text/babel">
const {useState,useEffect,useRef}=React;

/* ══ CONFIG ══ */
const SUPA='https://lllzlidwtcjwsxbgkygn.supabase.co';
const KEY='sb_publishable_3weqcRqeCv9lwclSAPC2rA_48OAwGcV';
const H={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'};

const DRIVERS=[
  {id:0,name:'OTMANE',display:'Otmane',color:'#3b82f6',code:'1111',truck:'VIVARO 1',start:'06:00',end:'14:00'},
  {id:1,name:'NICOLAS',display:'Nicolas',color:'#22c55e',code:'2222',truck:'JUMPY',start:'06:00',end:'14:00'},
  {id:2,name:'MICKAEL',display:'Mickael',color:'#f97316',code:'3333',truck:'VIVARO 1',start:'06:00',end:'15:00'},
  {id:3,name:'KARIM',display:'Karim',color:'#a855f7',code:'4444',truck:'VIVARO 2',start:'06:00',end:'14:00'},
  {id:4,name:'MAITRE_HOTEL',display:"Maître d'H.",color:'#f59e0b',code:'5555',truck:'CAMION 5',start:'08:00',end:'22:00'},
];

/* ══ UTILS ══ */
function toast(msg,col='var(--orange)'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.borderColor=col;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}

async function supaGet(path){
  const r=await fetch(SUPA+'/rest/v1/'+path,{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
  return r.json();
}
async function supaPost(table,body){
  return fetch(SUPA+'/rest/v1/'+table,{method:'POST',headers:H,body:JSON.stringify(body)});
}

function getMissions(planning,driverId,date){
  if(!planning||!planning.tasks) return[];
  const res=[];
  Object.keys(planning.tasks).forEach(k=>{
    const[d,di,h]=k.split('|');
    if(d===date&&parseInt(di)===driverId){
      (planning.tasks[k]||[]).forEach(t=>{
        if(t&&(t.client||t.task)) res.push({...t,heure:h,_key:k});
      });
    }
  });
  return res.sort((a,b)=>a.heure.localeCompare(b.heure));
}

/* ══ HEADER ══ */
function Header({title,onBack,right}){
  return(
    <div className="hdr">
      {onBack&&<button className="hdr-back" onClick={onBack}><i className="fa fa-arrow-left"/></button>}
      <div className="hdr-title">{title}</div>
      {right&&<div className="hdr-right">{right}</div>}
    </div>
  );
}

/* ══ MÉTÉO ══ */
function MeteoBar(){
  const[m,setM]=useState(null);
  useEffect(()=>{
    fetch('https://api.open-meteo.com/v1/forecast?latitude=43.2965&longitude=5.3698&current=temperature_2m,weathercode,windspeed_10m&timezone=Europe/Paris')
      .then(r=>r.json()).then(d=>{
        if(d?.current){
          const c=d.current.weathercode;
          const ico=c===0?'☀️':c<=3?'⛅':c<=67?'🌧️':'⛈️';
          const desc=c===0?'Ensoleillé':c<=3?'Nuageux':c<=67?'Pluie':'Orage';
          setM({temp:Math.round(d.current.temperature_2m),wind:Math.round(d.current.windspeed_10m),ico,desc});
        }
      }).catch(()=>{});
  },[]);
  if(!m) return null;
  const alerte=m.wind>60;
  return(
    <div className="meteo-bar" style={{borderColor:alerte?'rgba(239,68,68,.25)':'rgba(255,255,255,.08)',background:alerte?'rgba(239,68,68,.06)':'rgba(255,255,255,.04)'}}>
      <span style={{fontSize:20}}>{m.ico}</span>
      <div style={{flex:1}}>
        <div style={{fontWeight:800,color:'#fff'}}>{m.desc} · {m.temp}°C</div>
        <div style={{fontSize:11,color:alerte?'#ef4444':'var(--muted)',fontWeight:alerte?800:400}}>
          {alerte?'⚠️ Mistral fort — ':''}{m.wind} km/h · Marseille
        </div>
      </div>
      {alerte&&<span style={{fontSize:10,fontWeight:900,color:'#ef4444',background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.3)',borderRadius:6,padding:'3px 8px'}}>PRUDENCE</span>}
    </div>
  );
}

/* ══ LOGIN ══ */
function Login({onLogin}){
  const[sel,setSel]=useState(null);
  const[pin,setPin]=useState('');
  const[err,setErr]=useState('');
  const colors=['#3b82f6','#22c55e','#f97316','#a855f7','#f59e0b'];

  function tryLogin(){
    if(!sel){setErr('Choisissez un chauffeur');return;}
    if(pin===sel.code){onLogin(sel);setErr('');}
    else{setErr('Code incorrect');setPin('');}
  }

  return(
    <div className="login-wrap">
      <div className="login-logo">🍽️</div>
      <div className="login-title">La Table de Cana</div>
      <div className="login-sub">Choisissez votre profil puis entrez votre code</div>
      <div className="login-grid">
        {DRIVERS.map((dr,i)=>(
          <button key={dr.id} className="driver-btn"
            onClick={()=>{setSel(dr);setPin('');setErr('');}}
            style={{borderColor:dr.color,color:dr.color,background:sel?.id===dr.id?dr.color+'22':'transparent'}}>
            {dr.display}<br/>
            <span style={{fontSize:10,opacity:.7}}>{dr.truck}</span>
          </button>
        ))}
      </div>
      {sel&&(
        <div className="pin-section">
          <input className="pin-input" type="password" maxLength={4} value={pin}
            onChange={e=>setPin(e.target.value)} onKeyDown={e=>e.key==='Enter'&&tryLogin()}
            placeholder="••••" autoFocus/>
          <button className="pin-go" onClick={tryLogin}>Connexion →</button>
          <div className="pin-err">{err}</div>
        </div>
      )}
    </div>
  );
}

/* ══ HOME SCREEN ══ */
function HomeScreen({ch,planning,onNavigate,unreadMsg}){
  const today=new Date().toISOString().slice(0,10);
  const ms=planning?getMissions(planning,ch.id,today):[];
  const done=ms.filter(m=>m._statut==='done').length;
  const restant=ms.length-done;
  const next=ms.find(m=>m._statut!=='done');

  const tiles=[
    {ico:'🚚',label:'Mes missions',sub:'Livraisons du jour',col:'#60a5fa',bg:'rgba(59,130,246,.1)',border:'rgba(59,130,246,.3)',to:'today',badge:restant},
    {ico:'📅',label:'Calendrier',sub:'Mon mois',col:'#c084fc',bg:'rgba(168,85,247,.1)',border:'rgba(168,85,247,.3)',to:'calendar'},
    {ico:'💬',label:'Messages',sub:'Responsable',col:'#2dd4bf',bg:'rgba(20,184,166,.1)',border:'rgba(20,184,166,.3)',to:'messages',badge:unreadMsg},
    {ico:'🛒',label:'Hors Carte',sub:'Commandes',col:'#f97316',bg:'rgba(249,115,22,.12)',border:'rgba(249,115,22,.4)',to:'horscarte'},
    {ico:'⚠️',label:'Incident',sub:'Signaler',col:'#ef4444',bg:'rgba(239,68,68,.1)',border:'rgba(239,68,68,.3)',to:'incident'},
    {ico:'📡',label:'Mon statut',sub:'Visible direct',col:'#4ade80',bg:'rgba(34,197,94,.1)',border:'rgba(34,197,94,.3)',to:'statut'},
    {ico:'📝',label:'Bilan',sub:'Ma journée',col:'#818cf8',bg:'rgba(99,102,241,.1)',border:'rgba(99,102,241,.3)',to:'bilan'},
    {ico:'⭐',label:'Mon score',sub:'Performance',col:'#fbbf24',bg:'rgba(245,158,11,.1)',border:'rgba(245,158,11,.3)',to:'score'},
    {ico:'✅',label:'Fin journée',sub:'Checklist',col:'#4ade80',bg:'rgba(34,197,94,.1)',border:'rgba(34,197,94,.3)',to:'checklist_fin'},
    {ico:'📸',label:'Mes photos',sub:'Du jour',col:'#c084fc',bg:'rgba(168,85,247,.1)',border:'rgba(168,85,247,.3)',to:'photos'},
    {ico:'📅',label:'Historique',sub:'Mes semaines',col:'#38bdf8',bg:'rgba(14,165,233,.1)',border:'rgba(14,165,233,.3)',to:'historique'},
    {ico:'🆘',label:'Aide rapide',sub:'SOS urgence',col:'#f87171',bg:'rgba(239,68,68,.1)',border:'rgba(239,68,68,.3)',to:'help'},
  ];

  return(
    <div className="screen">
      <div className="scroll">
        <div className="home-top">
          <div className="home-greet">Bonjour 👋</div>
          <div className="home-name" style={{color:ch.color}}>{ch.display}</div>
          <div className="home-meta">
            <span style={{fontWeight:700}}>🚛 {ch.truck}</span>
            <span>·</span>
            <span>{ch.start}–{ch.end}</span>
            {next&&<span style={{color:'var(--orange)',fontWeight:700}}>📍 {next.heure} {next.client||next.task}</span>}
          </div>
        </div>
        <MeteoBar/>
        <div style={{padding:'14px 16px 4px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{fontSize:11,fontWeight:900,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em'}}>Aujourd'hui</div>
          <div style={{fontSize:12,fontWeight:800,color:done===ms.length&&ms.length>0?'#22c55e':'var(--orange)'}}>{done}/{ms.length} missions</div>
        </div>
        <div className="icon-grid">
          {tiles.map(t=>(
            <button key={t.to} className="icon-tile" onClick={()=>onNavigate(t.to)}
              style={{background:t.bg,borderColor:t.border}}>
              {t.badge>0&&<div className="tile-badge">{t.badge}</div>}
              <div className="icon-tile-emoji">{t.ico}</div>
              <div className="icon-tile-label" style={{color:t.col}}>{t.label}</div>
              <div className="icon-tile-sub" style={{color:t.col,opacity:.7}}>{t.sub}</div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ══ MISSIONS DU JOUR ══ */
function TodayScreen({ch,planning,onBack}){
  const today=new Date().toISOString().slice(0,10);
  const ms=planning?getMissions(planning,ch.id,today):[];

  return(
    <div className="screen">
      <Header title="🚚 Mes missions" onBack={onBack}/>
      <div className="scroll">
        {!planning&&<div style={{textAlign:'center',padding:40,color:'var(--muted)'}}>Chargement...</div>}
        {planning&&ms.length===0&&(
          <div style={{textAlign:'center',padding:40,color:'var(--muted)'}}>
            <div style={{fontSize:40,marginBottom:12}}>✅</div>
            <div style={{fontWeight:700}}>Aucune mission aujourd'hui</div>
          </div>
        )}
        {ms.map((m,i)=>(
          <div key={i} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,padding:14,margin:'0 16px 10px',borderLeft:`4px solid ${m._statut==='done'?'#22c55e':'var(--orange)'}`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'start',marginBottom:8}}>
              <div style={{fontSize:18,fontWeight:900,color:'var(--orange)'}}>{m.heure}</div>
              <span style={{fontSize:10,fontWeight:800,padding:'3px 8px',borderRadius:6,background:m._statut==='done'?'rgba(34,197,94,.15)':'rgba(249,115,22,.12)',color:m._statut==='done'?'#22c55e':'#f97316',border:`1px solid ${m._statut==='done'?'rgba(34,197,94,.3)':'rgba(249,115,22,.3)'}`}}>
                {m._statut==='done'?'✅ Livré':'En attente'}
              </span>
            </div>
            <div style={{fontSize:15,fontWeight:800,color:'#fff',marginBottom:4}}>{m.client||m.task}</div>
            {m.adresse&&<div style={{fontSize:12,color:'var(--muted)',marginBottom:10}}>📍 {m.adresse}</div>}
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {m.adresse&&(
                <>
                  <a href={`https://maps.google.com/?q=${encodeURIComponent(m.adresse)}`} target="_blank" style={{textDecoration:'none'}}>
                    <button style={{padding:'8px 14px',background:'rgba(59,130,246,.15)',border:'1px solid rgba(59,130,246,.3)',borderRadius:8,color:'#60a5fa',fontSize:12,fontWeight:700,cursor:'pointer'}}>🗺️ Maps</button>
                  </a>
                  <a href={`https://waze.com/ul?q=${encodeURIComponent(m.adresse)}&navigate=yes`} target="_blank" style={{textDecoration:'none'}}>
                    <button style={{padding:'8px 14px',background:'rgba(34,197,94,.15)',border:'1px solid rgba(34,197,94,.3)',borderRadius:8,color:'#4ade80',fontSize:12,fontWeight:700,cursor:'pointer'}}>🗺️ Waze</button>
                  </a>
                </>
              )}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ══ HORS CARTE ══ */
function HorsCarteScreen({ch,onBack}){
  const[items,setItems]=useState([]);
  const[loading,setLoading]=useState(true);
  const[showForm,setShowForm]=useState(false);
  const[form,setForm]=useState({client:'',article:'',quantite:'',dateEvenement:'',note:''});

  async function load(){
    setLoading(true);
    try{
      const rows=await supaGet('planning?date=eq.HORS_CARTE_SYNC&limit=1');
      if(rows?.length&&rows[0].donnees?.horsCarte) setItems(rows[0].donnees.horsCarte);
      else setItems([]);
    }catch(e){setItems([]);}
    setLoading(false);
  }

  useEffect(()=>{load();const iv=setInterval(load,15000);return()=>clearInterval(iv);},[]);

  async function sync(list){
    await supaPost('planning',{date:'HORS_CARTE_SYNC',donnees:{horsCarte:list,updated_at:new Date().toISOString()},updated_at:new Date().toISOString()});
  }

  async function envoyer(){
    if(!form.client||!form.article){toast('Client et article requis','var(--red)');return;}
    const n={id:Date.now(),client:form.client,article:form.article,quantite:form.quantite,dateEvenement:form.dateEvenement,note:form.note,saisiepar:ch.display,statut:'atraiter',createdAt:new Date().toISOString(),sourceApp:'chauffeur'};

              <div className="field" key={k}>
                <label>{l}</label>
                <input value={form[k]} onChange={e=>setForm({...form,[k]:e.target.value})} placeholder={p}/>

            <button className="btn-primary" onClick={envoyer}>📤 Envoyer au responsable</button>
          </div>
        )}
        {loading&&<div style={{textAlign:'center',padding:24,color:'var(--muted)'}}>Chargement...</div>}
        {mine.length>0&&(
          <>
            <div style={{padding:'0 16px 8px',fontSize:11,fontWeight:900,color:'#f97316',textTransform:'uppercase'}}>Mes hors carte ({mine.length})</div>

              return(
                <div key={h.id||i} className={`hc-card ${h.statut}`} style={{borderLeftColor:col}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'start',marginBottom:6}}>

                  </div>
                  <div style={{fontSize:12,color:'#e2e8f0',marginBottom:4}}>📦 {h.article}{h.quantite?' — '+h.quantite:''}</div>
                  {h.dateEvenement&&<div style={{fontSize:11,color:col,fontWeight:700}}>📅 {new Date(h.dateEvenement).toLocaleDateString('fr-FR')}</div>}
                  {h.statut!=='traite'&&(

                  )}

/* ══ SCORE ══ */
function ScoreScreen({ch,planning,onBack}){
  const today=new Date().toISOString().slice(0,10);
  const ms=planning?getMissions(planning,ch.id,today):[];
  const done=ms.filter(m=>m._statut==='done').length;
  const total=ms.length;
  const pct=total>0?Math.round(done/total*100):100;
  const score=Math.min(100,Math.max(0,Math.round(pct*0.6+40)));
  const col=score>=80?'#22c55e':score>=60?'#f59e0b':'#ef4444';
  const lbl=score>=90?'Excellent 🏆':score>=80?'Très bien ⭐':score>=70?'Bien 👍':score>=60?'Correct':'À améliorer 💪';
  const r=50,circ=2*Math.PI*r;

  return(
    <div className="screen">
      <Header title="⭐ Mon score" onBack={onBack}/>
      <div className="scroll">
        <div className="card" style={{textAlign:'center',margin:'16px'}}>
          <div style={{fontSize:11,fontWeight:900,color:'var(--muted)',textTransform:'uppercase',marginBottom:14}}>Score de performance du jour</div>
          <div className="score-circle">
            <svg width="120" height="120" viewBox="0 0 120 120">
              <circle cx="60" cy="60" r={r} fill="none" stroke="#1a3550" strokeWidth="10"/>
              <circle cx="60" cy="60" r={r} fill="none" stroke={col} strokeWidth="10"
                strokeDasharray={`${score/100*circ} ${circ}`}
                strokeLinecap="round" transform="rotate(-90 60 60)"/>
            </svg>
            <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
              <div style={{fontSize:28,fontWeight:900,color:col}}>{score}</div>
              <div style={{fontSize:10,color:'var(--muted)'}}>/ 100</div>
            </div>
          </div>
          <div style={{fontSize:16,fontWeight:800,color:col}}>{lbl}</div>
          <div style={{fontSize:12,color:'var(--muted)',marginTop:6}}>{ch.display} · {new Date().toLocaleDateString('fr-FR')}</div>
        </div>
        <div className="card" style={{margin:'0 16px'}}>
          <div className="card-title">Détail</div>
          {[{l:'Missions complétées',v:`${done}/${total}`,pts:Math.round(pct*.6),max:60,c:'#22c55e'},{l:'Bilan journée',v:'À envoyer',pts:0,max:20,c:'#6366f1'},{l:'Aucun incident grave',v:'✅',pts:20,max:20,c:'#22c55e'}].map((cr,i)=>(
            <div key={i} style={{marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                <div style={{fontSize:12,fontWeight:700}}>{cr.l}</div>
                <div style={{fontSize:12,fontWeight:900,color:cr.c}}>{cr.pts}/{cr.max}</div>
              </div>
              <div style={{background:'var(--bg)',borderRadius:4,height:5}}>
                <div style={{width:`${cr.pts/cr.max*100}%`,height:5,borderRadius:4,background:cr.c}}/>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ══ CHECKLIST FIN ══ */
function ChecklistFinScreen({ch,onBack}){
  const items=[
    {id:'bls',label:'Tous les BL remis et signés',icon:'📋',critical:true},
    {id:'materiel',label:'Matériel ramené au dépôt',icon:'📦',critical:true},
    {id:'camion',label:'Camion nettoyé',icon:'🧹',critical:false},
    {id:'frigo',label:'Frigo éteint, portes ouvertes',icon:'🌡️',critical:false},
    {id:'carburant',label:'Plein de carburant si besoin',icon:'⛽',critical:false},
    {id:'incidents',label:'Tous les incidents signalés',icon:'⚠️',critical:true},
    {id:'km',label:'Kilométrage noté dans le bilan',icon:'📍',critical:false},
    {id:'cles',label:'Clés du véhicule rendues',icon:'🔑',critical:true},
    {id:'tenue',label:'Tenue rangée',icon:'👔',critical:false},
  ];
  const[checked,setChecked]=useState({});
  const[sent,setSent]=useState(false);
  const[sending,setSending]=useState(false);
  const critOk=items.filter(i=>i.critical).every(i=>checked[i.id]);
  const count=Object.values(checked).filter(Boolean).length;

  function toggle(id){setChecked(c=>({...c,[id]:!c[id]}));}

  async function valider(){
    if(!critOk){toast('Complétez les points obligatoires','var(--red)');return;}
    setSending(true);
    try{
      await supaPost('planning',{date:'CHECKLINFIN_'+new Date().toISOString().slice(0,10)+'_'+ch.id,donnees:{type:'checklist_fin',_isEvent:true,chauffeurId:ch.id,chauffeur:ch.display,date:new Date().toISOString().slice(0,10),heure:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),checked,score:`${count}/${items.length}`,ts:new Date().toISOString()},updated_at:new Date().toISOString()});
      setSent(true);
      toast('🏁 Journée clôturée !','var(--green)');
    }catch(e){toast('Erreur','var(--red)');}
    setSending(false);
  }

  if(sent) return(
    <div className="screen">
      <Header title="🏁 Journée clôturée" onBack={onBack}/>
      <div className="scroll" style={{textAlign:'center',paddingTop:50}}>
        <div style={{fontSize:72,marginBottom:16}}>🏁</div>
        <div style={{fontSize:22,fontWeight:900,color:'#fff',marginBottom:8}}>Bonne fin de journée !</div>
        <div style={{fontSize:13,color:'#22c55e',marginBottom:24}}>{count}/{items.length} points validés</div>
        <button onClick={onBack} style={{padding:'13px 28px',background:'rgba(34,197,94,.15)',border:'1px solid rgba(34,197,94,.3)',borderRadius:12,color:'#22c55e',fontSize:14,fontWeight:800,cursor:'pointer'}}>Retour à l'accueil</button>
      </div>
    </div>
  );

  return(
    <div className="screen">
      <Header title="✅ Fin de journée" onBack={onBack}/>
      <div className="scroll">
        <div style={{padding:'12px 16px'}}>
          <div className="card" style={{margin:'0 0 16px'}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
              <div style={{fontWeight:800}}>Progression</div>
              <div style={{fontWeight:900,color:critOk?'#22c55e':'#f97316'}}>{count}/{items.length}</div>
            </div>
            <div style={{background:'var(--bg)',borderRadius:4,height:8}}>
              <div style={{width:`${count/items.length*100}%`,height:8,borderRadius:4,background:critOk?'#22c55e':'#f97316',transition:'.3s'}}/>
            </div>
          </div>
          {items.map(item=>(
            <div key={item.id} className={`check-item ${checked[item.id]?'checked':''}`} onClick={()=>toggle(item.id)}>
              <span style={{fontSize:20,flexShrink:0}}>{item.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700,color:checked[item.id]?'#22c55e':'#fff'}}>{item.label}</div>
                {item.critical&&!checked[item.id]&&<div style={{fontSize:10,color:'#ef4444',fontWeight:700,marginTop:2}}>● Obligatoire</div>}
              </div>
              <div className="check-box">
                {checked[item.id]&&<span style={{fontSize:14,color:'#fff'}}>✓</span>}
              </div>
            </div>
          ))}
          {!critOk&&<div style={{background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.2)',borderRadius:10,padding:'10px 14px',marginBottom:16,fontSize:12,color:'#fca5a5'}}>⚠️ Points obligatoires manquants</div>}
          <button className="btn-primary" onClick={valider} disabled={sending||!critOk} style={{opacity:!critOk?.4:1,marginTop:8}}>
            {sending?'Envoi...':'🏁 Clôturer la journée'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ══ HISTORIQUE ══ */
function HistoriqueScreen({ch,onBack}){
  const[data,setData]=useState([]);
  const[loading,setLoading]=useState(true);
  const[weekOff,setWeekOff]=useState(0);

  function getWeekDays(off){
    const now=new Date();const d=now.getDay();
    const mon=new Date(now);mon.setDate(now.getDate()-(d===0?6:d-1)+off*7);mon.setHours(0,0,0,0);
    return Array.from({length:7},(_,i)=>{const dd=new Date(mon);dd.setDate(mon.getDate()+i);return dd.toISOString().slice(0,10);});
  }

  const days=getWeekDays(weekOff);
  const JOURS=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];

  useEffect(()=>{
    setLoading(true);
    Promise.all([
      supaGet(`planning?date=like.STATUT_*&select=donnees,updated_at&order=updated_at.desc&limit=200`),
      supaGet(`planning?date=like.INC_*&select=donnees,updated_at&order=updated_at.desc&limit=200`),
      supaGet(`planning?date=like.BILAN_*&select=donnees,date,updated_at&order=updated_at.desc&limit=200`),
    ]).then(([d1,d2,d3])=>{
      const all=[
        ...(Array.isArray(d1)?d1:[]).map(r=>r.donnees).filter(d=>d&&d._isEvent&&String(d.chauffeurId)===String(ch.id)),
        ...(Array.isArray(d2)?d2:[]).map(r=>r.donnees).filter(d=>d&&d._isEvent&&String(d.chauffeurId)===String(ch.id)),
        ...(Array.isArray(d3)?d3:[]).map(r=>r.donnees).filter(d=>d&&d._isEvent&&String(d.chauffeurId)===String(ch.id)),
      ];
      setData(all);setLoading(false);
    }).catch(()=>setLoading(false));
  },[weekOff,ch.id]);

  const weekLabel=`${new Date(days[0]).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})} → ${new Date(days[6]).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}`;

  return(
    <div className="screen">
      <Header title="📅 Historique" onBack={onBack}/>
      <div className="scroll">
        <div style={{padding:'12px 16px'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,padding:'10px 14px',marginBottom:14}}>
            <button onClick={()=>setWeekOff(w=>w-1)} style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,color:'#fff',padding:'6px 12px',cursor:'pointer',fontWeight:700,fontFamily:'inherit'}}>←</button>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:13,fontWeight:800,color:'#fff'}}>{weekLabel}</div>
              {weekOff===0&&<div style={{fontSize:10,color:'var(--orange)',fontWeight:700}}>Semaine actuelle</div>}
            </div>
            <button onClick={()=>setWeekOff(w=>w+1)} disabled={weekOff>=0} style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,color:weekOff>=0?'#334155':'#fff',padding:'6px 12px',cursor:weekOff>=0?'not-allowed':'pointer',fontWeight:700,fontFamily:'inherit'}}>→</button>
          </div>
          {loading&&<div style={{textAlign:'center',padding:24,color:'var(--muted)'}}>Chargement...</div>}
          {!loading&&days.map((date,i)=>{
            const dayData=data.filter(d=>d.date===date||(d.ts&&d.ts.startsWith(date)));
            const incidents=dayData.filter(d=>d.type==='incident');
            const bilan=dayData.find(d=>d.type==='bilan_journee');
            const isToday=date===new Date().toISOString().slice(0,10);
            const isPast=date<new Date().toISOString().slice(0,10);
            return(
              <div key={date} className="hist-day">
                <div className={`hist-day-head ${isToday?'today':''}`}>
                  <div style={{fontWeight:900,fontSize:13,color:isToday?'var(--orange)':'#fff',width:36}}>{JOURS[i]}</div>
                  <div style={{fontSize:11,color:'var(--muted)',flex:1}}>{new Date(date).toLocaleDateString('fr-FR',{day:'numeric',month:'long'})}</div>
                  <div style={{display:'flex',gap:6}}>
                    {incidents.length>0&&<span style={{fontSize:10,fontWeight:800,color:'#ef4444',background:'rgba(239,68,68,.1)',padding:'2px 7px',borderRadius:6}}>⚠️ {incidents.length}</span>}
                    {bilan&&<span style={{fontSize:10,fontWeight:800,color:'#6366f1',background:'rgba(99,102,241,.1)',padding:'2px 7px',borderRadius:6}}>📝</span>}
                    {!dayData.length&&<span style={{fontSize:10,color:'#334155'}}>{isPast?'—':'·'}</span>}
                  </div>
                </div>
                {bilan&&(
                  <div style={{padding:'8px 14px 10px',borderTop:'1px solid var(--border)'}}>
                    <div style={{display:'flex',gap:8}}>
                      {[{l:'Missions',v:`${bilan.missionsDone||0}/${bilan.missionsTotal||0}`,c:'#22c55e'},{l:'Km',v:bilan.km||0,c:'#3b82f6'},{l:'Carb.',v:`${bilan.carburant||0}L`,c:'#f97316'}].map(k=>(
                        <div key={k.l} style={{background:'var(--bg)',borderRadius:8,padding:'5px 10px',flex:1,textAlign:'center'}}>
                          <div style={{fontSize:13,fontWeight:900,color:k.c}}>{k.v}</div>
                          <div style={{fontSize:9,color:'var(--muted)'}}>{k.l}</div>
                        </div>
                      ))}
                      {bilan.humeur&&<div style={{fontSize:22,display:'flex',alignItems:'center'}}>{bilan.humeur}</div>}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ══ MESSAGES ══ */
function MessagesScreen({ch,onBack}){
  const[msgs,setMsgs]=useState([]);
  const[text,setText]=useState('');
  const[loading,setLoading]=useState(true);

  async function load(){
    try{
      const rows=await supaGet('planning?date=eq.MESSAGES&select=donnees&limit=1');
      if(rows?.length&&rows[0].donnees){
        const d=rows[0].donnees;
        const list=typeof d==='string'?JSON.parse(d):Array.isArray(d)?d:[];
        setMsgs(list.slice(-50));
      }
    }catch(e){}
    setLoading(false);
  }

  useEffect(()=>{load();const iv=setInterval(load,8000);return()=>clearInterval(iv);},[]);

  async function envoyer(){
    if(!text.trim()) return;
    const msg={id:Date.now(),from:ch.id,fromName:ch.display,text:text.trim(),time:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),date:new Date().toISOString().slice(0,10)};
    const newList=[...msgs,msg];
    setText('');
    try{
      await supaPost('planning',{date:'MESSAGES',donnees:JSON.stringify(newList),updated_at:new Date().toISOString()});
      setMsgs(newList);
    }catch(e){toast('Erreur envoi','var(--red)');}
  }

  return(
    <div className="screen">
      <Header title="💬 Messages" onBack={onBack}/>
      <div className="scroll">
        {loading&&<div style={{textAlign:'center',padding:24,color:'var(--muted)'}}>Chargement...</div>}
        <div style={{padding:'8px 16px'}}>
          {msgs.map((m,i)=>{
            const mine=m.from===ch.id;
            return(
              <div key={i} style={{display:'flex',justifyContent:mine?'flex-end':'flex-start',marginBottom:10}}>
                <div style={{maxWidth:'75%',background:mine?ch.color+'22':'var(--card)',border:`1px solid ${mine?ch.color+'44':'var(--border)'}`,borderRadius:12,padding:'8px 12px'}}>
                  {!mine&&<div style={{fontSize:10,fontWeight:800,color:'#64748b',marginBottom:3}}>{m.fromName||'Responsable'}</div>}
                  <div style={{fontSize:13,color:'#fff'}}>{m.text}</div>
                  <div style={{fontSize:10,color:'var(--muted)',marginTop:3,textAlign:mine?'right':'left'}}>{m.time}</div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
      <div style={{padding:'10px 16px',background:'var(--card)',borderTop:'1px solid var(--border)',display:'flex',gap:8,flexShrink:0}}>
        <input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&envoyer()} placeholder="Votre message..." style={{flex:1,background:'var(--bg)',border:'1px solid var(--border)',borderRadius:10,color:'#fff',padding:'10px 12px',fontSize:13,outline:'none',fontFamily:'inherit'}}/>
        <button onClick={envoyer} style={{padding:'10px 16px',background:'var(--orange)',border:'none',borderRadius:10,color:'#fff',fontWeight:800,cursor:'pointer',fontFamily:'inherit'}}>→</button>
      </div>
    </div>
  );
}

/* ══ SIMPLE SCREENS (Véhicule, Photos, Aide, Calendrier, Reprises) ══ */
function SimpleScreen({title,icon,msg,onBack}){
  return(
    <div className="screen">
      <Header title={title} onBack={onBack}/>
      <div className="scroll" style={{textAlign:'center',paddingTop:60}}>
        <div style={{fontSize:56,marginBottom:16}}>{icon}</div>
        <div style={{fontSize:14,color:'var(--muted)',padding:'0 24px'}}>{msg}</div>
      </div>
    </div>
  );
}

/* ══ APP PRINCIPALE ══ */
function App(){
  const[ch,setCh]=useState(null);
  const[screen,setScreen]=useState('home');
  const[planning,setPlanning]=useState(null);

  useEffect(()=>{
    if(!ch) return;
    supaGet('planning?date=eq.'+new Date().toISOString().slice(0,10)+'&limit=1').then(rows=>{
      if(rows?.length&&rows[0].donnees) setPlanning(rows[0].donnees);
    }).catch(()=>{});
    const iv=setInterval(()=>{
      supaGet('planning?date=eq.'+new Date().toISOString().slice(0,10)+'&limit=1').then(rows=>{
        if(rows?.length&&rows[0].donnees) setPlanning(rows[0].donnees);
      }).catch(()=>{});
    },30000);
    return()=>clearInterval(iv);
  },[ch]);

  if(!ch) return <Login onLogin={driver=>{setCh(driver);setScreen('home');}}/>;

  const nav=s=>setScreen(s);
  const back=()=>setScreen('home');

  if(screen==='home') return <HomeScreen ch={ch} planning={planning} onNavigate={nav} unreadMsg={0}/>;
  if(screen==='today') return <TodayScreen ch={ch} planning={planning} onBack={back}/>;
  if(screen==='horscarte') return <HorsCarteScreen ch={ch} onBack={back}/>;
  if(screen==='incident') return <IncidentScreen ch={ch} onBack={back}/>;
  if(screen==='statut') return <StatutScreen ch={ch} onBack={back}/>;
  if(screen==='bilan') return <BilanScreen ch={ch} planning={planning} onBack={back}/>;
  if(screen==='score') return <ScoreScreen ch={ch} planning={planning} onBack={back}/>;
  if(screen==='checklist_fin') return <ChecklistFinScreen ch={ch} onBack={back}/>;
  if(screen==='historique') return <HistoriqueScreen ch={ch} onBack={back}/>;
  if(screen==='messages') return <MessagesScreen ch={ch} onBack={back}/>;
  if(screen==='calendar') return <SimpleScreen title="📅 Calendrier" icon="📅" msg="Le calendrier mensuel sera disponible prochainement." onBack={back}/>;
  if(screen==='photos') return <SimpleScreen title="📸 Mes photos" icon="📸" msg="Vos photos de livraison apparaîtront ici." onBack={back}/>;
  if(screen==='vehicle') return <SimpleScreen title="🚛 Mon véhicule" icon="🚛" msg={`Votre véhicule : ${ch.truck}`} onBack={back}/>;
  if(screen==='help') return(
    <div className="screen">
      <Header title="🆘 Aide rapide" onBack={back}/>
      <div className="scroll">
        <div className="card" style={{margin:16}}>
          <div className="card-title">En cas d'urgence</div>
          <a href="tel:15"><button style={{width:'100%',marginBottom:10,padding:13,background:'rgba(239,68,68,.15)',border:'1px solid rgba(239,68,68,.3)',borderRadius:10,color:'#ef4444',fontSize:15,fontWeight:800,cursor:'pointer'}}>📞 SAMU — 15</button></a>
          <a href="tel:17"><button style={{width:'100%',marginBottom:10,padding:13,background:'rgba(59,130,246,.12)',border:'1px solid rgba(59,130,246,.3)',borderRadius:10,color:'#60a5fa',fontSize:15,fontWeight:800,cursor:'pointer'}}>🚔 Police — 17</button></a>
          <a href="tel:18"><button style={{width:'100%',padding:13,background:'rgba(249,115,22,.12)',border:'1px solid rgba(249,115,22,.3)',borderRadius:10,color:'#f97316',fontSize:15,fontWeight:800,cursor:'pointer'}}>🚒 Pompiers — 18</button></a>
        </div>
        <div className="card" style={{margin:'0 16px'}}>
          <div className="card-title">Signaler un problème</div>
          <button onClick={()=>nav('incident')} style={{width:'100%',padding:13,background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.25)',borderRadius:10,color:'#ef4444',fontSize:14,fontWeight:800,cursor:'pointer',fontFamily:'inherit'}}>⚠️ Signaler un incident</button>
        </div>
      </div>
    </div>
  );
  return <HomeScreen ch={ch} planning={planning} onNavigate={nav} unreadMsg={0}/>;
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
