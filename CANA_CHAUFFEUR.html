<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cana Logistique">
<meta name="theme-color" content="#0a0f1e">
<title>La Table de Cana</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0f1e;--card:#111827;--raised:#1a2234;
  --orange:#f97316;--blue:#3b82f6;--green:#22c55e;
  --amber:#f59e0b;--red:#ef4444;--purple:#a855f7;--teal:#14b8a6;
  --text:#f1f5f9;--muted:#64748b;--dim:#374151;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body,#root{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}
.screen{height:100%;display:flex;flex-direction:column}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
input,textarea,select{font-family:inherit;outline:none;-webkit-appearance:none}
::-webkit-scrollbar{display:none}
.mono{font-family:'SF Mono','Consolas',monospace}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px}

/* LOGIN */
.login-screen{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse 120% 60% at 50% 0%,#1a2234,var(--bg) 70%);overflow-y:auto}
.login-logo{width:76px;height:76px;background:linear-gradient(135deg,#f97316,#ef4444);border-radius:22px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 20px 40px rgba(249,115,22,.35)}
.ch-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:320px;margin-bottom:24px}
.ch-btn{background:var(--card);border:2px solid var(--border);border-radius:16px;padding:16px 10px;display:flex;flex-direction:column;align-items:center;gap:8px;transition:all .2s}
.ch-btn:active{transform:scale(.95)}
.ch-btn.sel{border-color:var(--orange);background:rgba(249,115,22,.08)}
.av{border-radius:13px;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
.code-dots{display:flex;gap:14px;margin:16px 0}
.code-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--dim);transition:all .25s}
.code-dot.filled{background:var(--orange);border-color:var(--orange);transform:scale(1.1)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:290px}
.num-key{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:17px;font-size:22px;font-weight:600;color:var(--text);transition:all .12s;display:flex;align-items:center;justify-content:center;aspect-ratio:1}
.num-key:active{background:var(--raised);transform:scale(.92)}

/* HEADER */
.app-top{padding:calc(var(--safe-top) + 48px) 16px 12px;flex-shrink:0}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,15,30,.97);border-top:1px solid var(--border);display:flex;padding:8px 0 calc(var(--safe-bottom) + 8px);backdrop-filter:blur(24px);z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;background:transparent;color:var(--muted);font-size:10px;font-weight:500;position:relative;transition:color .2s}
.nav-btn.active{color:var(--orange)}
.nav-btn svg{width:22px;height:22px;stroke-width:1.8}
.nav-badge{position:absolute;top:2px;right:calc(50% - 18px);background:var(--red);border-radius:20px;min-width:17px;height:17px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;padding:0 4px;border:2px solid var(--bg)}

/* CONTENT */
.main-content{flex:1;overflow:hidden;display:flex;flex-direction:column;padding-bottom:calc(64px + var(--safe-bottom))}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px}

/* MISSION CARD */
.mc{border-radius:20px;margin-bottom:14px;overflow:hidden;background:var(--card);border:1px solid var(--border)}
.mc:active{transform:scale(.995)}
.mc-head{padding:14px 16px 10px;display:flex;align-items:flex-start;justify-content:space-between}
.mc-time{font-size:28px;font-weight:800;letter-spacing:-1.5px;line-height:1}
.mc-time-sub{font-size:10px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:5px}
.mc-truck{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--raised)}
.mc-client{padding:0 16px 10px}
.mc-name{font-size:18px;font-weight:800;line-height:1.2;margin-bottom:5px}
.mc-addr{font-size:12px;color:var(--muted);display:flex;gap:6px;align-items:flex-start;line-height:1.5;cursor:pointer}
.mc-addr:active{color:var(--blue)}
.allerg-bar{margin:0 16px 10px;padding:8px 12px;border-radius:10px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:7px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:var(--red)}
.mc-div{height:1px;background:var(--border);margin:0 16px}
.mc-meta{padding:10px 16px;display:flex;flex-wrap:wrap;gap:8px}
.mt{background:var(--raised);border-radius:9px;padding:5px 10px;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px}
.mt b{color:var(--text)}
.mt.full{width:100%}
.mc-btns{padding:12px 16px;display:grid;gap:8px}
.ab{border-radius:13px;padding:13px 8px;font-size:12px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:5px;border:1.5px solid transparent;transition:all .15s}
.ab:active{transform:scale(.93)}
.ab svg{width:22px;height:22px}
.ab-maps{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.3);color:var(--blue)}
.ab-call{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.3);color:var(--green)}
.ab-go{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.3);color:var(--amber)}
.ab-done{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.3);color:var(--green)}
.ab-photo{background:rgba(168,85,247,.12);border-color:rgba(168,85,247,.3);color:var(--purple)}
.ab-sign{background:rgba(20,184,166,.12);border-color:rgba(20,184,166,.3);color:var(--teal)}
.ab-voice{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.3);color:var(--red)}

/* MODE CONDUITE */
.drive-mode{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.drive-time{font-size:64px;font-weight:900;letter-spacing:-3px;line-height:1}
.drive-client{font-size:22px;font-weight:700;text-align:center;margin:8px 0 4px}
.drive-addr{font-size:14px;color:var(--muted);text-align:center;margin-bottom:24px;line-height:1.6}
.drive-timer{font-size:16px;color:var(--amber);font-weight:600;margin-bottom:32px}
.drive-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:320px}
.drive-btn{border-radius:16px;padding:20px 12px;font-size:14px;font-weight:800;display:flex;flex-direction:column;align-items:center;gap:8px;border:none;transition:transform .15s}
.drive-btn:active{transform:scale(.95)}
.drive-btn svg{width:28px;height:28px}

/* ASSISTANT VOCAL */
.voice-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;backdrop-filter:blur(10px)}
.voice-circle{width:140px;height:140px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:24px}
.voice-circle-bg{position:absolute;inset:0;border-radius:50%;border:3px solid var(--red);animation:voicePulse 1.5s ease-in-out infinite}
.voice-icon{width:64px;height:64px;color:var(--red)}
.voice-text{font-size:20px;font-weight:700;text-align:center;margin-bottom:8px}
.voice-result{font-size:14px;color:var(--muted);text-align:center;min-height:20px;margin-bottom:24px;line-height:1.5}
.voice-action{font-size:16px;font-weight:700;color:var(--green);text-align:center;min-height:24px}
@keyframes voicePulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.15);opacity:1}}

/* SIGNATURE */
.sig-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:0}
.sig-box{background:var(--card);border-radius:24px 24px 0 0;padding:20px;width:100%}
.sig-canvas{background:#fff;border-radius:12px;width:100%;touch-action:none;display:block}
.sig-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}

/* FICHE CLIENT */
.client-sheet{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;flex-direction:column;justify-content:flex-end}
.client-box{background:var(--card);border-radius:24px 24px 0 0;padding:20px;max-height:80vh;overflow-y:auto}
.client-history-item{background:var(--raised);border-radius:10px;padding:10px 12px;margin-bottom:6px;font-size:12px}

/* CALENDRIER */
.cal-wrap{flex:1;overflow-y:auto;padding:12px 16px 0}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-nav-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
.cal-hd{text-align:center;font-size:10px;color:var(--muted);font-weight:700;padding:4px 0}
.cal-d{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;cursor:pointer;position:relative;border:1.5px solid transparent;transition:all .15s;font-weight:500}
.cal-d.today{border-color:var(--orange);color:var(--orange);font-weight:800}
.cal-d.has-m::after{content:'';position:absolute;bottom:5px;width:4px;height:4px;border-radius:50%;background:var(--orange)}
.cal-d.sel{background:var(--orange);color:#fff;font-weight:800}
.cal-d.sel::after{background:#fff}
.cal-d.off{color:var(--dim);background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.15)}
.cal-d.rest{color:var(--muted);background:rgba(100,116,139,.06)}
.hours-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
.hg{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
.hg-val{font-size:24px;font-weight:800;line-height:1}
.hg-lbl{font-size:10px;color:var(--muted);margin-top:3px}

/* MESSAGES */
.msg-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.msg-list{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.mb{max-width:88%}
.mb.me{align-self:flex-end}
.mb.them{align-self:flex-start}
.mb-inner{padding:11px 15px;border-radius:20px;font-size:14px;line-height:1.5}
.mb.them .mb-inner{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px}
.mb.me .mb-inner{background:var(--orange);color:#fff;border-bottom-right-radius:4px}
.mb-meta{font-size:10px;color:var(--muted);margin-top:4px;padding:0 4px}
.mb.me .mb-meta{text-align:right}
.msg-bar{padding:10px 16px;background:var(--bg);border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;padding-bottom:calc(10px + var(--safe-bottom))}
.msg-input{flex:1;background:var(--card);border:1px solid var(--border2);border-radius:22px;padding:11px 16px;font-size:14px;color:var(--text);resize:none;max-height:100px}
.send-btn{background:var(--orange);border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}

/* RECAP FIN JOURNEE */
.recap-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.recap-box{background:var(--card);border-radius:24px;padding:24px;width:100%;max-width:360px}

/* TOAST */
.toast{position:fixed;top:calc(var(--safe-top) + 16px);left:50%;transform:translateX(-50%);padding:11px 22px;border-radius:30px;font-size:13px;font-weight:600;z-index:999;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:tIn .25s ease;max-width:90vw;text-align:center}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}


/* MODAL MATERIEL */
.mat-modal{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:250;display:flex;flex-direction:column;justify-content:flex-end}
.mat-box{background:var(--card);border-radius:24px 24px 0 0;padding:20px;max-height:85vh;overflow-y:auto}
.mat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}
.mat-item{background:var(--raised);border:2px solid var(--border);border-radius:14px;padding:12px 6px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:all .15s}
.mat-item:active{transform:scale(.95)}
.mat-item.sel{border-color:var(--orange);background:rgba(249,115,22,.1)}
.mat-item-icon{font-size:22px}
.mat-item-label{font-size:10px;color:var(--muted);text-align:center;font-weight:600;line-height:1.3}
.mat-counter{display:flex;align-items:center;gap:10px;justify-content:center;margin-top:6px}
.mat-counter-btn{background:var(--raised);border:1px solid var(--border2);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--text)}
.mat-counter-btn:active{background:var(--orange);color:#fff}
.mat-count{font-size:20px;font-weight:800;color:var(--orange);min-width:32px;text-align:center}

/* LOADER */
.spin{border:3px solid var(--border2);border-top-color:var(--orange);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--muted);font-size:13px}

/* STATUT BARRE */
.status-bar{margin:0 16px 12px;border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px;border:1px solid var(--border2)}
.sb-icon{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-info{flex:1}
.sb-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.sb-val{font-size:14px;font-weight:700;margin-top:1px}
.sb-sub{font-size:11px;color:var(--muted);margin-top:1px}
.prog-bar-wrap{margin:0 16px 12px}
.prog-bar{height:6px;background:var(--raised);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .5s}
.prog-row{display:flex;justify-content:space-between;margin-bottom:5px}

/* GEO DOT */
.geo-dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(34,197,94,.2);animation:geoPulse 2s infinite}
@keyframes geoPulse{0%,100%{box-shadow:0 0 0 3px rgba(34,197,94,.2)}50%{box-shadow:0 0 0 8px rgba(34,197,94,.05)}}
</style>
</head>
<body>
<div id="root"></div>
<input type="file" id="photo-cap" accept="image/*" capture="environment" style="position:absolute;width:0;height:0;opacity:0"/>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

/* ══ CONFIG ══ */
const SUPA_URL='https://lllzlidwtcjwsxbgkygn.supabase.co';
const SUPA_KEY='sb_publishable_3weqcRqeCv9lwclSAPC2rA_48OAwGcV';

const CHAUFFEURS=[
  {id:0,name:'Otmane',initial:'O',color:'#3b82f6',code:'1111',truck:'JUMPY',start:'06:00',end:'14:00'},
  {id:1,name:'Nicolas',initial:'N',color:'#22c55e',code:'2222',truck:'VIVARO 1',start:'06:00',end:'14:00'},
  {id:2,name:'Mickaël',initial:'M',color:'#f97316',code:'3333',truck:'VIVARO 2',start:'06:00',end:'15:00'},
  {id:3,name:'Karim',initial:'K',color:'#a855f7',code:'4444',truck:'IVECO',start:'06:00',end:'14:00'},
  {id:4,name:"Maître d'H.",initial:'H',color:'#f59e0b',code:'5555',truck:'VIVARO LOC.',start:'08:00',end:'22:00'},
];

const SL=['06:00','06:30','07:00','07:30','08:00','08:30','09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00'];
const MOIS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const JOURS=['Di','Lu','Ma','Me','Je','Ve','Sa'];

/* ══ SUPABASE ══ */
async function supaFetch(path,opts={}){
  try{
    const r=await fetch(SUPA_URL+'/rest/v1/'+path,{
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
      ...opts
    });
    return r.json();
  }catch(e){return null;}
}

async function chargerPlanning(date){
  const d=date||new Date().toISOString().slice(0,10);
  const rows=await supaFetch('planning?date=eq.'+d+'&select=donnees&order=updated_at.desc&limit=1');
  if(rows&&rows.length)return rows[0].donnees;
  return null;
}

async function sauverPosition(chauffeurId,lat,lng){
  const key=`position_${chauffeurId}`;
  const val=JSON.stringify({lat,lng,t:new Date().toISOString(),di:chauffeurId});
  await supaFetch('planning?date=eq.GEO_'+chauffeurId,{method:'DELETE'});
  await supaFetch('planning',{method:'POST',body:JSON.stringify({date:'GEO_'+chauffeurId,donnees:val})});
}

async function sauverEvenement(ev){
  try{
    const existing=await supaFetch('planning?date=eq.EVENTS&select=donnees&limit=1');
    let events=[];
    if(existing&&existing.length){try{events=JSON.parse(existing[0].donnees)||[];}catch(e){}}
    events.unshift({...ev,ts:new Date().toISOString()});
    events=events.slice(0,200);
    if(existing&&existing.length){
      await supaFetch('planning?date=eq.EVENTS',{method:'PATCH',body:JSON.stringify({donnees:JSON.stringify(events)})});
    }else{
      await supaFetch('planning',{method:'POST',body:JSON.stringify({date:'EVENTS',donnees:JSON.stringify(events)})});
    }
  }catch(e){}
}

async function sauverMessage(msg){
  try{
    const existing=await supaFetch('planning?date=eq.MESSAGES&select=donnees&limit=1');
    let msgs=[];
    if(existing&&existing.length){try{msgs=JSON.parse(existing[0].donnees)||[];}catch(e){}}
    msgs.push(msg);msgs=msgs.slice(-500);
    if(existing&&existing.length){
      await supaFetch('planning?date=eq.MESSAGES',{method:'PATCH',body:JSON.stringify({donnees:JSON.stringify(msgs)})});
    }else{
      await supaFetch('planning',{method:'POST',body:JSON.stringify({date:'MESSAGES',donnees:JSON.stringify(msgs)})});
    }
  }catch(e){}
}

function getMissions(planning,di,date){
  if(!planning||!planning.tasks)return[];
  const ms=[];
  SL.forEach(h=>{
    const k=date+'|'+di+'|'+h;
    (planning.tasks[k]||[]).forEach((t,ti)=>{
      ms.push({...t,heure:h,_key:k,_ti:ti,_statut:t._statut||'pending'});
    });
  });
  return ms;
}

function getStatut(planning,di,date){
  if(!planning||!planning.statuts)return null;
  return Object.values(planning.statuts).find(s=>s.di===di&&s.date===date)||null;
}

function calcHeures(planning,di,mois,annee){
  let jours=0,absences=0,min=0;
  const days=new Date(annee,mois+1,0).getDate();
  for(let d=1;d<=days;d++){
    const now=new Date();
    if(new Date(annee,mois,d)>now)break;
    const ds=`${annee}-${String(mois+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const st=getStatut(planning,di,ds);
    if(st&&(st.type==='absent'||st.type==='maladie'||st.type==='conge'||st.type==='repos')){absences++;continue;}
    if(getMissions(planning,di,ds).length>0){jours++;min+=7*60-45;}
  }
  return{jours,absences,h:Math.floor(min/60),m:min%60,hBrut:jours*7};
}

/* ══ TOAST ══ */
function Toast({msg,color}){
  if(!msg)return null;
  return<div className="toast" style={{background:'#1e293b',border:`1px solid ${color}44`,color}}>{msg}</div>;
}

/* ══ LOGIN ══ */
function Login({onLogin}){
  const [sel,setSel]=useState(null);
  const [code,setCode]=useState('');
  const [err,setErr]=useState('');

  const add=d=>{
    if(code.length>=4)return;
    const nc=code+d;setCode(nc);setErr('');
    if(nc.length===4){
      const ch=CHAUFFEURS.find(c=>c.id===sel);
      if(nc===ch.code||nc==='0000'){setTimeout(()=>onLogin(ch),80);}
      else{setTimeout(()=>{setCode('');setErr('Code incorrect');},300);}
    }
  };

  const speak=(txt)=>{if(window.speechSynthesis){const u=new SpeechSynthesisUtterance(txt);u.lang='fr-FR';window.speechSynthesis.speak(u);}};

  return(
    <div className="login-screen">
      <div className="login-logo">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="white"><path d="M1 3h15v13H1zM16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
      </div>
      <h2 style={{fontSize:22,fontWeight:800,marginBottom:4,textAlign:'center'}}>La Table de Cana</h2>
      <p style={{fontSize:12,color:'var(--muted)',marginBottom:24,textAlign:'center'}}>Application chauffeur</p>
      <div className="ch-grid">
        {CHAUFFEURS.map(ch=>(
          <button key={ch.id} className={`ch-btn ${sel===ch.id?'sel':''}`}
            onClick={()=>{setSel(ch.id);setCode('');setErr('');speak('Bonjour '+ch.name+', entrez votre code');}}>
            <div className="av" style={{width:46,height:46,fontSize:18,background:ch.color+'20',border:`2px solid ${sel===ch.id?ch.color:ch.color+'40'}`,color:ch.color}}>{ch.initial}</div>
            <span style={{fontSize:12,fontWeight:700,color:sel===ch.id?'var(--text)':'var(--muted)'}}>{ch.name}</span>
            <span style={{fontSize:10,color:'var(--dim)'}}>{ch.truck}</span>
          </button>
        ))}
      </div>
      {sel!==null&&(
        <>
          <div className="code-dots">{[0,1,2,3].map(i=><div key={i} className={`code-dot ${i<code.length?'filled':''}`}/>)}</div>
          <div style={{color:'var(--red)',fontSize:12,minHeight:18,marginBottom:6}}>{err}</div>
          <div className="numpad">
            {[1,2,3,4,5,6,7,8,9,'','0','⌫'].map((k,i)=>
              k===''?<div key={i}/>:
              <button key={i} className="num-key" style={{color:k==='⌫'?'var(--muted)':'var(--text)'}}
                onClick={()=>k==='⌫'?setCode(c=>{setErr('');return c.slice(0,-1);}):add(String(k))}>
                {k}
              </button>
            )}
          </div>
          <p style={{fontSize:10,color:'var(--dim)',marginTop:14}}>Code provisoire : 0000</p>
        </>
      )}
    </div>
  );
}


/* ══ MODAL MATERIEL OBLIGATOIRE ══ */
const MATERIEL_LISTE=[
  {id:'gastro',label:'Bacs gastro',icon:'🥘'},
  {id:'chariot',label:'Chariots',icon:'🛒'},
  {id:'echelle',label:'Échelles pâtiss.',icon:'🏗️'},
  {id:'container',label:'Containers',icon:'📦'},
  {id:'caisse',label:'Caisses traiteur',icon:'🗃️'},
  {id:'etuve',label:'Étuves',icon:'🔥'},
  {id:'plateau',label:'Plateaux inox',icon:'🍽️'},
  {id:'nappe',label:'Nappes',icon:'🪡'},
];

function MaterielModal({mission,chauffeur,onClose,onConfirm}){
  const [laisse,setLaisse]=useState({});
  const [recupere,setRecupere]=useState({});
  const [note,setNote]=useState('');
  const [tab,setTab]=useState('laisse');

  const update=(obj,setObj,id,delta)=>{
    setObj(o=>({...o,[id]:Math.max(0,(o[id]||0)+delta)}));
  };

  const totalLaisse=Object.values(laisse).reduce((a,b)=>a+b,0);
  const totalRecupere=Object.values(recupere).reduce((a,b)=>a+b,0);

  const confirm=async()=>{
    const materiel={laisse,recupere,note,total:{laisse:totalLaisse,recupere:totalRecupere}};
    await sauverEvenement({
      type:'materiel',
      chauffeurId:chauffeur.id,
      chauffeur:chauffeur.name,
      client:mission.client,
      heure:mission.heure,
      date:new Date().toISOString().slice(0,10),
      materiel
    });
    onConfirm(materiel);
  };

  const speak=(txt)=>{if(window.speechSynthesis){const u=new SpeechSynthesisUtterance(txt);u.lang='fr-FR';window.speechSynthesis.speak(u);}};
  useEffect(()=>{speak(`Livraison chez ${mission.client}. Combien de matériel avez-vous laissé ?`);},[]);

  const current=tab==='laisse'?laisse:recupere;
  const setCurrent=tab==='laisse'?setLaisse:setRecupere;

  return(
    <div className="mat-modal" onClick={onClose}>
      <div className="mat-box" onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
          <div>
            <div style={{fontSize:16,fontWeight:800}}>📦 Matériel</div>
            <div style={{fontSize:12,color:'var(--muted)'}}>{mission.client} — {mission.heure}</div>
          </div>
          <button onClick={onClose} style={{background:'var(--raised)',border:'1px solid var(--border)',borderRadius:50,width:34,height:34,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--muted)',fontSize:16}}>✕</button>
        </div>

        {/* Tabs */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,margin:'12px 0 4px',background:'var(--raised)',borderRadius:12,padding:4}}>
          {[
            {id:'laisse',label:'Laissé sur place',emoji:'📤',count:totalLaisse},
            {id:'recupere',label:'Récupéré',emoji:'📥',count:totalRecupere},
          ].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{background:tab===t.id?'var(--card)':'transparent',border:tab===t.id?'1px solid var(--border2)':'1px solid transparent',borderRadius:9,padding:'8px 6px',fontSize:12,fontWeight:700,color:tab===t.id?'var(--orange)':'var(--muted)',display:'flex',flexDirection:'column',alignItems:'center',gap:2,transition:'all .2s'}}>
              <span>{t.emoji} {t.label}</span>
              {t.count>0&&<span style={{background:'var(--orange)',color:'#fff',borderRadius:20,padding:'1px 7px',fontSize:10}}>{t.count} items</span>}
            </button>
          ))}
        </div>

        {/* Grille matériel */}
        <div className="mat-grid">
          {MATERIEL_LISTE.map(item=>{
            const qty=current[item.id]||0;
            return(
              <div key={item.id} className={`mat-item ${qty>0?'sel':''}`}>
                <div className="mat-item-icon">{item.icon}</div>
                <div className="mat-item-label">{item.label}</div>
                <div className="mat-counter">
                  <button className="mat-counter-btn" onClick={()=>update(current,setCurrent,item.id,-1)}>−</button>
                  <div className="mat-count">{qty}</div>
                  <button className="mat-counter-btn" onClick={()=>update(current,setCurrent,item.id,1)}>+</button>
                </div>
              </div>
            );
          })}
        </div>

        {/* Note */}
        <div style={{marginBottom:12}}>
          <textarea value={note} onChange={e=>setNote(e.target.value)}
            placeholder="Note complémentaire (matériel endommagé, remarque...)"
            style={{width:'100%',background:'var(--raised)',border:'1px solid var(--border2)',borderRadius:12,padding:'10px 14px',fontSize:13,color:'var(--text)',resize:'none',height:60}}/>
        </div>

        {/* Résumé */}
        {(totalLaisse>0||totalRecupere>0)&&(
          <div style={{background:'rgba(249,115,22,.08)',border:'1px solid rgba(249,115,22,.2)',borderRadius:12,padding:'10px 14px',marginBottom:12,fontSize:12}}>
            {totalLaisse>0&&<div style={{color:'var(--amber)',marginBottom:2}}>📤 Laissé : {Object.entries(laisse).filter(([,v])=>v>0).map(([k,v])=>`${v} ${MATERIEL_LISTE.find(m=>m.id===k)?.label||k}`).join(', ')}</div>}
            {totalRecupere>0&&<div style={{color:'var(--green)'}}>📥 Récupéré : {Object.entries(recupere).filter(([,v])=>v>0).map(([k,v])=>`${v} ${MATERIEL_LISTE.find(m=>m.id===k)?.label||k}`).join(', ')}</div>}
          </div>
        )}

        {/* Boutons */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          <button onClick={onClose}
            style={{background:'var(--raised)',border:'1px solid var(--border)',borderRadius:14,padding:14,fontSize:13,fontWeight:700,color:'var(--muted)'}}>
            Annuler
          </button>
          <button onClick={confirm}
            style={{background:'linear-gradient(135deg,var(--green),#16a34a)',border:'none',borderRadius:14,padding:14,fontSize:13,fontWeight:800,color:'#fff',boxShadow:'0 4px 12px rgba(34,197,94,.3)'}}>
            ✅ Confirmer livraison

        </div>
        <p style={{fontSize:10,color:'var(--dim)',textAlign:'center',marginTop:8}}>La saisie du matériel est obligatoire pour confirmer la livraison</p>
      </div>
    </div>
  );
}


/* ══ ASSISTANT VOCAL ══ */
function VoiceAssistant({chauffeur,mission,onClose,onCommand}){
  const [listening,setListening]=useState(false);
  const [transcript,setTranscript]=useState('');
  const [action,setAction]=useState('');
  const recRef=useRef(null);

  const speak=(txt)=>{
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(txt);u.lang='fr-FR';u.rate=0.95;
    window.speechSynthesis.speak(u);
  };

  const parseCommand=(txt)=>{
    const t=txt.toLowerCase();
    if(t.includes('terminé')||t.includes('livré')||t.includes('mission terminée')||t.includes('livraison terminée')){
      speak('Mission marquée comme terminée.');onCommand('done');return'✅ Mission marquée comme terminée';
    }
    if(t.includes('en route')||t.includes('je pars')||t.includes('je démarre')){
      speak('Bon trajet !');onCommand('enroute');return'🚗 Statut En route enregistré';
    }
    if(t.includes('client absent')||t.includes('personne')||t.includes('absent')){
      speak('Client absent noté.');onCommand('absent');return'⚠️ Client absent enregistré';
    }
    if(t.includes('retard')){
      const m=t.match(/(\d+)\s*minute/);
      const min=m?m[1]:'';
      speak('Retard signalé.');onCommand('retard',min);return`⏰ Retard ${min?'de '+min+' min':''} signalé`;
    }
    const bacs=t.match(/(\d+)\s*(bac|caisse|plateau|carton)/);
    if(bacs){
      speak(`${bacs[1]} ${bacs[2]} enregistrés.`);onCommand('materiel',bacs[1]+' '+bacs[2]);
      return`📦 ${bacs[1]} ${bacs[2]} enregistrés`;
    }
    if(t.includes('photo')){speak('Prenez la photo.');onCommand('photo');return'📷 Ouverture photo';}
    if(t.includes('appel')||t.includes('appeler')){speak('Appel du client.');onCommand('call');return'📞 Appel du client';}
    if(t.includes('navigation')||t.includes('maps')||t.includes('itinéraire')){speak('Ouverture de la navigation.');onCommand('maps');return'📍 Ouverture Maps';}
    speak('Je n\'ai pas compris. Réessayez.');
    return'❓ Non reconnu — réessayez';
  };

  const startListen=()=>{
    if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
      speak('Reconnaissance vocale non disponible sur ce navigateur.');
      setAction('Non disponible sur ce navigateur');return;
    }
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    const rec=new SR();recRef.current=rec;
    rec.lang='fr-FR';rec.continuous=false;rec.interimResults=true;
    rec.onstart=()=>{setListening(true);setTranscript('');setAction('');speak('Je vous écoute');};
    rec.onresult=e=>{
      const t=Array.from(e.results).map(r=>r[0].transcript).join('');
      setTranscript(t);
      if(e.results[e.results.length-1].isFinal){
        const result=parseCommand(t);
        setAction(result);setListening(false);
      }
    };
    rec.onerror=()=>{setListening(false);speak('Erreur, réessayez.');};
    rec.onend=()=>setListening(false);
    rec.start();
  };

  useEffect(()=>{
    speak(`Que dois-je faire pour la livraison ${mission?mission.client:'en cours'} ?`);
    setTimeout(startListen,1500);
  },[]);

  const stop=()=>{if(recRef.current){recRef.current.stop();}};

  return(
    <div className="voice-overlay" onClick={!listening?onClose:undefined}>
      <div className="voice-circle" style={{background:listening?'rgba(239,68,68,.1)':'rgba(34,197,94,.1)'}}>
        <div className="voice-circle-bg" style={{borderColor:listening?'var(--red)':'var(--green)',animationDuration:listening?'1s':'2s'}}/>
        <svg className="voice-icon" style={{color:listening?'var(--red)':'var(--green)'}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </div>
      <div className="voice-text">{listening?'Je vous écoute...':'En attente'}</div>
      <div className="voice-result" style={{color:'var(--text)'}}>{transcript||'Parlez maintenant'}</div>
      <div className="voice-action">{action}</div>
      <div style={{display:'flex',gap:12,marginTop:24}}>
        {listening?(
          <button onClick={stop} style={{background:'var(--red)',color:'#fff',border:'none',borderRadius:50,padding:'14px 28px',fontSize:14,fontWeight:700}}>Stop</button>
        ):(
          <button onClick={startListen} style={{background:'var(--green)',color:'#fff',border:'none',borderRadius:50,padding:'14px 28px',fontSize:14,fontWeight:700}}>🎤 Reparler</button>
        )}
        <button onClick={onClose} style={{background:'var(--raised)',color:'var(--muted)',border:'1px solid var(--border2)',borderRadius:50,padding:'14px 28px',fontSize:14,fontWeight:700}}>Fermer</button>
      </div>
      <p style={{fontSize:11,color:'var(--dim)',marginTop:16,textAlign:'center',maxWidth:280,lineHeight:1.6}}>
        Dites : "Mission terminée" · "En route" · "Client absent" · "Retard 10 minutes" · "3 bacs récupérés" · "Photo" · "Appeler"
      </p>
    </div>
  );
}

/* ══ FICHE CLIENT ══ */
function ClientSheet({mission,planning,chauffeur,onClose}){
  const mapsUrl=`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(mission.adresse||mission.client||'')}`;
  const today=new Date().toISOString().slice(0,10);

  /* Historique : chercher ce client dans toutes les dates */
  const historique=[];
  if(planning&&planning.tasks){
    Object.entries(planning.tasks).forEach(([k,tasks])=>{
      tasks.forEach(t=>{
        if((t.client||'').toLowerCase().includes((mission.client||'').toLowerCase().substring(0,6))&&k.split('|')[0]!==today){
          historique.push({date:k.split('|')[0],heure:k.split('|')[2],client:t.client,chauffeurId:parseInt(k.split('|')[1])});
        }
      });
    });
  }
  historique.sort((a,b)=>b.date.localeCompare(a.date));

  const speak=(txt)=>{if(window.speechSynthesis){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(txt);u.lang='fr-FR';window.speechSynthesis.speak(u);}};

  const readAloud=()=>{
    let txt=`Client : ${mission.client}. `;
    if(mission.adresse)txt+=`Adresse : ${mission.adresse}. `;
    if(mission.contact)txt+=`Téléphone : ${mission.contact}. `;
    if(mission.convives)txt+=`${mission.convives} convives. `;
    if(mission.note_liv)txt+=`Note : ${mission.note_liv}. `;
    if(mission.allergenes&&mission.allergenes.length)txt+=`Attention allergènes : ${mission.allergenes.join(', ')}.`;
    speak(txt);
  };

  return(
    <div className="client-sheet" onClick={onClose}>
      <div className="client-box" onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <div>
            <div style={{fontSize:11,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.05}}>Fiche client</div>
            <div style={{fontSize:18,fontWeight:800,color:chauffeur.color}}>{mission.client}</div>
          </div>
          <button onClick={onClose} style={{background:'var(--raised)',border:'1px solid var(--border)',borderRadius:50,width:36,height:36,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--muted)'}}>✕</button>
        </div>

        {/* Infos */}
        {[
          {icon:'🕐',label:'Heure',val:mission.heure,big:true},
          {icon:'📍',label:'Adresse',val:mission.adresse,link:mapsUrl},
          {icon:'📞',label:'Téléphone',val:mission.contact,tel:true},
          {icon:'👥',label:'Convives',val:mission.convives?mission.convives+' personnes':null},
          {icon:'🚛',label:'Camion',val:mission.truck||chauffeur.truck},
          {icon:'📝',label:'Note',val:mission.note_liv},
        ].filter(r=>r.val).map((row,i)=>(
          <div key={i} style={{display:'flex',gap:10,padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
            <span style={{fontSize:18,flexShrink:0}}>{row.icon}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:10,color:'var(--muted)'}}>{row.label}</div>
              {row.link?(
                <a href={row.link} target="_blank" style={{fontSize:14,color:'var(--blue)',fontWeight:600,textDecoration:'none'}}>{row.val}</a>
              ):row.tel?(
                <a href={`tel:${row.val}`} style={{fontSize:14,color:'var(--green)',fontWeight:600,textDecoration:'none'}}>{row.val}</a>
              ):(
                <div style={{fontSize:14,fontWeight:row.big?700:400,color:row.big?chauffeur.color:'var(--text)'}}>{row.val}</div>
              )}
            </div>
          </div>
        ))}

        {/* Allergènes */}
        {mission.allergenes&&mission.allergenes.length>0&&(
          <div style={{background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.2)',borderRadius:10,padding:'10px 12px',margin:'10px 0',fontSize:12,color:'var(--red)',fontWeight:700}}>
            🚨 ALLERGÈNES : {mission.allergenes.join(', ')}
          </div>
        )}

        {/* Boutons */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,margin:'12px 0'}}>
          <button onClick={readAloud} style={{background:'rgba(168,85,247,.12)',border:'1px solid rgba(168,85,247,.3)',color:'var(--purple)',borderRadius:12,padding:12,fontSize:12,fontWeight:700,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
            <span style={{fontSize:20}}>🔊</span>Lire à voix haute
          </button>
          {mission.contact&&(
            <a href={`tel:${mission.contact}`} style={{textDecoration:'none'}}>
              <button style={{background:'rgba(34,197,94,.12)',border:'1px solid rgba(34,197,94,.3)',color:'var(--green)',borderRadius:12,padding:12,fontSize:12,fontWeight:700,width:'100%',display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                <span style={{fontSize:20}}>📞</span>Appeler
              </button>
            </a>
          )}
        </div>

        {/* Historique */}
        {historique.length>0&&(
          <>
            <div style={{fontSize:11,color:'var(--muted)',fontWeight:600,textTransform:'uppercase',margin:'12px 0 8px'}}>Historique ({historique.length} livraisons)</div>
            {historique.slice(0,3).map((h,i)=>(
              <div key={i} className="client-history-item">
                <div style={{display:'flex',justifyContent:'space-between'}}>
                  <span style={{fontWeight:600}}>{h.date}</span>
                  <span style={{color:'var(--muted)'}}>{h.heure} · {CHAUFFEURS[h.chauffeurId]?.name}</span>
                </div>
              </div>
            ))}
          </>
        )}
      </div>
    </div>
  );
}

/* ══ CARTE MISSION ══ */
function MissionCard({m,chauffeur,onAction,onClientClick,driveMode}){
  const stConf={
    pending:{col:'var(--blue)',lbl:'En attente',dot:'var(--dim)'},
    enroute:{col:'var(--amber)',lbl:'🚗 En route',dot:'var(--amber)'},
    done:{col:'var(--green)',lbl:'✓ Livré',dot:'var(--green)'},
    retard:{col:'var(--red)',lbl:'⚠ Retard',dot:'var(--red)'},
    absent:{col:'var(--red)',lbl:'Client absent',dot:'var(--red)'},
  }[m._statut]||{col:'var(--blue)',lbl:'En attente',dot:'var(--dim)'};

  const mapsUrl=`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(m.adresse||m.client||'')}`;
  const ncols=m._statut==='done'?2:3;

  if(driveMode&&m._statut==='enroute') return null;

  return(
    <div className="mc" style={{borderColor:m._statut==='retard'||m._statut==='absent'?'rgba(239,68,68,.35)':m._statut==='done'?'rgba(34,197,94,.2)':m._statut==='enroute'?`${chauffeur.color}30`:'var(--border)',opacity:m._statut==='done'?.75:1}}>
      <div className="mc-head">
        <div>
          <div className="mc-time mono" style={{color:chauffeur.color}}>{m.heure}</div>
          <div className="mc-time-sub">
            <div style={{width:7,height:7,borderRadius:'50%',background:stConf.dot,flexShrink:0}}/>
            {stConf.lbl}
          </div>
        </div>
        <div className="mc-truck" style={{color:chauffeur.color,background:chauffeur.color+'15'}}>{m.truck||chauffeur.truck}</div>
      </div>

      <div className="mc-client">
        <div className="mc-name" onClick={()=>onClientClick(m)} style={{cursor:'pointer'}}>{m.client||m.task||'Livraison'} <span style={{fontSize:12,color:'var(--muted)'}}>›</span></div>
        {m.adresse&&(
          <div className="mc-addr" onClick={()=>window.open(mapsUrl,'_blank')}>

/* ══ SIGNATURE ══ */
function SigModal({mission,chauffeur,onClose,onDone}){
  const canvasRef=useRef();const drawing=useRef(false);const last=useRef({x:0,y:0});
  useEffect(()=>{
    const c=canvasRef.current;const ctx=c.getContext('2d');
    c.width=c.offsetWidth*window.devicePixelRatio;c.height=c.offsetHeight*window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio,window.devicePixelRatio);
    ctx.strokeStyle='#1e293b';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';
  },[]);
  const pos=(e,c)=>{const r=c.getBoundingClientRect();const s=e.touches?e.touches[0]:e;return{x:s.clientX-r.left,y:s.clientY-r.top};};
  const start=e=>{drawing.current=true;last.current=pos(e,canvasRef.current);e.preventDefault();};
  const move=e=>{
    if(!drawing.current)return;e.preventDefault();
    const c=canvasRef.current;const ctx=c.getContext('2d');const p=pos(e,c);
    ctx.beginPath();ctx.moveTo(last.current.x,last.current.y);ctx.lineTo(p.x,p.y);ctx.stroke();last.current=p;
  };
  const end=()=>drawing.current=false;
  const clear=()=>{const c=canvasRef.current;c.getContext('2d').clearRect(0,0,c.offsetWidth,c.offsetHeight);};
  const save=async()=>{
    const dataUrl=canvasRef.current.toDataURL('image/png');
    await sauverEvenement({type:'signature',chauffeurId:chauffeur.id,chauffeur:chauffeur.name,client:mission.client,heure:mission.heure,dataUrl});
    onDone();
  };
  return(
    <div className="sig-modal" onClick={onClose}>
      <div className="sig-box" onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>Signature client</div>
        <div style={{fontSize:12,color:'var(--muted)',marginBottom:12}}>{mission.client} — {mission.heure}</div>
        <canvas ref={canvasRef} className="sig-canvas" style={{height:180}}
          onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
          onTouchStart={start} onTouchMove={move} onTouchEnd={end}/>
        <div className="sig-btns">
          <button style={{background:'var(--raised)',color:'var(--muted)',borderRadius:12,padding:12,fontSize:13,fontWeight:700,border:'1px solid var(--border)'}} onClick={clear}>Effacer</button>
          <button style={{background:'var(--green)',color:'#fff',borderRadius:12,padding:12,fontSize:13,fontWeight:700}} onClick={save}>Valider ✓</button>
        </div>
        <button onClick={onClose} style={{width:'100%',marginTop:8,padding:10,background:'transparent',color:'var(--muted)',fontSize:12,border:'none'}}>Annuler</button>
      </div>
    </div>
  );
}

/* ══ VUE AUJOURD'HUI ══ */
function TodayView({chauffeur,planning,onAction,onClientClick}){
  const today=new Date().toISOString().slice(0,10);
  const missions=planning?getMissions(planning,chauffeur.id,today):[];
  const statut=planning?getStatut(planning,chauffeur.id,today):null;
  const done=missions.filter(m=>m._statut==='done').length;
  const total=missions.length;
  const now=new Date();
  const startH=parseInt(chauffeur.start.split(':')[0]);
  const endH=parseInt(chauffeur.end.split(':')[0]);
  const pct=Math.max(0,Math.min(100,((now.getHours()+now.getMinutes()/60-startH)/(endH-startH))*100));

  let sbBg='var(--raised)',sbCol='var(--green)',sbLbl='En service',sbSub=chauffeur.start+' → '+chauffeur.end;
  if(statut){

    else if(statut.type==='conge'){sbBg='rgba(59,130,246,.08)';sbCol='var(--blue)';sbLbl='Congé';}
    else if(statut.type==='repos'){sbBg='rgba(100,116,139,.08)';sbCol='var(--muted)';sbLbl='Repos';}
  }

  return(
    <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
      {/* Statut */}
      <div className="status-bar" style={{background:sbBg}}>
        <div className="sb-icon" style={{background:sbCol+'15'}}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={sbCol} strokeWidth="2">
            <rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/>
            <circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
          </svg>
        </div>
        <div className="sb-info">
          <div className="sb-label">Statut du jour</div>
          <div className="sb-val" style={{color:sbCol}}>{sbLbl}</div>
          <div className="sb-sub">{sbSub}</div>
        </div>
        <div style={{width:42,height:42,position:'relative',flexShrink:0}}>
          <svg viewBox="0 0 36 36" style={{width:'100%',height:'100%',transform:'rotate(-90deg)'}}>
            <circle cx="18" cy="18" r="15" fill="none" stroke="var(--raised)" strokeWidth="3"/>
            <circle cx="18" cy="18" r="15" fill="none" stroke={chauffeur.color} strokeWidth="3"
              strokeDasharray={`${pct*0.942} 100`} strokeLinecap="round"/>
          </svg>
          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:800,color:chauffeur.color}}>{Math.round(pct)}%</div>
        </div>
      </div>

      {/* Progress */}
      {total>0&&(
        <div className="prog-bar-wrap">
          <div className="prog-row">
            <span style={{fontSize:11,color:'var(--muted)'}}>Progression</span>
            <span style={{fontSize:11,fontWeight:700,color:chauffeur.color}}>{done}/{total} livrées</span>
          </div>
          <div className="prog-bar">
            <div className="prog-fill" style={{width:total?`${Math.round(done/total*100)}%`:'0%',background:`linear-gradient(90deg,${chauffeur.color},var(--green))`}}/>
          </div>
        </div>
      )}

      <div className="scroll-area" style={{paddingTop:12,paddingBottom:0}}>
        {!planning&&<div className="loader-wrap"><div className="spin" style={{width:34,height:34}}/><span>Chargement...</span></div>}
        {planning&&missions.length===0&&(
          <div style={{textAlign:'center',padding:'60px 24px',color:'var(--muted)'}}>
            <div style={{fontSize:48,marginBottom:12}}>🌟</div>

          </div>
        )}

    </div>
  );

/* ══ CALENDRIER ══ */
function CalendarView({chauffeur,planning}){
  const today=new Date();
  const [month,setMonth]=useState(today.getMonth());
  const [year,setYear]=useState(today.getFullYear());
  const [sel,setSel]=useState(today.getDate());

  const daysInMonth=new Date(year,month+1,0).getDate();
  const firstDay=new Date(year,month,1).getDay();
  const offset=firstDay===0?6:firstDay-1;

  const getMs=d=>{
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    return planning?getMissions(planning,chauffeur.id,ds):[];
  };
  const getSt=d=>{
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    return planning?getStatut(planning,chauffeur.id,ds):null;
  };
  const heures=planning?calcHeures(planning,chauffeur.id,month,year):{jours:0,absences:0,h:0,m:0,hBrut:0};
  const selMs=getMs(sel);const selSt=getSt(sel);
  const days=[];
  for(let i=0;i<offset;i++)days.push(null);
  for(let d=1;d<=daysInMonth;d++)days.push(d);

  return(
    <div className="cal-wrap">
      <div className="hours-grid">
        {[
          {val:heures.jours,lbl:'Jours travaillés',col:chauffeur.color},
          {val:`${heures.h}h${heures.m>0?heures.m+'m':''}`,lbl:'Heures nettes',col:'var(--green)'},
          {val:heures.absences,lbl:'Absences',col:'var(--amber)'},
          {val:`${heures.hBrut}h`,lbl:'Heures brutes',col:'var(--blue)'},
        ].map((item,i)=>(
          <div key={i} className="hg">
            <div className="hg-val" style={{color:item.col}}>{item.val}</div>
            <div className="hg-lbl">{item.lbl}</div>
          </div>
        ))}
      </div>

      <div className="cal-nav">
        <button className="cal-nav-btn" onClick={()=>month===0?(setMonth(11),setYear(y=>y-1)):setMonth(m=>m-1)}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:16,fontWeight:700}}>{MOIS[month]} {year}</div>
          <div style={{fontSize:11,color:'var(--muted)'}}>{chauffeur.name}</div>
        </div>
        <button className="cal-nav-btn" onClick={()=>month===11?(setMonth(0),setYear(y=>y+1)):setMonth(m=>m+1)}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>

      <div className="cal-grid">
        {JOURS.map(j=><div key={j} className="cal-hd">{j}</div>)}
        {days.map((d,i)=>{
          if(!d)return<div key={`e${i}`}/>;
          const isT=d===today.getDate()&&month===today.getMonth()&&year===today.getFullYear();
          const hasMiss=getMs(d).length>0;const st=getSt(d);const isSel=d===sel;
          const isOff=st&&(st.type==='absent'||st.type==='maladie'||st.type==='conge');
          const isRest=st&&st.type==='repos';
          return<div key={d} className={`cal-d ${isT?'today':''} ${hasMiss?'has-m':''} ${isSel&&!isT?'sel':''} ${isOff?'off':''} ${isRest?'rest':''}`} onClick={()=>setSel(d)}>{d}</div>;
        })}
      </div>

      <div style={{marginTop:4}}>
        <div style={{fontSize:11,color:'var(--muted)',fontWeight:600,marginBottom:10,textTransform:'uppercase'}}>
          {JOURS[new Date(year,month,sel).getDay()]} {sel} {MOIS[month]}
          {selSt&&<span style={{marginLeft:8,background:'var(--raised)',borderRadius:20,padding:'2px 8px',fontSize:10,color:'var(--muted)'}}>{selSt.type}</span>}
        </div>
        {selMs.length===0?(
          <div style={{textAlign:'center',padding:'20px 0',color:'var(--muted)',fontSize:13}}>{selSt?'Statut : '+selSt.type:'Aucune mission'}</div>
        ):(
          selMs.map((m,i)=>(
            <div key={i} style={{background:'var(--card)',border:'1px solid var(--border)',borderLeft:`3px solid ${chauffeur.color}`,borderRadius:12,padding:'11px 13px',marginBottom:8,display:'flex',alignItems:'center',gap:10}}>
              <div style={{fontFamily:'monospace',fontSize:14,fontWeight:800,color:chauffeur.color,flexShrink:0,width:46}}>{m.heure}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600}}>{m.client||m.task}</div>
                <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>{m.convives?m.convives+' conv. · ':''}{(m.adresse||'').split(',')[0]}</div>
              </div>
              <div style={{width:8,height:8,borderRadius:'50%',background:m._statut==='done'?'var(--green)':m._statut==='enroute'?'var(--amber)':'var(--dim)',flexShrink:0}}/>
            </div>
          ))
        )}
      </div>
    </div>
  );
}

/* ══ MESSAGES ══ */
function MessagesView({chauffeur}){
  const [msgs,setMsgs]=useState([
    {id:1,from:'resp',text:'Bonjour à tous ! Bonne journée 💪',time:'07:00'},
    {id:2,from:'resp',text:'Confirmez chaque livraison directement dans l\'app.',time:'07:05'},
  ]);
  const [text,setText]=useState('');
  const listRef=useRef();

  useEffect(()=>{
    if(listRef.current)listRef.current.scrollTop=listRef.current.scrollHeight;
  },[msgs]);

  useEffect(()=>{
    /* Charger messages depuis Supabase */
    const load=async()=>{
      const rows=await supaFetch('planning?date=eq.MESSAGES&select=donnees&limit=1');
      if(rows&&rows.length){
        try{const ms=JSON.parse(rows[0].donnees)||[];setMsgs(m=>{const ids=new Set(m.map(x=>x.id));return[...m,...ms.filter(x=>!ids.has(x.id))];});}catch(e){}
      }
    };
    load();const iv=setInterval(load,15000);return()=>clearInterval(iv);
  },[]);

  const send=async()=>{
    if(!text.trim())return;
    const t=text.trim();setText('');
    const time=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    const msg={id:Date.now(),from:'chauffeur',fromName:chauffeur.name,chauffeurId:chauffeur.id,text:t,time};
    setMsgs(m=>[...m,{...msg,from:'me'}]);
    await sauverMessage(msg);
  };

  return(
    <div className="msg-wrap">
      <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
        <div style={{width:38,height:38,borderRadius:11,background:'rgba(249,115,22,.15)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--orange)" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        </div>
        <div>
          <div style={{fontSize:14,fontWeight:700}}>Responsable</div>
          <div style={{fontSize:11,color:'var(--green)',display:'flex',alignItems:'center',gap:5}}>
            <div style={{width:5,height:5,background:'var(--green)',borderRadius:'50%'}}/>En ligne
          </div>
        </div>
      </div>
      <div ref={listRef} className="msg-list">
        {msgs.map(m=>(
          <div key={m.id} className={`mb ${m.from==='me'||m.from==='chauffeur'&&m.chauffeurId===chauffeur.id?'me':'them'}`}>
            <div className="mb-inner">{m.text}</div>
            <div className="mb-meta">{m.from==='me'?'Moi':m.fromName||'Responsable'} · {m.time}</div>
          </div>
        ))}
      </div>
      <div className="msg-bar">
        <textarea className="msg-input" placeholder="Votre message..." rows={1} value={text}
          onChange={e=>setText(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}/>
        <button className="send-btn" onClick={send}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  );
}

/* ══ APP PRINCIPALE ══ */
function ChaufApp({chauffeur,onLogout}){
  const [tab,setTab]=useState('today');
  const [planning,setPlanning]=useState(null);
  const [toast,setToast]=useState(null);
  const [voiceMission,setVoiceMission]=useState(null);
  const [sigMission,setSigMission]=useState(null);
  const [clientMission,setClientMission]=useState(null);
  const [driveMission,setDriveMission]=useState(null);
  const [showRecap,setShowRecap]=useState(false);
  const [matMission,setMatMission]=useState(null);
  const pendingPhoto=useRef(null);
  const geoInterval=useRef(null);

  const showToast=(msg,color='var(--green)')=>{
    setToast({msg,color});setTimeout(()=>setToast(null),3000);
  };

  const speak=(txt)=>{
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(txt);u.lang='fr-FR';u.rate=0.95;
    window.speechSynthesis.speak(u);
  };

  /* Charger planning + auto-refresh 30s */
  useEffect(()=>{
    const load=()=>chargerPlanning().then(p=>{if(p)setPlanning(p);}).catch(()=>{});
    load();const iv=setInterval(load,30000);return()=>clearInterval(iv);
  },[]);

  /* Géolocalisation */
  useEffect(()=>{
    if(!navigator.geolocation)return;
    geoInterval.current=setInterval(()=>{
      navigator.geolocation.getCurrentPosition(pos=>{
        sauverPosition(chauffeur.id,pos.coords.latitude,pos.coords.longitude);
      },()=>{},{enableHighAccuracy:true,timeout:10000});
    },30000);
    return()=>clearInterval(geoInterval.current);
  },[chauffeur.id]);

  /* Photo */
  useEffect(()=>{
    const input=document.getElementById('photo-cap');if(!input)return;
    const handler=async e=>{
      const file=e.target.files[0];if(!file)return;
      const m=pendingPhoto.current;
      const reader=new FileReader();
      reader.onload=async ev=>{
        const dataUrl=ev.target.result;
        await sauverEvenement({type:'photo',chauffeurId:chauffeur.id,chauffeur:chauffeur.name,client:m?m.client:'',heure:m?m.heure:'',dataUrl,date:new Date().toISOString().slice(0,10)});
        showToast('📷 Photo envoyée au responsable !','var(--purple)');
        if(navigator.vibrate)navigator.vibrate([100,50,100]);
      };
      reader.readAsDataURL(file);
      input.value='';
    };
    input.addEventListener('change',handler);return()=>input.removeEventListener('change',handler);
  },[chauffeur]);

  /* Vibration */
  const vibrate=(pattern)=>{if(navigator.vibrate)navigator.vibrate(pattern);};

  const handleAction=async(mission,action)=>{
    if(action==='voice'){setVoiceMission(mission);return;}
    if(action==='sign'){setSigMission(mission);return;}
    if(action==='photo'){pendingPhoto.current=mission;document.getElementById('photo-cap').click();return;}
    if(action==='enroute'){
      vibrate([50,30,50]);showToast('🚗 En route !','var(--amber)');
      await sauverEvenement({type:'enroute',chauffeurId:chauffeur.id,chauffeur:chauffeur.name,client:mission.client,heure:mission.heure});
      setDriveMission(mission);
    }
    if(action==='done'){
      /* Ouvrir modal matériel obligatoire avant de confirmer */
      setMatMission(mission);
      return;
    }
    if(action==='done_confirmed'){
      vibrate([100,50,200]);showToast('✅ Livraison confirmée !','var(--green)');
      await sauverEvenement({type:'done',chauffeurId:chauffeur.id,chauffeur:chauffeur.name,client:mission.client,heure:mission.heure,date:new Date().toISOString().slice(0,10),materiel:mission._materiel||{}});
      speak('Livraison confirmée. Excellent travail !');
      setDriveMission(null);
    }
    if(action==='absent'){
      showToast('⚠️ Client absent enregistré','var(--red)');
      await sauverEvenement({type:'absent',chauffeurId:chauffeur.id,chauffeur:chauffeur.name,client:mission.client,heure:mission.heure});
    }
    if(action==='retard'){
      showToast('⏰ Retard signalé','var(--amber)');
      await sauverEvenement({type:'retard',chauffeurId:chauffeur.id,chauffeur:chauffeur.name,client:mission.client,heure:mission.heure});
    }
    if(action==='materiel'){
      showToast('📦 Matériel enregistré','var(--blue)');
    }
  };

  const handleVoiceCommand=async(cmd,data)=>{
    const m=voiceMission;
    if(cmd==='done')await handleAction(m,'done');
    if(cmd==='enroute')await handleAction(m,'enroute');
    if(cmd==='photo')await handleAction(m,'photo');
    if(cmd==='absent')await handleAction(m,'absent');
    if(cmd==='retard')await handleAction(m,'retard');
    if(cmd==='materiel')await sauverEvenement({type:'materiel',detail:data,chauffeurId:chauffeur.id,chauffeur:chauffeur.name,client:m?.client||''});
    if(cmd==='call'&&m?.contact)window.open('tel:'+m.contact);
    if(cmd==='maps'&&m)window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(m.adresse||m.client||'')}`, '_blank');
    setVoiceMission(null);
  };

  const today=new Date().toISOString().slice(0,10);
  const myMissions=planning?getMissions(planning,chauffeur.id,today):[];
  const pending=myMissions.filter(m=>m._statut!=='done').length;
  const allDone=myMissions.length>0&&myMissions.every(m=>m._statut==='done');

  /* Alerter si tout est fait */
  useEffect(()=>{
    if(allDone){setTimeout(()=>setShowRecap(true),1000);}
  },[allDone]);

  return(
    <div className="screen">
      {/* Header */}
      <div className="app-top">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div className="av" style={{width:46,height:46,fontSize:18,background:chauffeur.color+'20',border:`2px solid ${chauffeur.color}60`,color:chauffeur.color}}>
              {chauffeur.initial}
            </div>
            <div>
              <div style={{fontSize:12,color:'var(--muted)'}}>Bonjour 👋</div>
              <div style={{fontSize:20,fontWeight:800,color:chauffeur.color,lineHeight:1.1}}>{chauffeur.name}</div>
              <div style={{fontSize:10,color:'var(--muted)',marginTop:2,display:'flex',alignItems:'center',gap:6}}>
                <span>{chauffeur.truck}</span>
                <span>·</span>
                <span>{chauffeur.start}–{chauffeur.end}</span>
                <div className="geo-dot" style={{width:6,height:6}}/>
              </div>
            </div>
          </div>
          <div style={{display:'flex',gap:8}}>
            {myMissions.length>0&&(
              <button onClick={()=>setShowRecap(true)} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,width:40,height:40,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--muted)'}}>
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
              </button>
            )}
            <button onClick={onLogout} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,width:40,height:40,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--muted)'}}>
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
          </div>
        </div>
      </div>

      {/* Contenu */}
      <div className="main-content">
        {tab==='today'&&<TodayView chauffeur={chauffeur} planning={planning} onAction={handleAction} onClientClick={setClientMission}/>}
        {tab==='calendar'&&<CalendarView chauffeur={chauffeur} planning={planning}/>}
        {tab==='messages'&&<MessagesView chauffeur={chauffeur}/>}
      </div>

      {/* Nav */}
      <nav className="bnav">
        {[
          {id:'today',lbl:"Aujourd'hui",badge:pending,svg:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>},
          {id:'calendar',lbl:'Planning',badge:0,svg:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>},
          {id:'messages',lbl:'Messages',badge:0,svg:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>},
        ].map(n=>(
          <button key={n.id} className={`nav-btn ${tab===n.id?'active':''}`} onClick={()=>setTab(n.id)}>
            {n.svg}<span>{n.lbl}</span>
            {n.badge>0&&<div className="nav-badge" style={{background:tab===n.id?chauffeur.color:'var(--red)'}}>{n.badge}</div>}
          </button>
        ))}
      </nav>

      {/* Overlays */}
      {matMission&&<MaterielModal mission={matMission} chauffeur={chauffeur}
        onClose={()=>setMatMission(null)}
        onConfirm={async(mat)=>{
          const m={...matMission,_materiel:mat};
          setMatMission(null);
          await handleAction(m,'done_confirmed');
        }}/>}
      {driveMission&&<DriveMode mission={driveMission} chauffeur={chauffeur} onClose={()=>setDriveMission(null)} onDone={()=>handleAction(driveMission,'done')}/>}
      {voiceMission&&<VoiceAssistant chauffeur={chauffeur} mission={voiceMission} onClose={()=>setVoiceMission(null)} onCommand={handleVoiceCommand}/>}
      {sigMission&&<SigModal mission={sigMission} chauffeur={chauffeur} onClose={()=>setSigMission(null)} onDone={()=>{setSigMission(null);showToast('✍️ Signature enregistrée !','var(--teal)');}}/>}
      {clientMission&&<ClientSheet mission={clientMission} planning={planning} chauffeur={chauffeur} onClose={()=>setClientMission(null)}/>}
      {showRecap&&<RecapModal missions={myMissions} chauffeur={chauffeur} onClose={()=>setShowRecap(false)}/>}
      {toast&&<Toast msg={toast.msg} color={toast.color}/>}
    </div>
  );
}

function App(){
  const [ch,setCh]=useState(null);
  return ch?<ChaufApp chauffeur={ch} onLogout={()=>setCh(null)}/>:<Login onLogin={setCh}/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
