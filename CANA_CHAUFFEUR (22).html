/* ═══════════════════ ALERTE NOUVELLE MISSION ═══════════════════ */
var _audioCtx=null;
function debloquerAudio(){
  try{
    var AC=window.AudioContext||window.webkitAudioContext;
    if(!AC)return;
    if(!_audioCtx)_audioCtx=new AC();
    if(_audioCtx.state==='suspended')_audioCtx.resume();
    /* Jouer un son inaudible pour débloquer */
    var o=_audioCtx.createOscillator();var g=_audioCtx.createGain();
    o.connect(g);g.connect(_audioCtx.destination);
    g.gain.value=0.0001;
    o.start();o.stop(_audioCtx.currentTime+0.01);
  }catch(e){}
}
function jouerBip(){
  try{
    var AC=window.AudioContext||window.webkitAudioContext;
    if(!AC)return;
    var ctx=_audioCtx||new AC();
    if(ctx.state==='suspended')ctx.resume();
    /* Deux bips courts */
    [0,0.25].forEach(function(delay){
      var o=ctx.createOscillator();
      var g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=880;
      o.type='sine';
      g.gain.setValueAtTime(0.001,ctx.currentTime+delay);
      g.gain.exponentialRampToValueAtTime(0.4,ctx.currentTime+delay+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+0.18);
      o.start(ctx.currentTime+delay);
      o.stop(ctx.currentTime+delay+0.2);
    });
  }catch(e){}
}

function alerterNouvelleMission(mission){
  /* 1. Bip sonore */
  jouerBip();
  /* 2. Vibration (motif : long-court-long) */
  if(navigator.vibrate)navigator.vibrate([300,100,300,100,300]);
  /* 3. Notification système (si autorisée) */
  try{
    if('Notification' in window && Notification.permission==='granted'){
      var n=new Notification('🔔 Nouvelle mission !',{
        body:(mission.client||mission.task||'Nouvelle livraison')+(mission.heure?' à '+mission.heure:''),
        icon:'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%230ea5e9%22/%3E%3Ctext x=%2250%22 y=%2268%22 font-size=%2255%22 text-anchor=%22middle%22%3E%F0%9F%94%94%3C/text%3E%3C/svg%3E',
        tag:'nouvelle-mission',
        requireInteraction:true
      });
      setTimeout(function(){try{n.close();}catch(e){}},8000);
    }
  }catch(e){}
  /* 4. Bandeau visuel */
  afficherBandeauMission(mission);
}

function afficherBandeauMission(mission){
  var ex=document.getElementById('bandeau-mission');if(ex)ex.remove();
  var b=document.createElement('div');
  b.id='bandeau-mission';
  b.style.cssText='position:fixed;top:0;left:0;right:0;z-index:99999999;background:linear-gradient(135deg,#0ea5e9,#0369a1);color:#fff;padding:16px 18px;display:flex;align-items:center;gap:12px;box-shadow:0 6px 24px rgba(0,0,0,.4);font-family:-apple-system,Arial,sans-serif;animation:slideDownB .4s ease';
  b.innerHTML='<div style="font-size:32px;animation:ringB .6s ease infinite">🔔</div>'
    +'<div style="flex:1"><div style="font-size:15px;font-weight:900">Nouvelle mission ajoutée !</div>'
    +'<div style="font-size:13px;opacity:.95;margin-top:2px">'+(mission.client||mission.task||'Nouvelle livraison')+(mission.heure?' · '+mission.heure:'')+'</div></div>'
    +'<button onclick="document.getElementById(\'bandeau-mission\').remove()" style="background:rgba(255,255,255,.25);border:none;border-radius:10px;color:#fff;padding:10px 16px;font-size:13px;font-weight:900;cursor:pointer;font-family:inherit">OK</button>';
  document.body.appendChild(b);
  /* Style animations */
  if(!document.getElementById('anim-bandeau')){
    var s=document.createElement('style');
    s.id='anim-bandeau';
    s.textContent='@keyframes slideDownB{from{transform:translateY(-100%)}to{transform:translateY(0)}}@keyframes ringB{0%,100%{transform:rotate(0)}25%{transform:rotate(-15deg)}75%{transform:rotate(15deg)}}';
    document.head.appendChild(s);
  }
  /* Retirer après 10s */
  setTimeout(function(){var el=document.getElementById('bandeau-mission');if(el){el.style.transition='transform .4s';el.style.transform='translateY(-100%)';setTimeout(function(){el.remove();},400);}},10000);
}

function demanderPermissionNotif(){
  try{
    if('Notification' in window && Notification.permission==='default'){
      Notification.requestPermission();
    }
  }catch(e){}
}

/* ═══════════════════ GÉOLOCALISATION ═══════════════════ */
function envoyerPosition(ch,contexte){
  return new Promise(function(resolve){
    if(!navigator.geolocation){resolve(false);return;}
    navigator.geolocation.getCurrentPosition(function(pos){
      var data={
        type:'position_chauffeur',_isEvent:true,
        chauffeurId:ch.id,chauffeur:ch.display,vehicule:ch.truck,
        lat:pos.coords.latitude,lng:pos.coords.longitude,
        precision:Math.round(pos.coords.accuracy),
        contexte:contexte||'manuel',
        date:new Date().toISOString().slice(0,10),
        heure:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),
        ts:new Date().toISOString()
      };
      var headers={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'};
      fetch(SUPA+'/rest/v1/planning',{method:'POST',headers:headers,body:JSON.stringify({date:'POS_'+ch.id,donnees:data,updated_at:new Date().toISOString()})})
      .then(function(){resolve(true);}).catch(function(){resolve(false);});
    },function(){resolve(false);},{enableHighAccuracy:true,timeout:8000,maximumAge:30000});
  });
}

/* ═══════════════════ APP ═══════════════════ */
function App(){
  const[ch,setCh]=useState(null);
  const[screen,setScreen]=useState('home');
  const[screenData,setScreenData]=useState(null);
  const[planning,setPlanning]=useState(null);

  useEffect(()=>{
    if(!ch) return;
    async function loadAll(){
      try{
        const today=new Date().toISOString().slice(0,10);
        const rows=await sGet(`planning?date=gte.${today}&select=date,donnees&order=date.asc&limit=100`);
        const tasks={};
        let drivers=null;
        const driversParDate={};
        (rows||[]).forEach(r=>{
          let d=r.donnees;
          if(typeof d==='string'){try{d=JSON.parse(d);}catch(e){d=null;}}
          if(d&&d.tasks){Object.assign(tasks,d.tasks);}
          /* Horaires + camions de CHAQUE date (et pas seulement aujourd'hui) */
          if(d&&d.drivers&&/^\d{4}-\d{2}-\d{2}$/.test(r.date)){
            driversParDate[r.date]=d.drivers;
            if(r.date===today)drivers=d.drivers;
          }
        });
        /* Mettre à jour le camion du chauffeur connecté si changé côté planning */
        if(drivers&&Array.isArray(drivers)&&drivers[ch.id]){
          const dj=drivers[ch.id];
          const nouveauCamion=dj.truck;
          const nvStart=dj.start, nvEnd=dj.end;
          if((nouveauCamion&&nouveauCamion!==ch.truck)||(nvStart&&nvStart!==ch.start)||(nvEnd&&nvEnd!==ch.end)){
            try{localStorage.setItem('cana_ch_truck_'+ch.id,nouveauCamion||'');}catch(e){}
            setCh(prev=>({...prev,
              truck:nouveauCamion||prev.truck,
              start:nvStart||prev.start,
              end:nvEnd||prev.end
            }));
          }
        }
        /* Horaires du mois en cours + du mois suivant */
        const horaires={};
        try{
          const m1=today.slice(0,7);
          const dn=new Date(); dn.setMonth(dn.getMonth()+1);
          const m2=dn.getFullYear()+'-'+String(dn.getMonth()+1).padStart(2,'0');
          const mois=[m1,m2];
          for(const mm of mois){
            const rh=await sGet('planning?date=eq.HORAIRES_'+mm+'&select=donnees&limit=1');
            if(rh&&rh.length&&rh[0].donnees){
              let dh=rh[0].donnees;
              if(typeof dh==='string'){try{dh=JSON.parse(dh);}catch(e){dh=null;}}
              if(dh&&dh.h)horaires[mm]=dh.h;
            }
          }
        }catch(e){}
        const nouveauPlanning={tasks,drivers,driversParDate,horaires};
        /* Détecter les nouvelles missions du jour pour CE chauffeur */
        const mesMissionsAvant=window._dernierNbMissions;
        const mesMissionsMaintenant=getMissions(nouveauPlanning,ch.id,today);
        const nbMaintenant=mesMissionsMaintenant.length;
        if(typeof mesMissionsAvant==='number' && nbMaintenant>mesMissionsAvant){
          /* Une ou plusieurs nouvelles missions ! Alerter avec la dernière ajoutée */
          const nouvelle=mesMissionsMaintenant[mesMissionsMaintenant.length-1];
          alerterNouvelleMission(nouvelle||{});
        }
        window._dernierNbMissions=nbMaintenant;
        if(Object.keys(tasks).length>0){setPlanning(nouveauPlanning);}
        else{
          const rows2=await sGet(`planning?date=eq.${today}&limit=1`);
          if(rows2?.length&&rows2[0].donnees){
            let d2=rows2[0].donnees;
            if(typeof d2==='string'){try{d2=JSON.parse(d2);}catch(e){}}
            setPlanning(d2);
          }
        }
      }catch(e){}
    }
    loadAll();
    const iv=setInterval(loadAll,10000);
    return()=>clearInterval(iv);
  },[ch]);

  if(!ch) return <Login onLogin={d=>{setCh(d);setScreen('home');demanderPermissionNotif();debloquerAudio();}}/>;
  const nav=(s,data=null)=>{setScreen(s);setScreenData(data);};
  const back=()=>{setScreen('home');setScreenData(null);};

  if(screen==='home') return <HomeScreen ch={ch} planning={planning} onNavigate={nav} unreadMsg={0} onLogout={()=>{setCh(null);setScreen('home');setPlanning(null);}}/>;
  if(screen==='today') return <TodayScreen ch={ch} planning={planning} onNavigate={nav} onBack={back}/>;
  if(screen==='mission_detail'&&screenData) return <MissionDetailScreen ch={ch} mission={screenData} planning={planning} onBack={()=>setScreen('today')} onNavigate={nav}/>;
  if(screen==='calendar') return <CalendarScreen ch={ch} planning={planning} onBack={back} onNavigate={nav}/>;
  if(screen==='horscarte') return <HorsCarteScreen ch={ch} onBack={back}/>;
  if(screen==='incident') return <IncidentScreen ch={ch} onBack={back}/>;
  if(screen==='statut') return <StatutScreen ch={ch} onBack={back}/>;
  if(screen==='bilan') return <BilanScreen ch={ch} planning={planning} onBack={back}/>;
  if(screen==='score') return <ScoreScreen ch={ch} planning={planning} onBack={back}/>;
  if(screen==='checklist_fin') return <ChecklistFinScreen ch={ch} onBack={back}/>;
  if(screen==='historique') return <HistoriqueScreen ch={ch} onBack={back}/>;
  if(screen==='preuves') return <PreuvesScreen ch={ch} onBack={back}/>;
  if(screen==='messages') return <MessagesScreen ch={ch} onBack={back}/>;
  if(screen==='help') return <HelpScreen ch={ch} onBack={back}/>;
  if(screen==='conges') return <CongesScreen ch={ch} onBack={back}/>;
  if(screen==='horaires') return <HorairesScreen ch={ch} planning={planning} onBack={back}/>;
  if(screen==='plus') return <PlusScreen ch={ch} onNavigate={nav} onBack={back} onLogout={()=>{setCh(null);setScreen('home');setPlanning(null);}}/>;
  return <HomeScreen ch={ch} planning={planning} onNavigate={nav} unreadMsg={0} onLogout={()=>{setCh(null);setScreen('home');setPlanning(null);}}/>;
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>

<script>
/* ═══ AUTO-UPDATE : recharge la dernière version automatiquement ═══ */
(function(){
  var APP_TITRE = document.title;
  /* Vérifier s'il y a une nouvelle version toutes les 2 minutes */
  var _monVersion = null;
  function checkUpdate(){
    /* Ajouter un timestamp pour contourner le cache */
    fetch(window.location.href + '?v=' + Date.now(), {cache:'no-store'})
      .then(function(r){return r.text();})
      .then(function(html){
        /* Extraire un identifiant de version (taille du fichier) */
        var v = html.length;
        if(_monVersion === null){
          _monVersion = v;
        } else if(Math.abs(v - _monVersion) > 50){
          /* Nouvelle version détectée */
          afficherBanniereUpdate();
        }
      })
      .catch(function(){});
  }

  function afficherBanniereUpdate(){
    if(document.getElementById('update-banner')) return;
    var b = document.createElement('div');
    b.id = 'update-banner';
    b.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;z-index:9999999;font-family:-apple-system,Arial,sans-serif;box-shadow:0 -4px 20px rgba(0,0,0,.3);animation:slideUp .3s';
    b.innerHTML = '<div style="display:flex;align-items:center;gap:10px"><span style="font-size:22px">🔄</span><div><div style="font-size:14px;font-weight:900">Nouvelle version disponible !</div><div style="font-size:11px;opacity:.9">Cliquez pour mettre à jour</div></div></div><button onclick="location.reload(true)" style="background:#fff;color:#16a34a;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:900;cursor:pointer">Mettre à jour</button>';
    document.body.appendChild(b);
    var st = document.createElement('style');
    st.textContent = '@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}';
    document.head.appendChild(st);
  }

  /* Vérifier au chargement puis toutes les 2 minutes */
  setTimeout(checkUpdate, 5000);
  setInterval(checkUpdate, 120000);

  /* Recharger la dernière version quand on revient sur l'onglet/app */
  var _lastCheck = Date.now();
  document.addEventListener('visibilitychange', function(){
    if(!document.hidden && Date.now() - _lastCheck > 60000){
      _lastCheck = Date.now();
      checkUpdate();
    }
  });
})();
</script>

<script>
/* ══ PWA — le manifest est un VRAI fichier (manifest-chauffeur.json)
      déclaré dans le <head>. Chrome exige un vrai fichier pour proposer
      « Installer l'application ». ══ */

/* ══ SERVICE WORKER — obligatoire pour que Chrome propose l'installation ══ */
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}

/* Capturer l'événement d'installation et afficher un bouton flottant */
var deferredPrompt;
window.addEventListener('beforeinstallprompt', function(e){
  e.preventDefault();
  deferredPrompt = e;
  afficherBoutonInstall();
});

function estInstallee(){
  try{
    return (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
        || (window.matchMedia && window.matchMedia('(display-mode: fullscreen)').matches)
        || navigator.standalone === true;
  }catch(e){return false;}
}
function afficherBoutonInstall(){
  if(estInstallee()) return;
  if(document.getElementById('btn-install-flottant')) return;
  var btn=document.createElement('button');
  btn.id='btn-install-flottant';
  btn.innerHTML='⬇️ Installer l\'application';
  btn.style.cssText='position:fixed;top:12px;right:12px;z-index:9999999;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:900;cursor:pointer;box-shadow:0 4px 16px rgba(34,197,94,.4);font-family:-apple-system,Arial,sans-serif';
  btn.onclick=installerApp;
  document.body.appendChild(btn);
}

function installerApp(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(choice){
      deferredPrompt=null;
      var btn=document.getElementById('btn-install-flottant');
      if(btn) btn.remove();
    });
  } else {
    var ua=navigator.userAgent;
    var msg='';
    if(/iPhone|iPad|iPod/.test(ua)){
      msg='Sur iPhone :\n1. Appuyez sur Partager (carre avec fleche en bas)\n2. "Sur l\'ecran d\'accueil"\n3. Ajouter';
    } else if(/Android/.test(ua)){
      msg='Sur Android :\n1. Menu 3 points en haut a droite\n2. "Installer l\'application"';
    } else {
      msg='Sur PC (Chrome/Edge) :\n1. Icone d\'installation dans la barre d\'adresse (a droite)\nOu 3 points > Applications > Installer';
    }
    alert(msg);
  }
}

/* Si déjà installable au chargement, montrer le bouton après 3s */
window.addEventListener('load',function(){
  setTimeout(function(){
    if(deferredPrompt && !document.getElementById('btn-install-flottant')){
      afficherBoutonInstall();
    }
  },3000);
});
</script>
