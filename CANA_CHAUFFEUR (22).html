<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07101e;--card:#0d1b2e;--border:#1a3550;--text:#e2e8f0;--muted:#607d9a;
  --orange:#f97316;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#a855f7;
  --sab:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden}
#root{height:100%}
.screen{height:100%;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}
/* LOGIN */
.lw{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:24px;background:linear-gradient(160deg,#071526,#0a1f38)}
.l-logo{font-size:56px;margin-bottom:12px}
.l-title{font-size:26px;font-weight:900;color:#fff;margin-bottom:4px}
.l-sub{font-size:13px;color:var(--muted);margin-bottom:28px;text-align:center}
.l-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:320px;margin-bottom:20px}
.drv-btn{padding:16px 8px;border-radius:14px;border:2px solid;background:transparent;font-size:13px;font-weight:800;cursor:pointer;transition:.15s;font-family:inherit}
.drv-btn:active{transform:scale(.95)}
.pin-wrap{width:100%;max-width:320px}
.pin-in{width:100%;background:var(--card);border:2px solid var(--border);border-radius:12px;color:#fff;padding:14px;font-size:20px;text-align:center;outline:none;letter-spacing:8px;margin-bottom:10px;font-family:inherit}
.pin-in:focus{border-color:var(--orange)}
.pin-go{width:100%;padding:14px;background:var(--orange);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:900;cursor:pointer;font-family:inherit}
.pin-err{color:var(--red);font-size:12px;text-align:center;margin-top:8px;height:16px}
/* HEADER */
.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;min-height:52px}
.hdr-back{background:rgba(249,115,22,.15);border:1px solid rgba(249,115,22,.3);color:var(--orange);font-size:16px;font-weight:900;cursor:pointer;padding:9px 16px;border-radius:12px;line-height:1;font-family:inherit;white-space:nowrap}
.hdr-title{font-size:15px;font-weight:800;color:#fff;flex:1}
/* ICON GRID */
.icon-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px}
.icon-tile{aspect-ratio:1;border-radius:20px;border:1.5px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;cursor:pointer;background:none;font-family:inherit;position:relative;transition:.12s;box-shadow:0 2px 10px rgba(0,0,0,.2)}
.icon-tile:active{transform:scale(.91);box-shadow:none}
.it-ico{font-size:28px}
.it-lbl{font-size:11px;font-weight:900;text-align:center;padding:0 4px;line-height:1.3}
.it-sub{font-size:9px;text-align:center;padding:0 4px;line-height:1.2;opacity:.75}
.tile-badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:10px;font-weight:800;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--bg)}
/* HOME TOP */
.home-top{padding:18px 16px 12px;background:linear-gradient(160deg,#0f1928,#071526);border-bottom:1px solid var(--border)}
.home-greet{font-size:12px;color:var(--muted)}
.home-name{font-size:24px;font-weight:900;margin-bottom:6px}
.home-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);flex-wrap:wrap}
/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin:0 16px 12px}
.card-title{font-size:14px;font-weight:800;color:#fff;margin-bottom:12px}
/* FORMS */
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.field label{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.field input,.field select,.field textarea{background:#071526;border:1px solid var(--border);border-radius:8px;color:#fff;padding:10px 12px;font-size:13px;outline:none;font-family:inherit;box-sizing:border-box;width:100%}
.field input:focus,.field select:focus{border-color:var(--orange)}
.btn-p{width:100%;padding:14px;background:var(--orange);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:900;cursor:pointer;font-family:inherit}
.btn-s{width:100%;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
/* MISSION CARD */
.mission-card{background:var(--card);border-radius:14px;padding:14px;margin:0 16px 10px;border-left:4px solid var(--orange);cursor:pointer;transition:.15s}
.mission-card:active{transform:scale(.98)}
.mission-card.done{border-left-color:var(--green);opacity:.8}
/* MISSION DETAIL */
.md-section{margin:0 16px 14px}
.md-section-title{font-size:10px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.action-btn{display:flex;align-items:center;gap:10px;width:100%;padding:13px 16px;background:var(--card);border:1px solid var(--border);border-radius:12px;cursor:pointer;margin-bottom:8px;font-family:inherit;text-align:left;transition:.15s}
.action-btn:active{transform:scale(.98)}
.action-btn-ico{font-size:22px;flex-shrink:0}
.action-btn-label{font-size:13px;font-weight:800;color:#fff}
.action-btn-sub{font-size:11px;color:var(--muted);margin-top:1px}
/* PHOTO PREVIEW */
.photo-preview{width:100%;border-radius:12px;max-height:200px;object-fit:cover;margin-bottom:8px;border:1px solid var(--border)}
/* SIGNATURE PAD */
#sig-canvas{border:2px solid var(--border);border-radius:12px;background:#071526;touch-action:none;cursor:crosshair}
/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:0 12px}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;font-size:11px;cursor:pointer;position:relative}
.cal-day.today{background:var(--orange);color:#fff;font-weight:900}
.cal-day.has-missions::after{content:'';position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--green)}
.cal-day.today.has-missions::after{background:#fff}
.cal-day-off{opacity:.3}
/* STATUT */
.st-btn{width:100%;padding:15px 16px;background:var(--card);border:2px solid var(--border);border-radius:14px;text-align:left;cursor:pointer;margin-bottom:10px;transition:.2s;font-family:inherit}
.st-btn.active{border-color:var(--orange);background:rgba(249,115,22,.08)}
.st-lbl{font-size:14px;font-weight:900;color:#fff}
.st-desc{font-size:11px;color:var(--muted);margin-top:2px}
/* CHECK */
.chk-item{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--card);border:2px solid var(--border);border-radius:14px;margin-bottom:8px;cursor:pointer;transition:.2s}
.chk-item.on{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.3)}
.chk-box{width:26px;height:26px;border-radius:8px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s}
.chk-item.on .chk-box{background:var(--green);border-color:var(--green);color:#fff}
/* METEO */
.meteo-bar{margin:8px 16px 0;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:10px;font-size:12px}
/* TOAST */
#toast{position:fixed;bottom:calc(20px + var(--sab));left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 20px;font-size:13px;font-weight:700;color:#fff;z-index:9999;pointer-events:none;opacity:0;transition:.3s;white-space:nowrap;max-width:90vw}
#toast.show{opacity:1}
@keyframes slideUpPad{from{transform:translateY(100%)}to{transform:translateY(0)}}
</style>
</head>
<body>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

/* ═══════════════════ CONFIG ═══════════════════ */
const SUPA='https://lllzlidwtcjwsxbgkygn.supabase.co';
const KEY='sb_publishable_3weqcRqeCv9lwclSAPC2rA_48OAwGcV';
const H={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'};
const HM={...H,'Prefer':'resolution=merge-duplicates,return=minimal'};

const DRIVERS=[
  {id:0,name:'OTMANE',display:'Otmane',color:'#3b82f6',code:'1111',truck:'JUMPY',start:'06:00',end:'14:00'},
  {id:1,name:'NICOLAS',display:'Nicolas',color:'#22c55e',code:'2222',truck:'VIVARO LOCATION',start:'06:00',end:'14:00'},
  {id:2,name:'MICKAEL',display:'Mickael',color:'#f97316',code:'3333',truck:'VIVARO 1',start:'06:00',end:'15:00'},
  {id:3,name:'KARIM',display:'Karim',color:'#a855f7',code:'4444',truck:'VIVARO 2',start:'06:00',end:'14:00'},
  {id:4,name:'MAITRE_HOTEL',display:"Maître d'H.",color:'#f59e0b',code:'5555',truck:'CAMION 5',start:'08:00',end:'22:00'},
];

/* ═══════════════════ UTILS ═══════════════════ */
function showToast(msg,col='var(--orange)'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.borderColor=col;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);
}

async function sGet(path){
  try{const r=await fetch(SUPA+'/rest/v1/'+path,{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});return r.json();}
  catch(e){return[];}
}
async function sPostEvent(body){
  /* POST dédié aux événements (livraisons, statuts) - upsert propre */
  const headers={...H,'Prefer':'resolution=merge-duplicates,return=minimal'};
  try{
    const r=await fetch(SUPA+'/rest/v1/planning',{method:'POST',headers:headers,body:JSON.stringify(body)});
    if(!r.ok){
      const txt=await r.text().catch(()=>'');
      console.log('sPostEvent echec:',r.status,txt);
      await new Promise(res=>setTimeout(res,1000));
      return await fetch(SUPA+'/rest/v1/planning',{method:'POST',headers:headers,body:JSON.stringify(body)});
    }
    return r;
  }catch(e){
    console.log('sPostEvent erreur:',e);
    try{await new Promise(res=>setTimeout(res,1000));return await fetch(SUPA+'/rest/v1/planning',{method:'POST',headers:headers,body:JSON.stringify(body)});}catch(e2){}
  }
}
async function sPost(table,body){
  try{
    const r=await fetch(SUPA+'/rest/v1/'+table,{method:'POST',headers:HM,body:JSON.stringify(body)});
    if(!r.ok){
      /* Retry une fois */
      await new Promise(res=>setTimeout(res,800));
      return await fetch(SUPA+'/rest/v1/'+table,{method:'POST',headers:HM,body:JSON.stringify(body)});
    }
    return r;
  }catch(e){
    /* Retry en cas d'erreur réseau */
    try{await new Promise(res=>setTimeout(res,800));return await fetch(SUPA+'/rest/v1/'+table,{method:'POST',headers:HM,body:JSON.stringify(body)});}catch(e2){}
  }
}

/* ═══ Tâche (charger, décharger, commande...) ou vraie livraison client ? ═══ */
function estTache(m){ return !!(m && m.category === 'task'); }
function libFait(m){ return estTache(m) ? 'Mission accomplie' : 'Livraison confirmée'; }
function libAction(m){ return estTache(m) ? 'MARQUER MISSION ACCOMPLIE' : 'CONFIRMER LA LIVRAISON'; }
function libCourt(m){ return estTache(m) ? 'Fait' : 'Livré'; }

/* ═══ HORAIRES MENSUELS (partagés avec le planning) ═══ */
function hmDuree(s,e){
  if(!s||!e)return 0;
  var a=s.split(':'),b=e.split(':');
  var m1=parseInt(a[0],10)*60+parseInt(a[1],10);
  var m2=parseInt(b[0],10)*60+parseInt(b[1],10);
  if(m2<=m1)m2+=1440;
  return (m2-m1)/60;
}
function hmFmt(h){
  if(!h)return '—';
  var t=Math.round(h*60), hh=Math.floor(t/60), mm=t%60;
  return hh+'h'+(mm?String(mm).padStart(2,'0'):'');
}
var _MOIS_FR=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
var _JOURS_FR=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
function hmNomMois(m){var p=m.split('-');return _MOIS_FR[parseInt(p[1],10)-1]+' '+p[0];}
function hmJoursDuMois(m){
  var p=m.split('-'), an=parseInt(p[0],10), mo=parseInt(p[1],10);
  var n=new Date(an,mo,0).getDate(), out=[];
  for(var i=1;i<=n;i++){
    var ds=an+'-'+String(mo).padStart(2,'0')+'-'+String(i).padStart(2,'0');
    var d=new Date(ds+'T12:00:00');
    out.push({date:ds,num:i,jour:_JOURS_FR[d.getDay()],we:(d.getDay()===0||d.getDay()===6)});
  }
  return out;
}
/* Horaires officiels du mois pour ce chauffeur (prioritaires sur le reste) */
function horairesMois(planning,driverId,date){
  var hm = planning && planning.horaires;
  if(!hm) return null;
  var m = String(date).slice(0,7);
  var d = hm[m] && hm[m][String(driverId)];
  return (d && d[date]) ? d[date] : null;
}

/* Horaires d'un chauffeur pour une date précise (null si non définis) */
function horairesDu(planning,driverId,date){
  /* 1) Le planning des horaires du mois fait autorité */
  var off = horairesMois(planning,driverId,date);
  if(off && off.s && off.e) return {start:off.s, end:off.e, truck:'', officiel:true};
  /* 2) Sinon, les horaires enregistrés avec la journée */
  var dpd = planning && planning.driversParDate;
  if(!dpd || !dpd[date]) return null;
  var d = dpd[date][driverId];
  if(!d || !d.start || !d.end) return null;
  return {start:d.start, end:d.end, truck:d.truck||''};
}

function getMissions(planning,driverId,date){
  if(!planning?.tasks) return[];
  const res=[];
  Object.keys(planning.tasks).forEach(k=>{
    const[d,di,h]=k.split('|');
    if(d===date&&parseInt(di)===driverId){
      (planning.tasks[k]||[]).forEach(t=>{
        if(t&&(t.client||t.task)) res.push({...t,heure:h,_key:k});
      });
    }
  });
  return res.sort((a,b)=>a.heure.localeCompare(b.heure));
}

function getAllMissionDates(planning,driverId){
  if(!planning?.tasks) return{};
  const dates={};
  Object.keys(planning.tasks).forEach(k=>{
    const[d,di]=k.split('|');
    if(parseInt(di)===driverId&&(planning.tasks[k]||[]).some(t=>t?.client||t?.task)){
      if(!dates[d]) dates[d]=0;
      dates[d]+=(planning.tasks[k]||[]).length;
    }
  });
  return dates;
}

/* ═══════════════════ HEADER ═══════════════════ */
function Header({title,onBack,right,ch,onLogout}){
  return(
    <div className="hdr">
      {onBack&&<button className="hdr-back" onClick={onBack}>← Retour</button>}
      <div className="hdr-title">{title}</div>
      {right&&<div style={{fontSize:12,color:'var(--muted)',flexShrink:0}}>{right}</div>}
      {onLogout&&(
        <button onClick={onLogout}
          style={{background:'rgba(249,115,22,.12)',border:'1px solid rgba(249,115,22,.35)',borderRadius:10,color:'var(--orange)',padding:'9px 16px',fontSize:14,fontWeight:900,cursor:'pointer',flexShrink:0}}>
          🔄 Changer
        </button>
      )}
    </div>
  );
}

/* ═══════════════════ MÉTÉO ═══════════════════ */
function MeteoBar(){
  const[m,setM]=useState(null);
  useEffect(()=>{
    fetch('https://api.open-meteo.com/v1/forecast?latitude=43.2965&longitude=5.3698&current=temperature_2m,weathercode,windspeed_10m&timezone=Europe/Paris')
      .then(r=>r.json()).then(d=>{
        if(d?.current){
          const c=d.current.weathercode;
          const ico=c===0?'☀️':c<=3?'⛅':c<=67?'🌧️':'⛈️';
          setM({temp:Math.round(d.current.temperature_2m),wind:Math.round(d.current.windspeed_10m),ico,desc:c===0?'Ensoleillé':c<=3?'Nuageux':c<=67?'Pluie':'Orage'});
        }
      }).catch(()=>{});
  },[]);
  if(!m) return null;
  const alerte=m.wind>60;
  return(
    <div className="meteo-bar" style={{borderColor:alerte?'rgba(239,68,68,.3)':'rgba(255,255,255,.08)',background:alerte?'rgba(239,68,68,.06)':'rgba(255,255,255,.04)'}}>
      <span style={{fontSize:20}}>{m.ico}</span>
      <div style={{flex:1}}>
        <div style={{fontWeight:800,color:'#fff',fontSize:12}}>{m.desc} · {m.temp}°C</div>
        <div style={{fontSize:10,color:alerte?'#ef4444':'var(--muted)',fontWeight:alerte?800:400}}>{alerte?'⚠️ Mistral fort — ':''}{m.wind} km/h</div>
      </div>
      {alerte&&<span style={{fontSize:9,fontWeight:900,color:'#ef4444',background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.3)',borderRadius:5,padding:'2px 6px'}}>PRUDENCE</span>}
    </div>
  );
}

/* ═══════════════════ LOGIN ═══════════════════ */
function Login({onLogin}){
  const[sel,setSel]=useState(null);
  const[pin,setPin]=useState('');
  const[err,setErr]=useState('');
  const[now,setNow]=useState(new Date());
  const[listeOuverte,setListeOuverte]=useState(false);
  const[pavOuvert,setPavOuvert]=useState(false);
  useEffect(()=>{const iv=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(iv);},[]);

  function tapeChiffre(c){
    if(pin.length<4){var np=pin+c;setPin(np);setErr('');
      if(np.length===4){setTimeout(()=>{if(np===sel.code)onLogin(sel);else{setErr('Code incorrect');setPin('');}},150);}
    }
  }
  function effacer(){setPin(pin.slice(0,-1));setErr('');}

  const JOURS=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const MOIS=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  const heureStr=now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  const dateStr=JOURS[now.getDay()]+' '+now.getDate()+' '+MOIS[now.getMonth()]+' '+now.getFullYear();
  const h=now.getHours();
  const salut=h<12?'Bonne matinée':h<18?'Bon après-midi':'Bonne soirée';

  return(
    <div style={{minHeight:'100%',display:'flex',flexDirection:'column',background:'linear-gradient(165deg,#0c2818 0%,#071526 50%,#0a1628 100%)',position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',top:-80,right:-60,width:220,height:220,borderRadius:'50%',background:'radial-gradient(circle,rgba(34,197,94,.18),transparent 70%)',pointerEvents:'none'}}/>
      <div style={{position:'absolute',bottom:-40,left:-50,width:200,height:200,borderRadius:'50%',background:'radial-gradient(circle,rgba(14,165,233,.1),transparent 70%)',pointerEvents:'none'}}/>

      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',padding:'0 22px',position:'relative',zIndex:2,overflowY:'auto'}}>
        {/* Date + heure */}
        <div style={{textAlign:'center',marginTop:24,marginBottom:12}}>
          <div style={{fontSize:38,fontWeight:900,color:'#fff',letterSpacing:1,lineHeight:1,fontVariantNumeric:'tabular-nums'}}>{heureStr}</div>
          <div style={{fontSize:12,fontWeight:700,color:'#4ade80',marginTop:5,textTransform:'capitalize'}}>{dateStr}</div>
        </div>

        {/* LOGO La Table de Cana */}
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',marginBottom:6}}>
          <div style={{width:98,height:98,borderRadius:'50%',background:'#fff',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 12px 34px rgba(190,24,93,.4)',marginBottom:12,position:'relative',border:'3px solid rgba(190,24,93,.15)'}}>

/* ═══════════════════ MES HORAIRES (mois complet) ═══════════════════ */
function HorairesScreen({ch,planning,onBack}){
  const [mois,setMois]=useState(new Date().toISOString().slice(0,7));
  const today=new Date().toISOString().slice(0,10);
  const jours=hmJoursDuMois(mois);
  let total=0, nbJours=0;
  const lignes=jours.map(j=>{
    const h=horairesDu(planning,ch.id,j.date);
    const dur=h?hmDuree(h.start,h.end):0;
    if(dur>0){total+=dur;nbJours++;}
    return {...j,h,dur,estAujourdhui:j.date===today};
  });
  function changerMois(d){
    const p=mois.split('-');
    const x=new Date(parseInt(p[0]),parseInt(p[1])-1+d,1);
    setMois(x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0'));
  }
  return(
    <div className="screen">
      <Header title="🕐 Mes horaires" onBack={onBack} ch={ch}/>
      <div className="scroll">

        {/* Mois */}
        <div style={{display:'flex',alignItems:'center',gap:8,padding:'12px 14px'}}>
          <button onClick={()=>changerMois(-1)} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,color:'#fff',width:44,height:44,fontSize:20,fontWeight:800,cursor:'pointer'}}>‹</button>
          <div style={{flex:1,textAlign:'center',fontSize:17,fontWeight:900,color:'#fff',textTransform:'capitalize'}}>{hmNomMois(mois)}</div>
          <button onClick={()=>changerMois(1)} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,color:'#fff',width:44,height:44,fontSize:20,fontWeight:800,cursor:'pointer'}}>›</button>
        </div>

        {/* Total du mois */}
        <div style={{margin:'0 14px 14px',background:'linear-gradient(135deg,#0f1e33,#0a1628)',border:'1px solid rgba(34,197,94,.35)',borderRadius:18,padding:'16px 18px'}}>
          <div style={{fontSize:12,color:'var(--muted)',fontWeight:700,textTransform:'uppercase',letterSpacing:.5}}>Total travaillé</div>
          <div style={{fontSize:34,fontWeight:900,color:'#22c55e',lineHeight:1.1}}>{hmFmt(total)}</div>
          <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>{nbJours} jour{nbJours>1?'s':''} · moyenne {hmFmt(nbJours?total/nbJours:0)} par jour</div>
        </div>

        {/* Les jours */}
        <div style={{padding:'0 14px 20px'}}>
          {lignes.map(l=>(
            <div key={l.date} style={{
              display:'flex',alignItems:'center',gap:12,padding:'11px 14px',marginBottom:6,borderRadius:13,
              background:l.estAujourdhui?'rgba(14,165,233,.14)':(l.h?'var(--card)':'transparent'),
              border:'1px solid '+(l.estAujourdhui?'rgba(14,165,233,.5)':(l.h?'var(--border)':'rgba(255,255,255,.05)')),
              opacity:(!l.h&&l.we)?.45:1
            }}>
              <div style={{textAlign:'center',minWidth:44}}>
                <div style={{fontSize:10,fontWeight:800,color:l.we?'var(--muted)':'#94a3b8'}}>{l.jour}</div>
                <div style={{fontSize:19,fontWeight:900,color:l.estAujourdhui?'#38bdf8':(l.h?'#fff':'var(--muted)'),lineHeight:1}}>{l.num}</div>
              </div>
              <div style={{width:3,alignSelf:'stretch',minHeight:30,borderRadius:2,background:l.h?'#22c55e':'rgba(255,255,255,.07)'}}/>
              <div style={{flex:1,minWidth:0}}>
                {l.h?(
                  <div style={{fontSize:17,fontWeight:900,color:'#fff'}}>{l.h.start} <span style={{color:'var(--muted)',fontWeight:700}}>→</span> {l.h.end}</div>
                ):(
                  <div style={{fontSize:13,fontWeight:700,color:'var(--muted)'}}>{l.we?'Week-end':'Repos / non défini'}</div>
                )}
              </div>
              {l.dur>0&&<div style={{fontSize:14,fontWeight:900,color:'#22c55e',flexShrink:0}}>{hmFmt(l.dur)}</div>}
              {l.estAujourdhui&&<div style={{fontSize:8,fontWeight:900,padding:'3px 6px',borderRadius:5,background:'#0ea5e9',color:'#fff',flexShrink:0}}>AUJOURD'HUI</div>}
            </div>
          ))}
        </div>

        <div style={{padding:'0 14px 24px',fontSize:11,color:'var(--muted)',textAlign:'center',lineHeight:1.6}}>
          Horaires définis par ton responsable.<br/>Une erreur ? Préviens-le avec le bouton 💬 Messages.
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════ MISSIONS DU JOUR ═══════════════════ */
function TodayScreen({ch,planning,onNavigate,onBack}){
  const today=new Date().toISOString().slice(0,10);
  const ms=(planning?getMissions(planning,ch.id,today):[]).map(m=>{
    var mk='LIV_'+ch.id+'_'+today+'_'+(m.client||m.task||'')+'_'+(m.heure||'');
    try{if(localStorage.getItem(mk)==='done')return{...m,_statut:'done'};}catch(e){}
    return m;
  });
  const done=ms.filter(m=>m._statut==='done').length;
  const restant=ms.length-done;
  const pct=ms.length>0?Math.round(done/ms.length*100):0;
  /* Répartition par type */
  const repartition={
    traiteur:ms.filter(m=>m.category==='traiteur').length,
    collectivite:ms.filter(m=>m.category==='collectivite').length,
    centre:ms.filter(m=>m.category==='centre').length,
    task:ms.filter(m=>m.category==='task').length
  };
  const typesInfo=[
    {key:'traiteur',ico:'🎉',lbl:'Traiteur',col:'#a855f7'},
    {key:'collectivite',ico:'🏢',lbl:'Resto co',col:'#3b82f6'},
    {key:'centre',ico:'🌳',lbl:'Centre',col:'#22c55e'},
    {key:'task',ico:'📋',lbl:'Tâche',col:'#f59e0b'}
  ].filter(t=>repartition[t.key]>0);

  const CATCOL={
    traiteur:{c:'#a855f7',bg:'rgba(168,85,247,.14)',l:'TRAITEUR',ico:'🎉'},
    collectivite:{c:'#3b82f6',bg:'rgba(59,130,246,.14)',l:'RESTO CO',ico:'🏢'},
    centre:{c:'#22c55e',bg:'rgba(34,197,94,.14)',l:'CENTRE',ico:'🌳'},
    task:{c:'#f59e0b',bg:'rgba(245,158,11,.14)',l:'TÂCHE',ico:'📋'}
  };

  /* Trier : à faire d'abord (par heure), livrées à la fin */
  const msTries=[...ms].sort((a,b)=>{
    const ad=a._statut==='done'?1:0, bd=b._statut==='done'?1:0;
    if(ad!==bd)return ad-bd;
    return (a.heure||'').localeCompare(b.heure||'');
  });

  return(
    <div className="screen">
      <Header title="🚚 Mes livraisons" onBack={onBack} ch={ch}/>
      <div className="scroll">
        {!planning&&<div style={{textAlign:'center',padding:40,color:'var(--muted)'}}>⏳ Chargement...</div>}

        {planning&&ms.length>0&&(
          <div style={{padding:'14px 16px 4px'}}>
            {/* Grande barre de progression */}
            <div style={{background:'linear-gradient(135deg,#0f1e33,#0a1628)',border:'1px solid var(--border)',borderRadius:18,padding:'16px 18px',marginBottom:14}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:10}}>
                <div>
                  <div style={{fontSize:13,color:'var(--muted)',fontWeight:600}}>Ma journée</div>
                  <div style={{fontSize:26,fontWeight:900,color:'#fff',lineHeight:1.1}}>{done} <span style={{fontSize:16,color:'var(--muted)'}}>sur {ms.length} faites</span></div>
                </div>
                <div style={{fontSize:34,fontWeight:900,color:pct>=100?'#22c55e':pct>=50?'#0ea5e9':'#f97316',lineHeight:1}}>{pct}%</div>
              </div>
              <div style={{background:'rgba(255,255,255,.08)',borderRadius:10,height:14,overflow:'hidden'}}>
                <div style={{width:pct+'%',height:14,borderRadius:10,background:pct>=100?'linear-gradient(90deg,#22c55e,#16a34a)':'linear-gradient(90deg,#0ea5e9,#0369a1)',transition:'.5s'}}/>
              </div>
              {restant>0&&<div style={{fontSize:13,color:'#f97316',fontWeight:800,marginTop:10,textAlign:'center'}}>🔥 Encore {restant} mission{restant>1?'s':''} à faire !</div>}
              {restant===0&&<div style={{fontSize:14,color:'#22c55e',fontWeight:900,marginTop:10,textAlign:'center'}}>🎉 Bravo ! Toutes tes missions sont faites !</div>}
            </div>

            {/* Répartition par type — discret et élégant */}
            {typesInfo.length>0&&(
              <div style={{display:'flex',gap:8,marginBottom:6,flexWrap:'wrap'}}>
                {typesInfo.map(t=>(
                  <div key={t.key} style={{flex:'1 1 0',minWidth:70,background:t.col+'12',border:'1px solid '+t.col+'30',borderRadius:12,padding:'10px 8px',textAlign:'center'}}>
                    <div style={{fontSize:18,marginBottom:2}}>{t.ico}</div>
                    <div style={{fontSize:20,fontWeight:900,color:t.col,lineHeight:1}}>{repartition[t.key]}</div>
                    <div style={{fontSize:10,color:t.col,fontWeight:700,marginTop:2,opacity:.85}}>{t.lbl}</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {planning&&ms.length===0&&(
          <div style={{textAlign:'center',padding:50,color:'var(--muted)'}}>
            <div style={{fontSize:48,marginBottom:12}}>😎</div>
            <div style={{fontWeight:800,fontSize:16,color:'#fff'}}>Aucune livraison aujourd'hui</div>
            <div style={{fontSize:13,marginTop:6}}>Profite de ta journée !</div>
          </div>
        )}

        <div style={{padding:'0 14px 20px'}}>
          {msTries.map((m,i)=>{
            const cat=CATCOL[m.category]||{c:'#64748b',bg:'rgba(100,116,139,.14)',l:'',ico:'📦'};
            const estLivre=m._statut==='done';
            const numero=msTries.filter((x,j)=>j<=i && x._statut!=='done').length;
            return(
              <div key={i}
                onClick={()=>onNavigate('mission_detail',m)}
                style={{
                  background:estLivre?'rgba(34,197,94,.06)':'linear-gradient(135deg,#0f1e33,#0a1628)',
                  border:`2px solid ${estLivre?'rgba(34,197,94,.25)':cat.c+'55'}`,
                  borderRadius:20,padding:0,marginBottom:12,overflow:'hidden',cursor:'pointer',
                  opacity:estLivre?.7:1,position:'relative'
                }}>
                {/* Bande couleur en haut */}
                <div style={{height:5,background:estLivre?'#22c55e':cat.c}}/>
                <div style={{padding:'14px 16px'}}>
                  <div style={{display:'flex',alignItems:'center',gap:14}}>
                    {/* Heure ÉNORME à gauche */}
                    <div style={{textAlign:'center',minWidth:64}}>
                      <div style={{fontSize:28,fontWeight:900,color:estLivre?'#22c55e':'#fff',lineHeight:1,fontVariantNumeric:'tabular-nums'}}>{m.heure||'—'}</div>
                      {!estLivre&&<div style={{fontSize:10,fontWeight:800,color:cat.c,marginTop:3}}>N°{numero}</div>}
                    </div>
                    {/* Séparateur vertical */}
                    <div style={{width:2,alignSelf:'stretch',background:estLivre?'rgba(34,197,94,.2)':cat.c+'33',borderRadius:2,minHeight:44}}/>
                    {/* Client + type */}
                    <div style={{flex:1,minWidth:0}}>
                      {cat.l&&<div style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:10,fontWeight:900,padding:'3px 9px',borderRadius:7,background:cat.bg,color:cat.c,marginBottom:5,letterSpacing:.5}}>{cat.ico} {cat.l}</div>}
                      <div style={{fontSize:18,fontWeight:900,color:estLivre?'#94a3b8':'#fff',lineHeight:1.15,textDecoration:estLivre?'line-through':'none'}}>{m.client||m.task}</div>
                      {m.task&&m.client&&<div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>{m.task}</div>}
                    </div>
                    {/* Statut à droite */}
                    <div style={{textAlign:'center'}}>
                      {estLivre?(
                        <div style={{fontSize:28}}>✅</div>
                      ):(
                        <div style={{width:38,height:38,borderRadius:'50%',border:`2px solid ${cat.c}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,color:cat.c}}>→</div>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════ FICHE CLIENT / MISSION DETAIL ═══════════════════ */
function MissionDetailScreen({ch,mission,planning,onBack,onNavigate}){
  const today=new Date().toISOString().slice(0,10);
  /* Clé unique pour cette mission (persistance état livré) */
  const missionKey='LIV_'+ch.id+'_'+today+'_'+(mission.client||mission.task||'')+'_'+(mission.heure||'');
  const dejaLivre=(()=>{try{return localStorage.getItem(missionKey)==='done';}catch(e){return false;}})();
  const[statut,setStatut]=useState(mission._statut==='done'||dejaLivre?'done':'pending');
  const[photos,setPhotos]=useState([]);
  const[sig,setSig]=useState(null);
  const[reprises,setReprises]=useState([]);
  const[loading,setLoading]=useState(false);
  const[activeSection,setActiveSection]=useState(null);

  // Charger les preuves existantes
  useEffect(()=>{
    sGet(`planning?date=like.EV_*&select=donnees&order=date.desc&limit=100`).then(rows=>{
      const evts=(rows||[]).map(r=>r.donnees).filter(d=>d&&d._isEvent&&d.chauffeurId===ch.id&&d.date===today&&d.client===(mission.client||mission.task));
      setPhotos(evts.filter(e=>e.type==='photo'));
      const s=evts.find(e=>e.type==='signature');
      if(s) setSig(s);
      setReprises(evts.filter(e=>e.type==='reprise'));
      /* Si une livraison confirmée existe déjà pour cette mission, marquer done */
      if(evts.find(e=>e.type==='livraison_confirmee')){setStatut('done');try{localStorage.setItem(missionKey,'done');}catch(e){}}
    });
  },[]);

  const maps=`https://maps.google.com/?q=${encodeURIComponent(mission.adresse||mission.client||'')}`;
  const waze=`https://waze.com/ul?q=${encodeURIComponent(mission.adresse||mission.client||'')}&navigate=yes`;

  async function marquerLivre(){
    if(statut==='done'){showToast('Déjà confirmée ✓','var(--green)');return;}
    setStatut('done');
    try{localStorage.setItem(missionKey,'done');}catch(e){}
    showToast('✅ '+libFait(mission)+' — responsable notifié','var(--green)');
    try{envoyerPosition(ch,'livraison');}catch(e){}
    /* Récupérer la dernière photo prise pour cette mission si elle existe */
    var dernierePhoto=null;
    try{
      if(photos&&photos.length){var pp=photos[photos.length-1];dernierePhoto=pp.dataUrl||pp.photo||null;}
    }catch(e){}
    /* Envoyer confirmation au planning */
    try{
      await sPostEvent({
        date:'EV_LIV_'+Date.now()+'_'+ch.id,
        donnees:{
          type:'livraison_confirmee',
          _isEvent:true,
          chauffeurId:ch.id,
          chauffeur:ch.display,
          vehicule:ch.truck,
          client:mission.client||mission.task||'',
          category:mission.category||'',
          estTache:estTache(mission),
          libelle:libFait(mission),
          heure:mission.heure||'',
          taskKey:mission._key||'',
          photo:dernierePhoto,
          date:new Date().toISOString().slice(0,10),
          ts:new Date().toISOString()
        },
        updated_at:new Date().toISOString()
      });
    }catch(e){}
    /* Revenir à la liste des missions après 1.2s */
    setTimeout(function(){if(onBack)onBack();},1200);
  }

  const sections=[
    {id:'photo',ico:'📸',lbl:'Prendre une photo',sub:'Photo du dépôt, livraison...',col:'#818cf8',bg:'rgba(99,102,241,.1)',brd:'rgba(99,102,241,.3)'},
    {id:'ia_bac',ico:'🤖',lbl:'Photo IA — Bacs gastro',sub:'L\'IA compte les bacs automatiquement',col:'#f97316',bg:'rgba(249,115,22,.1)',brd:'rgba(249,115,22,.3)'},
    {id:'signature',ico:'✍️',lbl:'Signature client',sub:'Preuve de livraison signée',col:'#22c55e',bg:'rgba(34,197,94,.1)',brd:'rgba(34,197,94,.3)'},
    {id:'reprise',ico:'📦',lbl:'Signaler une reprise',sub:'Bacs, matériel à récupérer',col:'#f59e0b',bg:'rgba(245,158,11,.1)',brd:'rgba(245,158,11,.3)'},
    {id:'retard',ico:'⏰',lbl:'Signaler un retard',sub:'Notifier le responsable',col:'#ef4444',bg:'rgba(239,68,68,.1)',brd:'rgba(239,68,68,.3)'},
  ];

  if(activeSection==='photo') return <PhotoScreen ch={ch} mission={mission} onBack={()=>setActiveSection(null)} ia={false}/>;
  if(activeSection==='ia_bac') return <PhotoIABacsScreen ch={ch} mission={mission} onBack={()=>setActiveSection(null)}/>;
  if(activeSection==='signature') return <SignatureScreen ch={ch} mission={mission} onBack={()=>setActiveSection(null)}/>;
  if(activeSection==='reprise') return <RepriseScreen ch={ch} mission={mission} onBack={()=>setActiveSection(null)}/>;

  return(
    <div className="screen">
      <Header title={mission.client||mission.task||'Mission'} onBack={onBack} right={mission.heure}/>
      <div className="scroll">
        {/* Infos client */}
        <div className="card">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'start',marginBottom:10}}>
            <div>
              <div style={{fontSize:16,fontWeight:900,color:'#fff',marginBottom:4}}>{mission.client||mission.task}</div>
              {mission.adresse&&<div style={{fontSize:12,color:'var(--muted)',marginBottom:3}}>📍 {mission.adresse}</div>}
              {mission.convives&&<div style={{fontSize:12,color:'var(--muted)'}}>👥 {mission.convives} convives</div>}
            </div>
            <span style={{fontSize:22,fontWeight:900,color:'var(--orange)',flexShrink:0}}>{mission.heure}</span>
          </div>
          {/* Statut livraison */}
          {statut==='done'?(
            <div style={{background:'rgba(34,197,94,.1)',border:'2px solid rgba(34,197,94,.4)',borderRadius:14,padding:'16px',marginBottom:4,textAlign:'center'}}>
              <div style={{fontSize:36,marginBottom:4}}>✅</div>
              <div style={{fontWeight:900,color:'#22c55e',fontSize:15}}>{libFait(mission)} !</div>
              <div style={{fontSize:11,color:'var(--muted)',marginTop:3}}>Responsable notifié en temps réel</div>
            </div>
          ):(
            <button onClick={marquerLivre} style={{width:'100%',padding:'18px',background:'linear-gradient(135deg,#22c55e,#16a34a)',border:'none',borderRadius:14,color:'#fff',fontSize:17,fontWeight:900,cursor:'pointer',marginBottom:4,display:'flex',alignItems:'center',justifyContent:'center',gap:10,boxShadow:'0 4px 20px rgba(34,197,94,.3)',fontFamily:'inherit'}}>
              <span style={{fontSize:22}}>✅</span> {libAction(mission)}
            </button>
          )}
        </div>

        {/* Navigation GPS */}

function PhotoScreen({ch,mission,onBack,ia}){
  const[img,setImg]=useState(null);
  const[sending,setSending]=useState(false);
  const fileRef=useRef();
  const today=new Date().toISOString().slice(0,10);

  function handleFile(e){
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      /* Compresser la photo avant envoi */
      const original=ev.target.result;
      const imgEl=new Image();
      imgEl.onload=function(){
        const MAX=800;
        let w=imgEl.width,h=imgEl.height;
        if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
        if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        const ctx=canvas.getContext('2d');
        ctx.drawImage(imgEl,0,0,w,h);
        setImg(canvas.toDataURL('image/jpeg',0.72));
      };
      imgEl.src=original;
    };
    reader.readAsDataURL(f);
  }

  async function envoyer(){
    if(!img){showToast('Prenez une photo d\'abord','var(--red)');return;}
    setSending(true);
    try{
      await sPost('planning',{
        date:'EV_'+Date.now()+'_'+ch.id,
        donnees:{type:'photo',_isEvent:true,chauffeurId:ch.id,chauffeur:ch.display,vehicule:ch.truck,client:mission.client||mission.task,date:today,heure:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),photo:img,dataUrl:img,ts:new Date().toISOString()},
        updated_at:new Date().toISOString()
      });
      showToast('📸 Photo envoyée au responsable','var(--green)');
      onBack();
    }catch(e){showToast('Erreur envoi','var(--red)');}
    setSending(false);
  }

  return(
    <div className="screen">
      <Header title="📸 Photo de livraison" onBack={onBack}/>
      <div className="scroll">
        <div style={{padding:'16px'}}>
          {img&&<img src={img} className="photo-preview" alt="preview"/>}

            <button onClick={()=>fileRef.current.click()} style={{flex:1,padding:13,background:'rgba(99,102,241,.12)',border:'1px solid rgba(99,102,241,.3)',borderRadius:12,color:'#818cf8',fontSize:13,fontWeight:800,cursor:'pointer',fontFamily:'inherit'}}>
              {img?'🔄 Reprendre':'📷 Prendre une photo'}

          </div>
          <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handleFile} style={{display:'none'}}/>

/* ═══════════════════ PHOTO IA BACS GASTRO ═══════════════════ */
function PhotoIABacsScreen({ch,mission,onBack}){
  const[img,setImg]=useState(null);
  const[result,setResult]=useState(null);
  const[analyzing,setAnalyzing]=useState(false);
  const[sending,setSending]=useState(false);
  const fileRef=useRef();
  const today=new Date().toISOString().slice(0,10);

  function handleFile(e){
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{setImg(ev.target.result);setResult(null);};
    reader.readAsDataURL(f);
  }

  async function analyserIA(){
    if(!img){showToast('Prenez une photo d\'abord','var(--red)');return;}
    setAnalyzing(true);
    setResult(null);
    try{
      const base64=img.split(',')[1];
      const resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-6',
          max_tokens:300,
          messages:[{role:'user',content:[
            {type:'image',source:{type:'base64',media_type:'image/jpeg',data:base64}},
            {type:'text',text:'Tu es un assistant pour une société de traiteur. Compte précisément le nombre de bacs gastronormes (bacs GN) visibles sur cette photo. Réponds UNIQUEMENT avec ce format JSON: {"nb_bacs": <nombre>, "details": "<description courte>"} . Si tu ne vois pas de bacs, mets 0.'}
          ]}]
        })
      });
      const data=await resp.json();
      const text=(data.content||[]).map(c=>c.text||'').join('');
      const clean=text.replace(/```json|```/g,'').trim();
      const parsed=JSON.parse(clean);
      setResult(parsed);

      <div className="scroll">
        <div style={{padding:'16px'}}>
          <div style={{background:'rgba(249,115,22,.08)',border:'1px solid rgba(249,115,22,.2)',borderRadius:12,padding:'12px',fontSize:12,color:'#fed7aa',marginBottom:16}}>

          </div>
          {img&&<img src={img} className="photo-preview" alt="preview"/>}
          {result&&(
            <div style={{background:'rgba(34,197,94,.08)',border:'2px solid rgba(34,197,94,.3)',borderRadius:14,padding:'16px',marginBottom:14,textAlign:'center'}}>
              <div style={{fontSize:48,fontWeight:900,color:'#22c55e',marginBottom:6}}>{result.nb_bacs}</div>
              <div style={{fontSize:14,fontWeight:800,color:'#fff',marginBottom:4}}>bacs gastronormes détectés</div>
              <div style={{fontSize:12,color:'var(--muted)'}}>{result.details}</div>

          <div style={{display:'flex',gap:8,marginBottom:12}}>

/* ═══════════════════ SIGNATURE ═══════════════════ */
function SignatureScreen({ch,mission,onBack}){
  const canvasRef=useRef();
  const[hasDrawn,setHasDrawn]=useState(false);
  const[sending,setSending]=useState(false);
  const[nom,setNom]=useState('');
  const today=new Date().toISOString().slice(0,10);

  useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas) return;
    const rect=canvas.getBoundingClientRect();
    canvas.width=rect.width*window.devicePixelRatio||600;
    canvas.height=200*window.devicePixelRatio||200;
    canvas.style.width=rect.width+'px';
    canvas.style.height='200px';
    const ctx=canvas.getContext('2d');
    ctx.scale(window.devicePixelRatio,window.devicePixelRatio);
    ctx.strokeStyle='#fff';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';
    let drawing=false;
    function getPos(e){
      const r=canvas.getBoundingClientRect();
      const src=e.touches?e.touches[0]:e;
      return{x:(src.clientX-r.left),y:(src.clientY-r.top)};
    }
    function start(e){e.preventDefault();drawing=true;const p=getPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);}
    function move(e){e.preventDefault();if(!drawing)return;const p=getPos(e);ctx.lineTo(p.x,p.y);ctx.stroke();setHasDrawn(true);}
    function end(e){e.preventDefault();drawing=false;}
    canvas.addEventListener('mousedown',start);canvas.addEventListener('mousemove',move);canvas.addEventListener('mouseup',end);
    canvas.addEventListener('touchstart',start,{passive:false});canvas.addEventListener('touchmove',move,{passive:false});canvas.addEventListener('touchend',end,{passive:false});
  },[]);

  function effacer(){
    const canvas=canvasRef.current;if(!canvas)return;
    const ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,canvas.width,canvas.height);
    setHasDrawn(false);
  }

  async function envoyer(){
    if(!hasDrawn){showToast('Demandez la signature d\'abord','var(--red)');return;}
    setSending(true);
    try{
      const canvas=canvasRef.current;
      const sigData=canvas.toDataURL('image/png');
      await sPost('planning',{
        date:'EV_'+Date.now()+'_'+ch.id,
        donnees:{type:'signature',_isEvent:true,chauffeurId:ch.id,chauffeur:ch.display,vehicule:ch.truck,client:mission.client||mission.task,date:today,heure:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),signature:sigData,dataUrl:sigData,signataire:nom,ts:new Date().toISOString()},
        updated_at:new Date().toISOString()
      });
      showToast('✍️ Signature envoyée au responsable','var(--green)');
      onBack();
    }catch(e){showToast('Erreur','var(--red)');}
    setSending(false);
  }

  return(
    <div className="screen">
      <Header title="✍️ Signature client" onBack={onBack}/>
      <div className="scroll">
        <div style={{padding:'16px'}}>
          <div style={{background:'rgba(34,197,94,.06)',border:'1px solid rgba(34,197,94,.2)',borderRadius:12,padding:12,fontSize:12,color:'#86efac',marginBottom:16}}>
            ✍️ Faites signer le client sur l'écran pour valider la réception de la livraison.
          </div>
          <div className="field"><label>Nom du signataire</label><input value={nom} onChange={e=>setNom(e.target.value)} placeholder="Nom et prénom du client..."/></div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:10,fontWeight:900,color:'var(--muted)',textTransform:'uppercase',marginBottom:6}}>Zone de signature</div>
            <canvas ref={canvasRef} id="sig-canvas" style={{width:'100%',height:200,border:'2px solid var(--border)',borderRadius:12,background:'#071526',touchAction:'none',cursor:'crosshair'}}/>
          </div>
          <div style={{display:'flex',gap:8,marginBottom:16}}>
            <button onClick={effacer} className="btn-s" style={{flex:1}}>🗑️ Effacer</button>
          </div>
          <button className="btn-p" onClick={envoyer} disabled={!hasDrawn||sending}
            style={{opacity:!hasDrawn?.5:1}}>
            {sending?'Envoi...':'📤 Valider et envoyer'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════ CALENDRIER CONNECTÉ AU PLANNING ═══════════════════ */
function CalendarScreen({ch,planning,onBack,onNavigate}){
  const[month,setMonth]=useState(()=>{
    const d=new Date();return{year:d.getFullYear(),month:d.getMonth()};
  });
  const[selectedDate,setSelectedDate]=useState(null);
  const MOIS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const JOURS_COURTS=['L','M','M','J','V','S','D'];

  const missionDates=getAllMissionDates(planning,ch.id);
  const today=new Date().toISOString().slice(0,10);

  function getDays(){
    const first=new Date(month.year,month.month,1);
    const last=new Date(month.year,month.month+1,0);
    let dow=first.getDay();if(dow===0)dow=7;
    const days=[];
    for(let i=1;i<dow;i++) days.push(null);
    for(let d=1;d<=last.getDate();d++){
      const dt=new Date(month.year,month.month,d);
      days.push(dt.toISOString().slice(0,10));
    }
    return days;
  }

  const days=getDays();
  const selMs=selectedDate&&planning?getMissions(planning,ch.id,selectedDate):[];

  /* Les 7 prochains jours avec horaires */
  const JN=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const semaine=[];
  for(let i=0;i<7;i++){
    const d=new Date();d.setDate(d.getDate()+i);
    const ds=d.toISOString().slice(0,10);
    semaine.push({
      date:ds,
      jour:JN[d.getDay()],
      num:d.getDate(),
      horaires:horairesDu(planning,ch.id,ds),
      nb:planning?getMissions(planning,ch.id,ds).length:0,
      estAujourdhui:ds===today
    });
  }

  return(

/* ═══════════════════ HORS CARTE ═══════════════════ */
function HorsCarteScreen({ch,onBack}){

      if(rows?.length&&rows[0].donnees?.horsCarte) setItems(rows[0].donnees.horsCarte);
      else setItems([]);
    }catch(e){}
    setLoading(false);
  }
  useEffect(()=>{load();const iv=setInterval(load,15000);return()=>clearInterval(iv);},[]);

  async function sync(list){await sPost('planning',{date:'HORS_CARTE_SYNC',donnees:{horsCarte:list,updated_at:new Date().toISOString()},updated_at:new Date().toISOString()});}

/* ═══════════════════ SCORE ═══════════════════ */
function ScoreScreen({ch,planning,onBack}){
  const today=new Date().toISOString().slice(0,10);
  const ms=planning?getMissions(planning,ch.id,today):[];
  const done=ms.filter(m=>m._statut==='done').length;
  const pct=ms.length>0?Math.round(done/ms.length*100):100;
  const score=Math.min(100,Math.max(0,Math.round(pct*.6+40)));
  const col=score>=80?'#22c55e':score>=60?'#f59e0b':'#ef4444';
  const r=50,circ=2*Math.PI*r;
  return(<div className="screen"><Header title="⭐ Mon score" onBack={onBack}/>
  <div className="scroll"><div className="card" style={{margin:16,textAlign:'center'}}>
    <div style={{position:'relative',width:120,height:120,margin:'0 auto 14px'}}>
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r={r} fill="none" stroke="#1a3550" strokeWidth="10"/>
        <circle cx="60" cy="60" r={r} fill="none" stroke={col} strokeWidth="10" strokeDasharray={`${score/100*circ} ${circ}`} strokeLinecap="round" transform="rotate(-90 60 60)"/>
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
        <div style={{fontSize:28,fontWeight:900,color:col}}>{score}</div>
        <div style={{fontSize:10,color:'var(--muted)'}}>/ 100</div>
      </div>
    </div>
    <div style={{fontSize:16,fontWeight:800,color:col}}>{score>=90?'Excellent 🏆':score>=80?'Très bien ⭐':score>=70?'Bien 👍':score>=60?'Correct':'À améliorer 💪'}</div>
    <div style={{fontSize:12,color:'var(--muted)',marginTop:4}}>{done}/{ms.length} missions · {new Date().toLocaleDateString('fr-FR')}</div>
  </div></div></div>);
}

      setSent(true);showToast('🏁 Journée clôturée !','var(--green)');
    }catch(e){showToast('Erreur','var(--red)');}
    setSending(false);
  }
  if(sent) return(<div className="screen"><Header title="🏁 Clôturé" onBack={onBack}/><div className="scroll" style={{textAlign:'center',paddingTop:60}}><div style={{fontSize:72}}>🏁</div><div style={{fontSize:20,fontWeight:900,color:'#fff',marginTop:16}}>Bonne fin de journée !</div><div style={{fontSize:13,color:'#22c55e',marginTop:8}}>{count}/{items.length} points</div></div></div>);
  return(<div className="screen"><Header title="✅ Fin de journée" onBack={onBack}/>
  <div className="scroll"><div style={{padding:'12px 16px'}}>
    <div className="card" style={{margin:'0 0 14px'}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}><div style={{fontWeight:800}}>Progression</div><div style={{fontWeight:900,color:reqOk?'#22c55e':'#f97316'}}>{count}/{items.length}</div></div>
      <div style={{background:'var(--bg)',borderRadius:4,height:8}}><div style={{width:`${count/items.length*100}%`,height:8,borderRadius:4,background:reqOk?'#22c55e':'#f97316',transition:'.3s'}}/></div>
    </div>
    {items.map(item=><div key={item.id} className={`chk-item ${checked[item.id]?'on':''}`} onClick={()=>setChecked(c=>({...c,[item.id]:!c[item.id]}))}>

      <div className="chk-box">{checked[item.id]&&'✓'}</div>

/* ═══════════════════ HISTORIQUE ═══════════════════ */
function HistoriqueScreen({ch,onBack}){
  const[data,setData]=useState([]);const[loading,setLoading]=useState(true);const[weekOff,setWeekOff]=useState(0);
  function getWeekDays(off){const now=new Date();const d=now.getDay();const mon=new Date(now);mon.setDate(now.getDate()-(d===0?6:d-1)+off*7);mon.setHours(0,0,0,0);return Array.from({length:7},(_,i)=>{const dd=new Date(mon);dd.setDate(mon.getDate()+i);return dd.toISOString().slice(0,10);});}
  const days=getWeekDays(weekOff);const JOURS=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  useEffect(()=>{setLoading(true);Promise.all([sGet('planning?date=like.STATUT_*&select=donnees,updated_at&order=updated_at.desc&limit=200'),sGet('planning?date=like.INC_*&select=donnees,updated_at&order=updated_at.desc&limit=200'),sGet('planning?date=like.BILAN_*&select=donnees,date,updated_at&order=updated_at.desc&limit=200')]).then(([d1,d2,d3])=>{const all=[...(Array.isArray(d1)?d1:[]).map(r=>r.donnees).filter(d=>d&&d._isEvent&&String(d.chauffeurId)===String(ch.id)),...(Array.isArray(d2)?d2:[]).map(r=>r.donnees).filter(d=>d&&d._isEvent&&String(d.chauffeurId)===String(ch.id)),...(Array.isArray(d3)?d3:[]).map(r=>r.donnees).filter(d=>d&&d._isEvent&&String(d.chauffeurId)===String(ch.id))];setData(all);setLoading(false);}).catch(()=>setLoading(false));},[weekOff,ch.id]);
  const weekLabel=`${new Date(days[0]).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})} → ${new Date(days[6]).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}`;
  return(<div className="screen"><Header title="📅 Historique" onBack={onBack}/>
  <div className="scroll"><div style={{padding:'12px 16px'}}>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,padding:'10px 14px',marginBottom:14}}>
      <button onClick={()=>setWeekOff(w=>w-1)} style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,color:'#fff',padding:'6px 12px',cursor:'pointer',fontWeight:700,fontFamily:'inherit'}}>←</button>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:13,fontWeight:800,color:'#fff'}}>{weekLabel}</div>
        {weekOff===0&&<div style={{fontSize:10,color:'var(--orange)',fontWeight:700}}>Semaine actuelle</div>}
      </div>
      <button onClick={()=>setWeekOff(w=>w+1)} disabled={weekOff>=0} style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,color:weekOff>=0?'#334155':'#fff',padding:'6px 12px',cursor:weekOff>=0?'not-allowed':'pointer',fontWeight:700,fontFamily:'inherit'}}>→</button>
    </div>
    {loading&&<div style={{textAlign:'center',padding:24,color:'var(--muted)'}}>Chargement...</div>}
    {!loading&&days.map((date,i)=>{
      const dd=data.filter(d=>d.date===date||(d.ts&&d.ts.startsWith(date)));
      const incidents=dd.filter(d=>d.type==='incident');
      const bilan=dd.find(d=>d.type==='bilan_journee');
      const isToday=date===new Date().toISOString().slice(0,10);
      const isPast=date<new Date().toISOString().slice(0,10);
      return(<div key={date} style={{background:'var(--card)',border:`1px solid ${isToday?'var(--orange)':'var(--border)'}`,borderRadius:14,marginBottom:10,overflow:'hidden'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:isToday?'rgba(249,115,22,.06)':'transparent'}}>
          <div style={{fontWeight:900,fontSize:13,color:isToday?'var(--orange)':'#fff',width:36}}>{JOURS[i]}</div>
          <div style={{fontSize:11,color:'var(--muted)',flex:1}}>{new Date(date+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'long'})}</div>
          <div style={{display:'flex',gap:5}}>
            {incidents.length>0&&<span style={{fontSize:10,fontWeight:800,color:'#ef4444',background:'rgba(239,68,68,.1)',padding:'2px 7px',borderRadius:6}}>⚠️ {incidents.length}</span>}
            {bilan&&<span style={{fontSize:10,fontWeight:800,color:'#6366f1',background:'rgba(99,102,241,.1)',padding:'2px 7px',borderRadius:6}}>📝</span>}
            {!dd.length&&<span style={{fontSize:10,color:'#334155'}}>{isPast?'—':'·'}</span>}
          </div>
        </div>
        {bilan&&<div style={{padding:'8px 14px 10px',borderTop:'1px solid var(--border)',display:'flex',gap:8}}>
          {[{l:'Missions',v:`${bilan.missionsDone||0}/${bilan.missionsTotal||0}`,c:'#22c55e'},{l:'Km',v:bilan.km||0,c:'#3b82f6'},{l:'Carb.',v:`${bilan.carburant||0}L`,c:'#f97316'}].map(k=><div key={k.l} style={{background:'var(--bg)',borderRadius:8,padding:'5px 10px',flex:1,textAlign:'center'}}><div style={{fontSize:13,fontWeight:900,color:k.c}}>{k.v}</div><div style={{fontSize:9,color:'var(--muted)'}}>{k.l}</div></div>)}
          {bilan.humeur&&<div style={{fontSize:22,display:'flex',alignItems:'center'}}>{bilan.humeur}</div>}
        </div>}
      </div>);
    })}
  </div></div></div>);
}

/* ═══════════════════ MES PREUVES ═══════════════════ */
function PreuvesScreen({ch,onBack}){
  const[preuves,setPreuves]=useState([]);const[loading,setLoading]=useState(true);
  const today=new Date().toISOString().slice(0,10);
  useEffect(()=>{
    sGet('planning?date=like.EV_*&select=donnees,date&order=date.desc&limit=200').then(rows=>{
      const ev=(rows||[]).map(r=>r.donnees).filter(d=>d&&d._isEvent&&d.chauffeurId===ch.id&&d.date===today);
      setPreuves(ev);setLoading(false);
    });
  },[]);
  const photos=preuves.filter(e=>e.type==='photo');
  const sigs=preuves.filter(e=>e.type==='signature');
  const reprises=preuves.filter(e=>e.type==='reprise');
  return(<div className="screen"><Header title="📸 Mes preuves du jour" onBack={onBack}/>
  <div className="scroll">
    {loading&&<div style={{textAlign:'center',padding:24,color:'var(--muted)'}}>Chargement...</div>}
    {!loading&&preuves.length===0&&<div style={{textAlign:'center',padding:40,color:'var(--muted)'}}><div style={{fontSize:40,marginBottom:12}}>📸</div><div style={{fontWeight:700}}>Aucune preuve aujourd'hui</div></div>}
    {photos.length>0&&<div style={{padding:'12px 16px 4px'}}><div style={{fontSize:10,fontWeight:900,color:'var(--muted)',textTransform:'uppercase',marginBottom:10}}>📸 Photos ({photos.length})</div>
      {photos.map((p,i)=><div key={i} style={{background:'var(--card)',borderRadius:12,padding:14,marginBottom:10,border:'1px solid var(--border)'}}>
        {p.photo&&<img src={p.photo} style={{width:'100%',borderRadius:10,maxHeight:150,objectFit:'cover',marginBottom:8}} alt=""/>}
        <div style={{fontSize:12,fontWeight:800,color:'#fff'}}>{p.client}</div>
        {p.nb_bacs&&<div style={{fontSize:13,fontWeight:900,color:'var(--orange)',marginTop:4}}>🤖 {p.nb_bacs} bacs gastro détectés</div>}
        <div style={{fontSize:10,color:'var(--muted)',marginTop:3}}>{p.heure}</div>
      </div>)}
    </div>}
    {sigs.length>0&&<div style={{padding:'0 16px 4px'}}><div style={{fontSize:10,fontWeight:900,color:'var(--muted)',textTransform:'uppercase',marginBottom:10}}>✍️ Signatures ({sigs.length})</div>
      {sigs.map((s,i)=><div key={i} style={{background:'var(--card)',borderRadius:12,padding:14,marginBottom:10,border:'1px solid var(--border)'}}>
        {s.signature&&<img src={s.signature} style={{width:'100%',borderRadius:10,maxHeight:100,objectFit:'contain',background:'#071526',marginBottom:8}} alt=""/>}
        <div style={{fontSize:12,fontWeight:800,color:'#fff'}}>{s.client}</div>
        {s.signataire&&<div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>Par : {s.signataire}</div>}
      </div>)}
    </div>}
    {reprises.length>0&&<div style={{padding:'0 16px 4px'}}><div style={{fontSize:10,fontWeight:900,color:'var(--muted)',textTransform:'uppercase',marginBottom:10}}>📦 Reprises ({reprises.length})</div>
      {reprises.map((r,i)=><div key={i} style={{background:'var(--card)',borderRadius:12,padding:14,marginBottom:10,border:'1px solid rgba(245,158,11,.3)',borderLeft:'4px solid #f59e0b'}}>
        <div style={{fontSize:13,fontWeight:800,color:'#fff'}}>{r.article}</div>
        {r.quantite&&<div style={{fontSize:12,color:'#f59e0b'}}>Qté : {r.quantite}</div>}
        <div style={{fontSize:11,color:'var(--muted)',marginTop:3}}>Chez : {r.client} · {r.heure}</div>
      </div>)}
    </div>}
  </div></div>);
}

/* ═══════════════════ MESSAGES ═══════════════════ */
function MessagesScreen({ch,onBack}){
  const[msgs,setMsgs]=useState([]);const[text,setText]=useState('');const[loading,setLoading]=useState(true);
  async function load(){try{const rows=await sGet('planning?date=eq.MESSAGES&select=donnees&limit=1');if(rows?.length&&rows[0].donnees){const d=rows[0].donnees;const list=typeof d==='string'?JSON.parse(d):Array.isArray(d)?d:[];setMsgs(list.slice(-60));}}catch(e){}setLoading(false);}
  useEffect(()=>{load();const iv=setInterval(load,8000);return()=>clearInterval(iv);},[]);
  async function envoyer(){if(!text.trim())return;const msg={id:Date.now(),from:ch.id,fromName:ch.display,text:text.trim(),time:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),date:new Date().toISOString().slice(0,10)};const nl=[...msgs,msg];setText('');try{await sPost('planning',{date:'MESSAGES',donnees:JSON.stringify(nl),updated_at:new Date().toISOString()});setMsgs(nl);}catch(e){showToast('Erreur','var(--red)');}}
  return(<div className="screen"><Header title="💬 Messages" onBack={onBack}/>
  <div className="scroll">
    {loading&&<div style={{textAlign:'center',padding:24,color:'var(--muted)'}}>Chargement...</div>}
    <div style={{padding:'8px 16px'}}>
      {msgs.map((m,i)=>{const mine=m.from===ch.id;return(<div key={i} style={{display:'flex',justifyContent:mine?'flex-end':'flex-start',marginBottom:10}}>
        <div style={{maxWidth:'75%',background:mine?ch.color+'22':'var(--card)',border:`1px solid ${mine?ch.color+'44':'var(--border)'}`,borderRadius:12,padding:'8px 12px'}}>
          {!mine&&<div style={{fontSize:10,fontWeight:800,color:'#64748b',marginBottom:3}}>{m.fromName||'Responsable'}</div>}
          <div style={{fontSize:13,color:'#fff'}}>{m.text}</div>
          <div style={{fontSize:10,color:'var(--muted)',marginTop:3,textAlign:mine?'right':'left'}}>{m.time}</div>
        </div>
      </div>);})}
    </div>
  </div>
  <div style={{padding:'10px 16px',background:'var(--card)',borderTop:'1px solid var(--border)',display:'flex',gap:8,flexShrink:0}}>
    <input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&envoyer()} placeholder="Message..." style={{flex:1,background:'var(--bg)',border:'1px solid var(--border)',borderRadius:10,color:'#fff',padding:'10px 12px',fontSize:13,outline:'none',fontFamily:'inherit'}}/>
    <button onClick={envoyer} style={{padding:'10px 16px',background:'var(--orange)',border:'none',borderRadius:10,color:'#fff',fontWeight:800,cursor:'pointer',fontFamily:'inherit'}}>→</button>
  </div></div>);
}

/* ═══════════════════ CONGÉS CHAUFFEUR ═══════════════════ */
function CongesScreen({ch,onBack}){
  const SUPA='https://lllzlidwtcjwsxbgkygn.supabase.co';
  const KEY='sb_publishable_3weqcRqeCv9lwclSAPC2rA_48OAwGcV';
  const[data,setData]=useState({periodes:[],solde:25,pris:0,demandes:[]});
  const[loading,setLoading]=useState(true);
  const[vue,setVue]=useState('calendrier');
  const[form,setForm]=useState({debut:'',fin:'',type:'conge',note:''});
  const[sending,setSending]=useState(false);
  const[sent,setSent]=useState(false);
  const annee=new Date().getFullYear();
  const today=new Date().toISOString().slice(0,10);

  const TYPES={
    conge:{label:'Congé payé',color:'#22c55e',icon:'🏖️'},
    sans_solde:{label:'Sans solde',color:'#f59e0b',icon:'📋'},
    maladie:{label:'Maladie',color:'#ef4444',icon:'🏥'},
    formation:{label:'Formation',color:'#3b82f6',icon:'📚'},
    rtt:{label:'RTT',color:'#a855f7',icon:'⏰'},
    absence:{label:'Absence',color:'#64748b',icon:'❌'},
  };

  const MOIS=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  const JOURS=['L','M','M','J','V','S','D'];

  function getClef(){
    return 'CONGES_'+annee+'_'+ch.id;
  }

  useEffect(()=>{
    const clef=getClef();
    sGet('planning?date=eq.'+clef+'&select=donnees&limit=1').then(rows=>{
      if(rows?.length&&rows[0].donnees) setData(rows[0].donnees);
      setLoading(false);
    }).catch(()=>setLoading(false));
    /* Polling notif validation */
    const iv=setInterval(()=>{
      sGet('planning?date=eq.CONGES_NOTIF_'+ch.id+'&select=donnees&limit=1').then(rows=>{
        if(rows?.length&&rows[0].donnees){
          const st=rows[0].donnees.statut;
          if(st==='valide') showToast('✅ Votre demande de congé a été validée !','var(--green)');
          else if(st==='refuse') showToast('❌ Votre demande a été refusée','var(--red)');
          /* Recharger les données */
          sGet('planning?date=eq.'+clef+'&select=donnees&limit=1').then(r=>{
            if(r?.length&&r[0].donnees) setData(r[0].donnees);
          });
        }
      });
    },15000);
    return()=>clearInterval(iv);
  },[]);

  function getCongeForDate(dateStr){
    return (data.periodes||[]).find(p=>dateStr>=p.debut&&dateStr<=p.fin)||null;
  }

  async function envoyerDemande(){
    if(!form.debut||!form.fin){showToast('Dates obligatoires','var(--red)');return;}
    if(form.fin<form.debut){showToast('La fin doit être après le début','var(--red)');return;}
    setSending(true);
    try{
      const clef=getClef();
      const newDemande={
        id:Date.now(),debut:form.debut,fin:form.fin,
        type:form.type,note:form.note,statut:'attente',
        chauffeur:ch.display,chauffeurId:ch.id,
        createdAt:new Date().toISOString()
      };
      const newData={...data,demandes:[...(data.demandes||[]),newDemande]};
      await sPost('planning',{date:clef,donnees:newData,updated_at:new Date().toISOString()});
      setData(newData);
      setSent(true);
      showToast('📨 Demande envoyée au responsable','var(--green)');
    }catch(e){showToast('Erreur','var(--red)');}
    setSending(false);
  }

  const restant=(data.solde||25)-(data.pris||0);
  const pct=Math.min(100,Math.round((data.pris||0)/(data.solde||25)*100));

  return(
    <div className="screen">
      <Header title="🏖️ Mes congés" onBack={onBack}/>
      <div className="scroll">
        {/* KPIs */}
        <div style={{display:'flex',gap:8,padding:'12px 16px 8px'}}>
          {[{v:restant,l:'Restants',c:'#22c55e'},{v:data.pris||0,l:'Pris',c:'#f97316'},{v:data.solde||25,l:'Solde',c:'#6366f1'}].map(k=>(
            <div key={k.l} style={{flex:1,background:'var(--card)',border:`1px solid ${k.c}33`,borderRadius:12,padding:'10px 8px',textAlign:'center'}}>
              <div style={{fontSize:22,fontWeight:900,color:k.c}}>{k.v}</div>
              <div style={{fontSize:9,color:'var(--muted)',textTransform:'uppercase'}}>{k.l}</div>
            </div>
          ))}
        </div>
        {/* Barre progression */}
        <div style={{padding:'0 16px 10px'}}>
          <div style={{background:'#1a3550',borderRadius:4,height:6}}>
            <div style={{width:pct+'%',height:6,borderRadius:4,background:pct>=90?'#ef4444':pct>=70?'#f59e0b':'#22c55e',transition:'.3s'}}/>
          </div>
          <div style={{fontSize:10,color:'var(--muted)',marginTop:3,textAlign:'right'}}>{data.pris||0}/{data.solde||25} jours utilisés</div>
        </div>
        {/* Onglets */}
        <div style={{display:'flex',gap:6,padding:'0 16px 12px'}}>
          {[['calendrier','📅 Calendrier'],['demande','➕ Demande'],['historique','📋 Historique']].map(t=>(
            <button key={t[0]} onClick={()=>{setVue(t[0]);setSent(false);}}
              style={{flex:1,padding:'8px 4px',background:vue===t[0]?'rgba(34,197,94,.2)':'var(--card)',border:`2px solid ${vue===t[0]?'#22c55e':'var(--border)'}`,borderRadius:8,color:vue===t[0]?'#22c55e':'var(--muted)',fontSize:10,fontWeight:800,cursor:'pointer',fontFamily:'inherit'}}>
              {t[1]}
            </button>
          ))}
        </div>

        {loading&&<div style={{textAlign:'center',padding:24,color:'var(--muted)'}}>Chargement...</div>}

        {/* VUE CALENDRIER */}
        {!loading&&vue==='calendrier'&&(
          <div style={{padding:'0 16px'}}>
            <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:10}}>
              {Array.from({length:12},(_,m)=>{
                const fd=new Date(annee,m,1),ld=new Date(annee,m+1,0);
                let dow=fd.getDay();if(dow===0)dow=7;
                const isCurr=m===new Date().getMonth();
                return(

                <div style={{fontSize:10,fontWeight:900,color:'var(--muted)',textTransform:'uppercase',marginBottom:8}}>Congés validés</div>

                  const tc=TYPES[p.type]||TYPES.conge;

                <div style={{fontSize:10,fontWeight:900,color:'#f59e0b',textTransform:'uppercase',margin:'12px 0 8px'}}>En attente de validation</div>
                {(data.demandes||[]).filter(d=>d.statut==='attente').map((d,i)=>(

        <div style={{height:20}}/>

    </div>
  );
