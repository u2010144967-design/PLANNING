<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Répartition — La Table de Cana</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07101e;--panel:#0d1b2e;--panel2:#112238;--border:#1a3550;
  --text:#e2e8f0;--sub:#607d9a;--sub2:#1e3a5f;
  --cana:#22c55e;--sadi:#0ea5e9;--warn:#f97316;--red:#ef4444;--purple:#a855f7;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ══ LOGIN ══ */
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-card{background:var(--panel);border:2px solid var(--border);border-radius:24px;padding:52px 44px;width:400px;text-align:center;box-shadow:0 40px 100px rgba(0,0,0,.7)}
.login-icon{font-size:60px;margin-bottom:16px}
.login-title{font-size:26px;font-weight:900;color:#fff;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--sub);margin-bottom:36px}
.login-choices{display:flex;gap:14px}
.lc-btn{flex:1;padding:18px 8px;border-radius:14px;border:2px solid transparent;font-size:13px;font-weight:800;cursor:pointer;transition:.2s;display:flex;flex-direction:column;align-items:center;gap:8px}
.lc-icon{font-size:32px}
.lc-log{background:rgba(249,115,22,.12);border-color:rgba(249,115,22,.25);color:var(--warn)}
.lc-log:hover{background:rgba(249,115,22,.22);border-color:var(--warn)}
.lc-cui{background:rgba(14,165,233,.12);border-color:rgba(14,165,233,.25);color:var(--sadi)}
.lc-cui:hover{background:rgba(14,165,233,.22);border-color:var(--sadi)}
.pw-zone{margin-top:20px;display:none;flex-direction:column;gap:10px}
.pw-input{width:100%;padding:13px 16px;background:#071526;border:1px solid var(--border);border-radius:10px;color:#fff;font-size:14px;outline:none}
.pw-input:focus{border-color:var(--warn)}
.pw-go{width:100%;padding:13px;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer}
.pw-go-log{background:linear-gradient(135deg,#f97316,#ea580c);color:#fff}
.pw-go-cui{background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff}
.pw-err{color:var(--red);font-size:12px;display:none}

/* ══ APP ══ */
#app{display:none;flex-direction:column;height:100vh}

/* ══ TOPBAR ══ */
.topbar{background:var(--panel);border-bottom:2px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.tb-logo{font-size:17px;font-weight:900;color:#fff}
.tb-logo span{color:var(--warn)}
.role-pill{font-size:10px;font-weight:800;padding:4px 12px;border-radius:20px;text-transform:uppercase}
.rp-log{background:rgba(249,115,22,.18);color:var(--warn);border:1px solid rgba(249,115,22,.3)}
.rp-cui{background:rgba(14,165,233,.18);color:var(--sadi);border:1px solid rgba(14,165,233,.3)}
.search-wrap{flex:1;max-width:320px;position:relative}
.search-input{width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:8px 12px 8px 34px;font-size:13px;outline:none}
.search-input:focus{border-color:var(--warn)}
.search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}
.search-drop{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--panel2);border:1px solid var(--border);border-radius:12px;z-index:500;display:none;box-shadow:0 16px 40px rgba(0,0,0,.5);overflow:hidden}
.sd-item{padding:11px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s}
.sd-item:last-child{border-bottom:none}
.sd-item:hover{background:var(--panel)}
.sd-name{font-size:13px;font-weight:700;flex:1}
.sd-badge{font-size:11px;font-weight:800;padding:3px 10px;border-radius:7px}
.sdb-cana{background:rgba(34,197,94,.15);color:var(--cana);border:1px solid rgba(34,197,94,.25)}
.sdb-sadi{background:rgba(14,165,233,.15);color:var(--sadi);border:1px solid rgba(14,165,233,.25)}
.sdb-none{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.tb-btn{background:var(--panel2);border:1px solid var(--border);border-radius:8px;color:var(--sub);padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;transition:.15s;white-space:nowrap}
.tb-btn:hover{background:var(--border);color:var(--text)}
#sync-led{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--sub);padding:5px 10px;background:var(--panel2);border:1px solid var(--border);border-radius:8px}

/* ══ WEEK BAR ══ */
.week-bar{background:var(--panel);border-bottom:2px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.wbn{background:var(--panel2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;transition:.15s}
.wbn:hover{background:var(--border)}
.wbn-lbl{font-size:14px;font-weight:800;color:#fff;min-width:200px;text-align:center}
.today-btn{background:rgba(249,115,22,.12);border:1px solid rgba(249,115,22,.3);border-radius:8px;color:var(--warn);padding:7px 14px;font-size:12px;font-weight:800;cursor:pointer}
.wb-right{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
.vac-btn{background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.2);border-radius:8px;color:var(--purple);padding:6px 14px;font-size:11px;font-weight:800;cursor:pointer}
.vac-btn.on{background:rgba(168,85,247,.25);border-color:var(--purple)}
.dup-btn{background:rgba(14,165,233,.1);border:1px solid rgba(14,165,233,.2);border-radius:8px;color:var(--sadi);padding:6px 14px;font-size:11px;font-weight:800;cursor:pointer}

/* ══ DAY TABS ══ */
.day-tabs{display:flex;background:var(--panel2);border-bottom:2px solid var(--border);flex-shrink:0;overflow-x:auto}
.dt{flex:1;padding:10px 6px;text-align:center;cursor:pointer;border-bottom:3px solid transparent;transition:.15s;min-width:80px}
.dt:hover{background:var(--panel)}
.dt.active{border-bottom-color:var(--warn);background:var(--panel)}
.dt-day{font-size:10px;font-weight:800;text-transform:uppercase;color:var(--sub);margin-bottom:3px}
.dt-date{font-size:12px;font-weight:700}
.dt-dot{width:7px;height:7px;border-radius:50%;margin:4px auto 0}
.dt.active .dt-day,.dt.active .dt-date{color:var(--warn)}
.dt.today-tab .dt-date{color:var(--warn)}

/* ══ DAY VIEW ══ */
#view-day{display:flex;flex-direction:column;flex:1;overflow:hidden}
.day-top{padding:10px 20px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0}
.day-title{font-size:15px;font-weight:900;color:#fff}
.note-inp{flex:1;min-width:160px;background:var(--panel);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 12px;font-size:12px;outline:none}
.note-inp:focus{border-color:var(--sadi)}
.na-pill{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:8px;color:var(--red);padding:5px 12px;font-size:11px;font-weight:800}

/* ══ COLONNES ══ */
.cols{display:grid;grid-template-columns:1fr 1fr;flex:1;overflow:hidden}
.site-col{display:flex;flex-direction:column;border-right:2px solid var(--border);overflow:hidden}
.site-col:last-child{border-right:none}
.site-head{padding:14px 16px;border-bottom:2px solid var(--border);flex-shrink:0}
.sh-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sh-name{font-size:15px;font-weight:900;display:flex;align-items:center;gap:8px}
.sh-cnt{font-size:11px;font-weight:800;padding:3px 10px;border-radius:10px}
.sh-cana .sh-name{color:var(--cana)}
.sh-cana .sh-cnt{background:rgba(34,197,94,.12);color:var(--cana);border:1px solid rgba(34,197,94,.2)}
.sh-cana{background:rgba(34,197,94,.03)}
.sh-sadi .sh-name{color:var(--sadi)}
.sh-sadi .sh-cnt{background:rgba(14,165,233,.12);color:var(--sadi);border:1px solid rgba(14,165,233,.2)}
.sh-sadi{background:rgba(14,165,233,.03)}
.charge-bar{height:4px;border-radius:2px;transition:.3s}
.col-body{overflow-y:auto;flex:1;padding:8px 10px}

/* ══ SECTION CATÉGORIE ══ */
.cat-section{margin-bottom:6px}
.cat-head{display:flex;align-items:center;gap:8px;padding:8px 6px 4px;cursor:pointer;user-select:none}
.cat-ico{font-size:16px}
.cat-name{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:var(--sub)}
.cat-cnt{font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px;background:var(--sub2);color:var(--sub)}
.cat-toggle{font-size:10px;color:var(--sub2);margin-left:auto}
.cat-body{display:flex;flex-direction:column;gap:3px}

/* ══ CLIENT CARD ══ */
.cli{display:flex;align-items:center;border-radius:9px;border:1px solid transparent;overflow:hidden;transition:.15s}
.cli-dot{width:5px;align-self:stretch;flex-shrink:0}
.dot-c{background:var(--cana)}
.dot-s{background:var(--sadi)}
.dot-e{background:var(--sub2)}
.cli-name{flex:1;font-size:12px;font-weight:700;color:var(--text);padding:9px 10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cli-btns{display:flex;gap:3px;padding:4px 6px;flex-shrink:0}
.cb{padding:4px 10px;border-radius:6px;font-size:10px;font-weight:800;cursor:pointer;border:none;transition:.15s}
.cb-c{background:rgba(34,197,94,.12);color:var(--cana)}
.cb-c:hover,.cb-c.on{background:rgba(34,197,94,.25);box-shadow:0 0 0 1.5px var(--cana)}
.cb-s{background:rgba(14,165,233,.12);color:var(--sadi)}
.cb-s:hover,.cb-s.on{background:rgba(14,165,233,.25);box-shadow:0 0 0 1.5px var(--sadi)}
.cb-x{background:rgba(239,68,68,.08);color:var(--red);font-size:11px;padding:4px 7px}
.cb-x:hover{background:rgba(239,68,68,.18)}
.cli-empty{background:var(--panel);border-color:var(--border)}

/* ═══ 7 TOURNÉES CSS ═══ */
.groupes-wrap{display:flex;flex-direction:column;flex:1;overflow-y:auto;gap:0}
.groupe-section{border-bottom:2px solid var(--border)}
.groupe-head{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;background:var(--panel);user-select:none}
.groupe-head:hover{background:var(--panel2)}
.groupe-label{font-size:13px;font-weight:900;flex:1}
.groupe-desc{font-size:10px;opacity:.65}
.groupe-cnt{font-size:10px;font-weight:800;padding:2px 8px;border-radius:8px;opacity:.85}
.tournees-row{display:flex;gap:0;overflow-x:auto;min-height:180px}
.tournee-col{display:flex;flex-direction:column;min-width:200px;flex:1;border-right:1px solid var(--border)}
.tournee-col:last-child{border-right:none}
.tournee-head{padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0;position:relative}
.tournee-nom{font-size:12px;font-weight:900;margin-bottom:2px}
.tournee-camion{font-size:10px;opacity:.6}
.tournee-cnt{font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px;margin-top:4px;display:inline-block}
.tournee-body{overflow-y:auto;padding:6px;flex:1;min-height:120px}
.tournee-body.drop-target{background:rgba(255,255,255,.05);outline:2px dashed rgba(255,255,255,.2)}

/* Carte client dans tournée */
.tc-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:5px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:.12s}
.tc-card:hover{transform:translateX(2px)}
.tc-card:active{transform:scale(.97)}
.tc-name{flex:1;font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tc-ico{font-size:14px;flex-shrink:0}
.tc-remove{font-size:14px;opacity:.4;cursor:pointer;padding:2px 4px;border-radius:4px;flex-shrink:0}
.tc-remove:hover{opacity:1;background:rgba(239,68,68,.15);color:#ef4444}

/* Non affectés en bas */
.na-zone{border-top:2px solid var(--border);flex-shrink:0}

/* Boutons rapides basculement */
.bascule-btns{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
.bb{font-size:9px;font-weight:800;padding:3px 7px;border-radius:5px;border:none;cursor:pointer;transition:.12s}
.bb:hover{filter:brightness(1.2)}
.bb.active{outline:2px solid white}

/* Stats en haut */
.stats-bar{display:flex;gap:8px;padding:8px 14px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.stat-chip{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700}
.cli-cana{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.15)}
.cli-sadi{background:rgba(14,165,233,.08);border-color:rgba(14,165,233,.15)}
.prod-btn{padding:3px 8px;border-radius:5px;font-size:9px;font-weight:800;cursor:pointer;border:none}
.p0{background:rgba(239,68,68,.1);color:var(--red)}
.p1{background:rgba(249,115,22,.12);color:var(--warn)}
.p2{background:rgba(34,197,94,.12);color:var(--cana)}
.readonly .cli-btns{display:none}
.readonly .cli{cursor:default}

/* ══ NON AFFECTÉS ══ */
.na-zone{background:rgba(239,68,68,.04);border-top:2px solid rgba(239,68,68,.15);flex-shrink:0}
.na-head{padding:8px 16px;display:flex;align-items:center;gap:8px;cursor:pointer}
.na-ttl{font-size:11px;font-weight:800;color:var(--red);text-transform:uppercase}
.na-cnt-badge{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.25);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:800}
.na-body{padding:6px 12px 8px;display:flex;flex-wrap:wrap;gap:5px;max-height:90px;overflow-y:auto}
.na-chip{display:inline-flex;align-items:center;gap:5px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15);border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;color:var(--red);cursor:pointer;transition:.15s}
.na-chip:hover{background:rgba(239,68,68,.15)}

/* ══ MODAL ══ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:8000;display:none;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal-box{background:var(--panel);border:2px solid var(--border);border-radius:20px;padding:28px;width:460px;max-width:96vw;max-height:90vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:900;color:#fff;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.mc-close{background:var(--panel2);border:1px solid var(--border);border-radius:8px;color:var(--sub);padding:5px 12px;font-size:13px;cursor:pointer}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.field label{font-size:10px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.05em}
.field input,.field select,.field textarea{background:#071526;border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 12px;font-size:13px;outline:none;width:100%;transition:.2s;font-family:inherit}
.field input:focus,.field select:focus{border-color:var(--warn)}
.mbtns{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
.mbtn{padding:10px 22px;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;border:none}
.mbtn-ok{background:var(--warn);color:#fff}
.mbtn-cancel{background:var(--panel2);color:var(--sub);border:1px solid var(--border)}
.mbtn-del{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.25)}

/* ══ TOAST ══ */
.toast{position:fixed;bottom:24px;right:24px;background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:12px 20px;font-size:13px;font-weight:700;color:#fff;z-index:9999;transform:translateY(80px);opacity:0;transition:.3s;pointer-events:none;max-width:280px}
.toast.show{transform:translateY(0);opacity:1}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

@media(max-width:640px){
  .cols{grid-template-columns:1fr;grid-template-rows:1fr 1fr}
  .site-col{border-right:none;border-bottom:2px solid var(--border)}
}

/* ══ HORS CARTE ══ */
.hc-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px}
.hc-box{background:#0d1b2e;border:2px solid #f97316;border-radius:20px;padding:24px;width:100%;max-width:640px;max-height:90vh;display:flex;flex-direction:column;gap:14px;overflow:hidden}
.hc-header{display:flex;align-items:center;justify-content:space-between}
.hc-title{font-size:18px;font-weight:900;color:#fff}
.hc-tabs{display:flex;gap:8px}
.hc-tab{padding:6px 14px;border-radius:8px;border:1px solid #1a3550;background:#071526;color:#64748b;font-size:12px;font-weight:800;cursor:pointer;transition:.15s}
.hc-tab.on{background:rgba(249,115,22,.15);border-color:rgba(249,115,22,.4);color:#f97316}
.hc-list{overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:8px}
.hc-item{background:#071526;border-radius:12px;padding:14px;border-left:4px solid #f97316;display:flex;gap:12px;align-items:start}
.hc-item.done{border-left-color:#22c55e;opacity:.7}
.hc-item.urgent{border-left-color:#ef4444;background:rgba(239,68,68,.05)}
.hc-form{background:#071526;border-radius:12px;padding:16px;border:1px dashed rgba(249,115,22,.4)}
.hc-field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.hc-field label{font-size:10px;font-weight:900;color:#64748b;text-transform:uppercase;letter-spacing:.06em}
.hc-field input,.hc-field select,.hc-field textarea{background:#0a1628;border:1px solid #1a3550;border-radius:8px;color:#fff;padding:10px 12px;font-size:13px;outline:none;width:100%;box-sizing:border-box;font-family:inherit}
.hc-field input:focus,.hc-field select:focus{border-color:#f97316}
.hc-btn-send{width:100%;padding:13px;background:#f97316;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:900;cursor:pointer}
.hc-btn-send:hover{background:#ea580c}
.hc-stat{font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;border:1px solid;display:inline-block}
.hc-stat-wait{background:rgba(239,68,68,.1);color:#ef4444;border-color:rgba(239,68,68,.3)}
.hc-stat-prog{background:rgba(245,158,11,.1);color:#f59e0b;border-color:rgba(245,158,11,.3)}
.hc-stat-done{background:rgba(34,197,94,.1);color:#22c55e;border-color:rgba(34,197,94,.3)}

</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div class="login-icon">🍽️</div>
    <div class="login-title">La Table de Cana</div>
    <div class="login-sub">Répartition des livraisons</div>
    <div class="login-choices">
      <button class="lc-btn lc-log" onclick="showPw('log')"><span class="lc-icon">🚚</span>Logistique</button>
      <button class="lc-btn lc-cui" onclick="showPw('cui')"><span class="lc-icon">👨‍🍳</span>Cuisine</button>
    </div>
    <div class="pw-zone" id="pw-zone">
      <input class="pw-input" type="password" id="pw-input" placeholder="Mot de passe...">
      <button class="pw-go" id="pw-go" onclick="doLogin()">Connexion</button>
      <div class="pw-err" id="pw-err">⚠️ Mot de passe incorrect</div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="tb-logo">🍽️ <span>Cana</span></div>
    <span class="role-pill" id="role-pill"></span>
    <div class="search-wrap">
      <span class="search-ico">🔍</span>
      <input class="search-input" id="srch" placeholder="Rechercher un client..." oninput="doSearch(this.value)" autocomplete="off">
      <div class="search-drop" id="srch-drop"></div>
    </div>
    <div class="tb-right">

/* ══ ÉTAT ══ */
var S={
  role:null,weekOffset:0,dayIdx:0,vacances:false,naOpen:true,
  data:{},notes:{},prod:{},clients:{}
};
var loginRole=null;
var editClientId=null;

/* ══ UTILITAIRES ══ */
function getMonday(off){
  var d=new Date();var day=d.getDay();
  d.setDate(d.getDate()+(day===0?-6:1-day)+off*7);
  d.setHours(0,0,0,0);return d;
}
function weekKey(mon){
  var y=mon.getFullYear();var s=new Date(y,0,1);
  var w=Math.ceil(((mon-s)/864e5+s.getDay()+1)/7);
  return y+'-W'+(w<10?'0':'')+w;
}
function getDays(mon){var a=[];for(var i=0;i<7;i++){var d=new Date(mon);d.setDate(mon.getDate()+i);a.push(d);}return a;}
function fmtD(d){return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});}
function isLog(){return S.role==='log';}
function toast(msg,col){
  var t=document.getElementById('toast');t.textContent=msg;
  t.style.borderColor=col||'var(--warn)';t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2400);
}
function setLed(state,msg){
  var dot=document.getElementById('led-dot');var txt=document.getElementById('led-txt');
  if(!dot||!txt) return;
  dot.style.background={ok:'#22c55e',err:'#ef4444',sync:'#f97316',off:'#334155'}[state]||'#334155';
  txt.textContent=msg||'';
}

/* ══ CLIENTS ══ */
function initClients(){
  if(Object.keys(S.clients).length>0) return;
  CLIENTS_INIT.forEach(function(c){S.clients[c.id]=JSON.parse(JSON.stringify(c));});
}
function getActiveClients(){
  return Object.values(S.clients).filter(function(c){return !(S.vacances&&c.cat==='cae');});
}
function getClientsBycat(cat){
  return getActiveClients().filter(function(c){return c.cat===cat;});
}

/* ══ PERSISTANCE ══ */
function load(){
  try{var d=localStorage.getItem('rep_cana_v4');if(d){var p=JSON.parse(d);
    S.data=p.data||{};S.notes=p.notes||{};S.prod=p.prod||{};
    S.clients=p.clients||{};S.vacances=!!p.vacances;
  }}catch(e){}initClients();
}
function save(){
  try{localStorage.setItem('rep_cana_v4',JSON.stringify({
    data:S.data,notes:S.notes,prod:S.prod,clients:S.clients,vacances:S.vacances
  }));}catch(e){}
  if(typeof scheduleCloudSave==='function') scheduleCloudSave();
}

/* ══ GETTERS ══ */
function getVal(wk,id,j){return(S.data[wk]&&S.data[wk][id+'__'+j])||'';}
function setVal(wk,id,j,v){if(!S.data[wk])S.data[wk]={};S.data[wk][id+'__'+j]=v;save();}
function getNote(wk,j){return S.notes[wk+'__'+j]||'';}
function setNote(wk,j,t){S.notes[wk+'__'+j]=t;save();}
function getProd(wk,j,id){return S.prod[wk+'__'+j+'__'+id]||0;}
function setProd(wk,j,id,v){S.prod[wk+'__'+j+'__'+id]=v;save();}

/* ══ LOGIN ══ */
function showPw(role){
  loginRole=role;
  var z=document.getElementById('pw-zone');z.style.display='flex';
  var b=document.getElementById('pw-go');
  b.className='pw-go pw-go-'+(role==='log'?'log':'cui');
  b.textContent=role==='log'?'Connexion Logistique':'Connexion Cuisine';
  document.getElementById('pw-input').value='';
  document.getElementById('pw-err').style.display='none';
  document.getElementById('pw-input').focus();
}
function doLogin(){
  var pw=document.getElementById('pw-input').value;
  if(pw!==PW[loginRole]){
    document.getElementById('pw-err').style.display='block';
    document.getElementById('pw-input').value='';return;
  }
  S.role=loginRole;
  document.getElementById('pw-go').textContent='Connexion...';
  document.getElementById('pw-go').disabled=true;
  load();
  if(typeof loadCloud==='function'){
    loadCloud(function(){initClients();launchApp();});
  } else {initClients();launchApp();}
}
function launchApp(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('app').style.flexDirection='column';
  var p=document.getElementById('role-pill');
  p.textContent=S.role==='log'?'🚚 Logistique':'👨‍🍳 Cuisine';
  p.className='role-pill '+(S.role==='log'?'rp-log':'rp-cui');
  document.getElementById('btn-add-cli').style.display=isLog()?'block':'none';
  S.dayIdx=new Date().getDay()===0?6:Math.max(0,new Date().getDay()-1);
  if(typeof startPoll==='function') startPoll();
  renderWeek();
}
function logout(){
  S.role=null;
  document.getElementById('login').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('pw-zone').style.display='none';
  document.getElementById('pw-go').disabled=false;
}

/* ══ NAVIGATION ══ */
function navWeek(d){S.weekOffset+=d;renderWeek();}
function goToday(){S.weekOffset=0;S.dayIdx=new Date().getDay()===0?6:Math.max(0,new Date().getDay()-1);renderWeek();}
function toggleVac(){if(!isLog()){toast('Logistique requis','var(--red)');return;}S.vacances=!S.vacances;save();renderWeek();toast(S.vacances?'🌴 Vacances — Centres Aérés masqués':'Mode normal rétabli');}
function dupliquer(){
  if(!isLog()){toast('Logistique requis','var(--red)');return;}
  var mon=getMonday(S.weekOffset);var wk=weekKey(mon);
  var nwk=weekKey(getMonday(S.weekOffset+1));
  S.data[nwk]=JSON.parse(JSON.stringify(S.data[wk]||{}));
  save();toast('✅ Semaine dupliquée → semaine suivante');
}

/* ══ RECHERCHE ══ */
function doSearch(q){
  var drop=document.getElementById('srch-drop');
  if(!q||q.length<2){drop.style.display='none';return;}
  var mon=getMonday(S.weekOffset);var wk=weekKey(mon);var j=S.dayIdx;
  var hits=Object.values(S.clients).filter(function(c){return c.nom.toLowerCase().includes(q.toLowerCase());}).slice(0,8);
  if(!hits.length){drop.style.display='none';return;}
  drop.innerHTML=hits.map(function(c){
    var v=getVal(wk,c.id,j);
    var lbl=v==='cana'?'✅ CANA':v==='sadi'?'🔵 SADI':'Non affecté';
    var cls=v==='cana'?'sdb-cana':v==='sadi'?'sdb-sadi':'sdb-none';
    var cat=CATS[c.cat]||{icon:'',label:''};
    return '<div class="sd-item" onclick="goCli(\''+c.id+'\')">'+
      '<span style="font-size:14px">'+cat.icon+'</span>'+
      '<div class="sd-name">'+c.nom+'</div>'+
      '<span class="sd-badge '+cls+'">'+lbl+'</span></div>';
  }).join('');
  drop.style.display='block';
}
function goCli(id){
  document.getElementById('srch-drop').style.display='none';
  document.getElementById('srch').value='';
  setTimeout(function(){
    var el=document.getElementById('cli-card-'+id);
    if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.outline='2px solid var(--warn)';setTimeout(function(){el.style.outline='';},2000);}
  },200);
}
document.addEventListener('click',function(e){if(!e.target.closest('.search-wrap')) document.getElementById('srch-drop').style.display='none';});

/* ══ RENDER SEMAINE ══ */
function renderWeek(){
  var mon=getMonday(S.weekOffset);var days=getDays(mon);var wk=weekKey(mon);
  var todayReal=new Date();todayReal.setHours(0,0,0,0);
  var wn=wk.split('-W')[1];
  document.getElementById('wbn-lbl').textContent='Semaine '+wn+' · '+fmtD(days[0])+' → '+fmtD(days[6]);
  document.getElementById('vac-btn').classList.toggle('on',S.vacances);

  var tabs=document.getElementById('day-tabs');tabs.innerHTML='';
  days.forEach(function(d,i){
    var isT=d.getTime()===todayReal.getTime();var isA=i===S.dayIdx;
    var ac=getActiveClients();var nc=0,ns=0;
    ac.forEach(function(c){var v=getVal(wk,c.id,i);if(v==='cana')nc++;if(v==='sadi')ns++;});
    var nv=ac.length-nc-ns;
    var dotCol=nv===0&&(nc+ns)>0?'var(--cana)':nv>0&&(nc+ns)>0?'var(--warn)':'var(--sub2)';
    var div=document.createElement('div');
    div.className='dt'+(isA?' active':'')+(isT?' today-tab':'');
    div.innerHTML='<div class="dt-day">'+JOURS[i].slice(0,3)+'</div>'+
      '<div class="dt-date">'+fmtD(d)+'</div>'+
      '<div class="dt-dot" style="background:'+dotCol+'"></div>';
    div.onclick=(function(idx){return function(){S.dayIdx=idx;renderWeek();};})(i);
    tabs.appendChild(div);
  });
  renderDay();
}

/* ══ RENDER JOUR ══ */
function renderDay(){
  var mon=getMonday(S.weekOffset);var days=getDays(mon);var wk=weekKey(mon);
  var j=S.dayIdx;var ac=getActiveClients();
  document.getElementById('day-title').textContent=JOURS[j]+' '+fmtD(days[j])+' '+days[j].getFullYear();
  document.getElementById('day-note').value=getNote(wk,j);
  document.getElementById('day-note').disabled=!isLog();

  /* ── Répartir les clients dans les 7 tournées ── */
  var parTournee={};
  var na=[];
  TOURNEES.forEach(function(t){parTournee[t.id]=[];});
  ac.forEach(function(cli){
    var v=getVal(wk,cli.id,j);
    if(parTournee[v]) parTournee[v].push(cli);
    else na.push(cli);
  });

  var nv=na.length;
  /* Pill non affectés */
  var pill=document.getElementById('na-pill');
  if(pill){
    if(nv>0){pill.style.display='block';pill.textContent='⚠️ '+nv+' non affecté'+(nv>1?'s':'')}
    else pill.style.display='none';
  }

  /* ── Rendu grille 7 tournées ── */
  var grid=document.getElementById('tournees-grid');
  if(!grid)return;
  grid.innerHTML='';

  /* Stats globales */
  var statsBar=document.createElement('div');
  statsBar.className='stats-bar';
  var totalAff=ac.length-nv;
  statsBar.innerHTML=

    '<span class="stat-chip" style="color:#a855f7">📅 '+JOURS[j]+'</span>';
  /* Bouton tout affecter par défaut */
  if(nv>0&&isLog()){
    var btnAll=document.createElement('button');
    btnAll.style.cssText='background:rgba(249,115,22,.15);border:1px solid rgba(249,115,22,.3);border-radius:8px;color:#f97316;font-size:11px;font-weight:800;padding:4px 12px;cursor:pointer;margin-left:auto';
    btnAll.textContent='⚡ Affecter tout selon défauts';
    btnAll.onclick=function(){
      ac.forEach(function(cli){
        if(!getVal(wk,cli.id,j)&&cli.def){setVal(wk,cli.id,j,cli.def);}
      });
      renderDay();toast('✅ Clients affectés selon leurs défauts');
    };
    statsBar.appendChild(btnAll);
  }
  grid.appendChild(statsBar);

  /* ── Groupes ── */
  var groupeKeys=['collectivite','centres_aeres','traiteur'];

    var groupe=GROUPES[gk];
    var tourneesGroupe=TOURNEES.filter(function(t){return t.groupe===gk;});

    var section=document.createElement('div');
    section.className='groupe-section';
    section.style.flex='1';
    section.style.display='flex';
    section.style.flexDirection='column';
    section.style.minHeight='0';

    /* Header groupe */
    var gHead=document.createElement('div');
    gHead.className='groupe-head';
    gHead.style.borderLeft='4px solid '+groupe.couleur;
    gHead.innerHTML=
      '<span style="font-size:18px">'+tourneesGroupe.map(function(t){return t.icone;}).join('')+'</span>'+
      '<div style="flex:1"><div class="groupe-label" style="color:'+groupe.couleur+'">'+groupe.label+'</div>'+
      '<div class="groupe-desc">'+groupe.desc+'</div></div>'+
      '<span class="groupe-cnt" style="background:'+groupe.couleur+'18;color:'+groupe.couleur+';border:1px solid '+groupe.couleur+'33">'+totalGroupe+' clients</span>';
    section.appendChild(gHead);

    /* Rangée des tournées */
    var row=document.createElement('div');
    row.className='tournees-row';
    row.style.flex='1';
    row.style.overflow='auto';

    tourneesGroupe.forEach(function(tournee){
      var clients=parTournee[tournee.id];
      var col=document.createElement('div');
      col.className='tournee-col';
      col.style.borderLeft='3px solid '+tournee.couleur+'44';

      /* Header tournée */
      var tHead=document.createElement('div');
      tHead.className='tournee-head';
      tHead.style.borderLeft='4px solid '+tournee.couleur;
      tHead.style.background=tournee.bg;
      tHead.innerHTML=
        '<div class="tournee-nom" style="color:'+tournee.couleur+'">'+tournee.icone+' '+tournee.prenom+'</div>'+
        '<div class="tournee-camion">🚛 '+tournee.camion+'</div>'+
        '<span class="tournee-cnt" style="background:'+tournee.bg+';color:'+tournee.couleur+';border:1px solid '+tournee.border+'">'+clients.length+' client'+(clients.length!==1?'s':'')+'</span>';
      col.appendChild(tHead);

      /* Corps */
      var body=document.createElement('div');
      body.className='tournee-body';

      if(!clients.length){
        body.innerHTML='<div style="text-align:center;padding:20px 8px;color:var(--sub2);font-size:11px">Aucun client</div>';
      } else {
        clients.forEach(function(cli){
          var card=document.createElement('div');
          card.className='tc-card';
          card.style.borderLeft='3px solid '+tournee.couleur;
          var catInfo=CATS[cli.cat]||{icon:'',label:''};
          card.innerHTML=
            '<span class="tc-ico">'+catInfo.icon+'</span>'+
            '<span class="tc-name" title="'+cli.nom+'">'+cli.nom+'</span>'+
            (isLog()?'<span class="tc-remove" onclick="event.stopPropagation();setVal(\''+wk+'\',\''+cli.id+'\','+j+',\'\');renderDay();toast(\'✅ '+cli.nom.replace(/'/g,'')+' retiré\');" title="Retirer">✕</span>':'');
          /* Clic = modal basculement */
          card.onclick=function(){ouvrirBasculement(cli,wk,j,tournee.id);};
          body.appendChild(card);
        });
      }
      col.appendChild(body);
      row.appendChild(col);
    });

    section.appendChild(row);
    grid.appendChild(section);
  });

  /* ── Non affectés ── */
  var naZ=document.getElementById('na-zone');
  if(naZ){
    naZ.style.display=nv>0?'block':'none';
    document.getElementById('na-cnt').textContent=nv;
    var nb=document.getElementById('na-body');nb.innerHTML='';
    if(S.naOpen){
      na.forEach(function(cli){
        var chip=document.createElement('span');
        chip.className='na-chip';
        chip.style.cursor='pointer';
        chip.style.userSelect='none';
        var catInfo=CATS[cli.cat]||{icon:''};
        chip.innerHTML=catInfo.icon+' '+cli.nom+(cli.def?' <span style="opacity:.5;font-size:10px">→ '+cli.def.toUpperCase()+'</span>':'');
        if(isLog()) chip.onclick=function(){
          /* Si le client a un défaut tournée, l'affecter direct sinon ouvrir le modal */
          if(cli.def&&TOURNEES.find(function(t){return t.id===cli.def;})){
            setVal(wk,cli.id,j,cli.def);renderDay();

          } else {
            ouvrirBasculement(cli,wk,j,'');
          }
        };
        nb.appendChild(chip);
      });
    }
  }
}

/* ═══════════════════════════════════════
   MODAL BASCULEMENT — Déplacer un client vers une tournée
═══════════════════════════════════════ */
function ouvrirBasculement(cli,wk,j,tourneeActuelle){
  if(!isLog()) return;
  var ex=document.getElementById('modal-bascule');if(ex)ex.remove();

  var bg=document.createElement('div');
  bg.id='modal-bascule';
  bg.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px';
  bg.onclick=function(e){if(e.target===bg)bg.remove();};

  var box=document.createElement('div');
  box.style.cssText='background:#0d1b2e;border:2px solid #1a3550;border-radius:16px;padding:22px;width:100%;max-width:480px;font-family:-apple-system,Arial,sans-serif';

  var catInfo=CATS[cli.cat]||{icon:'',label:''};
  var h='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">';
  h+='<div><div style="font-size:16px;font-weight:900;color:#fff">'+catInfo.icon+' '+cli.nom+'</div>';
  h+='<div style="font-size:11px;color:#64748b;margin-top:3px">'+catInfo.label+' · Choisissez la tournée</div></div>';
  h+='<button onclick="document.getElementById(\'modal-bascule\').remove()" style="background:#1e293b;border:1px solid #334155;border-radius:8px;color:#94a3b8;padding:6px 12px;font-size:13px;font-weight:700;cursor:pointer">✕</button>';
  h+='</div>';

  /* Groupes et tournées */
  var groupeKeys=['collectivite','centres_aeres','traiteur'];
  groupeKeys.forEach(function(gk){
    var groupe=GROUPES[gk];
    var tourneesGroupe=TOURNEES.filter(function(t){return t.groupe===gk;});
    h+='<div style="margin-bottom:12px">';
    h+='<div style="font-size:10px;font-weight:900;color:'+groupe.couleur+';text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">'+groupe.label+'</div>';
    h+='<div style="display:flex;gap:6px;flex-wrap:wrap">';
    tourneesGroupe.forEach(function(t){
      var isActive=tourneeActuelle===t.id;
      h+='<button onclick="setVal(\''+wk+'\',\''+cli.id+'\','+j+',\''+t.id+'\');document.getElementById(\'modal-bascule\').remove();renderDay();toast(\'✅ '+cli.nom.replace(/'/g,'')+' → '+t.prenom.replace(/'/g,'')+'\');" ';
      h+='style="padding:10px 14px;background:'+(isActive?t.couleur+'33':t.bg)+';border:2px solid '+(isActive?t.couleur:t.border)+';border-radius:10px;color:'+t.couleur+';font-size:12px;font-weight:800;cursor:pointer;transition:.12s">';
      h+=t.icone+' '+t.prenom+'<br><span style="font-size:9px;opacity:.7">'+t.camion+'</span>';
      h+='</button>';
    });
    h+='</div></div>';
  });

  /* Bouton retirer */
  if(tourneeActuelle){
    h+='<div style="border-top:1px solid #1a3550;margin-top:12px;padding-top:12px">';
    h+='<button onclick="setVal(\''+wk+'\',\''+cli.id+'\','+j+',\'\');document.getElementById(\'modal-bascule\').remove();renderDay();toast(\'✅ '+cli.nom.replace(/'/g,'')+' retiré\');" ';
    h+='style="width:100%;padding:10px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:10px;color:#ef4444;font-size:12px;font-weight:800;cursor:pointer">✕ Retirer de toute tournée</button>';
    h+='</div>';
  }

  /* Bouton définir comme défaut */
  h+='<div style="margin-top:8px">';
  h+='<button onclick="definirDefaut(\''+cli.id+'\',\''+wk+'\','+j+')" style="width:100%;padding:8px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.25);border-radius:10px;color:#818cf8;font-size:11px;font-weight:700;cursor:pointer">⭐ Définir la tournée actuelle comme défaut pour ce client</button>';
  h+='</div>';

  box.innerHTML=h;
  bg.appendChild(box);
  document.body.appendChild(bg);
}

/* ── Définir une tournée comme défaut pour un client ── */
function definirDefaut(cliId,wk,j){
  var v=getVal(wk,cliId,j);
  if(!v){toast('Affectez d\'abord le client à une tournée');return;}
  var cli=getActiveClients().find(function(c){return c.id===cliId;});
  if(!cli)return;
  var idx2=S.clients[cliId]?S.clients[cliId]:CLIENTS_INIT.find(function(c){return c.id===cliId;})||{};
  if(!S.clients[cliId])S.clients[cliId]={};
  S.clients[cliId].def=v;
  /* Aussi mettre à jour CLIENTS_INIT */
  var ci=CLIENTS_INIT.find(function(c){return c.id===cliId;});
  if(ci)ci.def=v;
  save();
  document.getElementById('modal-bascule').remove();
  renderDay();
  var t=TOURNEES.find(function(t){return t.id===v;});
  toast('⭐ Défaut enregistré → '+cli.nom+' sera toujours en '+(t?t.prenom:v));
}

/* ══ RENDER COLONNE ══ */
function renderColBody(elId,wk,j,site,list){
  var el=document.getElementById(elId);el.innerHTML='';
  var ro=!isLog();
  if(!list.length){
    el.innerHTML='<div style="text-align:center;padding:40px 12px;color:var(--sub2);font-size:13px">'+(ro?'Aucun client affecté ici':'Cliquez CANA/SADI sur les non affectés ci-dessous')+'</div>';
    return;
  }

  /* Grouper par catégorie dans l'ordre */
  var order=['reg','cae'];

    var catInfo=CATS[cat];

    var section=document.createElement('div');section.className='cat-section';

      '<span class="cat-name" style="color:'+catInfo.col+'">'+catInfo.label+'</span>'+

      var body=document.createElement('div');body.className='cat-body';
      group.forEach(function(c){
        var v=getVal(wk,c.id,j);
        var prod=getProd(wk,j,c.id);
        var card=document.createElement('div');
        card.className='cli cli-'+(v||'empty')+(ro?' readonly':'');
        card.id='cli-card-'+c.id;
        card.innerHTML=
          '<div class="cli-dot dot-'+(v?v.charAt(0):'e')+'"></div>'+
          '<div class="cli-name">'+c.nom+'</div>'+
          (!ro?
            '<div class="cli-btns">'+
              '<button class="cb cb-c'+(v==='cana'?' on':'')+'">CANA</button>'+
              '<button class="cb cb-s'+(v==='sadi'?' on':'')+'">SADI</button>'+
              '<button class="cb cb-x">✕</button>'+
            '</div>':'')+
          '<button class="prod-btn p'+prod+'" style="margin-right:6px">'+PROD_LBL[prod]+'</button>'+
          (isLog()?'<span style="font-size:12px;cursor:pointer;padding:0 6px 0 2px;color:var(--sub);opacity:.7" title="Éditer" onclick="openEditClient(\''+c.id+'\')">⚙️</span>':'');

        if(!ro){
          var btns=card.querySelectorAll('.cb');
          btns[0].onclick=function(e){e.stopPropagation();setVal(wk,c.id,j,'cana');renderDay();};
          btns[1].onclick=function(e){e.stopPropagation();setVal(wk,c.id,j,'sadi');renderDay();};
          btns[2].onclick=function(e){e.stopPropagation();setVal(wk,c.id,j,'');renderDay();};
        }
        var pb=card.querySelector('.prod-btn');
        pb.onclick=function(e){
          e.stopPropagation();
          var cur=getProd(wk,j,c.id);var next=(cur+1)%3;
          setProd(wk,j,c.id,next);
          pb.className='prod-btn p'+next;pb.textContent=PROD_LBL[next];
        };
        body.appendChild(card);
      });
      section.appendChild(body);
    }
    el.appendChild(section);
  });
}

function saveClient(){

/* ══ SUPABASE SYNC ══ */
var SUPA_URL='https://lllzlidwtcjwsxbgkygn.supabase.co';
var SUPA_KEY='sb_publishable_3weqcRqeCv9lwclSAPC2rA_48OAwGcV';
var syncTimer=null;var pollTimer=null;var lastRemoteTime=0;

function supaH(){return{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'};}

function loadCloud(cb){
  setLed('sync','Chargement...');
  fetch(SUPA_URL+'/rest/v1/repartition_cana?id=eq.rep_principale&limit=1',{method:'GET',mode:'cors',headers:supaH()})
  .then(function(r){return r.json();})
  .then(function(rows){
    if(rows&&rows.length){
      var d=rows[0];
      if(d.data) S.data=d.data;
      if(d.notes) S.notes=d.notes;
      if(d.prod) S.prod=d.prod;
      if(d.clients&&Object.keys(d.clients).length) S.clients=d.clients;
      if(typeof d.vacances!=='undefined') S.vacances=!!d.vacances;
      if(d.updated_at) lastRemoteTime=new Date(d.updated_at).getTime();
      setLed('ok','Synchronisé ✓');
    } else setLed('ok','Prêt');
    if(cb) cb();
  }).catch(function(){setLed('off','Hors ligne');if(cb) cb();});
}

function saveCloud(){
  if(!S.role) return;
  setLed('sync','Sync...');
  fetch(SUPA_URL+'/rest/v1/repartition_cana',{
    method:'POST',mode:'cors',
    headers:supaH(),
    body:JSON.stringify({id:'rep_principale',data:S.data,notes:S.notes,prod:S.prod,clients:S.clients,vacances:S.vacances,updated_at:new Date().toISOString(),updated_by:S.role})
  }).then(function(r){setLed(r.ok?'ok':'err',r.ok?'Synchronisé ✓':'Erreur');})
  .catch(function(){setLed('off','Hors ligne');});
}

function scheduleCloudSave(){
  if(syncTimer) clearTimeout(syncTimer);
  syncTimer=setTimeout(saveCloud,700);
}

function startPoll(){
  if(pollTimer) return;
  pollTimer=setInterval(function(){
    if(!S.role) return;
    fetch(SUPA_URL+'/rest/v1/repartition_cana?id=eq.rep_principale&select=updated_at,updated_by&limit=1',{method:'GET',mode:'cors',headers:supaH()})
    .then(function(r){return r.json();})
    .then(function(rows){
      if(!rows||!rows.length) return;
      var t=new Date(rows[0].updated_at).getTime();
      var by=rows[0].updated_by;
      if(t>lastRemoteTime&&by&&by!==S.role){
        lastRemoteTime=t;
        loadCloud(function(){
          renderWeek();
          toast('🔄 Mis à jour automatiquement','var(--sadi)');
        });
      }
    }).catch(function(){});
  },3000);
}

document.addEventListener('keydown',function(e){

    var pz=document.getElementById('pw-zone');
    if(pz&&pz.style.display==='flex') doLogin();

});

<script>

/* ── Badge sur le bouton ── */

/* ── Ouvrir le panneau ── */

  hcLoad().then(function() { hcRenderPanel(); });

function hcRenderPanel() {

  var ov = document.createElement('div');

  var nb_att = _hcItems.filter(function(h){ return h.statut==='atraiter'; }).length;
  var nb_prog = _hcItems.filter(function(h){ return h.statut==='encours'; }).length;
  var nb_done = _hcItems.filter(function(h){ return h.statut==='traite'; }).length;

  box.innerHTML =
    '<div class="hc-header">'
    + '<div class="hc-title">🛒 Hors Carte</div>'
    + '<button onclick="document.getElementById(\'hc-overlay\').remove()" style="background:#1e293b;border:1px solid #334155;border-radius:8px;color:#94a3b8;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer">✕ Fermer</button>'
    + '</div>'

    /* Stats rapides */
    + '<div style="display:flex;gap:8px;flex-wrap:wrap">'
    + '<span class="hc-stat hc-stat-wait">🔴 À traiter : ' + nb_att + '</span>'
    + '<span class="hc-stat hc-stat-prog">🟡 En cours : ' + nb_prog + '</span>'
    + '<span class="hc-stat hc-stat-done">✅ Traités : ' + nb_done + '</span>'
    + '</div>'

    /* Onglets */
    + '<div class="hc-tabs">'
    + '<button class="hc-tab' + (_hcTab==='liste'?' on':'') + '" onclick="hcSwitchTab(\'liste\')">📋 Liste (' + _hcItems.length + ')</button>'
    + '<button class="hc-tab' + (_hcTab==='ajouter'?' on':'') + '" onclick="hcSwitchTab(\'ajouter\')">➕ Signaler</button>'
    + '</div>'

    /* Contenu */
    + '<div id="hc-panel-content" style="overflow-y:auto;flex:1"></div>';

  ov.appendChild(box);
  document.body.appendChild(ov);
  hcRefreshUI();

  /* Poll auto toutes les 8s */
  _hcPollTimer = setInterval(function(){
    hcLoad();
  }, 8000);
}

window.hcSwitchTab = function(tab) {
  _hcTab = tab;
  document.querySelectorAll('.hc-tab').forEach(function(b) {
    b.classList.toggle('on', b.textContent.includes(tab==='liste'?'Liste':'Signaler'));
  });
  hcRefreshUI();
};

function hcRefreshUI() {
  var el = document.getElementById('hc-panel-content');
  if (!el) return;
  if (_hcTab === 'ajouter') { hcRenderForm(el); }
  else { hcRenderListe(el); }
}

function hcRenderListe(el) {
  var isLog = S.role === 'log';
  if (!_hcItems.length) {
    el.innerHTML = '<div style="text-align:center;padding:32px;color:#475569;font-size:13px">🛒<br>Aucun hors carte pour le moment.<br><span style="font-size:11px">Cliquez sur "Signaler" pour en ajouter un.</span></div>';
    return;
  }

  /* Trier : à traiter en premier */
  var sorted = _hcItems.slice().sort(function(a,b){
    var o = {atraiter:0,encours:1,traite:2};
    return (o[a.statut]||0)-(o[b.statut]||0);
  });

  var cols = {atraiter:'#ef4444',encours:'#f59e0b',traite:'#22c55e'};
  var lbls = {atraiter:'🔴 À traiter',encours:'🟡 En cours',traite:'✅ Traité'};

  var h = '';
  sorted.forEach(function(item, si) {
    /* Retrouver l'index réel */
    var realIdx = _hcItems.indexOf(item);
    var col = cols[item.statut]||'#64748b';
    var lbl = lbls[item.statut]||item.statut;
    var d = item.dateEvenement ? new Date(item.dateEvenement).toLocaleDateString('fr-FR') : '';
    var urgClass = item.urgence==='urgent'?' urgent':'';

    h += '<div class="hc-item' + urgClass + '" style="border-left-color:' + col + '">';
    h += '<div style="flex:1;min-width:0">';
    h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">';
    h += '<span style="font-size:10px;font-weight:800;padding:2px 8px;border-radius:5px;background:'+col+'22;color:'+col+';border:1px solid '+col+'44">'+lbl+'</span>';
    if(item.service) h += '<span style="font-size:10px;color:#64748b;font-weight:700">📍 '+item.service+'</span>';
    if(item.urgence==='urgent') h += '<span style="font-size:10px;font-weight:900;color:#ef4444">⚡ URGENT</span>';
    h += '</div>';
    h += '<div style="font-size:14px;font-weight:900;color:#fff;margin-bottom:3px">' + (item.client||'Client non précisé') + '</div>';
    h += '<div style="font-size:13px;color:#e2e8f0;margin-bottom:4px">📦 ' + (item.article||'') + (item.quantite?' — Qté : '+item.quantite:'') + '</div>';
    if(d) h += '<div style="font-size:11px;color:'+col+';font-weight:700;margin-bottom:3px">📅 Évènement : '+d+'</div>';
    if(item.note) h += '<div style="font-size:11px;color:#94a3b8;font-style:italic;margin-bottom:6px">💬 '+item.note+'</div>';
    h += '<div style="font-size:10px;color:#475569">Par : '+(item.saisiepar||'—')+' · '+new Date(item.createdAt||0).toLocaleDateString('fr-FR')+'</div>';
    h += '</div>';

    /* Boutons action — logistique voit tout, cuisine voit en lecture */
    if(isLog) {
      h += '<div style="display:flex;flex-direction:column;gap:5px;flex-shrink:0">';
      if(item.statut==='atraiter') {
        h += '<button data-i="'+realIdx+'" onclick="hcSetSt(this.dataset.i,\'encours\')" style="padding:5px 10px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.35);border-radius:6px;color:#f59e0b;font-size:10px;font-weight:800;cursor:pointer;white-space:nowrap">🟡 En cours</button>';
      }
      if(item.statut!=='traite') {
        h += '<button data-i="'+realIdx+'" onclick="hcSetSt(this.dataset.i,\'traite\')" style="padding:5px 10px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:6px;color:#22c55e;font-size:10px;font-weight:800;cursor:pointer">✅ Traité</button>';
      }
      if(item.statut==='traite') {
        h += '<button data-i="'+realIdx+'" onclick="hcSetSt(this.dataset.i,\'atraiter\')" style="padding:5px 10px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:6px;color:#ef4444;font-size:10px;cursor:pointer">↩ Réouvrir</button>';
      }
      h += '<button data-i="'+realIdx+'" onclick="hcDelete(this.dataset.i)" style="padding:5px 10px;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);border-radius:6px;color:#ef4444;font-size:10px;cursor:pointer">🗑️</button>';
      h += '</div>';
    }
    h += '</div>';
  });
  el.innerHTML = h;
}

function hcRenderForm(el) {
  el.innerHTML = '<div class="hc-form">'
    + '<div style="font-size:13px;font-weight:900;color:#fff;margin-bottom:14px">📝 Signaler un hors carte</div>'
    + '<div class="hc-field"><label>Votre service / département</label>'
    + '<select id="hc-service"><option>Cuisine</option><option>Logistique</option><option>CRM / Insertion</option><option>Direction</option><option>Autre</option></select></div>'
    + '<div class="hc-field"><label>Client / Évènement *</label><input id="hc-client" placeholder="Ex : Mariage Dupont, séminaire ville de Marseille..."/></div>'
    + '<div class="hc-field"><label>Article / Commande *</label><input id="hc-article" placeholder="Ex : 80 portions supplémentaires dessert"/></div>'
    + '<div class="hc-field"><label>Quantité</label><input id="hc-qte" placeholder="Ex : 80"/></div>'
    + '<div class="hc-field"><label>Date de l\'évènement</label><input type="date" id="hc-date"/></div>'
    + '<div class="hc-field"><label>Urgence</label>'
    + '<select id="hc-urgence"><option value="normal">Normal — peut attendre</option><option value="urgent">⚡ Urgent — traiter immédiatement</option></select></div>'
    + '<div class="hc-field"><label>Notes / précisions</label><textarea id="hc-note" rows="3" placeholder="Infos supplémentaires pour le responsable logistique..."></textarea></div>'
    + '<button class="hc-btn-send" onclick="hcEnvoyer()">📤 Envoyer au responsable logistique</button>'
    + '</div>';
}

window.hcEnvoyer = function() {
  var client = (document.getElementById('hc-client')||{}).value||'';
  var article = (document.getElementById('hc-article')||{}).value||'';
  if(!client.trim()||!article.trim()) { toast('Client et article requis','var(--red)'); return; }
  var newHC = {
    id: Date.now(),
    service: (document.getElementById('hc-service')||{}).value||'',
    client: client.trim(),
    article: article.trim(),
    quantite: (document.getElementById('hc-qte')||{}).value||'',
    dateEvenement: (document.getElementById('hc-date')||{}).value||'',
    urgence: (document.getElementById('hc-urgence')||{}).value||'normal',
    note: (document.getElementById('hc-note')||{}).value||'',
    saisiepar: (S.role==='log'?'Logistique':'Cuisine'),
    statut: 'atraiter',
    createdAt: new Date().toISOString()
  };
  _hcItems.push(newHC);
  hcSave().then(function(){
    hcUpdateBadge();
    _hcTab = 'liste';
    hcRenderPanel();
    toast('✅ Hors carte envoyé au responsable logistique','#22c55e');
  });
};

window.hcSetSt = function(i, statut) {
  if(!_hcItems[i]) return;
  _hcItems[i].statut = statut;
  if(statut==='traite') _hcItems[i].traiteLe = new Date().toISOString();
  hcSave().then(function(){ hcUpdateBadge(); hcRefreshUI(); });
};

window.hcDelete = function(i) {
  if(!confirm('Supprimer ce hors carte ?')) return;
  _hcItems.splice(parseInt(i), 1);
  hcSave().then(function(){ hcUpdateBadge(); hcRefreshUI(); });
};

/* ── Polling au démarrage ── */
setTimeout(hcLoad, 3000);
setInterval(hcLoad, 30000);

</script>

<script>
/* ═══════════════════════════════════════════════════════════════
   AMÉLIORATIONS RÉPARTITEUR — La Table de Cana
   1. Récapitulatif hebdomadaire
   2. Impression PDF de la répartition
   3. Équilibrage automatique
   4. Statistiques par tournée
   5. Historique des modifications
   6. Renommer les chauffeurs
   7. Mini-légende et indicateurs
═══════════════════════════════════════════════════════════════ */
(function(){

var JOURS_SEMAINE=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];

/* ══ 1. RÉCAPITULATIF HEBDOMADAIRE ══ */
window.ouvrirRecap=function(){
  var ex=document.getElementById('recap-win');if(ex){ex.remove();return;}

  var mon=getMonday(S.weekOffset);
  var days=getDays(mon);
  var wk=weekKey(mon);
  var ac=getActiveClients();

  var win=document.createElement('div');
  win.id='recap-win';
  win.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:99999;display:flex;align-items:center;justify-content:center;padding:12px;font-family:-apple-system,Arial,sans-serif';
  win.onclick=function(e){if(e.target===win)win.remove();};

  var box=document.createElement('div');
  box.style.cssText='background:#07101e;border:2px solid #6366f1;border-radius:18px;width:100%;max-width:1150px;max-height:95vh;display:flex;flex-direction:column;overflow:hidden';

  // Construire le tableau croisé tournées × jours
  var h='<div style="background:#0f1928;border-bottom:2px solid #1a3550;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">';
  h+='<div><div style="font-size:18px;font-weight:900;color:#fff">📊 Récapitulatif de la semaine</div>';
  h+='<div style="font-size:11px;color:#64748b">Semaine du '+fmtD(days[0])+' au '+fmtD(days[6])+'</div></div>';
  h+='<div style="display:flex;gap:8px">';
  h+='<button onclick="imprimerRecap()" style="background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);border-radius:8px;color:#22c55e;padding:7px 14px;font-size:12px;font-weight:800;cursor:pointer">🖨️ Imprimer</button>';
  h+='<button onclick="document.getElementById(\'recap-win\').remove()" style="background:#1e293b;border:1px solid #334155;border-radius:8px;color:#94a3b8;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer">✕</button>';
  h+='</div></div>';

  h+='<div style="overflow:auto;flex:1;padding:16px 20px">';

  // Tableau jours × tournées
  h+='<table style="width:100%;border-collapse:separate;border-spacing:0;min-width:900px">';
  h+='<thead><tr>';
  h+='<th style="padding:10px 12px;background:#0d1b2e;font-size:11px;font-weight:800;color:#64748b;text-align:left;border-bottom:2px solid #1a3550;position:sticky;left:0;z-index:2">Tournée</th>';
  for(var ji=0;ji<7;ji++){
    var isToday=days[ji].toISOString().slice(0,10)===new Date().toISOString().slice(0,10);
    h+='<th style="padding:10px 8px;background:#0d1b2e;font-size:10px;font-weight:800;color:'+(isToday?'#f97316':'#64748b')+';text-align:center;border-bottom:2px solid #1a3550">'+JOURS_SEMAINE[ji]+'<br><span style="font-size:9px;color:#334155">'+fmtD(days[ji])+'</span></th>';
  }
  h+='<th style="padding:10px 8px;background:#0d1b2e;font-size:10px;font-weight:800;color:#6366f1;text-align:center;border-bottom:2px solid #1a3550">Total semaine</th>';
  h+='</tr></thead><tbody>';

  TOURNEES.forEach(function(t){
    h+='<tr>';
    // Colonne tournée
    h+='<td style="padding:10px 12px;border-bottom:1px solid #1a3550;border-left:3px solid '+t.couleur+';background:#071526;position:sticky;left:0;z-index:1">';
    h+='<div style="font-size:12px;font-weight:900;color:'+t.couleur+'">'+t.icone+' '+t.prenom+'</div>';
    h+='<div style="font-size:9px;color:#475569">'+t.camion+'</div></td>';

    var totalSem=0;
    for(var ji2=0;ji2<7;ji2++){
      var clients=ac.filter(function(cl){return getVal(wk,cl.id,ji2)===t.id;});
      totalSem+=clients.length;
      var isToday2=days[ji2].toISOString().slice(0,10)===new Date().toISOString().slice(0,10);
      h+='<td style="padding:6px 8px;border-bottom:1px solid #1a3550;text-align:center;background:'+(isToday2?'rgba(249,115,22,.03)':'transparent')+'">';
      if(clients.length){
        h+='<div style="display:flex;flex-direction:column;gap:2px">';
        clients.slice(0,3).forEach(function(cl){
          var catInfo=CATS[cl.cat]||{icon:''};
          h+='<div style="font-size:9px;color:#e2e8f0;background:'+t.couleur+'18;border-radius:4px;padding:2px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px">'+catInfo.icon+' '+cl.nom+'</div>';
        });
        if(clients.length>3)h+='<div style="font-size:9px;color:#475569">+'+( clients.length-3)+' autres</div>';
        h+='<div style="font-size:10px;font-weight:900;color:'+t.couleur+';margin-top:2px">'+clients.length+' client'+(clients.length>1?'s':'')+'</div>';
        h+='</div>';
      } else {
        h+='<div style="color:#1e3a5f;font-size:10px">—</div>';
      }
      h+='</td>';
    }

    // Total semaine
    h+='<td style="padding:10px 8px;border-bottom:1px solid #1a3550;text-align:center">';
    h+='<div style="font-size:18px;font-weight:900;color:'+t.couleur+'">'+totalSem+'</div>';
    h+='<div style="font-size:9px;color:#475569">livraisons</div></td>';
    h+='</tr>';
  });

  // Ligne totaux
  h+='<tr style="background:#071526"><td style="padding:10px 12px;border-top:2px solid #1a3550;font-size:11px;font-weight:900;color:#64748b;position:sticky;left:0;background:#071526">TOTAUX</td>';
  var totalSemGlobal=0;
  for(var ji3=0;ji3<7;ji3++){
    var totalJour=ac.filter(function(cl){return getVal(wk,cl.id,ji3)!=='';}).length;
    totalSemGlobal+=totalJour;
    h+='<td style="padding:10px 8px;border-top:2px solid #1a3550;text-align:center"><div style="font-size:14px;font-weight:900;color:#fff">'+totalJour+'</div></td>';
  }
  h+='<td style="padding:10px 8px;border-top:2px solid #1a3550;text-align:center"><div style="font-size:18px;font-weight:900;color:#6366f1">'+totalSemGlobal+'</div></td>';
  h+='</tr></tbody></table>';

  // Stats par groupe
  h+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px">';
  Object.keys(GROUPES).forEach(function(gk){
    var groupe=GROUPES[gk];
    var tourneesG=TOURNEES.filter(function(t){return t.groupe===gk;});
    var total=0;
    tourneesG.forEach(function(t){
      for(var ji4=0;ji4<7;ji4++){
        total+=ac.filter(function(cl){return getVal(wk,cl.id,ji4)===t.id;}).length;
      }
    });
    h+='<div style="background:#0d1b2e;border:1px solid '+groupe.couleur+'33;border-radius:12px;padding:14px;border-left:4px solid '+groupe.couleur+'">';
    h+='<div style="font-size:13px;font-weight:900;color:'+groupe.couleur+';margin-bottom:6px">'+groupe.label+'</div>';
    h+='<div style="font-size:22px;font-weight:900;color:#fff">'+total+'</div>';
    h+='<div style="font-size:10px;color:#64748b">livraisons sur la semaine</div>';
    h+='</div>';
  });
  h+='</div>';

  h+='</div>';
  box.innerHTML=h;
  win.appendChild(box);
  document.body.appendChild(win);
};

/* ══ 2. IMPRESSION RÉPARTITION DU JOUR ══ */
window.imprimerRepartition=function(){
  var mon=getMonday(S.weekOffset);
  var days=getDays(mon);
  var wk=weekKey(mon);
  var j=S.dayIdx;
  var dateStr=JOURS_SEMAINE[j]+' '+fmtD(days[j]);
  var ac=getActiveClients();

  var html='<!DOCTYPE html><html><head><meta charset="UTF-8">';
  html+='<title>Répartition — '+dateStr+'</title>';
  html+='<style>body{font-family:Arial,sans-serif;padding:20px;color:#1a2435;font-size:12px}';
  html+='h1{font-size:18px;color:#f97316;border-bottom:3px solid #f97316;padding-bottom:6px;margin-bottom:4px}';
  html+='.sub{color:#64748b;font-size:11px;margin-bottom:18px}';
  html+='.tournees{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}';
  html+='.tournee{border:1px solid #e2e8f0;border-radius:8px;overflow:hidden}';
  html+='.th{padding:8px 12px;font-size:12px;font-weight:900;color:#fff}';
  html+='.client{padding:5px 10px;border-bottom:1px solid #f1f5f9;font-size:11px;display:flex;align-items:center;gap:6px}';
  html+='.cnt{font-size:11px;font-weight:700;padding:4px 10px;background:#f8fafc;color:#64748b}';
  html+='.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px}';
  html+='.stat{background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:10px;text-align:center}';
  html+='.sv{font-size:20px;font-weight:900}.sl{font-size:9px;color:#64748b;text-transform:uppercase}';
  html+='@media print{.no-print{display:none}}';
  html+='</style></head><body>';
  html+='<div class="no-print" style="text-align:right;margin-bottom:12px"><button onclick="window.print()" style="padding:8px 16px;background:#f97316;border:none;border-radius:6px;color:#fff;font-weight:700;cursor:pointer">🖨️ Imprimer</button></div>';
  html+='<h1>🍽️ La Table de Cana — Répartition des livraisons</h1>';
  html+='<div class="sub">'+dateStr+(S.vacances?' · 🌴 Vacances scolaires':'')+'</div>';

  var totalAffectes=0;
  html+='<div class="tournees">';
  TOURNEES.forEach(function(t){
    var clients=ac.filter(function(cl){return getVal(wk,cl.id,j)===t.id;});
    totalAffectes+=clients.length;
    var colHex=t.couleur;
    html+='<div class="tournee">';
    html+='<div class="th" style="background:'+colHex+'">'+t.icone+' '+t.prenom+' · '+t.camion+'</div>';
    if(!clients.length){html+='<div class="client" style="color:#94a3b8">Aucun client affecté</div>';}
    clients.forEach(function(cl){
      var catInfo=CATS[cl.cat]||{icon:''};
      html+='<div class="client">'+catInfo.icon+' '+cl.nom+'</div>';
    });
    html+='<div class="cnt">'+clients.length+' client'+(clients.length!==1?'s':'')+'</div>';
    html+='</div>';
  });
  html+='</div>';

  var naList=ac.filter(function(cl){return getVal(wk,cl.id,j)==='';});
  if(naList.length){
    html+='<div style="border:1px solid #fca5a5;border-radius:6px;padding:10px;margin-bottom:16px;background:#fef2f2">';
    html+='<div style="font-weight:800;color:#ef4444;margin-bottom:6px">⚠️ Non affectés ('+naList.length+')</div>';
    html+=naList.map(function(cl){return '<span style="font-size:11px;margin-right:8px">'+cl.nom+'</span>';}).join('');
    html+='</div>';
  }

  var note=getNote(wk,j);
  if(note)html+='<div style="border-left:3px solid #f97316;padding:8px 12px;background:#fff7ed;border-radius:4px;margin-bottom:14px;font-size:11px">📝 '+note+'</div>';

  html+='<div class="stats">';
  [{v:totalAffectes,l:'Clients affectés'},{v:naList.length,l:'Non affectés'},{v:TOURNEES.length,l:'Tournées actives'},{v:ac.length,l:'Total clients'}].forEach(function(s){
    html+='<div class="stat"><div class="sv">'+s.v+'</div><div class="sl">'+s.l+'</div></div>';
  });
  html+='</div>';

  html+='<div style="margin-top:20px;padding-top:10px;border-top:1px solid #e2e8f0;font-size:9px;color:#94a3b8;text-align:center">';
  html+='Répartition générée le '+new Date().toLocaleString('fr-FR')+' · La Table de Cana Marseille';
  html+='</div></body></html>';

  var w=window.open('','_blank');
  if(w){w.document.write(html);w.document.close();}
  else toast('Autorisez les popups pour imprimer','var(--red)');
};

/* ══ 3. IMPRIMER LE RÉCAP SEMAINE ══ */
window.imprimerRecap=function(){
  var mon=getMonday(S.weekOffset);
  var days=getDays(mon);
  var wk=weekKey(mon);
  var ac=getActiveClients();

  var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Récap semaine</title>';
  html+='<style>body{font-family:Arial,sans-serif;padding:20px;color:#1a2435;font-size:11px}';
  html+='h1{font-size:16px;color:#f97316;border-bottom:2px solid #f97316;padding-bottom:5px}';
  html+='table{width:100%;border-collapse:collapse;margin-top:12px}th,td{border:1px solid #e2e8f0;padding:6px 8px}';
  html+='th{background:#1a2435;color:#fff;font-size:10px}';
  html+='@media print{.no-print{display:none}}</style></head><body>';
  html+='<div class="no-print" style="text-align:right;margin-bottom:10px"><button onclick="window.print()" style="padding:7px 14px;background:#f97316;border:none;border-radius:5px;color:#fff;font-weight:700;cursor:pointer">🖨️ Imprimer</button></div>';
  html+='<h1>📊 La Table de Cana — Récapitulatif semaine</h1>';
  html+='<p>Semaine du '+fmtD(days[0])+' au '+fmtD(days[6])+(S.vacances?' · Vacances scolaires':'')+'</p>';
  html+='<table><thead><tr><th>Tournée</th>';
  days.forEach(function(d,i){html+='<th>'+JOURS_SEMAINE[i]+'<br>'+fmtD(d)+'</th>';});
  html+='<th>Total</th></tr></thead><tbody>';
  TOURNEES.forEach(function(t){
    html+='<tr><td style="font-weight:700;border-left:3px solid '+t.couleur+'">'+t.icone+' '+t.prenom+'<br><span style="font-size:9px;color:#64748b">'+t.camion+'</span></td>';
    var tot=0;
    for(var ji=0;ji<7;ji++){
      var clients=ac.filter(function(cl){return getVal(wk,cl.id,ji)===t.id;});
      tot+=clients.length;
      html+='<td style="text-align:center;font-size:10px">';
      if(clients.length){
        html+='<b style="color:'+t.couleur+'">'+clients.length+'</b><br>';
        html+=clients.slice(0,2).map(function(cl){return cl.nom.split(' ')[0];}).join(', ');
        if(clients.length>2)html+='...';
      } else {html+='<span style="color:#cbd5e1">—</span>';}
      html+='</td>';
    }
    html+='<td style="text-align:center;font-weight:900;color:'+t.couleur+'">'+tot+'</td></tr>';
  });
  html+='</tbody></table></body></html>';
  var w=window.open('','_blank');if(w){w.document.write(html);w.document.close();}
};

/* ══ 4. ÉQUILIBRAGE AUTOMATIQUE ══ */
window.equilibrerTournees=function(){
  var mon=getMonday(S.weekOffset);
  var wk=weekKey(mon);
  var j=S.dayIdx;
  var ac=getActiveClients();

  // Compter les clients non affectés + ceux dans chaque tournée
  var parTournee={};
  TOURNEES.forEach(function(t){parTournee[t.id]=[];});
  var nonAffectes=[];
  ac.forEach(function(cl){
    var v=getVal(wk,cl.id,j);
    if(parTournee[v]) parTournee[v].push(cl);
    else nonAffectes.push(cl);
  });

  // Grouper les tournées par groupe
  var parGroupe={};
  TOURNEES.forEach(function(t){
    if(!parGroupe[t.groupe]) parGroupe[t.groupe]={tournees:[],clients:[]};
    parGroupe[t.groupe].tournees.push(t);
    parGroupe[t.groupe].clients=parGroupe[t.groupe].clients.concat(parTournee[t.id]);
  });

  // Pour chaque groupe, répartir les clients de façon équilibrée
  var modified=0;
  Object.keys(parGroupe).forEach(function(gk){
    var g=parGroupe[gk];
    if(!g.tournees.length) return;
    var clients=g.clients.slice();
    // Trier par tournée de défaut puis distribuer équitablement
    var perTournee=Math.floor(clients.length/g.tournees.length);
    var reste=clients.length%g.tournees.length;
    var idx=0;
    g.tournees.forEach(function(t,ti){
      var nb=perTournee+(ti<reste?1:0);
      for(var i=0;i<nb&&idx<clients.length;i++,idx++){
        var oldVal=getVal(wk,clients[idx].id,j);
        if(oldVal!==t.id){setVal(wk,clients[idx].id,j,t.id);modified++;}
      }
    });
  });

  // Aussi affecter les non affectés selon leur défaut ou le groupe
  nonAffectes.forEach(function(cl){
    if(cl.def){setVal(wk,cl.id,j,cl.def);modified++;}
    else{
      // Affecter au groupe selon la catégorie
      var t=cl.cat==='reg'?TOURNEES[0]:cl.cat==='traiteur'?TOURNEES[6]:TOURNEES[2];
      setVal(wk,cl.id,j,t.id);modified++;
    }
  });

  save();
  if(typeof renderDay==='function') renderDay();
  toast('⚖️ '+modified+' clients rééquilibrés','#f59e0b');
};

/* ══ 5. STATISTIQUES PAR TOURNÉE EN TEMPS RÉEL ══ */
/* Ajouter une barre de stats sous le topbar */
function afficherStatsBar(){
  var existingBar=document.getElementById('stats-tournees-bar');
  if(existingBar)existingBar.remove();

  var mon=getMonday(S.weekOffset);
  var wk=weekKey(mon);
  var j=S.dayIdx||0;
  var ac=getActiveClients();

  var bar=document.createElement('div');
  bar.id='stats-tournees-bar';
  bar.style.cssText='display:flex;gap:6px;padding:6px 14px;background:#071526;border-bottom:1px solid #1a3550;overflow-x:auto;flex-shrink:0;align-items:center';

  var totalAff=0;
  TOURNEES.forEach(function(t){
    var clients=ac.filter(function(cl){return getVal(wk,cl.id,j)===t.id;});
    totalAff+=clients.length;
    var chip=document.createElement('div');
    chip.style.cssText='display:flex;align-items:center;gap:5px;background:'+t.couleur+'14;border:1px solid '+t.couleur+'33;border-radius:8px;padding:4px 10px;flex-shrink:0;cursor:pointer';
    chip.title='Cliquez pour voir les clients de '+t.prenom;
    chip.innerHTML='<span style="font-size:12px">'+t.icone+'</span>'
      +'<span style="font-size:11px;font-weight:800;color:'+t.couleur+'">'+t.prenom+'</span>'
      +'<span style="font-size:11px;font-weight:900;color:#fff;background:'+t.couleur+';border-radius:5px;padding:1px 6px">'+clients.length+'</span>';
    bar.appendChild(chip);
  });

  // Non affectés
  var na=ac.filter(function(cl){return getVal(wk,cl.id,j)==='';}).length;
  if(na>0){
    var naChip=document.createElement('div');
    naChip.style.cssText='display:flex;align-items:center;gap:5px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:4px 10px;flex-shrink:0';
    naChip.innerHTML='<span style="font-size:11px;font-weight:800;color:#ef4444">⚠️ '+na+' non affecté'+(na>1?'s':'')+'</span>';
    bar.appendChild(naChip);
  }

  // Total
  var totalChip=document.createElement('div');
  totalChip.style.cssText='margin-left:auto;display:flex;align-items:center;gap:5px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.25);border-radius:8px;padding:4px 10px;flex-shrink:0';
  totalChip.innerHTML='<span style="font-size:11px;font-weight:800;color:#818cf8">📊 Total: '+totalAff+'/'+ac.length+'</span>';
  bar.appendChild(totalChip);

  // Insérer après la week-bar
  var weekBar=document.querySelector('.week-bar');
  if(weekBar&&weekBar.nextSibling) weekBar.parentNode.insertBefore(bar,weekBar.nextSibling);
  else document.getElementById('app')&&document.getElementById('app').appendChild(bar);
}

/* ══ 6. RENOMMER LES CHAUFFEURS ══ */
window.ouvrirRenommerChauffeurs=function(){
  var ex=document.getElementById('rename-win');if(ex){ex.remove();return;}
  var win=document.createElement('div');
  win.id='rename-win';
  win.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:99999;display:flex;align-items:center;justify-content:center;padding:16px;font-family:-apple-system,Arial,sans-serif';
  win.onclick=function(e){if(e.target===win)win.remove();};
  var box=document.createElement('div');
  box.style.cssText='background:#07101e;border:2px solid #f97316;border-radius:16px;padding:22px;width:100%;max-width:520px;overflow-y:auto;max-height:90vh';

  var h='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">';
  h+='<div style="font-size:17px;font-weight:900;color:#fff">👤 Personnaliser les chauffeurs</div>';
  h+='<button onclick="document.getElementById(\'rename-win\').remove()" style="background:#1e293b;border:1px solid #334155;border-radius:8px;color:#94a3b8;padding:7px 12px;font-size:13px;font-weight:700;cursor:pointer">✕</button>';
  h+='</div>';

  TOURNEES.forEach(function(t,ti){
    h+='<div style="margin-bottom:14px;background:#0d1b2e;border:1px solid '+t.couleur+'33;border-left:4px solid '+t.couleur+';border-radius:10px;padding:12px">';
    h+='<div style="font-size:11px;font-weight:800;color:'+t.couleur+';margin-bottom:8px">'+t.icone+' Tournée '+(ti+1)+'</div>';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
    h+='<div><label style="font-size:9px;font-weight:800;color:#64748b;text-transform:uppercase;display:block;margin-bottom:3px">Prénom</label>';
    h+='<input id="rn-prenom-'+ti+'" value="'+t.prenom+'" style="width:100%;background:#071526;border:1px solid #1a3550;border-radius:6px;color:#fff;padding:7px 9px;font-size:12px;outline:none;box-sizing:border-box"></div>';
    h+='<div><label style="font-size:9px;font-weight:800;color:#64748b;text-transform:uppercase;display:block;margin-bottom:3px">Véhicule</label>';
    h+='<input id="rn-camion-'+ti+'" value="'+t.camion+'" style="width:100%;background:#071526;border:1px solid #1a3550;border-radius:6px;color:#fff;padding:7px 9px;font-size:12px;outline:none;box-sizing:border-box"></div>';
    h+='</div></div>';
  });

  h+='<button onclick="sauverRenommage()" style="width:100%;margin-top:14px;padding:12px;background:#f97316;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:900;cursor:pointer">💾 Enregistrer</button>';

  box.innerHTML=h;
  win.appendChild(box);
  document.body.appendChild(win);
};

window.sauverRenommage=function(){
  TOURNEES.forEach(function(t,ti){
    var prenom=(document.getElementById('rn-prenom-'+ti)||{}).value||t.prenom;
    var camion=(document.getElementById('rn-camion-'+ti)||{}).value||t.camion;
    t.prenom=prenom.trim();
    t.camion=camion.trim();
  });
  // Sauvegarder dans localStorage
  try{localStorage.setItem('cana_tournees',JSON.stringify(TOURNEES.map(function(t){return{id:t.id,prenom:t.prenom,camion:t.camion};})));}catch(e){}
  document.getElementById('rename-win').remove();
  if(typeof renderDay==='function')renderDay();
  toast('✅ Chauffeurs mis à jour','#22c55e');
};

/* ══ 7. CHARGER PERSONNALISATION AU DÉMARRAGE ══ */
setTimeout(function(){
  try{
    var saved=localStorage.getItem('cana_tournees');
    if(saved){
      var data=JSON.parse(saved);
      data.forEach(function(d){
        var t=TOURNEES.find(function(t){return t.id===d.id;});
        if(t){t.prenom=d.prenom;t.camion=d.camion;}
      });
    }
  }catch(e){}

  // Ajouter le bouton "Renommer" dans la topbar
  var tbRight=document.querySelector('.tb-right');
  if(tbRight&&!document.getElementById('btn-rename')){
    var btn=document.createElement('button');
    btn.id='btn-rename';
    btn.className='tb-btn';
    btn.style.cssText='background:rgba(249,115,22,.1);border-color:rgba(249,115,22,.25);color:#f97316;font-weight:800';
    btn.textContent='👤 Chauffeurs';
    btn.onclick=window.ouvrirRenommerChauffeurs;
    tbRight.insertBefore(btn,tbRight.firstChild);
  }

  // Afficher la barre de stats
  if(typeof afficherStatsBar==='function') afficherStatsBar();

  // Patcher renderDay pour rafraîchir les stats après chaque render
  var origRenderDay=window.renderDay;
  if(typeof origRenderDay==='function'){
    window.renderDay=function(){
      origRenderDay.apply(this,arguments);
      setTimeout(afficherStatsBar,100);
    };
  }

  console.log('✅ Améliorations répartiteur: récap·impression·équilibrage·stats·renommage');
},1500);

})();
